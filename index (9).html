  <div class="card" style="margin-bottom:14px">
    <div class="between"><b>Расходы доставщика</b><button class="btn ghost sm" style="width:auto;padding:6px 12px" onclick="shrAddExp('${sh.id}')">${I.plus} Расход</button></div>
    ${exps.length?`<table style="width:100%;font-size:13px;margin-top:10px"><tbody>${exps.map(e=>`<tr><td>${esc((DB.expenseCats.find(c=>c.id===e.cat)||{}).name||'Расход')}</td><td class="hint">${esc(e.note||'')}</td><td class="num">${money(e.amount)}</td><td class="num"><button class="btn danger sm" style="width:auto;padding:3px 8px" onclick="shrDelExp('${e.id}','${sh.id}')">✕</button></td></tr>`).join('')}</tbody></table>`:'<div class="hint" style="margin-top:8px">Расходов нет. Например: топливо, питание, ремонт.</div>'}
  </div>
  <div class="card" style="background:#EAF3FF;border:1px solid #B9D4F5">
    <div class="between"><div><b>Итого во временный счёт</b><div class="hint">Собрано ${short(total)} − расходы ${short(expSum)}</div></div>
      <div style="font-size:24px;font-weight:800;color:var(--navy)">${money(net)}</div></div>
    <button class="btn primary" style="width:100%;margin-top:12px" onclick="shrToTempCash('${sh.id}')">💰 Принять деньги во временный счёт</button>
  </div>`;
}
function shrAddExp(sid){
  openModal(`<h2>Расход доставщика</h2>
    <div class="field"><label>Категория</label><select id="se_cat">${(DB.expenseCats||[]).map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')||'<option value="">— создайте в Настройках —</option>'}</select></div>
    <div class="field"><label>Сумма</label><input id="se_amt" type="number" placeholder="напр. 200000"></div>
    <div class="field"><label>Примечание</label><input id="se_note" placeholder="напр. топливо"></div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="shrSaveExp('${sid}')">Добавить</button></div>`);
}
function shrSaveExp(sid){const amt=+$('#se_amt').value;if(!amt){toast('Введите сумму');return;}
  DB.expenses=DB.expenses||[];DB.expenses.push({id:uid('ex'),cat:$('#se_cat').value,amount:amt,note:$('#se_note').value.trim(),employee:shipment(sid).courier||'',shipment:sid,date:nowTashkent()});
  saveDB();if(sbCfg())scheduleCloudPush();closeModal();renderShipReturn();toast('Расход добавлен');}
function shrDelExp(eid,sid){DB.expenses=DB.expenses.filter(e=>e.id!==eid);saveDB();renderShipReturn();toast('Расход удалён');}
function shrToTempCash(sid){const sh=shipment(sid);
  askCode(()=>{
    sh.cashAccepted=true;sh.cashAcceptedAt=nowTashkent();
    logAct('Финансы','Возврат '+sh.number+': деньги во временный счёт','');saveDB();if(sbCfg())scheduleCloudPush();
    renderShipReturn();toast('💰 Деньги приняты во временный счёт');});}
function shipStatus(sid,st){const sh=shipment(sid);
  if(st==='transit'){
    if(!sh.courier){toast('Сначала назначьте доставщика');return;}
    sh.status='transit';sh.sentAt=nowTashkent();
    logAct('Заявки','Отгрузка '+sh.number+' отправлена в путь','🚚');saveDB();if(sbCfg())scheduleCloudPush();ordShipments();
    toast('🚚 Отгрузка в пути — доставщик видит её на телефоне. Лист заблокирован для изменений.');return;}
  if(st==='returned'){
    sh.status='returned';sh.returnedAt=nowTashkent();
    if(sh.vanSale&&!sh._loadReturned&&Array.isArray(sh.load)){const w=(sh.warehouses&&sh.warehouses[0])||'w_main';
      sh.load.forEach(i=>{const p=prod(i.p);if(p&&i.q>0){p.stockBy=p.stockBy||{};p.stockBy[w]=(p.stockBy[w]||0)+i.q;p.stock=(p.stock||0)+i.q;}});
      sh._loadReturned=true;logAct('Склад','Ван-сел '+sh.number+': непроданный товар возвращён на склад','');}
    // блокируем кассу доставщика: больше не может перекидывать деньги во временную кассу по этому листу
    sh.courierCashLocked=true;
    const x=shipStats(sh);
    logAct('Заявки','Доставщик вернулся: '+sh.number,'✅'+x.del+' ❌'+x.can+' ⏳'+x.pend);saveDB();if(sbCfg())scheduleCloudPush();ordShipments();
    toast(x.pend>0?'↩️ Доставщик вернулся. '+x.pend+' не доставлено — нажмите «Получить остатки».':'↩️ Доставщик вернулся. Все заявки закрыты — можно завершить.');return;}
  if(st==='done'){const x=shipStats(sh);
    if(x.pend>0){toast('Нельзя завершить: '+x.pend+' заявок не закрыты (Доставлено/Отказ). Получите остатки.');openShipment(sid);return;}
    sh.status='done';logAct('Заявки','Отгрузка завершена: '+sh.number,'✅'+x.del+' ❌'+x.can);saveDB();if(sbCfg())scheduleCloudPush();ordShipments();toast('Отгрузка завершена');return;}
  sh.status=st;saveDB();ordShipments();}

/* ---- Доставка ---- */
let delivFilt={ship:'all',q:''};
/* ============ ДОСТАВКА — модуль (Список · Транспорт · Планы · Ван-сел) ============ */
let delivView='list',delivSearch='',delivStatusF='';            // list | transport | plans
let planAnchor=null;             // понедельник показываемой недели (iso)

function delivActive(){return DB.shipments.filter(s=>s.status!=='done');}
function delivMetrics(list){
  let pts=0,del=0,can=0;const drivers=new Set();
  list.forEach(sh=>{const st=shipStats(sh);pts+=st.os.length;del+=st.del;can+=st.can;if(sh.courier)drivers.add(sh.courier);});
  return {pts,del,can,pend:Math.max(0,pts-del-can),drivers:drivers.size};
}
function shRoutes(sh){return new Set(shipStats(sh).os.map(o=>o.route).filter(Boolean)).size;}
function shPct(sh){const st=shipStats(sh);return st.os.length?Math.round((st.del+st.can)/st.os.length*100):0;}
function dAva(name){const i=((name||'?').trim()[0]||'?').toUpperCase();
  return `<span style="width:30px;height:30px;border-radius:50%;background:var(--green-100);color:var(--green);display:inline-grid;place-items:center;font-weight:700;font-size:13px">${esc(i)}</span>`;}
function dWeekMon(d){const dt=new Date(d);const wd=(dt.getDay()+6)%7;dt.setDate(dt.getDate()-wd);return iso(dt);}

function ordDelivery(){
  const active=delivActive();const m=delivMetrics(active);
  const sw=(v,l)=>`<button class="${delivView===v?'on':''}" style="padding:9px 16px" onclick="delivView='${v}';ordDelivery()">${l}</button>`;
  const head=`${ordSubBar()}
  <div class="between" style="margin-bottom:14px;flex-wrap:wrap;gap:10px">
    <div><h2 style="margin:0;display:inline-block">Доставка</h2>
      <span class="pill blue" style="margin-left:8px">${active.length}</span>
      <span class="hint" style="margin-left:8px">${money(active.reduce((s,sh)=>s+shipStats(sh).sum,0))}</span></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <div class="seg" style="display:inline-flex;width:auto">${sw('list','▤ Список')}${sw('transport','▦ Транспорт')}${sw('plans','▥ Планы')}</div>
      <button class="btn primary" style="width:auto" onclick="vanSaleStart()">+ Новый ван-сел</button>
    </div>
  </div>`;
  let body='';
  if(delivView==='list')body=delivBand(m)+delivList(active);
  else if(delivView==='transport')body=delivKpis(m)+delivTransport(active);
  else body=delivPlans();
  $('#content').innerHTML=head+body;
}

function delivKpis(m){
  const tot=m.pts||1;
  const pc=(t,v,s,cls)=>`<div class="kpi ${cls||''}"><div class="label">${t}</div><div class="value">${v}</div>${s?`<div class="sub">${s}</div>`:''}</div>`;
  return `<div class="grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">
    ${pc('Торговых точек',m.pts,'')}
    ${pc('Доставлено',m.del,(m.del/tot*100).toFixed(2)+'%','green')}
    ${pc('Не доставлено',m.pend,(m.pend/tot*100).toFixed(2)+'%')}
    ${pc('Водителей',m.drivers,'')}
  </div>`;
}

/* блок-полоса как в Mirasoft: «114 Все точки» + «Доставка заказов» */
function delivBand(m){
  const tot=m.pts||1;const dP=m.del/tot*100,cP=m.can/tot*100,pP=m.pend/tot*100;
  return `<div class="card" style="display:flex;gap:26px;align-items:center;flex-wrap:wrap;margin-bottom:16px;padding:18px 22px">
    <div style="flex:0 0 auto;padding-right:26px;border-right:1px solid var(--line)">
      <div style="font-size:42px;font-weight:800;line-height:1">${m.pts}</div>
      <div class="hint" style="margin-top:2px">Все точки</div>
      <div style="font-size:12px;color:var(--red);margin-top:5px">↘ ${m.can} заказов отменено</div></div>
    <div style="flex:1;min-width:300px">
      <div class="between" style="margin-bottom:9px"><b>Доставка заказов</b><span class="hint">${m.del} / ${m.pts}</span></div>
      <div style="height:8px;border-radius:6px;overflow:hidden;background:#EDF1F5;display:flex;margin-bottom:13px">
        <div style="width:${dP}%;background:var(--blue)"></div><div style="width:${cP}%;background:var(--red)"></div></div>
      <div style="display:flex;gap:22px;flex-wrap:wrap;font-size:13px">
        <span><span class="dot" style="background:var(--blue);display:inline-block"></span> Доставлено ${m.del} (${dP.toFixed(2)}%)</span>
        <span><span class="dot" style="background:var(--red);display:inline-block"></span> Отменено ${m.can} (${cP.toFixed(2)}%)</span>
        <span><span class="dot" style="background:#CBD5E1;display:inline-block"></span> Ещё не доставлено ${m.pend} (${pP.toFixed(2)}%)</span></div></div>
  </div>`;
}
function delivFilterRows(q){q=(q||'').toLowerCase();delivSearch=q;document.querySelectorAll('#deliv_tbody tr').forEach(tr=>{tr.style.display=(!q||(tr.dataset.s||'').includes(q))?'':'none';});}

/* ---- ВКЛАДКА 1: СПИСОК ---- */
function delivList(list){
  let rows=list.slice().reverse();
  if(delivStatusF)rows=rows.filter(sh=>sh.status===delivStatusF);
  const toolbar=`<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
    <input id="deliv_q" value="${esc(delivSearch||'')}" placeholder="🔍 Поиск: лист, сотрудник, транспорт…" oninput="delivFilterRows(this.value)" style="flex:1;min-width:220px;padding:9px 12px;border:1.5px solid var(--line);border-radius:10px">
    <button class="btn ghost" style="width:auto" onclick="exportTable('Доставка',deliveryRows())">${I.down} Excel</button>
    <select onchange="delivStatusF=this.value;ordDelivery()" style="padding:9px 10px;border:1.5px solid var(--line);border-radius:10px;background:#fff">
      <option value="">Фильтр: все</option><option value="created" ${delivStatusF==='created'?'selected':''}>Создан</option><option value="transit" ${delivStatusF==='transit'?'selected':''}>В пути</option><option value="returned" ${delivStatusF==='returned'?'selected':''}>Вернулся</option></select></div>`;
  if(!rows.length)return toolbar+`<div class="card"><div class="empty">Листов не найдено.</div></div>`;
  return toolbar+`<div class="tablewrap">
    <div class="tabletop"><b>Листы отгрузки: ${rows.length}</b></div>
    <table><thead><tr>
      <th>Лист Отгрузки</th><th>Дата Отгрузки</th><th class="num">Доставлено</th><th class="num">Отменено</th>
      <th>Панель завершения</th><th class="num">Сумма</th><th>Сотрудник</th><th>Статус транспорта</th><th></th></tr></thead>
    <tbody id="deliv_tbody">${rows.map(sh=>{const st=shipStats(sh);const stt=SHIP_ST[sh.status]||['—','gray'];const pct=shPct(sh);
      const courier=emp(sh.courier);const cn=courier?courier.name:(sh.transport||'—');
      return `<tr data-s="${esc((sh.number+' '+cn+' '+(sh.transport||'')).toLowerCase())}" style="cursor:pointer" onclick="openShipment('${sh.id}')">
        <td><b>${sh.number}</b>${sh.vanSale?' <span class="pill gold" style="font-size:10px">ван-сел</span>':''}</td>
        <td class="hint">${dmonth(sh.date)}</td>
        <td class="num"><span class="pill green">${st.del}</span></td>
        <td class="num"><span class="pill ${st.can?'red':'gray'}">${st.can}</span></td>
        <td style="min-width:170px"><div class="progress"><div class="bar"><i style="width:${pct}%;background:${pct===100?'var(--green2)':'var(--gold)'}"></i></div>
          <b style="font-size:11px;white-space:nowrap">${st.del+st.can}/${st.os.length} · ${pct}%</b></div></td>
        <td class="num"><b>${money(st.sum)}</b></td>
        <td><div style="display:flex;align-items:center;gap:7px">${dAva(cn)}<span class="hint">${esc(cn)}</span></div></td>
        <td><span class="pill ${stt[1]}">${stt[0]}</span></td>
        <td class="num" onclick="event.stopPropagation()">
          <button class="btn ghost" style="width:auto;padding:6px 10px" onclick="openShipment('${sh.id}')">👁 Просмотреть</button>
          <button class="btn ghost" style="width:auto;padding:6px 9px;margin-left:4px" onclick="delivActions('${sh.id}')">▾</button></td>
      </tr>`}).join('')}</tbody></table></div>`;
}

/* меню действий (как в Mirasoft) */
function delivActions(sid){
  const sh=shipment(sid);if(!sh)return;
  const act=(ic,t,fn,dis)=>`<div class="legrow" style="padding:11px 4px;border-bottom:1px solid var(--line);${dis?'opacity:.4;pointer-events:none':'cursor:pointer'}" ${dis?'':`onclick="${fn}"`}><span style="width:22px">${ic}</span><span class="nm">${t}</span></div>`;
  const stt=SHIP_ST[sh.status]||['—','gray'];
  openModal(`<div class="between"><h2 style="margin:0">${sh.number}</h2><span class="pill ${stt[1]}">${stt[0]}</span></div>
    <div class="hint" style="margin:6px 0 10px">${esc(sh.transport||'—')} · ${dmonth(sh.date)}</div>
    <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:6px 0 2px">Действия</div>
    ${sh.vanSale?act('➕','Создать заказ из ван-села',`vanOrderFrom('${sid}')`,sh.status==='done'):''}
    ${act('📅','Изменить дату доставки',`shipChangeDate('${sid}')`,sh.status==='transit'||sh.status==='done')}
    ${act('↩️','Добавить возвраты',`closeModal();shipReturn('${sid}')`,sh.status!=='returned')}
    ${act('🧾','Добавить заказы',`shipAddOrders('${sid}')`,sh.status==='transit'||sh.status==='done')}
    <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:12px 0 2px">Статус</div>
    ${act('🟢','Вернулся',`closeModal();shipStatus('${sid}','returned');ordDelivery()`,sh.status!=='transit')}
    ${act('🟣','В пути',`closeModal();shipStatus('${sid}','transit');ordDelivery()`,sh.status!=='created')}
    ${act('🔵','Создан (сброс в сборку)',`shipSetCreated('${sid}')`,sh.status!=='transit')}
    <button class="btn ghost" style="width:100%;margin-top:12px" onclick="closeModal()">Закрыть</button>`);
}
function shipSetCreated(sid){const sh=shipment(sid);if(!sh)return;
  askCode(()=>{sh.status='created';delete sh.sentAt;logAct('Заявки','Лист '+sh.number+' возвращён в сборку','');saveDB();if(sbCfg())scheduleCloudPush();closeModal();ordDelivery();toast('Лист снова в сборке');});}
function shipChangeDate(sid){const sh=shipment(sid);if(!sh)return;
  openModal(`<h2>Дата доставки · ${sh.number}</h2>
    <div class="field"><label>Новая дата</label><input id="sd_d" type="date" value="${(sh.date||today()).slice(0,10)}"></div>
    <div class="modal-actions"><button class="btn ghost" onclick="delivActions('${sid}')">Назад</button>
    <button class="btn primary" onclick="applyShipDate('${sid}')">Сохранить</button></div>`);}
function applyShipDate(sid){const sh=shipment(sid);const d=$('#sd_d').value;if(!d){toast('Выберите дату');return;}
  sh.date=d;shipStats(sh).os.forEach(o=>o.deliveryDate=d);
  logAct('Заявки','Дата доставки '+sh.number+' → '+dmonth(d),'');saveDB();if(sbCfg())scheduleCloudPush();closeModal();ordDelivery();toast('Дата обновлена');}
function shipAddOrders(sid){const sh=shipment(sid);if(!sh)return;
  const free=DB.orders.filter(o=>o.status==='new'&&!o.shipmentId);
  openModal(`<h2>Добавить заказы · ${sh.number}</h2>
    <div class="hint" style="margin-bottom:10px">Новые заказы без листа отгрузки. Отметьте, чтобы привязать к этому листу.</div>
    <div style="max-height:42vh;overflow-y:auto">${free.length?free.map(o=>{const c=cli(o.client);return `
      <label class="legrow" style="padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer">
        <input type="checkbox" value="${o.id}" class="ao_chk" style="width:auto">
        <span class="nm"><b>${o.number}</b> ${esc(c?.name||'')}<div class="hint">${esc(c?.addr||'')}</div></span>
        <b>${money(o.total)}</b></label>`}).join(''):'<div class="empty">Свободных новых заказов нет</div>'}</div>
    <div class="modal-actions"><button class="btn ghost" onclick="delivActions('${sid}')">Назад</button>
    <button class="btn primary" onclick="doAddOrders('${sid}')">Добавить выбранные</button></div>`);}
function doAddOrders(sid){const sh=shipment(sid);
  const ids=[...document.querySelectorAll('.ao_chk:checked')].map(c=>c.value);
  if(!ids.length){toast('Ничего не выбрано');return;}
  ids.forEach(i=>{if(!sh.orders.includes(i))sh.orders.push(i);const o=DB.orders.find(x=>x.id===i);if(o){o.shipmentId=sid;o.status='shipped';o.deliveryDate=sh.date;}});
  logAct('Заявки','К листу '+sh.number+' добавлено заказов: '+ids.length,'');saveDB();if(sbCfg())scheduleCloudPush();closeModal();ordDelivery();toast('Добавлено заказов: '+ids.length);}

/* ---- ВКЛАДКА 2: ТРАНСПОРТ (канбан по машинам) ---- */
function delivTransport(list){
  const groups={};
  list.forEach(sh=>{const k=sh.transport||'— без транспорта —';(groups[k]=groups[k]||[]).push(sh);});
  const keys=Object.keys(groups);
  const cols=keys.map(k=>{const cards=groups[k].map(sh=>{const st=shipStats(sh);const stt=SHIP_ST[sh.status]||['—','gray'];const pct=shPct(sh);
    return `<div class="card" style="padding:14px;margin-bottom:12px;cursor:pointer" onclick="openShipment('${sh.id}')">
      <div class="between"><b>${sh.number}</b><span class="pill ${stt[1]}">${stt[0]}</span></div>
      <div style="display:flex;gap:18px;margin:10px 0 8px">
        <div><div style="font-size:19px;font-weight:700">${shRoutes(sh)}</div><div class="hint">Всего маршрутов</div></div>
        <div><div style="font-size:19px;font-weight:700">${st.os.length}</div><div class="hint">Всего точек</div></div></div>
      <div style="display:flex;gap:18px;margin-bottom:8px">
        <div><div style="font-size:17px;font-weight:700;color:var(--green)">${st.del}</div><div class="hint">Доставлено</div></div>
        <div><div style="font-size:17px;font-weight:700;color:${st.can?'var(--red)':'var(--muted)'}">${st.can}</div><div class="hint">Отменено</div></div></div>
      <div class="progress" style="margin-bottom:8px"><div class="bar"><i style="width:${pct}%;background:${pct===100?'var(--green2)':'var(--gold)'}"></i></div><b style="font-size:11px">${pct}%</b></div>
      <div class="hint">Общая сумма</div><b>${money(st.sum)}</b>
    </div>`}).join('');
    return `<div style="min-width:280px;flex:0 0 280px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <div style="flex:1;border:1.5px solid var(--line);border-radius:9px;padding:9px 12px;font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center;background:#fff">${esc(k)} <span style="opacity:.4">▾</span></div>
        <span style="cursor:pointer;opacity:.55;font-size:16px" title="Транспорт" onclick="VIEW='settings';setSub='transport';renderContent()">⚙</span></div>
      ${cards}</div>`;}).join('');
  return `<div style="display:flex;gap:14px;overflow-x:auto;padding-bottom:8px">${cols||'<div class="card" style="flex:1"><div class="empty">Нет активных листов</div></div>'}
    <div style="min-width:210px;flex:0 0 210px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;cursor:pointer" onclick="VIEW='settings';setSub='transport';renderContent()">
        <div style="flex:1;font-size:12px;font-weight:700;letter-spacing:.4px;color:var(--muted);text-transform:uppercase">Добавить транспорт</div>
        <span style="width:34px;height:34px;border-radius:9px;background:var(--green);color:#fff;display:grid;place-items:center;font-size:20px">+</span></div></div></div>`;
}

/* ---- ВКЛАДКА 3: ПЛАНЫ (недельный календарь) ---- */
function planNav(delta){const base=planAnchor||dWeekMon(today());planAnchor=iso(addDays(base,delta*7));ordDelivery();}
function planToday(){planAnchor=null;ordDelivery();}
function delivPlans(){
  const mon=planAnchor||dWeekMon(today());
  const days=Array.from({length:7},(_,i)=>iso(addDays(mon,i)));
  const dow=['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];
  const t=today();
  const monthsR=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
  const fd=ds=>{const d=new Date(ds);return d.getDate()+' '+monthsR[d.getMonth()];};
  const d0=new Date(days[0]),d6=new Date(days[6]);const range=(d0.getMonth()===d6.getMonth())?`${d0.getDate()} – ${d6.getDate()} ${monthsR[d6.getMonth()]}. ${d6.getFullYear()} г.`:`${d0.getDate()} ${monthsR[d0.getMonth()]} – ${d6.getDate()} ${monthsR[d6.getMonth()]}. ${d6.getFullYear()} г.`;
  let overdue=0;
  const cols=days.map((ds,i)=>{
    const ships=DB.shipments.filter(sh=>(sh.date||'').slice(0,10)===ds);
    const isToday=ds===t;
    const cards=ships.map(sh=>{const st=shipStats(sh);const stt=SHIP_ST[sh.status]||['—','gray'];
      const done=sh.status==='done'||sh.status==='returned';
      const over=!done&&ds<t;if(over)overdue++;
      const border=done?'var(--green)':(over?'var(--red)':'var(--blue)');
      const courier=emp(sh.courier);
      return `<div class="card" style="padding:10px;margin-bottom:8px;border-left:4px solid ${border};cursor:pointer" onclick="openShipment('${sh.id}')">
        <b style="font-size:12px">${sh.number}</b>
        <div class="hint" style="font-size:11px">${esc(sh.transport||'—')}</div>
        <div style="font-size:12px;font-weight:600;margin:3px 0">${money(st.sum)}</div>
        <div style="display:flex;align-items:center;justify-content:space-between"><span class="pill ${stt[1]}" style="font-size:10px">${stt[0]}</span>${courier?dAva(courier.name):''}</div>
      </div>`;}).join('');
    return `<div style="flex:1;min-width:130px;background:${isToday?'var(--green-100)':'transparent'};border-radius:10px;padding:4px">
      <div style="text-align:center;font-size:12px;font-weight:700;color:${isToday?'var(--green)':'var(--muted)'};padding:6px 0">${dow[i]} ${new Date(ds).getDate()}.${String(new Date(ds).getMonth()+1).padStart(2,'0')}</div>
      ${cards||'<div style="height:8px"></div>'}</div>`;}).join('');
  return `<div class="card">
    <div class="between" style="margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)">Просроченные доставки (${overdue})</div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn ghost" style="width:auto;padding:7px 12px" onclick="planToday()">Сегодня</button>
        <button class="btn ghost" style="width:auto;padding:7px 11px" onclick="planNav(-1)">‹</button>
        <b style="margin:0 6px">${range}</b>
        <button class="btn ghost" style="width:auto;padding:7px 11px" onclick="planNav(1)">›</button></div>
      <div style="display:flex;gap:6px"><button class="btn ghost" style="width:auto;padding:7px 12px;opacity:.6" disabled>Фильтр ▾</button><button class="btn ghost" style="width:auto;padding:7px 12px;opacity:.6" disabled>Неделю ▾</button></div>
    </div>
    <div class="legrow" style="gap:20px;margin-bottom:14px;flex-wrap:wrap;font-size:13px">
      <span><span class="dot" style="background:var(--red);display:inline-block"></span> Просроченные доставки</span>
      <span><span class="dot" style="background:var(--blue);display:inline-block"></span> Ближайшие доставки</span>
      <span><span class="dot" style="background:var(--green);display:inline-block"></span> Успешные доставки, не могут быть изменены</span>
    </div>
    <div style="display:flex;gap:6px;overflow-x:auto">${cols}</div></div>`;
}

/* ============ ВАН-СЕЛ — мастер в 3 шага (продажа с борта) ============ */
let VS=null;
function vanSaleStart(){
  VS={step:1,date:today(),transport:'',warehouses:(DB.warehouses||[]).filter(w=>w.id==='w_main').map(w=>w.id),status:'transit',load:{}};
  vsRender();
}
function vsRender(){
  const step=(n,l)=>`<div style="display:flex;align-items:center;gap:8px;${VS.step===n?'':'opacity:.45'}">
    <span style="width:26px;height:26px;border-radius:50%;background:${VS.step>=n?'var(--green)':'#ccc'};color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px">${n}</span>${l}</div>`;
  const head=`${ordSubBar()}
  <div class="between" style="margin-bottom:6px"><h2 style="margin:0">Новый ван-сел</h2>
    <button class="btn ghost" style="width:auto" onclick="ordGo('delivery')">← К доставке</button></div>
  <div class="card" style="display:flex;gap:30px;align-items:center;margin-bottom:16px">${step(1,'Ван-сел')}${step(2,'Продукты')}${step(3,'Предпросмотр')}</div>`;
  let body='';
  if(VS.step===1)body=vsStep1();
  else if(VS.step===2)body=vsStep2();
  else body=vsStep3();
  $('#content').innerHTML=head+body;
}
function vsStep1(){
  const tr=DB.transport||[];
  return `<div class="card" style="max-width:640px">
    <div class="field"><label>Дата доставки</label><input id="vs_date" type="date" value="${VS.date}" onchange="VS.date=this.value"></div>
    <div class="field"><label>Транспорт</label><select id="vs_tr" onchange="VS.transport=this.value">
      <option value="">— выберите транспорт —</option>
      ${tr.map(t=>`<option value="${t.id}" ${VS.transport===t.id?'selected':''}>${esc((t.model||'')+' '+(t.number||''))}${t.emp?' · '+esc(emp(t.emp)?.name||''):''}</option>`).join('')}</select></div>
    <div class="field"><label>Склад(ы)-источник</label>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">
      ${(DB.warehouses||[]).map(w=>`<label class="chip" style="cursor:pointer;${VS.warehouses.includes(w.id)?'border-color:var(--green);background:var(--green-100)':''}">
        <input type="checkbox" ${VS.warehouses.includes(w.id)?'checked':''} onchange="vsToggleWh('${w.id}')" style="width:auto">${esc(w.name)}</label>`).join('')}</div></div>
    <div class="field"><label>Статус</label><select onchange="VS.status=this.value">
      <option value="transit" ${VS.status==='transit'?'selected':''}>В пути</option>
      <option value="created" ${VS.status==='created'?'selected':''}>Создан (сборка)</option></select></div>
    <div class="modal-actions"><span></span><button class="btn primary" style="width:auto" onclick="vsNext()">Далее ›</button></div></div>`;
}
function vsToggleWh(id){const i=VS.warehouses.indexOf(id);if(i>=0)VS.warehouses.splice(i,1);else VS.warehouses.push(id);vsRender();}
function vsStock(p){if(!p)return 0;if(!VS.warehouses.length)return p.stock||0;
  return VS.warehouses.reduce((s,w)=>s+((p.stockBy&&p.stockBy[w]!==undefined)?p.stockBy[w]:0),0);}
function vsNext(){if(VS.step===1&&!VS.transport){toast('Выберите транспорт');return;}VS.step=Math.min(3,VS.step+1);vsRender();}
function vsBack(){VS.step=Math.max(1,VS.step-1);vsRender();}
function vsStep2(){
  const prods=DB.products.filter(p=>!p.hidden);
  return `<div class="card">
    <div class="hint" style="margin-bottom:12px">Загрузите товар в фургон. Доступно показано по выбранным складам.</div>
    <table><thead><tr><th>Товар</th><th class="num">Цена</th><th class="num">Доступно</th><th class="num" style="width:150px">В фургон</th></tr></thead>
    <tbody>${prods.map(p=>{const q=VS.load[p.id]||0;const av=vsStock(p);return `<tr>
      <td><b>${esc(p.name)}</b></td><td class="num">${money(p.price)}</td><td class="num">${av} ${esc(p.unit||'')}</td>
      <td class="num"><div style="display:flex;gap:6px;justify-content:flex-end;align-items:center">
        <button class="btn ghost" style="width:auto;padding:4px 10px" onclick="vsLoad('${p.id}',-1)">−</button>
        <input id="vsq_${p.id}" type="number" inputmode="numeric" min="0" max="${av}" value="${q}" oninput="vsSet('${p.id}',this.value)" style="width:66px;text-align:center;padding:5px;border:1.5px solid var(--line);border-radius:8px">
        <button class="btn ghost" style="width:auto;padding:4px 10px" onclick="vsLoad('${p.id}',1)">+</button></div></td></tr>`}).join('')}</tbody></table>
    <div class="modal-actions"><button class="btn ghost" style="width:auto" onclick="vsBack()">‹ Назад</button>
    <button class="btn primary" style="width:auto" onclick="vsNext()">Далее ›</button></div></div>`;
}
function vsLoad(pid,d){const p=prod(pid);const av=vsStock(p);const q=Math.max(0,Math.min(av,(VS.load[pid]||0)+d));
  if(q)VS.load[pid]=q;else delete VS.load[pid];const e=document.getElementById('vsq_'+pid);if(e)e.value=q;}
function vsSet(pid,val){const p=prod(pid);const av=vsStock(p);let q=parseInt(val);if(isNaN(q)||q<0)q=0;if(q>av){q=av;const e=document.getElementById('vsq_'+pid);if(e)e.value=av;}if(q)VS.load[pid]=q;else delete VS.load[pid];}
function vsStep3(){
  const tr=(DB.transport||[]).find(t=>t.id===VS.transport);
  const items=Object.entries(VS.load).filter(([,q])=>q>0).map(([p,q])=>({p,q,price:prod(p)?.price||0}));
  const total=items.reduce((s,i)=>s+i.q*i.price,0);
  const whs=VS.warehouses.map(w=>(DB.warehouses.find(x=>x.id===w)||{}).name).filter(Boolean).join(', ');
  return `<div class="card" style="max-width:720px">
    <h3 style="margin:0 0 12px">Предпросмотр</h3>
    <div class="legrow" style="padding:6px 0"><span class="nm">Дата доставки</span><b>${dmonth(VS.date)}</b></div>
    <div class="legrow" style="padding:6px 0"><span class="nm">Транспорт</span><b>${esc(tr?((tr.model||'')+' '+(tr.number||'')):'—')}</b></div>
    <div class="legrow" style="padding:6px 0"><span class="nm">Доставщик</span><b>${esc(emp(tr?.emp)?.name||'—')}</b></div>
    <div class="legrow" style="padding:6px 0"><span class="nm">Склад</span><b>${esc(whs||'—')}</b></div>
    <div class="legrow" style="padding:6px 0;border-bottom:1px solid var(--line)"><span class="nm">Статус</span><b>${(SHIP_ST[VS.status]||['—'])[0]}</b></div>
    <div style="margin:14px 0 6px"><b style="font-size:13px">Товар в фургоне (${items.length})</b></div>
    <table><thead><tr><th>Товар</th><th class="num">Кол-во</th><th class="num">Цена</th><th class="num">Сумма</th></tr></thead>
    <tbody>${items.length?items.map(i=>`<tr><td>${esc(prod(i.p)?.name||i.p)}</td><td class="num"><b>${i.q}</b> ${esc(prod(i.p)?.unit||'')}</td><td class="num">${money(i.price)}</td><td class="num">${money(i.q*i.price)}</td></tr>`).join(''):'<tr><td colspan="4"><div class="empty">Фургон пуст — можно загрузить позже</div></td></tr>'}</tbody>
    <tfoot><tr><td colspan="3" style="text-align:right"><b>Итого</b></td><td class="num"><b>${money(total)}</b></td></tr></tfoot></table>
    <div class="modal-actions"><button class="btn ghost" style="width:auto" onclick="vsBack()">‹ Назад</button>
    <button class="btn primary" style="width:auto" onclick="vanSaleConfirm()">✓ Создать ван-сел</button></div></div>`;
}
function vanSaleConfirm(){
  const tr=(DB.transport||[]).find(t=>t.id===VS.transport);
  const items=Object.entries(VS.load).filter(([,q])=>q>0).map(([p,q])=>({p,q:+q}));
  const sid=uid('sh');
  const label=tr?((tr.model||'')+' '+(tr.number||'')).trim():'';
  DB.shipments.push({id:sid,number:nextShipNo(),date:VS.date,transport:label,
    courier:tr?(tr.emp||''):'',status:VS.status,orders:[],vanSale:true,load:items,warehouses:VS.warehouses.slice(),createdAt:nowTashkent()});
  // списываем загруженный товар каскадом по выбранным складам (не только с первого)
  const whs=VS.warehouses.length?VS.warehouses:['w_main'];
  items.forEach(i=>{const p=prod(i.p);if(!p)return;p.stockBy=p.stockBy||{};let need=i.q;
    for(const w of whs){if(need<=0)break;const have=(p.stockBy[w]!==undefined)?p.stockBy[w]:(w==='w_main'?(p.stock||0):0);const take=Math.min(have,need);p.stockBy[w]=have-take;need-=take;}
    p.stock=Math.max(0,(p.stock||0)-i.q);});
  logAct('Заявки','Ван-сел создан '+label+' · позиций '+items.length,'');
  VS=null;saveDB();if(sbCfg())scheduleCloudPush();delivView='list';ordGo('delivery');toast('✅ Ван-сел создан');
}

/* продажа с борта: создать заказ из ван-села */
function vanOrderFrom(sid){const sh=shipment(sid);if(!sh||!sh.vanSale)return;
  VO={sid,client:'',items:{},method:'cash'};
  voRender();
}
let VO=null;
function voRender(){const sh=shipment(VO.sid);
  const load=(sh.load||[]).filter(l=>l.q>0);
  const total=Object.entries(VO.items).reduce((s,[p,q])=>s+q*(prod(p)?.price||0),0);
  openModal(`<h2>Продажа из ван-села · ${sh.number}</h2>
    <div class="field"><label>Клиент *</label><select id="vo_cli" onchange="VO.client=this.value">
      <option value="">— выберите —</option>${DB.clients.filter(c=>c.active!==false).map(c=>`<option value="${c.id}" ${VO.client===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
    <div style="margin:8px 0 4px"><b style="font-size:13px">Товар с борта</b></div>
    <div style="max-height:34vh;overflow-y:auto">${load.length?load.map(l=>{const q=VO.items[l.p]||0;return `
      <div class="legrow" style="padding:8px 0;border-bottom:1px solid var(--line)">
        <span class="nm"><b>${esc(prod(l.p)?.name||l.p)}</b><div class="hint">в фургоне: ${l.q} · ${money(prod(l.p)?.price||0)}</div></span>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="btn ghost" style="width:auto;padding:3px 9px" onclick="voStep('${l.p}',-1)">−</button>
          <input id="voq_${l.p}" type="number" inputmode="numeric" min="0" max="${l.q}" value="${q}" oninput="voSet('${l.p}',this.value)" style="width:60px;text-align:center;padding:4px;border:1.5px solid var(--line);border-radius:8px">
          <button class="btn ghost" style="width:auto;padding:3px 9px" onclick="voStep('${l.p}',1)">+</button></div></div>`}).join(''):'<div class="empty">Фургон пуст</div>'}</div>
    <div class="field" style="margin-top:10px"><label>Оплата</label><select id="vo_m" onchange="VO.method=this.value">
      <option value="cash">Наличные</option><option value="terminal">Терминал</option><option value="transfer">Безналичный</option><option value="debt">В долг</option></select></div>
    <div class="field"><label>Получено (сум)</label><input id="vo_amt" type="number" value="${total}"></div>
    <div class="legrow" style="padding:8px 0"><span class="nm"><b>Итого заказ</b></span><b>${money(total)}</b></div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Отмена</button>
    <button class="btn primary" onclick="voConfirm()">Продать</button></div>`);
  $('#modal').classList.add('wide');
}
function voStep(pid,d){const sh=shipment(VO.sid);const l=(sh.load||[]).find(x=>x.p===pid);const max=l?l.q:0;
  const q=Math.max(0,Math.min(max,(VO.items[pid]||0)+d));if(q)VO.items[pid]=q;else delete VO.items[pid];voRender();}
function voSet(pid,val){const sh=shipment(VO.sid);const l=(sh.load||[]).find(x=>x.p===pid);const max=l?l.q:0;let q=parseInt(val);if(isNaN(q)||q<0)q=0;if(q>max){q=max;const e=document.getElementById('voq_'+pid);if(e)e.value=max;}if(q)VO.items[pid]=q;else delete VO.items[pid];}
function voConfirm(){const sh=shipment(VO.sid);const c=cli(VO.client);
  if(!c){toast('Выберите клиента');return;}
  const items=Object.entries(VO.items).filter(([,q])=>q>0).map(([p,q])=>({p,q,price:prod(p)?.price||0}));
  if(!items.length){toast('Добавьте товар');return;}
  const total=items.reduce((s,i)=>s+i.q*i.price,0);
  const m=$('#vo_m').value;let received=Math.max(0,+$('#vo_amt').value||0);if(m==='debt')received=0;
  const oid=uid('o');
  const o={id:oid,number:nextOrderNo(),client:c.id,agent:sh.courier||'',terr:c.terr||'',route:c.route||'',
    date:today(),createdAt:nowTashkent(),status:'delivered',deliveredAt:nowTashkent(),method:m==='debt'?'debt':m,payType:'onsite',
    items,total,paid:Math.min(received,total),shipmentId:VO.sid,courier:sh.courier||'',vanSale:true};
  DB.orders.push(o);sh.orders.push(oid);
  // снимаем с борта
  items.forEach(i=>{const l=(sh.load||[]).find(x=>x.p===i.p);if(l)l.q=Math.max(0,l.q-i.q);});
  if(received>0)DB.payments.push({id:uid('pm'),client:c.id,order:oid,amount:Math.min(received,total),method:m,employee:sh.courier||'',date:nowTashkent(),allocations:[{order:oid,amount:Math.min(received,total)}]});
  const rest=total-Math.min(received,total);if(rest>0)c.debt=(c.debt||0)+rest;
  logAct('Заявки','Ван-сел продажа '+o.number+' · '+esc(c.name)+' · '+money(total),'');
  saveDB();if(sbCfg())scheduleCloudPush();closeModal();ordDelivery();toast('✅ Продано: '+o.number+(rest>0?' · в долг '+money(rest):''));
}

function deliveryRows(){const rows=[['№','Клиент','Адрес','Отгрузка','Доставщик','Сумма']];DB.orders.filter(o=>o.status==='shipped').forEach(o=>{const sh=o.shipmentId?shipment(o.shipmentId):null;rows.push([o.number,cli(o.client)?.name||'',cli(o.client)?.addr||'',sh?.number||'',emp(o.courier||sh?.courier)?.name||'',o.total]);});return rows;}

/* Доставлено: приём оплаты, остаток — в долг */
function deliverDialog(oid,backShip){const o=DB.orders.find(x=>x.id===oid);if(!o)return;const c=cli(o.client);
  openModal(`<h2>Доставлено · ${o.number}</h2>
    <div class="legrow" style="background:var(--green-100);border-radius:12px;padding:11px 13px;margin-bottom:12px"><span class="nm"><b>${esc(c?.name||'')}</b><div class="hint">${esc(c?.addr||'')}</div></span><b>${money(o.total)}</b></div>
    <div class="field"><label>Получено от клиента (сум)</label><input id="dv_amt" type="number" value="${o.payType==='consignment'?0:o.total-(o.paid||0)}"></div>
    <div class="field"><label>Способ оплаты</label><select id="dv_m"><option value="cash">Наличные</option><option value="terminal">Терминал</option><option value="transfer">Безналичный</option></select></div>
    <div class="hint" style="margin-bottom:10px">Если получено меньше суммы — остаток автоматически запишется в долг клиента${o.payType==='consignment'?' (заказ по консигнации — допустимо 0)':''}.</div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="confirmDeliver('${oid}','${backShip||''}')">Подтвердить доставку</button></div>`);}
function confirmDeliver(oid,backShip){const o=DB.orders.find(x=>x.id===oid);const c=cli(o.client);
  let amt=Math.max(0,Math.min(+$('#dv_amt').value||0,o.total-(o.paid||0)));const m=$('#dv_m').value;
  o.status='delivered';o.deliveredAt=nowTashkent();
  if(amt>0){o.paid=(o.paid||0)+amt;DB.payments.push({id:uid('pm'),client:o.client,order:o.id,amount:amt,method:m,employee:o.courier||'',date:nowTashkent(),allocations:[{order:o.id,amount:amt}]});}
  const rest=o.total-(o.paid||0);if(rest>0&&c)c.debt=(c.debt||0)+rest;
  logAct('Заявки','Доставлено: '+o.number+' · получено '+money(amt)+(rest>0?' · в долг '+money(rest):''),c?.name||'');
  saveDB();closeModal();if(backShip)openShipment(backShip);else ordDelivery();toast('Доставлено: '+o.number);}

/* Отказ: причина из справочника, товар — на склад возврата */
function refuseDialog(oid,backShip){const o=DB.orders.find(x=>x.id===oid);if(!o)return;const c=cli(o.client);
  openModal(`<h2>Отказ · ${o.number}</h2>
    <div class="legrow" style="background:#FBF0EE;border-radius:12px;padding:11px 13px;margin-bottom:12px"><span class="nm"><b>${esc(c?.name||'')}</b></span><b>${money(o.total)}</b></div>
    <div class="field"><label>Причина отказа *</label><select id="rf_r">${(DB.refusals||[]).length?DB.refusals.map(r=>`<option value="${esc(r.name)}">${esc(r.name)}</option>`).join(''):'<option value="">— добавьте причины в Настройках —</option>'}</select></div>
    <div class="field"><label>Комментарий</label><input id="rf_c" placeholder="необязательно"></div>
    <div class="hint" style="margin-bottom:10px">Товары заявки вернутся на склад возврата.</div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Отмена</button><button class="btn danger" onclick="confirmRefuse('${oid}','${backShip||''}')">Подтвердить отказ</button></div>`);}
function confirmRefuse(oid,backShip){const o=DB.orders.find(x=>x.id===oid);const c=cli(o.client);
  const reason=$('#rf_r').value;if(!reason){toast('Выберите причину (Настройки → Причины отказа)');return;}

      <td><span class="pill red">${esc(o.refusal||'отмена')}</span>${o.refusalNote?`<div class="hint">${esc(o.refusalNote)}</div>`:''}</td>
      <td class="num"><b>${money(o.total)}</b></td>
      <td class="num"><button class="btn ghost" style="padding:6px 11px" onclick="dupCanceled('${o.id}')">Дублировать</button>

function canceledRows(){const rows=[['Отменён','№','Клиент','Причина','Комментарий','Сумма']];
  DB.orders.filter(o=>o.status==='canceled'&&cancelCutoff(o)).forEach(o=>rows.push([fmtDT(o.canceledAt||o.date),o.number,cli(o.client)?.name||'',o.refusal||'',o.refusalNote||'',o.total]));return rows;}
function dupCanceled(oid){const src=DB.orders.find(x=>x.id===oid);if(!src)return;
  for(const i of src.items){const p=prod(i.p);if(!p){toast('Товар не найден');return;}if(i.q>p.stock){toast('Недостаточно «'+p.name+'»: остаток '+p.stock);return;}}
  const o={id:uid('o'),number:nextOrderNo(),client:src.client,agent:src.agent,terr:src.terr,route:src.route,
    courier:null,date:todayTashkent(),createdAt:nowTashkent(),deliveryDate:null,deliveredAt:null,status:'new',method:src.method,
    payType:src.payType,consignTerm:src.consignTerm,deliveryMethod:src.deliveryMethod,currency:src.currency,
    items:src.items.map(i=>({p:i.p,q:i.q,price:prod(i.p).price})),total:0,paid:0,shipmentId:null};
  o.total=o.items.reduce((s,i)=>s+i.q*i.price,0);
  o.items.forEach(i=>{const p=prod(i.p);p.stock=Math.max(0,(p.stock||0)-i.q);p.stockBy=p.stockBy||{};p.stockBy.w_main=Math.max(0,(p.stockBy.w_main!==undefined?p.stockBy.w_main:p.stock+i.q)-i.q);});
  DB.orders.push(o);logAct('Заявки','Заказ: дубль из отменённого '+src.number+' → '+o.number,cli(o.client)?.name||'');
  saveDB();ordSub='current';oSel=new Set();renderContent();toast('Создан '+o.number);}
function restoreCanceled(oid){const o=DB.orders.find(x=>x.id===oid);if(!o)return;
  // проверка наличия: товара должно хватить на складе, иначе восстановить нельзя
  for(const i of (o.items||[])){const p=prod(i.p);if(!p){toast('❌ Товар не найден — восстановить нельзя');return;}
    if(i.q>(p.stock||0)){toast('❌ Недостаточно «'+p.name+'» на складе (остаток '+(p.stock||0)+'). Восстановить нельзя.');return;}}
  // списываем со склада снова
  o.items.forEach(i=>{const p=prod(i.p);if(p){p.stock=Math.max(0,(p.stock||0)-i.q);p.stockBy=p.stockBy||{};if(p.stockBy.w_ret!==undefined)p.stockBy.w_ret=Math.max(0,(p.stockBy.w_ret||0)-i.q);p.stockBy.w_main=Math.max(0,(p.stockBy.w_main!==undefined?p.stockBy.w_main:(p.stock+i.q))-i.q);}});
  o.status='new';o.shipmentId=null;o.refusal='';o.refusalNote='';o.canceledAt=null;o.deliveryDate=null;
  logAct('Заявки','Заказ: возвращён в новые '+o.number,cli(o.client)?.name||'');
  saveDB();ordSub='current';oSel=new Set();renderContent();toast(o.number+' возвращён в новые');}

async function sendPush(){
  const to=$('#push_to').value,title=$('#push_title').value.trim()||'HALWAA',body=$('#push_body').value.trim();
  if(!body){toast('Введите текст уведомления');return;}
  const c=sbCfg();const key=c?c.key:'';
  if(!c){toast('Сначала настройте Supabase в Настройки→Интеграции');return;}
  toast('Отправка…');
  // 1) надёжная доставка: пишем сообщение в crm_kv — мобильное покажет его полноэкранно
  const msg={id:'pm'+Date.now(),title,body,at:new Date().toISOString(),to:to||null};
  const recipients=to?[to]:DB.employees.filter(e=>e.role!=='admin').map(e=>e.id);
  try{
    const rows=recipients.map(rid=>({key:'pushmsg_'+rid,value:msg,updated_at:new Date().toISOString()}));
    await fetch(c.url+'/rest/v1/crm_kv?on_conflict=key',{method:'POST',headers:{...sbHead(c),'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(rows)});
  }catch(e){}
  // 2) дополнительно — пробуем фоновый Web Push (если функция настроена)
  let pushNote='';
  try{
    const r=await fetch(PUSH_FN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({title,body,agent:to||null})});
    if(r.ok){const res=await r.json().catch(()=>({}));pushNote=res.sent!=null?(' · фоновый push: '+res.sent):'';}
    else pushNote=' · фоновый push не настроен (HTTP '+r.status+')';
  }catch(e){pushNote=' · фоновый push недоступен';}
  closeModal();
  toast('✅ Отправлено: '+recipients.length+' сотрудникам'+pushNote);
  logAct('Уведомления','Push: '+title+' → '+(to?emp(to)?.name:'всем'),'');
}

function saveEmp(){empSync();
  if(!EMPED.name.trim()){toast('Введите имя');return;}
  if(!EMPED.login||!EMPED.login.trim()){toast('Введите логин');return;}
  if(!/^[a-z]{7,}$/.test(EMPED.login.trim())){toast('Логин: минимум 7 строчных латинских букв (например: alisher)');return;}
  if(!EMPED.password||!EMPED.password.trim()){toast('Введите пароль');return;}
  if(!/^\d{10,}$/.test(EMPED.password.trim())){toast('Пароль: минимум 10 цифр (например: 1234567890)');return;}
  if(DB.employees.some(x=>x.id!==EMPED._id&&x.login===EMPED.login.trim())){toast('Такой логин уже занят');return;}
  if(!EMPED.terr){toast('Выберите территорию');return;}
  if((EMPED.role==='agent'||EMPED.role==='courier'||EMPED.role==='expediter')&&!EMPED.sup){toast('Прикрепите супервайзера');return;}
  const id=EMPED._id;const data={name:EMPED.name.trim(),role:EMPED.role,terr:EMPED.terr,sup:EMPED.sup,phone:EMPED.phone,email:EMPED.email,
    login:EMPED.login.trim(),password:EMPED.password.trim(),plan:EMPED.plan||25,active:EMPED.active!==false,perms:EMPED.perms,
    caps:{order:$('#cap_order')?$('#cap_order').checked:true,delivery:$('#cap_delivery')?$('#cap_delivery').checked:false,ret:$('#cap_return')?$('#cap_return').checked:true,expense:$('#cap_expense')?$('#cap_expense').checked:false},
    restrictCats:EMPED.restrictCats,restrictTypes:EMPED.restrictTypes,restrictMethods:EMPED.restrictMethods,
    restrictProducts:EMPED.restrictProducts||[],restrictTerrs:EMPED.restrictTerrs||[],restrictRoutes:EMPED.restrictRoutes||[],photo:EMPED.photo||''};
  // автозапрет маршрутов запрещённых территорий
  const tset=new Set(data.restrictTerrs);
  DB.routes.forEach(r=>{if(tset.has(r.terr)&&!data.restrictRoutes.includes(r.id))data.restrictRoutes.push(r.id);});
  let supId=id;
  if(id)Object.assign(emp(id),data);else{supId=uid('e');DB.employees.push({id:supId,...data});}
  if(EMPED.role==='supervisor'){const subs=new Set(EMPED.subs||[]);
    DB.employees.filter(x=>x.role==='agent'||x.role==='courier'||x.role==='expediter').forEach(x=>{
      if(subs.has(x.id))x.sup=supId;else if(x.sup===supId)x.sup='';});}
  logAct('Участники','Сотрудник: сохранён',EMPED.name);saveDB();closeModal();renderContent();toast('Сотрудник сохранён');}

  if(debt>0){toast('❌ Нельзя удалить: у клиента долг '+money(debt)+'. Сначала погасите долг или сделайте клиента неактивным.');return;}

  // долга и предоплаты нет — удаляем через код 2020
  askCode(()=>{DB.clients=DB.clients.filter(x=>x.id!==id);
    DB._deleted=DB._deleted||[];if(!DB._deleted.includes(id))DB._deleted.push(id);

function clientPhoto(inp){const f=inp.files&&inp.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{const img=new Image();img.onload=()=>{const max=500;let w=img.width,h=img.height;
    if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
    CLPIC=cv.toDataURL('image/jpeg',0.6);const b=$('#c_photo_box');if(b)b.style.backgroundImage="url('"+CLPIC+"')";};img.src=r.result;};
  r.readAsDataURL(f);}
let EMPIC=null;
function empPhoto(inp){const f=inp.files&&inp.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height,max=320;

function openImport(){
  openModal(`<h2>Импорт клиентов из Excel</h2>
    <div class="hint" style="line-height:1.7;margin-bottom:12px">Файл .xlsx или .csv с колонками (первая строка — заголовки):<br>
    <b>name</b> (название) · <b>type</b> (тип клиента) · <b>address</b> (адрес) · <b>lat</b> · <b>lng</b> · phone · owner · contact · landmark · legal<br>
    Территория и маршрут прикрепятся <b>автоматически по координатам</b> — к ближайшей территории (по отметке на карте в Настройках) и её маршруту. Базу точек (гейм-клубы, школы, магазины) можно выгрузить из 2ГИС или Яндекс.Бизнес.</div>
    <label class="btn primary" style="cursor:pointer;display:block;text-align:center">Выбрать файл<input type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="doImport(this)"></label>
    <div id="imp_res" class="hint" style="margin-top:10px"></div>
    <button class="btn ghost" style="width:100%;margin-top:12px" onclick="closeModal()">Закрыть</button>`);
}
function nearestTerr(lat,lng){let best=null,bd=1e9;
  DB.territories.forEach(t=>{if(!t.center)return;const d=(t.center[0]-lat)**2+(t.center[1]-lng)**2;if(d<bd){bd=d;best=t;}});
  return best||DB.territories[0]||null;}
function doImport(input){const file=input.files&&input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{try{
    const wb=XLSX.read(r.result,{type:'binary'});
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
    let added=0,skipped=0;
    rows.forEach(row=>{
      const name=String(row.name||row.Name||row['название']||'').trim();
      const lat=+row.lat||+row.Lat,lng=+row.lng||+row.Lng||+row.lon;
      if(!name||!lat||!lng){skipped++;return;}
      if(DB.clients.some(c=>(c.name||'').toLowerCase()===name.toLowerCase())){skipped++;return;}
      const t=nearestTerr(lat,lng);
      const typeName=String(row.type||row['тип']||'').trim().toLowerCase();
      let ct=DB.clientTypes.find(x=>x.name.toLowerCase()===typeName);
      if(!ct&&typeName){ct={id:uid('ct'),name:String(row.type||row['тип']).trim()};DB.clientTypes.push(ct);}
      const dow=1;const rt=t?DB.routes.find(r=>r.terr===t.id&&r.dow===dow):null;
      DB.clients.push({id:uid('cl'),name,legal:String(row.legal||'').trim()||name,owner:String(row.owner||'').trim()||'—',
        contact:String(row.contact||'').trim()||'—',phone:String(row.phone||'').trim()||'—',addr:String(row.address||row['адрес']||'').trim()||'—',
        landmark:String(row.landmark||'').trim()||'—',terr:t?.id||'',route:rt?.id||'',type:ct?.id||'',discount:0,agent:'',
        debt:0,active:true,created:todayTashkent(),act:0.6,lat,lng});
      added++;});
    logAct('Участники','Импорт клиентов: добавлено '+added+', пропущено '+skipped,file.name);
    saveDB();$('#imp_res').innerHTML='<b style="color:var(--green)">Добавлено: '+added+'</b> · пропущено (без имени/координат или дубликаты): '+skipped;
    renderContent&&setTimeout(()=>{},0);
  }catch(e){$('#imp_res').innerHTML='<b style="color:var(--red)">Ошибка чтения файла</b>';}};
  r.readAsBinaryString(file);}

/* ---- KPI / Зарплата ---- */
const KPI_TYPES={
  fixed:{l:'Фиксированная часть',u:'сум',sc:false},
  bonus:{l:'Доп. бонус (Extra)',u:'сум',sc:false},
  sum:{l:'% от суммы продаж',u:'%',sc:true},
  qty:{l:'За штуку',u:'сум/шт',sc:true},
  kg:{l:'За килограмм',u:'сум/кг',sc:true},
  visit:{l:'За визит',u:'сум/визит',sc:false},
  akb:{l:'За активного клиента (АКБ)',u:'сум/клиент',sc:false},
  newClient:{l:'За добавление клиента (ОКБ)',u:'сум/клиент',sc:true},
  noReturn:{l:'Бонус за безвозвратность',u:'сум',sc:false}
};
function ruleItems(rule,o){const sc=rule.scope||{kind:'all'};
  if(sc.kind==='ctype'){const c=cli(o.client);return (c&&c.type===sc.ref)?o.items:[];}
  if(sc.kind==='category')return o.items.filter(i=>prod(i.p)?.cat===sc.ref);
  if(sc.kind==='product')return o.items.filter(i=>i.p===sc.ref);
  return o.items;}
function computeKpi(a){
  const dord=DB.orders.filter(o=>o.agent===a.id&&o.status==='delivered'&&inP(o.date));
  const vis=DB.visits.filter(v=>v.agent===a.id&&inP(v.date)).length;
  const akb=new Set(DB.orders.filter(o=>o.agent===a.id&&inP(o.date)).map(o=>o.client)).size;
  const rets=DB.returns.filter(r=>r.agent===a.id&&inP(r.date)).length;
  const sales=dord.reduce((s,o)=>s+o.total,0);
  let total=0;const bd=[];
  DB.kpis.filter(k=>k.active&&(k.applyTo==='agent'||k.applyTo===a.id)).forEach(k=>{let amt=0;
    if(k.type==='fixed'||k.type==='bonus')amt=k.rate;
    else if(k.type==='visit')amt=vis*k.rate;
    else if(k.type==='akb')amt=akb*k.rate;
    else if(k.type==='newClient'){let n=DB.clients.filter(c=>c.agent===a.id&&c.created&&inP(c.created)&&(!k.scope||k.scope.kind!=='ctype'||c.type===k.scope.ref)).length;amt=n*k.rate;}
    else if(k.type==='noReturn')amt=rets===0?k.rate:0;
    else dord.forEach(o=>{const its=ruleItems(k,o);
      if(k.type==='sum')amt+=its.reduce((s,i)=>s+i.q*i.price,0)*k.rate/100;
      else if(k.type==='qty')amt+=its.reduce((s,i)=>s+i.q,0)*k.rate;
      else if(k.type==='kg')amt+=its.filter(i=>prod(i.p)?.unit==='кг').reduce((s,i)=>s+i.q,0)*k.rate;});
    total+=amt;bd.push({k,amt});});
  return {total,bd,vis,akb,rets,sales};
}

/* ---- Касса доставщиков: сколько привёз, расходы, сколько сдать, товар-возврат ---- */
function courierStats(empId){
  const inPer=d=>inP(pdate(d));
  // деньги, принятые этим сотрудником (доставка/оплаты)
  const pays=DB.payments.filter(p=>(p.employee===empId)&&inPer(p.date));
  const cash=pays.reduce((s,p)=>s+p.amount,0);
  // отгружено товаром (заказы, где курьер=этот, статус был отгружен/доставлен) за период
  const myOrders=DB.orders.filter(o=>(o.courier===empId||o.agent===empId)&&inPer(o.date)&&!o._deliverMarker);
  const shipped=myOrders.reduce((s,o)=>s+(o.total||0),0);
  const delivered=myOrders.filter(o=>o.status==='delivered').reduce((s,o)=>s+(o.total||0),0);
  const consign=myOrders.filter(o=>o.payType==='consignment').reduce((s,o)=>s+(o.total||0),0);
  // расходы
  const exps=(DB.expenses||[]).filter(x=>x.employee===empId&&inPer(x.date));
  const autoExp=exps.filter(x=>!x.salary).reduce((s,x)=>s+x.amount,0);
  const ownExp=exps.filter(x=>x.salary).reduce((s,x)=>s+x.amount,0);
  const allExp=autoExp+ownExp;
  // возврат товара (для фирмы — это ТОВАР, не деньги)
  const rets=DB.returns.filter(r=>r.agent===empId&&inPer(r.date));
  const retQty=rets.reduce((s,r)=>s+(r.items||[]).reduce((a,i)=>a+(i.q||0),0),0);
  const retSum=rets.reduce((s,r)=>s+(r.amount||0),0);
  // СКОЛЬКО СДАТЬ = наличные − все расходы
  const toCashbox=cash-allExp;
  return {cash,shipped,delivered,consign,autoExp,ownExp,allExp,retQty,retSum,toCashbox,orders:myOrders.length};
}

/* ---- Claude AI чат ---- */
let AIH=[];
function aiCtx(){
  const t=today();const t30=addDays(t,-30);
  const debt=DB.clients.reduce((s,c)=>s+(c.debt>0?c.debt:0),0);
  const ordToday=DB.orders.filter(o=>o.date===t);
  const supDebt=DB.suppliers.reduce((s,x)=>s+Math.max(0,x.balance||0),0);
  // топ должников
  const topDebt=DB.clients.filter(c=>c.debt>0).sort((a,b)=>b.debt-a.debt).slice(0,5)
    .map(c=>c.name+' '+Math.round(c.debt)).join('; ')||'нет';
  // непосещённые 14+ дней (есть клиент, но визита давно нет)
  const lastVisit={};DB.visits.forEach(v=>{if(!lastVisit[v.client]||v.date>lastVisit[v.client])lastVisit[v.client]=v.date;});
  const notVisited=DB.clients.filter(c=>c.active!==false&&(!lastVisit[c.id]||lastVisit[c.id]<addDays(t,-14)));
  // клиенты с возвратами за 30 дней
  const retByCli={};DB.returns.filter(r=>r.date>=t30).forEach(r=>{retByCli[r.client]=(retByCli[r.client]||0)+(r.amount||0);});
  const topRet=Object.entries(retByCli).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,v])=>(cli(id)?.name||'?')+' '+Math.round(v)).join('; ')||'нет';
  // лидеры продаж 30 дней
  const salesByCli={};DB.orders.filter(o=>o.date>=t30&&o.status!=='canceled').forEach(o=>{salesByCli[o.client]=(salesByCli[o.client]||0)+o.total;});
  const topSales=Object.entries(salesByCli).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,v])=>(cli(id)?.name||'?')+' '+Math.round(v)).join('; ')||'нет';
  return `Клиентов: ${DB.clients.length} (активных ${DB.clients.filter(c=>c.active!==false).length}). Сотрудников: ${DB.employees.length}. Товаров: ${DB.products.length}. `+
    `Территорий: ${DB.territories.length}, маршрутов: ${DB.routes.length}. Заказов сегодня: ${ordToday.length} на ${Math.round(ordToday.reduce((s,o)=>s+o.total,0))} сум. `+
    `Долг клиентов всего: ${Math.round(debt)} сум. Долг поставщикам: ${Math.round(supDebt)} сум. `+
    `ТОП должников: ${topDebt}. `+
    `Непосещённых клиентов 14+ дней: ${notVisited.length}${notVisited.length?' ('+notVisited.slice(0,8).map(c=>c.name).join(', ')+(notVisited.length>8?'…':'')+')':''}. `+
    `ТОП по возвратам (30дн): ${topRet}. `+
    `ТОП по продажам (30дн): ${topSales}.`;
}

function aiRender(pending){const log=$('#ai_log');if(!log)return;
  log.innerHTML=AIH.map((m,i)=>{
    let html=`<div style="margin:7px 0;display:flex;${m.role==='user'?'justify-content:flex-end':''}">

    if(m.cmds&&m.cmds.length){html+=m.cmds.map((c,ci)=>{
      const label=aiCmdLabel(c);
      if(c._done===true)return `<div style="margin:4px 0 8px"><span class="pill green">✓ ${esc(c._result||'применено')}</span></div>`;
      if(c._done==='err')return `<div style="margin:4px 0 8px"><span class="pill red">✗ не удалось (проверьте id)</span></div>`;
      return `<div style="margin:4px 0 8px;padding:10px;border:1.5px solid var(--gold);border-radius:11px;background:#FBF6E6">
        <div style="font-size:13px;margin-bottom:7px"><b>Изменение:</b> ${esc(label)}</div>
        <button class="btn primary" style="width:auto;padding:7px 16px;font-size:13px" onclick="aiApply(${i},${ci})">Применить (код)</button></div>`;
    }).join('');}
    return html;}).join('')
    +(pending?`<div class="hint" style="padding:6px 2px">${esc(pending)}</div>`:'');
  log.scrollTop=log.scrollHeight;}
function aiCmdLabel(c){
  const pn=id=>prod(id)?.name||id, en=id=>emp(id)?.name||id, cn=id=>cli(id)?.name||id;
  switch(c.do){
    case 'product_price':return 'цена "'+pn(c.id)+'" → '+money(c.value);
    case 'product_name':return 'переименовать товар → '+c.value;
    case 'product_stock':return 'остаток "'+pn(c.id)+'" → '+c.value;
    case 'emp_active':return (c.value===false||c.value==='false'?'заблокировать':'разблокировать')+' сотрудника "'+en(c.id)+'"';
    case 'emp_plan':return 'план визитов "'+en(c.id)+'" → '+c.value;
    case 'client_discount':return 'скидка "'+cn(c.id)+'" → '+c.value+'%';
    case 'client_active':return (c.value===false||c.value==='false'?'деактивировать':'активировать')+' клиента "'+cn(c.id)+'"';
    case 'client_cleardebt':return 'списать долг "'+cn(c.id)+'"';
    case 'rule':return 'правило "'+c.id+'" → '+(c.value===false||c.value==='false'?'выкл':'вкл');
    default:return c.do;
  }
}
async function aiSend(){
  const inp=$('#ai_q');const q=(inp?.value||'').trim();if(!q)return;inp.value='';
  AIH.push({role:'user',content:q});aiRender('Claude печатает…');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':DB.integrations.claude.apikey,
        'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1500,
        system:aiSystem(),
        messages:AIH.map(m=>({role:m.role,content:m.content}))})});
    const data=await res.json();
    let txt=(data.content||[]).map(c=>c.text||'').join('')||('Ошибка: '+((data.error&&data.error.message)||res.status));
    // ищем команду изменения в формате [[ACTION:{...}]]
    const cmds=[];txt=txt.replace(/\[\[ACTION:(\{[\s\S]*?\})\]\]/g,(m,j)=>{try{cmds.push(JSON.parse(j));}catch(e){}return '';}).trim();
    AIH.push({role:'assistant',content:txt,cmds});aiRender();
  }catch(e){AIH.push({role:'assistant',content:'Ошибка сети: '+e.message+'. Проверьте интернет и ключ.'});aiRender();}
}

/* применение команды AI — с подтверждением кодом */
function aiApply(idx,ci){
  const m=AIH[idx];if(!m||!m.cmds||!m.cmds[ci])return;const cmd=m.cmds[ci];
  askCode(()=>{
    const r=aiExec(cmd);
    cmd._done=r?true:'err';cmd._result=r||'не удалось';
    logAct('Настройки','AI изменил по команде: '+(r||'ошибка'),'');
    saveDB();aiRender();renderContent();toast(r?'Применено':'Не удалось');
  });
}
function aiExec(c){
  try{
    if(c.do==='product_price'){const p=prod(c.id);if(!p)return null;const old=p.price;p.price=+c.value;return 'цена "'+p.name+'": '+money(old)+' → '+money(p.price);}
    if(c.do==='product_name'){const p=prod(c.id);if(!p)return null;const old=p.name;p.name=String(c.value);return 'товар переименован: '+old+' → '+p.name;}
    if(c.do==='product_stock'){const p=prod(c.id);if(!p)return null;p.stock=+c.value;p.stockBy=p.stockBy||{};p.stockBy.w_main=+c.value;return 'остаток "'+p.name+'" = '+c.value;}
    if(c.do==='emp_active'){const e=emp(c.id);if(!e)return null;e.active=c.value!==false&&c.value!=='false';return 'сотрудник "'+e.name+'": '+(e.active?'разблокирован':'заблокирован');}
    if(c.do==='emp_plan'){const e=emp(c.id);if(!e)return null;e.plan=+c.value;return 'план визитов "'+e.name+'" = '+c.value;}
    if(c.do==='client_discount'){const x=cli(c.id);if(!x)return null;x.discount=+c.value;return 'скидка "'+x.name+'" = '+c.value+'%';}
    if(c.do==='client_active'){const x=cli(c.id);if(!x)return null;x.active=c.value!==false&&c.value!=='false';return 'клиент "'+x.name+'": '+(x.active?'активен':'неактивен');}
    if(c.do==='client_cleardebt'){const x=cli(c.id);if(!x)return null;const old=x.debt;x.debt=0;return 'долг "'+x.name+'" списан ('+money(old)+' → 0)';}
    if(c.do==='rule'){if(!DB.rules[c.id])return null;DB.rules[c.id].enabled=c.value!==false&&c.value!=='false';return 'правило "'+c.id+'": '+(DB.rules[c.id].enabled?'вкл':'выкл');}
  }catch(e){return null;}
  return null;
}

/* ---- Должники ---- */
function debtorMatch(c){const f=finFilt;
  if(!(f.route==='all'||c.route===f.route))return false;
  if(!(f.type==='all'||c.type===f.type))return false;
  if(!(f.agent==='all'||c.agent===f.agent))return false;
  if(f.product!=='all'||f.cat!=='all'){const uo=DB.orders.filter(o=>o.client===c.id&&(o.total-(o.paid||0))>0);
    if(!uo.some(o=>o.items.some(i=>(f.product==='all'||i.p===f.product)&&(f.cat==='all'||prod(i.p)?.cat===f.cat))))return false;}
  return true;}
function finDebtors(){
  const debtors=DB.clients.filter(c=>c.debt>0&&debtorMatch(c)).sort((a,b)=>b.debt-a.debt);
  const total=debtors.reduce((s,c)=>s+c.debt,0);

  $('#content').innerHTML=finBar()+`

      <div class="filt"><label>Тип клиента</label><select onchange="finFilt.type=this.value;PG.debtors=1;finDebtors()"><option value="all">Все</option>${DB.clientTypes.map(t=>`<option value="${t.id}" ${finFilt.type===t.id?'selected':''}>${esc(t.name)}</option>`).join('')}</select></div>
      <div class="filt"><label>Сотрудник</label><select onchange="finFilt.agent=this.value;PG.debtors=1;finDebtors()"><option value="all">Все</option>${DB.employees.filter(e=>e.role==='agent').map(e=>`<option value="${e.id}" ${finFilt.agent===e.id?'selected':''}>${esc(e.name)}</option>`).join('')}</select></div>
      <div class="filt"><label>Категория</label><select onchange="finFilt.cat=this.value;PG.debtors=1;finDebtors()"><option value="all">Все</option>${DB.categories.map(c=>`<option value="${c.id}" ${finFilt.cat===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
      <div class="filt"><label>Товар</label><select onchange="finFilt.product=this.value;PG.debtors=1;finDebtors()"><option value="all">Все</option>${DB.products.map(p=>`<option value="${p.id}" ${finFilt.product===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}</select></div>
      <div class="grow"></div><span class="hint">Итого долг: <b style="color:var(--red)">${money(total)}</b></span>
      <button class="btn ghost" onclick="exportTable('Должники',debtRows())">${I.down} Excel</button>
    </div>
    <table><thead><tr><th>Клиент</th><th>Маршрут</th><th>Тип</th><th>Агент</th><th class="num">Долг</th><th></th></tr></thead>
    <tbody>${pd.slice.length?pd.slice.map(c=>`<tr>
      <td><b>${esc(c.name)}</b></td><td>${esc(route(c.route)?.name||'—')}</td><td>${esc(ctype(c.type)?.name||'—')}</td><td>${esc(emp(c.agent)?.name||'—')}</td>
      <td class="num"><b style="color:var(--red)">${money(c.debt)}</b></td>
      <td class="num"><button class="btn primary" style="padding:6px 12px" onclick="payStart('${c.id}')">Заплатить</button></td></tr>`).join(''):'<tr><td colspan="6"><div class="empty">Должников нет</div></td></tr>'}</tbody></table>
  </div>`+pageBar(pd);
}
function debtRows(){const rows=[['Клиент','Маршрут','Тип','Агент','Долг']];
  DB.clients.filter(c=>c.debt>0&&debtorMatch(c)).sort((a,b)=>b.debt-a.debt).forEach(c=>rows.push([c.name,route(c.route)?.name||'',ctype(c.type)?.name||'',emp(c.agent)?.name||'',c.debt]));return rows;}

/* ---- Мастер оплаты ---- */
function payStart(cid){PAYW={step:1,client:cid,employee:'',cash:'',terminal:'',cashless:'',date:today(),alloc:{}};renderPay();}
function paySync1(){if($('#pw_emp'))PAYW.employee=$('#pw_emp').value;
  if($('#pw_cash'))PAYW.cash=$('#pw_cash').value;
  if($('#pw_terminal'))PAYW.terminal=$('#pw_terminal').value;
  if($('#pw_cashless'))PAYW.cashless=$('#pw_cashless').value;
  if($('#pw_date'))PAYW.date=$('#pw_date').value;}
function payTotal(){return (+PAYW.cash||0)+(+PAYW.terminal||0)+(+PAYW.cashless||0);}
function renderPay(){PAYW.step===1?payStep1():PAYW.step===2?payStep2():payStep3();}
function payStep1(){const c=cli(PAYW.client);
  openModal(`<h2>Оплата клиента · шаг 1 из 3</h2>
    <div class="legrow" style="background:var(--green-100);border-radius:12px;padding:11px 13px;margin-bottom:14px"><span class="nm"><b>${esc(c.name)}</b><div class="hint">${esc(route(c.route)?.name||'')}</div></span><b style="color:var(--red)">долг ${money(c.debt)}</b></div>
    <div class="field"><label>Сотрудник (кто принял деньги)</label><select id="pw_emp"><option value="">— выберите сотрудника —</option>${DB.employees.filter(e=>e.active!==false).map(e=>`<option value="${e.id}" ${PAYW.employee===e.id?'selected':''}>${esc(e.name)} (${ROLEMAP[e.role]||e.role})</option>`).join('')}</select></div>
    <div class="field"><label>Дата оплаты</label><input id="pw_date" type="date" value="${PAYW.date}"></div>
    <div style="border-top:1px solid var(--line);margin:8px 0 12px;padding-top:12px"><b style="font-size:14px">Сумма по способам оплаты</b></div>
    <div class="field"><label>💵 Наличный</label><input id="pw_cash" type="number" inputmode="numeric" value="${PAYW.cash}" placeholder="0" oninput="payT1()"></div>
    <div class="field"><label>💳 Терминал</label><input id="pw_terminal" type="number" inputmode="numeric" value="${PAYW.terminal}" placeholder="0" oninput="payT1()"></div>
    <div class="field"><label>🏦 Безналичный</label><input id="pw_cashless" type="number" inputmode="numeric" value="${PAYW.cashless}" placeholder="0" oninput="payT1()"></div>
    <div class="legrow" style="font-size:15px;margin:6px 0 13px"><span class="nm"><b>Итого к оплате</b></span><b id="pw_total" style="color:var(--green)">${money(payTotal())}</b></div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="payNext1()">Далее →</button></div>`);
}
function payT1(){paySync1();if($('#pw_total'))$('#pw_total').textContent=money(payTotal());}
function payNext1(){paySync1();const a=payTotal();if(!a||a<=0){toast('Введите сумму хотя бы по одному способу');return;}if(!PAYW.employee){toast('Выберите сотрудника');return;}
  // предоплата: если платят больше долга и предоплата запрещена в настройках — блокируем
  const c=cli(PAYW.client);const debt=c?c.debt||0:0;
  if(a>debt&&!DB.rules.allowPrepay){
    toast('❌ Сумма больше долга ('+money(debt)+'). Предоплата запрещена. Включите её в Настройки → Правила, если нужно.');return;}
  PAYW.amount=a;PAYW.step=2;renderPay();}
function payStep2(){const c=cli(PAYW.client);const amt=+PAYW.amount;
  const uo=DB.orders.filter(o=>o.client===PAYW.client&&(o.total-(o.paid||0))>0).sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  const allocSum=Object.values(PAYW.alloc).reduce((s,v)=>s+(+v||0),0);const left=amt-allocSum;
  openModal(`<h2>Оплата · шаг 2 из 3 — распределение</h2>
    <div class="hint" style="margin-bottom:10px">Сумма ${money(amt)} (${METHODP[PAYW.method]}). Укажите, за какие заказы. <button class="btn ghost" style="padding:4px 10px;font-size:12px" onclick="payAuto()">Авто (от старых)</button></div>
    ${uo.length?`<div style="max-height:44vh;overflow-y:auto">${uo.map(o=>{const rem=o.total-(o.paid||0);return `
      <div class="legrow" style="padding:9px 0;border-bottom:1px solid var(--line)"><span class="nm">${o.number} <span class="hint">${dmonth(o.date)} · остаток ${money(rem)}</span></span>
        <input type="number" id="al_${o.id}" value="${PAYW.alloc[o.id]||''}" placeholder="0" style="width:130px;padding:8px;border:1.5px solid var(--line);border-radius:9px;text-align:right" oninput="payAllocSync()"></div>`}).join('')}</div>`
      :'<div class="hint" style="padding:12px 0">У клиента нет неоплаченных заказов — оплата уменьшит общий долг.</div>'}
    <div class="legrow" style="margin-top:12px;font-size:15px"><span class="nm"><b>Распределено</b></span><b id="pw_alloc">${money(allocSum)}</b></div>
    <div class="legrow"><span class="nm">Остаток к распределению</span><b id="pw_left" style="color:${left===0?'var(--green)':'var(--red)'}">${money(left)}</b></div>
    <div class="modal-actions"><button class="btn ghost" onclick="PAYW.step=1;renderPay()">← Назад</button><button class="btn primary" onclick="payNext2()">Далее →</button></div>`);
  $('#modal').classList.add('wide');
}
function payAllocSync(){const amt=+PAYW.amount;let s=0;DB.orders.filter(o=>o.client===PAYW.client).forEach(o=>{const el=$('#al_'+o.id);if(el){PAYW.alloc[o.id]=el.value;s+=(+el.value||0);}});
  if($('#pw_alloc'))$('#pw_alloc').textContent=money(s);if($('#pw_left')){$('#pw_left').textContent=money(amt-s);$('#pw_left').style.color=(amt-s)===0?'var(--green)':'var(--red)';}}
function payAuto(){let amt=+PAYW.amount;PAYW.alloc={};const uo=DB.orders.filter(o=>o.client===PAYW.client&&(o.total-(o.paid||0))>0).sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  uo.forEach(o=>{const rem=o.total-(o.paid||0);if(amt<=0)return;const take=Math.min(rem,amt);PAYW.alloc[o.id]=take;amt-=take;});renderPay();}
function payNext2(){payAllocSync();const amt=+PAYW.amount;const allocSum=Object.values(PAYW.alloc).reduce((s,v)=>s+(+v||0),0);
  const uo=DB.orders.filter(o=>o.client===PAYW.client&&(o.total-(o.paid||0))>0);
  if(uo.length&&allocSum!==amt){toast('Распределите всю сумму по заказам');return;}
  PAYW.step=3;renderPay();}
function payStep3(){const c=cli(PAYW.client);const amt=payTotal();
  const allocs=Object.entries(PAYW.alloc).map(([oid,a])=>({order:oid,amount:+a})).filter(x=>x.amount>0);
  const methods=[['💵 Наличный',+PAYW.cash||0],['💳 Терминал',+PAYW.terminal||0],['🏦 Безналичный',+PAYW.cashless||0]].filter(m=>m[1]>0);
  openModal(`<h2>Оплата клиента · шаг 3 из 3 — просмотр</h2>
    <div class="card"><div class="legend">
      <div class="legrow"><span class="nm">Клиент</span><b>${esc(c.name)}</b></div>
      <div class="legrow"><span class="nm">Сотрудник</span><b>${esc(emp(PAYW.employee)?.name||'—')}</b></div>
      <div class="legrow"><span class="nm">Дата</span><b>${esc(PAYW.date||today())}</b></div>
      <div style="border-top:1px solid var(--line);margin:6px 0;padding-top:6px"></div>
      ${methods.map(m=>`<div class="legrow"><span class="nm">${m[0]}</span><b>${money(m[1])}</b></div>`).join('')}
      <div class="legrow" style="font-size:15px"><span class="nm"><b>Итого</b></span><b style="color:var(--green)">${money(amt)}</b></div>
      ${allocs.length?'<div style="border-top:1px solid var(--line);margin:6px 0;padding-top:6px"></div>'+allocs.map(a=>`<div class="legrow"><span class="nm">${ordNum(a.order)}</span><b>${money(a.amount)}</b></div>`).join(''):''}
    </div></div>
    <div class="hint" style="margin-top:8px">После подтверждения долг клиента уменьшится, а суммы попадут в кассу по своим способам.</div>
    <div class="modal-actions"><button class="btn ghost" onclick="PAYW.step=2;renderPay()">← Назад</button><button class="btn primary" onclick="payConfirm()">Подтвердить оплату</button></div>`);
}
function payConfirm(){const w=PAYW,c=cli(w.client),amt=payTotal();
  const allocs=Object.entries(w.alloc).map(([oid,a])=>({order:oid,amount:+a})).filter(x=>x.amount>0);
  allocs.forEach(a=>{const o=DB.orders.find(o=>o.id===a.order);if(o){o.paid=Math.min(o.total,(o.paid||0)+a.amount);}});
  // если предоплата разрешена — баланс может стать отрицательным (предоплата); иначе не ниже нуля
  c.debt=DB.rules.allowPrepay?((c.debt||0)-amt):Math.max(0,(c.debt||0)-amt);
  // создаём отдельную запись по каждому ненулевому способу
  [['cash',+w.cash||0],['terminal',+w.terminal||0],['cashless',+w.cashless||0]].forEach(([m,sum])=>{
    if(sum>0)DB.payments.push({id:uid('pay'),client:w.client,employee:w.employee||'',method:m,amount:sum,date:w.date||nowTashkent(),allocations:m==='cash'?allocs:[]});
  });
  logAct('Финансы','Оплата клиента: '+money(amt)+' (нал '+money(+w.cash||0)+', терм '+money(+w.terminal||0)+', безнал '+money(+w.cashless||0)+')',c.name);
  saveDB();if(sbCfg())scheduleCloudPush();closeModal();PAYW=null;finSub='cashbox';renderContent();toast('✅ Оплата проведена: '+money(amt));}

function whQty(p,wh){if(p.stockBy&&p.stockBy[wh]!==undefined)return p.stockBy[wh];return wh==='w_main'?(p.stock||0):0;}
function resMap(){const m={};(DB.orders||[]).forEach(o=>{if(o.status==='new')(o.items||[]).forEach(i=>{m[i.p]=(m[i.p]||0)+i.q;});});return m;} // бронь по товарам (новые заказы)
function whReserved(p,wh){if(wh!=='w_main'||!p)return 0;let r=0;(DB.orders||[]).forEach(o=>{if(o.status==='new')(o.items||[]).forEach(i=>{if(i.p===p.id)r+=i.q;});});return r;}

  const totalVal=rows.reduce((s,r)=>s+r.phys*(r.p.price||0),0);

  const totalRes=rows.reduce((s,r)=>s+r.res,0);
  $('#content').innerHTML=`
  <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">
    ${DB.warehouses.map(x=>{const val=DB.products.reduce((s,p)=>s+whQty(p,x.id)*(p.price||0),0);
      return `<button class="pill ${stockWH===x.id?'green':'gray'}" style="padding:10px 16px;font-size:13px" onclick="stockWH='${x.id}';pageStock()">${esc(x.name)} · ${short(val)}</button>`}).join('')}
  </div>

/* ---- Корректировка склада (код 2020) ---- */
function setWhQty(p,wh,q){p.stockBy=p.stockBy||{};p.stockBy[wh]=Math.max(0,q);if(wh==='w_main')p.stock=Math.max(0,q);}
function openCorrection(){
  if(!DB.products.length){toast('Товаров нет');return;}
  const w=warehouse(stockWH);
  openModal(`<h2>Корректировка — ${esc(w?.name||'')}</h2>
    <div class="hint" style="margin-bottom:10px">Инвентаризация: укажи <b>физический</b> остаток на складе. Нельзя указать меньше, чем в брони под заказы. Разница попадёт в журнал. Подтверждение кодом.</div>
    <div class="field"><label>Товар</label><select id="cor_prod" onchange="corShow()">${DB.products.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select></div>
    <div class="card" style="padding:10px 14px;margin-bottom:12px;background:#FBF8F0"><div class="between"><span class="hint">Физический остаток (по программе)</span><b id="cor_cur">${whQty(DB.products[0],stockWH)+whReserved(DB.products[0],stockWH)}</b></div>
      <div class="between" style="margin-top:6px"><span class="hint">в т.ч. бронь (под заказы)</span><b id="cor_res" style="color:var(--gold)">${whReserved(DB.products[0],stockWH)}</b></div></div>
    <div class="field"><label>Фактический остаток *</label><input id="cor_fact" type="number" placeholder="напр. 90"></div>
    <div class="field"><label>Комментарий (необязательно)</label><input id="cor_note" placeholder="итоги инвентаризации"></div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Отмена</button><button class="btn danger" onclick="saveCorrection()">Скорректировать</button></div>`);
}
function corShow(){const p=prod($('#cor_prod').value);const res=whReserved(p,stockWH);if($('#cor_cur'))$('#cor_cur').textContent=whQty(p,stockWH)+res;if($('#cor_res'))$('#cor_res').textContent=res;}
function saveCorrection(){const pid=$('#cor_prod').value,fact=$('#cor_fact').value,note=$('#cor_note').value.trim();
  if(fact===''){toast('Введите физический остаток');return;}
  const p=prod(pid),w=warehouse(stockWH),res=whReserved(p,stockWH),physCur=whQty(p,stockWH)+res,physNew=Math.max(0,+fact||0),diff=physNew-physCur;
  if(physNew<res){toast('❌ Нельзя: '+res+' ед. в брони под заказы. Минимум — '+res);return;}
  if(diff===0){toast('Остаток совпадает — корректировка не нужна');return;}
  askCode(()=>{setWhQty(p,stockWH,physNew-res);
    logAct('Склад','Корректировка ('+(w?.name||'')+'): '+p.name+' '+physCur+' → '+physNew+' ('+(diff>0?'+':'')+diff+'), бронь '+res,note||'инвентаризация');
    saveDB();if(sbCfg())scheduleCloudPush();renderContent();toast('Скорректировано: '+p.name+' → '+physNew);});}

/* ---- Возврат поставщику ---- */
function openSupReturn(){
  if(!DB.products.length){toast('Товаров нет');return;}
  if(!DB.suppliers.length){toast('Сначала добавьте поставщика');return;}
  openModal(`<h2>Возврат поставщику</h2>
    <div class="field"><label>Со склада *</label><select id="sr_wh">${DB.warehouses.map(w=>`<option value="${w.id}" ${w.id===stockWH?'selected':''}>${esc(w.name)}</option>`).join('')}</select></div>
    <div class="field"><label>Товар *</label><select id="sr_prod" onchange="srSupOpts()">${DB.products.map(p=>`<option value="${p.id}">${esc(p.name)} (приход. ${money(p.cost||0)})</option>`).join('')}</select></div>
    <div class="field"><label>Поставщик * <span class="hint">(только от кого был приход этого товара)</span></label><select id="sr_sup"></select></div>
    <div class="field"><label>Количество *</label><input id="sr_qty" type="number" placeholder="0"></div>
    <div class="hint" style="margin-bottom:8px">Сумма считается по приходной цене. Остаток склада уменьшится; долг поставщику уменьшится, а если долга нет — образуется предоплата.</div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="saveSupReturn()">Провести возврат</button></div>`);
  setTimeout(srSupOpts,0);
}
function srSupOpts(){const pid=$('#sr_prod')?$('#sr_prod').value:'';
  const ids=[...new Set((DB.arrivals||[]).filter(a=>a.prod===pid&&a.sup).map(a=>a.sup))];
  const sel=$('#sr_sup');if(!sel)return;
  sel.innerHTML=ids.length?ids.map(id=>{const sp=supplier(id);return sp?`<option value="${sp.id}">${esc(sp.name)}</option>`:''}).join(''):'<option value="">— приходов этого товара не было —</option>';}
function saveSupReturn(){const wh=$('#sr_wh').value,sup=$('#sr_sup').value,pid=$('#sr_prod').value,qty=+$('#sr_qty').value||0;
  if(!qty||qty<=0){toast('Введите количество');return;}
  const p=prod(pid),sx=supplier(sup),w=warehouse(wh);
  if(!sup||!sx){toast('Нет поставщика прихода для этого товара');return;}
  const hadArr=(DB.arrivals||[]).some(a=>a.prod===pid&&a.sup===sup);
  if(!hadArr){toast('От этого поставщика не было прихода товара «'+(p?.name||'')+'» — возврат возможен только поставщику прихода');return;}
  const cur=whQty(p,wh);
  if(qty>cur){toast('На складе «'+(w?.name||'')+'» только '+cur);return;}
  const total=(p.cost||0)*qty;
  askCode(()=>{setWhQty(p,wh,cur-qty);
    sx.balance=(sx.balance||0)-total; // минус = предоплата
    logAct('Склад','Возврат поставщику: '+p.name+' × '+qty+' с «'+(w?.name||'')+'» → '+(sx.name||''),money(total));
    saveDB();closeModal();renderContent();
    toast('Возврат проведён: '+money(total)+(sx.balance<0?' · предоплата '+money(-sx.balance):''));});}

function openArrival(){
  if(!DB.products.length){toast('Сначала добавьте товары');return;}
  openModal(`<h2>Приход товара</h2>
    <div class="field"><label>Склад *</label><select id="ar_wh">${DB.warehouses.map(w=>`<option value="${w.id}">${esc(w.name)}</option>`).join('')}</select></div>
    <div class="field"><label>Поставщик</label><select id="ar_sup"><option value="">—</option>${DB.suppliers.map(sp=>`<option value="${sp.id}">${esc(sp.name)}</option>`).join('')}</select></div>

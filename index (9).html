<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HALWAA BARAKA · Админ-панель</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#EEF1F5; --panel:#FFFFFF; --green:#1E2A44; --green2:#28365A; --green-100:#E9EEFB;
    --gold:#3B6FE0; --gold-soft:#CFDDF7; --ink:#1C2536; --muted:#8794A8; --line:#E6EAF1;
    --red:#B23A33; --red-100:#F6E4E2; --blue:#3B6FE0; --blue-100:#E9EEFB; --amber:#C97B1E; --amber-100:#F8ECD8;
    --sidebar:#16223A;
    --shadow:0 1px 2px rgba(38,32,23,.04),0 6px 22px rgba(38,32,23,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  .serif{font-family:Georgia,"Times New Roman",serif}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit;font-size:14px}
  a{color:inherit;text-decoration:none}

  /* ===== Layout ===== */
  .app{display:flex;min-height:100vh}
  /* ===== Горизонтальный layout Mirasoft ===== */
  .app-h{min-height:100vh;display:flex;flex-direction:column}
  .topbrand{background:#1B2438;color:#fff;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:40;box-shadow:0 2px 12px rgba(20,40,80,.18)}
  .topbrand .brand{display:flex;align-items:center;gap:11px}
  .topbrand .brandmark{width:30px;height:30px;border-radius:8px;background:#fff;display:grid;place-items:center}
  .topbrand .brandmark svg{width:18px;height:18px;stroke:var(--sidebar)}
  .topbrand .brand b{font-size:18px;font-weight:700;letter-spacing:.2px}
  .topbrand .brand-right{display:flex;align-items:center;gap:12px}
  .topbtn{background:rgba(255,255,255,.12);color:#fff;border:none;padding:7px 14px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer}
  .topbtn:hover{background:rgba(255,255,255,.2)}
  .ava-top{width:34px;height:34px;border-radius:50%;background:#fff;color:var(--green);display:grid;place-items:center;font-weight:700;cursor:pointer;border:2px solid var(--green);position:relative}
  .topnav{background:#fff;display:flex;align-items:center;gap:4px;padding:8px 16px;overflow-x:auto;position:sticky;top:56px;z-index:35;box-shadow:0 6px 20px -6px rgba(20,40,80,.16),0 2px 6px rgba(20,40,80,.06);border-bottom:1px solid #EEF1F6}
  .topnav::-webkit-scrollbar{height:0}
  .topnav button{display:flex;align-items:center;gap:8px;background:none;border:none;padding:10px 15px;font-size:14px;font-weight:600;color:#5A6478;cursor:pointer;white-space:nowrap;border-radius:12px;position:relative;transition:background .15s,color .15s,box-shadow .15s}
  .topnav button svg:first-child{width:18px;height:18px;stroke:#8A93A6;flex:0 0 auto;transition:stroke .15s}
  .topnav button .caret{width:13px;height:13px;stroke:#B4BCC9;opacity:.7;transition:transform .15s}
  .navitem:hover .caret{transform:rotate(180deg)}
  .topnav button:hover{color:var(--navy,#1E2A44);background:#F3F6FB}
  .topnav button:hover svg:first-child{stroke:var(--navy,#1E2A44)}
  .topnav button.active{color:#fff;background:linear-gradient(135deg,#2E6B50,#28365A);box-shadow:0 6px 16px -4px rgba(31,77,58,.5)}
  .topnav button.active svg:first-child{stroke:#fff}
  .topnav button.active .caret{stroke:rgba(255,255,255,.8)}
  .navitem{position:relative;display:inline-flex}
  .navdrop{position:absolute;top:calc(100% + 8px);left:0;min-width:210px;background:#fff;border:1px solid #EEF1F6;border-radius:14px;box-shadow:0 16px 44px -8px rgba(20,40,80,.28),0 4px 12px rgba(20,40,80,.1);padding:8px;opacity:0;visibility:hidden;transform:translateY(-8px) scale(.97);transform-origin:top left;transition:.18s cubic-bezier(.4,0,.2,1);z-index:60}
  .navdrop::before{content:"";position:absolute;top:-12px;left:0;right:0;height:12px}
  .navitem:hover .navdrop{opacity:1;visibility:visible;transform:translateY(0) scale(1)}
  .navdrop-item{display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:9px;font-size:13.5px;font-weight:600;color:#3A4357;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
  .navdrop-item::before{content:"";width:6px;height:6px;border-radius:50%;background:#CBD3E0;flex:0 0 auto;transition:background .12s}
  .actpop{background:#fff;border:1px solid #E6EAF1;border-radius:12px;box-shadow:0 16px 44px -8px rgba(20,40,80,.28),0 4px 12px rgba(20,40,80,.1);padding:6px;min-width:236px;z-index:9999;animation:actpopIn .14s ease}
  @keyframes actpopIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .actitem{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:8px;font-size:13.5px;font-weight:600;color:#3A4357;cursor:pointer;white-space:nowrap}
  .actitem:hover{background:#EFF3FB;color:#1E2A44}
  .actitem.danger{color:#C0392B}
  .actitem.danger:hover{background:#FBEBEA}
  .actitem .sdot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .acthead{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:#8794A8;padding:9px 12px 4px}
  .actsep{height:1px;background:#E6EAF1;margin:5px 0}
  .navdrop-item:hover{background:#EFF5F1;color:var(--navy,#1E2A44)}
  .navdrop-item:hover::before{background:var(--green,#1F8A4C)}
  .main-h{flex:1;min-width:0}
  .main-h .content{padding:24px 26px 60px;max-width:1400px;margin:0 auto}
  @media(max-width:720px){.topbrand{padding:0 14px}.topnav button{padding:13px 10px;font-size:13px}.topnav button .caret{display:none}.main-h .content{padding:16px 14px 60px}}
  .sidebar{width:248px;background:var(--sidebar);color:#C3CDDC;position:fixed;top:0;bottom:0;left:0;
    display:flex;flex-direction:column;padding:18px 14px;overflow-y:auto}
  .logo{display:flex;align-items:center;gap:11px;padding:6px 8px 18px}
  .logo .mark{width:42px;height:42px;border-radius:13px;background:rgba(212,175,55,.14);
    border:1px solid rgba(212,175,55,.35);display:grid;place-items:center;color:var(--gold-soft);font-size:24px}
  .logo b{color:#fff;font-size:16px;letter-spacing:.4px;display:block;line-height:1.1}
  .logo span{font-size:10px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:1.6px}
  .nav{display:flex;flex-direction:column;gap:3px;margin-top:6px}
  .nav button{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;
    color:#bcd0c4;font-size:14px;font-weight:500;text-align:left;width:100%;transition:.12s}
  .nav button:hover{background:rgba(255,255,255,.05);color:#fff}
  .nav button.active{background:var(--gold);color:#241c00;font-weight:600}
  .nav button.active svg{stroke:#241c00}
  .nav svg{width:19px;height:19px;flex:none;stroke:#9fbcab;stroke-width:2;fill:none}
  .nav button:hover svg{stroke:#fff}
  .nav .num{margin-left:auto;font-size:11px;opacity:.5}

  .main{flex:1;margin-left:248px;min-width:0}
  .topbar{position:sticky;top:0;z-index:30;background:rgba(238,241,245,.85);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;gap:16px}
  .topbar h1{font-size:20px;font-weight:600;margin:0;letter-spacing:-.3px;flex:none}
  .topbar .spacer{flex:1}
  .content{padding:24px 26px 60px}

  /* ===== Period ===== */
  .period{position:relative}
  .period .btn-period{display:flex;align-items:center;gap:9px;background:var(--panel);border:1.5px solid var(--line);
    border-radius:11px;padding:9px 13px;font-weight:600;font-size:13.5px;box-shadow:var(--shadow)}
  .period .btn-period svg{width:16px;height:16px;stroke:var(--muted);stroke-width:2;fill:none}
  .pop{position:absolute;top:46px;left:0;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    box-shadow:0 12px 40px rgba(38,32,23,.14);padding:8px;width:230px;z-index:50;display:none}
  .pop.open{display:block}
  .pop button{display:block;width:100%;text-align:left;padding:9px 11px;border-radius:9px;font-size:13.5px}
  .pop button:hover{background:var(--green-100)}
  .pop button.sel{background:var(--green);color:#fff}
  .pop .range{display:flex;gap:6px;padding:8px 6px 4px;border-top:1px solid var(--line);margin-top:6px}
  .pop .range input{flex:1;padding:7px;border:1.5px solid var(--line);border-radius:8px;width:100%}

  /* ===== Account ===== */
  .acct{position:relative}
  .acct .btn-acct{display:flex;align-items:center;gap:10px;background:var(--panel);border:1.5px solid var(--line);
    border-radius:12px;padding:6px 12px 6px 7px;box-shadow:var(--shadow)}
  .acct .ava{width:34px;height:34px;border-radius:9px;background:var(--green);color:var(--gold-soft);
    display:grid;place-items:center;font-weight:700;font-size:15px}
  .acct .who{line-height:1.15;text-align:left}
  .acct .who b{font-size:13.5px;display:block}
  .acct .who span{font-size:11px;color:var(--muted)}
  .acct .pop{right:0;left:auto;width:210px}

  /* ===== Cards / KPI ===== */
  .grid{display:grid;gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 4px;font-size:15px;font-weight:600}
  .card .hint{color:var(--muted);font-size:12px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:15px 17px;box-shadow:var(--shadow)}
  .kpi .label{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
  .kpi .value{font-size:26px;font-weight:700;margin-top:5px;letter-spacing:-.6px}
  .kpi .value small{font-size:13px;font-weight:600;color:var(--muted)}
  .kpi .sub{font-size:12.5px;color:var(--muted);margin-top:3px}
  .kpi.green{background:var(--green);border-color:var(--green);color:#fff}
  .kpi.green .label{color:var(--gold-soft)} .kpi.green .sub{color:#bcd0c4}
  .sectiontitle{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);
    margin:26px 2px 12px}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .pill.gray{background:#EFEBE0;color:#7A7363}.pill.green{background:var(--green-100);color:var(--green)}
  .pill.gold{background:var(--gold-soft);color:#8a6d12}.pill.amber{background:var(--amber-100);color:var(--amber)}
  .pill.blue{background:var(--blue-100);color:var(--blue)}.pill.red{background:var(--red-100);color:var(--red)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:9px 15px;border-radius:11px;font-weight:600;font-size:13.5px}
  .btn.primary{background:var(--green);color:#fff}.btn.primary:hover{background:var(--green2)}
  .btn.gold{background:var(--gold);color:#fff}
  .btn.ghost{background:var(--panel);border:1.5px solid var(--line)}
  .btn.ghost:hover{border-color:var(--green);color:var(--green)}
  .btn.danger{background:var(--red-100);color:var(--red)}
  .btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none}

  /* ===== Tables ===== */
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;
    padding:10px 12px;border-bottom:1px solid var(--line)}
  td{padding:11px 12px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#FBF8F0}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  .tabletop{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tabletop .grow{flex:1}
  .filt{display:flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:0 4px 0 10px}
  .filt label{font-size:11.5px;color:var(--muted);font-weight:600}
  .filt select,.filt input{border:none;padding:9px 8px;background:transparent;outline:none}

  /* ===== Bars / donut ===== */
  .bar{height:9px;border-radius:6px;background:#EFEBE0;overflow:hidden;flex:1}
  .bar i{display:block;height:100%;border-radius:6px}
  .legend{display:flex;flex-direction:column;gap:11px}
  .legrow{display:flex;align-items:center;gap:10px;font-size:13px}
  .legrow .dot{width:11px;height:11px;border-radius:3px;flex:none}
  .legrow .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .legrow b{font-variant-numeric:tabular-nums}
  .progress{display:flex;align-items:center;gap:10px}

  /* ===== Modal ===== */
  .scrim{position:fixed;inset:0;background:rgba(17,30,24,.45);z-index:60;display:none;align-items:center;justify-content:center;padding:24px}
  .scrim.open{display:flex}
  .modal{background:var(--bg);width:100%;max-width:460px;border-radius:20px;padding:22px;max-height:88vh;overflow-y:auto}
  .modal.wide{max-width:700px}
  /* выезжающая панель фильтров справа */
  .fdrawer{position:fixed;top:0;right:0;bottom:0;width:380px;max-width:90vw;background:#fff;z-index:70;box-shadow:-8px 0 30px rgba(0,0,0,.18);transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column}
  .fdrawer.open{transform:translateX(0)}
  .fdrawer .fhead{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line)}
  .fdrawer .fhead b{font-size:17px}
  .fdrawer .fbody{flex:1;overflow-y:auto;padding:16px 20px}
  .fdrawer .ffield{margin-bottom:14px}
  .fdrawer .ffield label{display:block;font-size:13px;font-weight:600;color:#5A6478;margin-bottom:6px}
  .fdrawer .ffield select,.fdrawer .ffield input{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;background:#fff}
  .fdrawer .ffoot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px}
  .fbackdrop{position:fixed;inset:0;background:rgba(17,30,24,.35);z-index:69;display:none}
  .fbackdrop.open{display:block}
  .modal h2{margin:0 0 16px;font-size:19px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
  .field input,.field select{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;background:#fff;outline:none}
  .field input:focus,.field select:focus{border-color:var(--green)}
  .modal-actions{display:flex;gap:10px;margin-top:8px}
  .modal-actions .btn{flex:1}
  .chip{display:inline-flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:8px 12px;font-size:13px;margin:0 8px 8px 0}
  .chip button{color:var(--muted);font-weight:700}
  .empty{text-align:center;padding:46px;color:var(--muted)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:11px 18px;border-radius:12px;font-size:13.5px;z-index:80;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}

  /* ===== Login ===== */
  .login{min-height:100vh;display:grid;place-items:center;
    background:radial-gradient(120% 80% at 50% 0%,#28365A,#16223A 70%)}
  .loginbox{background:var(--panel);border-radius:22px;padding:34px;width:340px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.3)}
  .loginbox .mark{width:64px;height:64px;border-radius:18px;background:var(--green);color:var(--gold-soft);
    display:grid;place-items:center;font-size:34px;margin:0 auto 14px}
  .loginbox h1{font-size:20px;margin:0 0 2px}
  .loginbox p{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1.6px;margin:0 0 22px}
  .loginbox .err{color:var(--red);font-size:12.5px;height:16px;margin-top:6px}

  /* ===== Стрелки пагинации ===== */
  .pager-arrow{position:fixed;top:50%;transform:translateY(-50%);width:50px;height:50px;border-radius:50%;
    background:var(--green);display:grid;place-items:center;box-shadow:0 8px 24px rgba(20,61,46,.28);z-index:26;cursor:pointer}
  .pager-arrow:hover{background:var(--green2)}
  .pager-arrow svg{width:24px;height:24px;stroke:#fff;stroke-width:2.6;fill:none}
  .pager-arrow.left{left:266px}
  .pager-arrow.right{right:22px}
  .pager-arrow:disabled{background:#E7E1D2;box-shadow:none;cursor:default}
  .pager-arrow:disabled svg{stroke:#BBB29C}
  .pager-info{position:fixed;bottom:20px;left:calc(50% + 124px);transform:translateX(-50%);
    background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:7px 16px;font-size:12.5px;
    font-weight:600;color:var(--muted);box-shadow:var(--shadow);z-index:26}
  .hscroll{overflow-x:auto;width:100%;scroll-behavior:smooth}
  .aifab{position:fixed;right:22px;bottom:22px;z-index:27;background:var(--green);color:#fff;font-weight:800;
    border-radius:999px;padding:13px 18px;box-shadow:0 8px 24px rgba(20,61,46,.3);display:flex;align-items:center;gap:7px;font-size:13.5px}
  .aifab:hover{background:var(--green2)}
  .pgbar{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:10px 14px;margin-top:12px;box-shadow:var(--shadow);flex-wrap:wrap}
  .pgbar select{padding:7px 10px;border:1.5px solid var(--line);border-radius:9px;background:#fff;font-weight:600}
  .pgbtn{padding:8px 14px;border:1.5px solid var(--line);border-radius:10px;background:var(--panel);font-weight:600;font-size:13px}
  .pgbtn:hover:not(:disabled){border-color:var(--green);color:var(--green)}
  .pgbtn:disabled{opacity:.4;cursor:default}
  #map{height:68vh;border-radius:16px;border:1px solid var(--line);box-shadow:var(--shadow);z-index:1}
  .maplegend{display:flex;gap:18px;flex-wrap:wrap;align-items:center;margin-top:12px;font-size:13px;color:var(--muted)}
  .maplegend .lg{display:flex;align-items:center;gap:7px}
  .maplegend .lg i{width:13px;height:13px;border-radius:50%;display:inline-block}
  .pickmap{height:300px;border-radius:12px;border:1px solid var(--line);margin-bottom:6px;overflow:hidden}
  .wx-hero{position:relative;overflow:hidden;border-radius:16px;color:#fff;padding:20px 22px}
  body.no-anim .wx-sun,body.no-anim .wx-cloud,body.no-anim .wx-c1,body.no-anim .wx-c2,body.no-anim .wx-drop,body.no-anim .wx-flake,body.no-anim .wx-fog,body.no-anim .wx-bolt,body.no-anim .wx-star{animation:none!important}
  .wx-hero .wx-content{position:relative;z-index:3}
  .wx-layer{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden}
  .wxvid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2}
  .wx-sun{position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,#FFE27A 0%,#FFC93C 55%,rgba(255,201,60,0) 72%);animation:wxspin 40s linear infinite}
  @keyframes wxspin{to{transform:rotate(360deg)}}
  .wx-cloud{position:absolute;border-radius:50px;background:rgba(255,255,255,.85);width:100px;height:28px}
  .wx-cloud::before,.wx-cloud::after{content:"";position:absolute;background:inherit;border-radius:50%}
  .wx-cloud::before{width:46px;height:46px;top:-20px;left:16px}
  .wx-cloud::after{width:32px;height:32px;top:-13px;right:16px}
  .wx-c1{top:16px;left:-120px;opacity:.9;animation:wxdrift 24s linear infinite}
  .wx-c2{top:54px;left:-160px;transform:scale(.7);opacity:.7;animation:wxdrift 34s linear infinite;animation-delay:4s}
  @keyframes wxdrift{0%{transform:translateX(0)}100%{transform:translateX(520px)}}
  .wx-drop{position:absolute;top:-12px;width:2px;height:15px;background:linear-gradient(transparent,rgba(190,225,255,.95));border-radius:2px;animation:wxfall 1s linear infinite}
  @keyframes wxfall{0%{transform:translateY(-15px);opacity:0}20%{opacity:1}100%{transform:translateY(150px);opacity:.2}}
  .wx-flake{position:absolute;top:-10px;color:#fff;font-size:12px;opacity:.9;animation:wxsnow 5s linear infinite}

const PRESETS=[['all','Всё время'],['today','Сегодня'],['yesterday','Вчера'],
  ['last7','Последние 7 дней'],['last30','Последние 30 дней'],['last90','Последние 90 дней'],
  ['thisMonth','Текущий месяц'],['lastMonth','Прошлый месяц'],['custom','Произвольный период']];
function periodLabel(){const f=PRESETS.find(p=>p[0]===PERIOD.preset);
  if(PERIOD.preset==='custom'&&PERIOD.from)return dmonth(PERIOD.from)+' — '+dmonth(PERIOD.to);return f?f[1]:'';}
function periodRange(){
  const t=today();const d=new Date();
  switch(PERIOD.preset){
    case 'all':return[null,null];
    case 'today':return[t,t];
    case 'yesterday':{const y=addDays(t,-1);return[y,y];}
    case 'last7':return[addDays(t,-6),t];
    case 'last30':return[addDays(t,-29),t];
    case 'last90':return[addDays(t,-89),t];
    case 'thisMonth':return[iso(new Date(d.getFullYear(),d.getMonth(),1)),t];
    case 'lastMonth':{const f=new Date(d.getFullYear(),d.getMonth()-1,1);const l=new Date(d.getFullYear(),d.getMonth(),0);return[iso(f),iso(l)];}
    case 'custom':return[PERIOD.from,PERIOD.to];
  }return[null,null];
}
const pdate=d=>String(d||'').split('T')[0];
function inP(date){const[f,to]=periodRange();if(!f)return true;return date>=f&&date<=to;}
function daysInPeriod(){const[f,to]=periodRange();if(!f)return 90;return Math.round((new Date(to)-new Date(f))/864e5)+1;}

  const bd=Math.max(1,Math.round(daysInPeriod()*6/7));let ags=DB.employees.filter(e=>e.role==='agent');if(f.agent!=='all')ags=ags.filter(a=>a.id===f.agent);else if(f.terr!=='all')ags=ags.filter(a=>a.terr===f.terr);
  const rows=[['Сотрудник','Территория','План','Посещено','Выполнение %']];

function wxSceneKey(code){
  const h=new Date().getHours();const night=h<6||h>=20;
  if(code>=95)return 'storm';
  if(code>=71&&code<=77)return 'snow';
  if((code>=61&&code<=65)||(code>=80&&code<=82))return 'rain';
  if(code>=51&&code<=55)return 'drizzle';
  if(code===45||code===48)return 'fog';
  if(code===3)return 'overcast';
  if(code===2)return 'clouds';
  if(code===1)return night?'night':'sunny';
  return night?'night':'sunny';
}

function wxScene(code){
  const h=new Date().getHours();const night=h<6||h>=20;
  const drops=n=>Array.from({length:n},()=>`<div class="wx-drop" style="left:${Math.random()*100}%;animation-delay:${(Math.random()).toFixed(2)}s;animation-duration:${(0.6+Math.random()*0.6).toFixed(2)}s"></div>`).join('');
  const flakes=n=>Array.from({length:n},()=>`<div class="wx-flake" style="left:${Math.random()*100}%;animation-delay:${(Math.random()*5).toFixed(2)}s;font-size:${(10+Math.random()*6).toFixed(0)}px">❄</div>`).join('');
  const stars=n=>Array.from({length:n},()=>`<div class="wx-star" style="left:${Math.random()*100}%;top:${(Math.random()*60)}%;animation-delay:${(Math.random()*3).toFixed(2)}s"></div>`).join('');
  const clouds=`<div class="wx-cloud wx-c1"></div><div class="wx-cloud wx-c2"></div>`;
  const sun=`<div class="wx-sun"></div>`;
  const fog=`<div class="wx-fog" style="top:30%"></div><div class="wx-fog" style="top:55%;animation-delay:5s"></div>`;
  if(code===0) return night?{grad:'linear-gradient(135deg,#1b2a4a,#33406b)',layers:stars(24),emoji:'🌙',label:'Ясная ночь'}:{grad:'linear-gradient(135deg,#2E9BD6,#62C3F0)',layers:sun,emoji:'☀️',label:'Солнечно'};
  if(code===1) return {grad:'linear-gradient(135deg,#3BA0D0,#7FC9E8)',layers:sun+clouds,emoji:'🌤',label:'В основном ясно'};
  if(code===2) return {grad:'linear-gradient(135deg,#6E8BA8,#9FB6CC)',layers:clouds+sun,emoji:'⛅',label:'Переменная облачность'};
  if(code===3) return {grad:'linear-gradient(135deg,#7A8699,#A6B0BE)',layers:clouds,emoji:'☁️',label:'Пасмурно'};
  if(code===45||code===48) return {grad:'linear-gradient(135deg,#8A93A0,#B4BAC2)',layers:fog+clouds,emoji:'🌫',label:'Туман'};
  if(code>=51&&code<=55) return {grad:'linear-gradient(135deg,#5B7387,#85A0B3)',layers:clouds+drops(16),emoji:'🌦',label:'Морось'};
  if((code>=61&&code<=65)||(code>=80&&code<=82)) return {grad:'linear-gradient(135deg,#3F5161,#647889)',layers:clouds+drops(50),emoji:'🌧',label:'Дождь'};
  if(code>=71&&code<=77) return {grad:'linear-gradient(135deg,#7E8CA3,#AEB9CC)',layers:clouds+flakes(36),emoji:'🌨',label:'Снег'};
  if(code>=95) return {grad:'linear-gradient(135deg,#2C3340,#4A5564)',layers:clouds+drops(44)+'<div class="wx-bolt">⚡</div>',emoji:'⛈',label:'Гроза'};
  return {grad:'linear-gradient(135deg,#28365A,#2E6B50)',layers:'',emoji:'🌡',label:''};
}

async function loadDashWeather(){
  if(!ADMWX){try{const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=41.31&longitude=69.28&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia/Tashkent&forecast_days=3');ADMWX=await r.json();}catch(e){}}
  if(!ADMUSD){try{
    const r=await fetch('https://cbu.uz/ru/arkhiv-kursov-valyut/json/USD/');const j=await r.json();
    if(j&&j[0]){const rate=parseFloat(j[0].Rate);
      ADMUSD={cb:Math.round(rate).toLocaleString('ru'),
        buy:Math.round(rate*0.995).toLocaleString('ru'),   // банк покупает (ниже курса ЦБ)
        sell:Math.round(rate*1.005).toLocaleString('ru'),  // банк продаёт (выше курса ЦБ)
        date:j[0].Date};}
  }catch(e){}}
  if(VIEW==='dash')pageDash();
  wxFullscreenAdm();
}
function wxAnimAdmOn(){return localStorage.getItem('wx_anim_adm')!=='off';}
let _wxAdmShown=false;
function wxFullscreenAdm(force){
  if(!wxAnimAdmOn())return;
  if(_wxAdmShown&&!force)return;
  _wxAdmShown=true;
  const code=ADMWX&&ADMWX.current?ADMWX.current.weather_code:0;
  const h=new Date().getHours();const night=h<6||h>=20;
  const rnd=(a,b)=>a+Math.random()*(b-a);let grad,parts='';
  if(code>=71&&code<=77){grad=night?'linear-gradient(#1b2a4a,#33406b)':'linear-gradient(#9fb0c8,#c5d2e0)';for(let i=0;i<90;i++)parts+=`<div class="fs-flake" style="left:${rnd(0,100)}%;font-size:${rnd(12,26)|0}px;animation-duration:${rnd(5,10).toFixed(1)}s;animation-delay:${rnd(0,5).toFixed(1)}s">❄</div>`;}
  else if((code>=51&&code<=67)||(code>=80&&code<=82)||code>=95){grad='linear-gradient(#3d4f5e,#5b6f80)';for(let i=0;i<140;i++)parts+=`<div class="fs-drop" style="left:${rnd(0,100)}%;height:${rnd(18,32)|0}px;animation-duration:${rnd(0.5,1.1).toFixed(2)}s;animation-delay:${rnd(0,1).toFixed(2)}s"></div>`;if(code>=95)parts+=`<div class="fs-bolt" style="top:12%;left:55%">⚡</div><div class="fs-bolt" style="top:22%;left:25%;animation-delay:1.2s">⚡</div>`;}
  else if(code===0||code===1){if(night){grad='linear-gradient(#0f1b3a,#243156)';for(let i=0;i<80;i++)parts+=`<div class="fs-star" style="left:${rnd(0,100)}%;top:${rnd(0,75)}%;animation-delay:${rnd(0,2.5).toFixed(1)}s"></div>`;}else{grad='linear-gradient(#3ea8e0,#8fd0f0)';parts=`<div class="fs-sun"></div>`;for(let i=0;i<12;i++)parts+=`<div class="fs-ray" style="transform:translateX(-50%) rotate(${i*30}deg)"></div>`;}}
  else if(code===45||code===48){grad='linear-gradient(#9aa3ad,#c3c9d0)';for(let i=0;i<6;i++)parts+=`<div class="fs-cloud" style="top:${12+i*14}%;animation-duration:${rnd(16,28).toFixed(0)}s;opacity:.6"></div>`;}
  else{grad='linear-gradient(#7c8ba0,#aab6c6)';for(let i=0;i<7;i++)parts+=`<div class="fs-cloud" style="top:${6+i*13}%;animation-duration:${rnd(18,32).toFixed(0)}s;animation-delay:${rnd(0,8).toFixed(0)}s"></div>`;}
  let ov=document.getElementById('wxfs');if(ov)ov.remove();
  ov=document.createElement('div');ov.id='wxfs';ov.innerHTML=`<div class="fs-grad" style="background:${grad};opacity:.5"></div>${parts}`;
  document.body.appendChild(ov);requestAnimationFrame(()=>ov.classList.add('show'));
  setTimeout(()=>{ov.classList.remove('show');setTimeout(()=>{if(ov)ov.remove();},900);},15000);
}
function pageDash(){
  const t=today(),d=new Date();
  const f=dashFilt;
  const oMatch=o=>(f.agent==='all'||o.agent===f.agent)&&(f.terr==='all'||o.terr===f.terr)&&(f.route==='all'||o.route===f.route);
  const cMatch=c=>(f.agent==='all'||c.agent===f.agent)&&(f.terr==='all'||c.terr===f.terr)&&(f.route==='all'||c.route===f.route);
  const vMatch=v=>{const c=cli(v.client);return (f.agent==='all'||v.agent===f.agent)&&(f.terr==='all'||(c&&c.terr===f.terr))&&(f.route==='all'||(c&&c.route===f.route));};
  const pMatch=p=>{const c=cli(p.client);return c?cMatch(c):(f.agent==='all'&&f.terr==='all'&&f.route==='all');};
  const cToday=countSum(o=>o.date===t&&oMatch(o));
  const cWeek=countSum(o=>o.date>=addDays(t,-6)&&oMatch(o));
  const mStart=iso(new Date(d.getFullYear(),d.getMonth(),1));
  const cMonth=countSum(o=>o.date>=mStart&&oMatch(o));
  const yStart=iso(new Date(d.getFullYear(),0,1));
  const cYear=countSum(o=>o.date>=yStart&&oMatch(o));

  // период-зависимые
  const ord=ordersInP().filter(oMatch), del=deliveredInP().filter(oMatch);
  const sumP=ord.reduce((s,o)=>s+o.total,0);
  const qtyProducts=ord.reduce((s,o)=>s+o.items.reduce((a,i)=>a+i.q,0),0);

  // возвраты
  const retP=DB.returns.filter(r=>inP(r.date)&&(cli(r.client)?cMatch(cli(r.client)):true));
  const retSum=retP.reduce((s,r)=>s+r.amount,0);
  const retOver=retP.filter(r=>r.status==='open'&&r.due<t);
  const retNotOver=retP.filter(r=>!(r.status==='open'&&r.due<t));
  const retOverSum=retOver.reduce((s,r)=>s+r.amount,0);
  const retNotOverSum=retNotOver.reduce((s,r)=>s+r.amount,0);

  // долги + способы оплаты
  const clientsF=DB.clients.filter(cMatch);
  const debtTotal=clientsF.reduce((s,c)=>s+c.debt,0);
  const payP=DB.payments.filter(p=>inP(pdate(p.date))&&pMatch(p));
  const cashSum=payP.filter(p=>p.method==='cash').reduce((s,p)=>s+p.amount,0);
  const termSum=payP.filter(p=>p.method==='terminal'||p.method==='transfer').reduce((s,p)=>s+p.amount,0);
  const debtSum=ord.filter(o=>o.method==='debt').reduce((s,o)=>s+o.total,0);
  const payTot=cashSum+termSum+debtSum||1;

  // клиентская база
  const okb=clientsF.length;
  const activeSet=new Set(ord.map(o=>o.client));
  const akb=activeSet.size;
  const akbPct=okb?akb/okb*100:0;

  // визиты
  const vis=DB.visits.filter(v=>inP(v.date)&&vMatch(v));
  const visited=vis.length;
  let agentsF=DB.employees.filter(e=>e.role==='agent');
  if(f.agent!=='all')agentsF=agentsF.filter(a=>a.id===f.agent);else if(f.terr!=='all')agentsF=agentsF.filter(a=>a.terr===f.terr);
  const plannedDay=agentsF.reduce((s,e)=>s+(e.plan||0),0);

  const byCat={};DB.categories.forEach(c=>byCat[c.id]=0);

  ord.forEach(o=>byTerr[o.terr]=(byTerr[o.terr]||0)+o.total);
  const terrData=DB.territories.map(tt=>({label:tt.name,value:byTerr[tt.id]||0})).sort((a,b)=>b.value-a.value);

      <option value="all">Все</option>${DB.routes.filter(r=>f.terr==='all'||r.terr===f.terr).map(r=>`<option value="${r.id}" ${f.route===r.id?'selected':''}>${esc(r.name)}</option>`).join('')}</select></div>

/* круговая диаграмма (donut) */
function donut(data){
  const total=data.reduce((s,d)=>s+d.value,0)||1;const r=46,C=2*Math.PI*r;let off=0;
  const segs=data.map(d=>{const len=d.value/total*C;const s=`<circle r="${r}" cx="60" cy="60" fill="none" stroke="${d.color}" stroke-width="18" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 60 60)"/>`;off+=len;return s;}).join('');
  return `<svg viewBox="0 0 120 120" width="120" height="120" style="flex:none">${segs}</svg>`;
}

function bulkDuplicate(){
  let done=0,skip=[];
  selOrders().forEach(o=>{
    // проверка наличия для каждого заказа
    let ok=true;for(const i of (o.items||[])){const p=prod(i.p);if(!p||i.q>(p.stock||0)){ok=false;break;}}
    if(!ok){skip.push(o.number);return;}
    const n={...o,id:uid('o'),number:nextOrderNo(),status:'new',createdAt:nowTashkent(),date:todayTashkent(),deliveredAt:null,deliveryDate:null,shipmentId:null,paid:0,items:o.items.map(i=>({...i}))};
    n.items.forEach(i=>{const p=prod(i.p);if(p){p.stock=Math.max(0,(p.stock||0)-i.q);p.stockBy=p.stockBy||{};p.stockBy.w_main=Math.max(0,(p.stockBy.w_main!==undefined?p.stockBy.w_main:(p.stock+i.q))-i.q);}});
    DB.orders.push(n);done++;
  });
  oSel=new Set();saveDB();ordCurrent();
  toast(done?('Дублировано: '+done+(skip.length?' · пропущено (нет товара): '+skip.join(', '):'')):('❌ Нет товара на складе для: '+skip.join(', ')));

function bulkStatus(val){
  // заказы «в пути» (отгружён) нельзя произвольно менять — только доставка/отмена через раздел Доставка
  const locked=selOrders().filter(o=>o.status==='shipped'&&val!=='delivered'&&val!=='canceled');
  if(locked.length){toast('❌ Заказы в пути нельзя изменить ('+locked.map(o=>o.number).join(', ')+'). Доставьте или отмените через раздел «Доставка».');return;}
  selOrders().forEach(o=>{if(val==='delivered'&&o.status!=='delivered'){o.deliveredAt=nowTashkent();const c=cli(o.client);if(o.method==='debt'){c.debt+=(o.total-o.paid);}else{o.paid=o.total;DB.payments.push({id:uid('pm'),client:o.client,order:o.id,amount:o.total,method:o.method,by:o.courier,date:todayTashkent()});}}
    if(val==='canceled')orderRestoreStock(o); else if(o.status==='canceled'&&val!=='canceled')orderReserveAgain(o);
    o.status=val;});oSel=new Set();saveDB();if(sbCfg())scheduleCloudPush();ordCurrent();toast('Статус обновлён');}
function bulkDelete(){
  const locked=selOrders().filter(o=>o.status==='shipped');
  if(locked.length){toast('❌ Нельзя удалить заказы в пути ('+locked.map(o=>o.number).join(', ')+').');return;}
  askCode(()=>{const ids=new Set(oSel);
    DB._deleted=DB._deleted||[];ids.forEach(id=>{if(!DB._deleted.includes(id))DB._deleted.push(id);});  // надгробия — чтобы заказ не вернулся из облака
    DB.orders=DB.orders.filter(o=>!ids.has(o.id));oSel=new Set();saveDB();ordCurrent();toast('Удалено');});}
function bulkChangeDate(){openModal(`<h2>Сменить дату доставки</h2><div class="field"><label>Дата доставки</label><input id="f_dd" type="date" value="${addDays(todayTashkent(),1)}"></div>
  <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="applyChangeDate()">Применить</button></div>`);}
function applyChangeDate(){const d=$('#f_dd').value;selOrders().forEach(o=>o.deliveryDate=d);saveDB();closeModal();ordCurrent();toast('Дата доставки обновлена');}

/* ---- Новый заказ (2 шага) ---- */
function openNewOrder(){NEWO={step:1,client:'',csearch:'',agent:'',route:'',deliveryMethod:'delivery',currency:'UZS',method:'cash',payType:'onsite',consignTerm:addDays(todayTashkent(),14),items:{},psearch:'',pcat:'all'};renderNewOrder();}
function noSync(){const g=id=>$('#'+id);if(g('no_client'))NEWO.client=g('no_client').value;if(g('no_agent'))NEWO.agent=g('no_agent').value;if(g('no_route'))NEWO.route=g('no_route').value;if(g('no_dm'))NEWO.deliveryMethod=g('no_dm').value;if(g('no_cur'))NEWO.currency=g('no_cur').value;if(g('no_method'))NEWO.method=g('no_method').value;if(g('no_pt'))NEWO.payType=g('no_pt').value;if(g('no_term'))NEWO.consignTerm=g('no_term').value;}

      <div style="max-height:32vh;overflow-y:auto;border:1.5px solid var(--line);border-radius:12px">${shown.length?shown.map(c=>`<div class="legrow" style="padding:10px 13px;border-bottom:1px solid var(--line);cursor:pointer" onclick="noPickClient('${c.id}')"><span class="nm">${esc(c.name)}<div class="hint">${esc(terr(c.terr)?.name||'')} · ${esc(route(c.route)?.name||'')}</div></span>${c.debt>0?`<span class="pill red">долг</span>`:''}</div>`).join(''):'<div class="hint" style="padding:14px">Ничего не найдено</div>'}</div>
      <div class="hint" style="margin-top:5px">${matches.length>40?'Показаны первые 40 — уточните поиск':matches.length+' клиент(ов)'}</div>`}
    </div>
    <div style="display:flex;gap:10px">
      <div class="field" style="flex:1"><label>Сотрудник</label><select id="no_agent">
        <option value="">${sel?'авто: '+esc(emp(sel.agent)?.name||'—'):'авто'}</option>${DB.employees.filter(e=>e.role==='agent').map(e=>`<option value="${e.id}" ${NEWO.agent===e.id?'selected':''}>${esc(e.name)}</option>`).join('')}</select></div>
      <div class="field" style="flex:1"><label>Маршрут (необязательно)</label><select id="no_route">
        <option value="">${sel?'авто: '+esc(route(sel.route)?.name||'—'):'—'}</option>${DB.routes.map(r=>`<option value="${r.id}" ${NEWO.route===r.id?'selected':''}>${esc(r.name)}</option>`).join('')}</select></div>
    </div>
    <div style="display:flex;gap:10px">
      <div class="field" style="flex:1"><label>Способ доставки</label><select id="no_dm"><option value="delivery" ${NEWO.deliveryMethod==='delivery'?'selected':''}>Доставка</option><option value="pickup" ${NEWO.deliveryMethod==='pickup'?'selected':''}>Самовывоз</option></select></div>
      <div class="field" style="flex:1"><label>Валюта</label><select id="no_cur"><option value="UZS" ${NEWO.currency==='UZS'?'selected':''}>Сум (UZS)</option><option value="USD" ${NEWO.currency==='USD'?'selected':''}>Доллар (USD)</option></select></div>
    </div>
    <div style="display:flex;gap:10px">
      <div class="field" style="flex:1"><label>Способ оплаты</label><select id="no_method"><option value="cash" ${NEWO.method==='cash'?'selected':''}>Наличные</option><option value="terminal" ${NEWO.method==='terminal'?'selected':''}>Терминал (безнал)</option></select></div>
      <div class="field" style="flex:1"><label>Тип оплаты</label><select id="no_pt" onchange="noSync();renderNewOrder1()"><option value="onsite" ${NEWO.payType==='onsite'?'selected':''}>Оплата на месте</option><option value="consignment" ${NEWO.payType==='consignment'?'selected':''}>Консигнация</option></select></div>
    </div>
    ${NEWO.payType==='consignment'?`<div class="field"><label>Срок оплаты (консигнация)</label><input id="no_term" type="date" value="${NEWO.consignTerm}"></div>`:''}
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="noNext()">Далее →</button></div>`);
  $('#modal').classList.add('wide');
  if(!sel)setTimeout(()=>{const el=$('#no_csearch');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}},0);

function noSearch(v){noSync();NEWO.csearch=v;renderNewOrder1();}
function noPickClient(id){noSync();NEWO.client=id;NEWO.agent='';NEWO.route='';renderNewOrder1();}
function noClearClient(){NEWO.client='';NEWO.csearch='';renderNewOrder1();}
function noNext(){noSync();if(!NEWO.client){toast('Выберите клиента');return;}NEWO.step=2;renderNewOrder();}
function noSetClient(id){noSync();NEWO.client=id;NEWO.agent='';NEWO.route='';renderNewOrder1();}
function renderNewOrder2(){
  const c=cli(NEWO.client);
  if(NEWO.pcat===undefined)NEWO.pcat='all';
  let prods=DB.products;
  if(NEWO.pcat!=='all')prods=prods.filter(p=>p.cat===NEWO.pcat);
  if(NEWO.psearch){const q=NEWO.psearch.toLowerCase();prods=prods.filter(p=>p.name.toLowerCase().includes(q));}
  const total=Object.entries(NEWO.items).reduce((s,[pid,q])=>s+q*prod(pid).price,0);
  const count=Object.values(NEWO.items).reduce((s,q)=>s+q,0);
  openModal(`<div style="display:flex;align-items:center;gap:10px"><button class="btn ghost" style="padding:6px 10px;width:auto" onclick="NEWO.step=1;renderNewOrder()">←</button><h2 style="margin:0">Шаг 2 · товары</h2></div>
    <div class="hint" style="margin:6px 2px 12px">${esc(c.name)} · ${METHOD3[NEWO.method]} · ${NEWO.payType==='consignment'?'консигнация':'на месте'}</div>
    <div style="margin-bottom:10px"><div class="hint" style="font-weight:700;margin-bottom:6px">1. Категория</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        <button class="pill ${NEWO.pcat==='all'?'green':'gray'}" style="padding:8px 13px;font-size:13px" onclick="NEWO.pcat='all';renderNewOrder2()">Все</button>
        ${DB.categories.map(cat=>`<button class="pill ${NEWO.pcat===cat.id?'green':'gray'}" style="padding:8px 13px;font-size:13px" onclick="NEWO.pcat='${cat.id}';renderNewOrder2()">${esc(cat.name)}</button>`).join('')}
      </div></div>
    <div class="hint" style="font-weight:700;margin-bottom:6px">2. Товар</div>
    <div class="filt" style="margin-bottom:10px"><input placeholder="🔍 Поиск товара" value="${esc(NEWO.psearch||'')}" oninput="NEWO.psearch=this.value;renderNewOrder2()"></div>
    <div style="max-height:38vh;overflow-y:auto">${prods.length?prods.map(p=>{const q=NEWO.items[p.id]||0;return `
      <div class="legrow" style="padding:9px 0;border-bottom:1px solid var(--line)">
        <span class="nm">${esc(p.name)}<div class="hint">${money(p.price)} / ${p.unit} · остаток ${p.stock}</div></span>
        <input type="number" min="0" value="${q||''}" placeholder="0" style="width:90px;padding:9px;border:1.5px solid ${q?'var(--green)':'var(--line)'};border-radius:10px;text-align:center;font-weight:700" onchange="noQty('${p.id}',this.value)" onkeydown="if(event.key==='Enter')this.blur()">
      </div>`}).join(''):'<div class="hint" style="padding:14px 0">В этой категории товаров нет</div>'}</div>
    <div class="legrow" style="margin-top:12px;font-size:17px"><span class="nm"><b>Итого · ${count} поз.</b></span><b>${money(total)}</b></div>
    <div class="modal-actions"><button class="btn ghost" onclick="NEWO.step=1;renderNewOrder()">← Назад</button><button class="btn primary" onclick="saveNewOrder()">Создать заказ</button></div>`);
  $('#modal').classList.add('wide');
}
function noQty(pid,val){const p=prod(pid);let q=Math.max(0,Math.floor(+val||0));
  if(q>p.stock){toast('Недостаточно на складе (остаток '+p.stock+')');q=p.stock;}
  if(q<=0)delete NEWO.items[pid];else NEWO.items[pid]=q;renderNewOrder2();}
function noItem(pid,d){const cur=NEWO.items[pid]||0,p=prod(pid),next=cur+d;if(next>p.stock){toast('Недостаточно на складе (остаток '+p.stock+')');return;}if(next<=0)delete NEWO.items[pid];else NEWO.items[pid]=next;renderNewOrder2();}
function saveNewOrder(){const entries=Object.entries(NEWO.items);if(!entries.length){toast('Добавьте товары');return;}
  for(const [pid,q] of entries){const p=prod(pid);if(!p){toast('Товар не найден');return;}if(q>p.stock){toast('Недостаточно «'+p.name+'»: остаток '+p.stock);return;}}
  const c=cli(NEWO.client);const items=entries.map(([pid,q])=>({p:pid,q,price:prod(pid).price}));const total=items.reduce((s,i)=>s+i.q*i.price,0);
  const o={id:uid('o'),number:nextOrderNo(),client:NEWO.client,agent:NEWO.agent||c.agent,terr:c.terr,route:NEWO.route||c.route,
    courier:null,date:todayTashkent(),createdAt:nowTashkent(),deliveryDate:null,deliveredAt:null,status:'new',method:NEWO.method,
    payType:NEWO.payType,consignTerm:NEWO.payType==='consignment'?NEWO.consignTerm:null,deliveryMethod:NEWO.deliveryMethod,currency:NEWO.currency,items,total,paid:0,shipmentId:null};
  DB.orders.push(o);items.forEach(i=>{const p=prod(i.p);p.stock=Math.max(0,(p.stock||0)-i.q);p.stockBy=p.stockBy||{};p.stockBy.w_main=Math.max(0,(p.stockBy.w_main!==undefined?p.stockBy.w_main:(p.stock+i.q))-i.q);});logAct('Заявки','Заказ: создан '+o.number,cli(o.client)?.name||'');saveDB();closeModal();ordSub='current';oSel=new Set();renderContent();toast('Заказ '+o.number+' создан');}

function openOrderDetail(id){
  const o=DB.orders.find(x=>x.id===id);if(!o)return;const c=cli(o.client),st=STAT[o.status]||['—','gray'];
  const pays=DB.payments.filter(p=>p.order===o.id);
  const paid=pays.reduce((s,p)=>s+(p.amount||0),0);
  const rets=(DB.returns||[]).filter(r=>r.order===o.id);
  const retSum=rets.reduce((s,r)=>s+(r.amount||0),0);
  const retQty=rets.reduce((s,r)=>s+(r.qty||0),0);
  const debt=Math.max(0,(o.total||0)-paid-retSum);
  const qty=(o.items||[]).reduce((a,i)=>a+(i.q||0),0);
  const catName=cid=>{const x=(DB.categories||[]).find(k=>k.id===cid||k.name===cid);return x?x.name:(cid||'—');};
  const payPct=o.total?Math.min(100,Math.round(paid/o.total*100)):0;
  const card=(label,val,sub)=>`<div class="card" style="flex:1;min-width:165px"><div class="hint" style="text-transform:uppercase;font-size:10.5px;letter-spacing:.6px">${label}</div><div style="font-size:20px;font-weight:800;color:var(--navy);margin-top:6px">${val}</div>${sub?`<div class="hint" style="margin-top:2px">${sub}</div>`:''}</div>`;
  openModal(`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div><div class="hint" style="font-size:11px">Заявки / Просмотр заказа</div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:3px"><h2 style="margin:0">${o.number}</h2><span class="pill gray">${qty} шт</span><span class="pill ${st[1]}">${st[0]}</span></div></div>
      <button class="btn ghost" onclick="exportOrder('${o.id}')">${I.down} Excel</button>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin:14px 0">
      ${card('Сумма заказа',money(o.total))}
      ${card('Возврат с полки',money(retSum),retQty+' кол-во')}
      ${card('Задолженность',money(debt))}
    </div>
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:12.5px"><span class="hint">Оплачено</span><b>${money(paid)} <span class="hint" style="font-weight:500">из ${money(o.total)}</span></b></div>
      <div style="height:8px;border-radius:6px;background:var(--line);margin-top:8px;overflow:hidden"><div style="height:100%;width:${payPct}%;background:linear-gradient(90deg,#3B6FE0,#2C5BC8)"></div></div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="legend" style="display:grid;grid-template-columns:1fr 1fr;gap:4px 24px">
        <div class="legrow"><span class="nm">Заказ ID</span><b>${o.number}</b></div>
        <div class="legrow"><span class="nm">Дата создания</span><span>${fmtDT(o.createdAt||o.date)}</span></div>
        <div class="legrow"><span class="nm">Клиент</span><b>${esc(c?c.name:'—')}</b></div>
        <div class="legrow"><span class="nm">Дата оплаты</span><span>${pays.length?fmtDT(pays[0].date):'—'}</span></div>
        <div class="legrow"><span class="nm">Адрес</span><span>${esc(c?.addr||'—')}</span></div>
        <div class="legrow"><span class="nm">Сотрудник</span><span>${esc(emp(o.agent)?.name||'—')}</span></div>
        <div class="legrow"><span class="nm">Маршрут</span><span>${esc(route(o.route)?.name||'—')}</span></div>
        <div class="legrow"><span class="nm">Способ оплаты</span><span>${METHOD3[o.method]||'—'}</span></div>
      </div>
    </div>
    <div class="tablewrap" style="margin-bottom:14px"><div style="overflow-x:auto"><table><thead><tr>
      <th>Товар</th><th class="num">Кол-во</th><th>Тип упаковки</th><th class="num">Цена за шт.</th><th class="num">Сумма</th><th>Категория</th><th>Ед.</th></tr></thead>
      <tbody>${(o.items||[]).map(i=>{const p=prod(i.p);return `<tr>
        <td><b>${esc(p?.name||'—')}</b></td><td class="num">${i.q}</td><td>${esc(p?.pkg||'—')}</td>
        <td class="num">${money(i.price)}</td><td class="num"><b>${money(i.q*i.price)}</b></td>
        <td>${esc(catName(p?.cat))}</td><td>${esc(p?.unit||'шт')}</td></tr>`}).join('')}
        <tr style="background:var(--green-100)"><td><b>Итого</b></td><td class="num"><b>${qty}</b></td><td></td><td></td><td class="num"><b>${money(o.total)}</b></td><td></td><td></td></tr>
      </tbody></table></div></div>

      <div class="grow" style="flex:1"></div>
      ${o.status!=='canceled'?`<button class="btn danger" onclick="if(confirm('Отменить заказ?')){var oo=DB.orders.find(x=>x.id==='${o.id}');orderRestoreStock(oo);oo.status='canceled';oo.canceledAt=nowTashkent();saveDB();if(sbCfg())scheduleCloudPush();closeModal();renderContent();toast('Отменён · товар возвращён на склад');}">Отменить заказ</button>`:''}

}
function exportOrder(id){const o=DB.orders.find(x=>x.id===id);const rows=[['Заказ',o.number],['Клиент',cli(o.client)?.name||''],['Дата',fmtDT(o.createdAt)],['Оплата',METHOD3[o.method]],[],['Товар','Кол-во','Цена','Сумма']];
  o.items.forEach(i=>rows.push([prod(i.p)?.name||'',i.q,i.price,i.q*i.price]));rows.push([],['Итого','','',o.total]);exportTable('Заказ_'+o.number,rows);}

/* ---- Отгрузки ---- */
function courierList(){return DB.employees.filter(e=>e.active!==false);}
function openShipmentModal(){if(!oSel.size){toast('Выберите заявки');return;}
  const tr=DB.transport||[];
  // дедупликация: считаем уникальных клиентов среди выбранных заявок
  const clientsSet=new Set([...oSel].map(id=>{const o=DB.orders.find(x=>x.id===id);return o?o.client:null}).filter(Boolean));
  openModal(`<h2>Создать лист отгрузки</h2>
    <div class="hint" style="margin-bottom:12px">Заявок: ${oSel.size} · клиентов: ${clientsSet.size}</div>
    <div class="field"><label>Дата доставки</label><input id="sh_date" type="date" value="${addDays(todayTashkent(),1)}"></div>
    <div class="field"><label>Доставщик</label><select id="sh_courier"><option value="">— выберите —</option>${courierList().map(e=>`<option value="${e.id}">${esc(e.name)} (${ROLEMAP[e.role]||e.role})</option>`).join('')}</select></div>
    <div class="field"><label>Транспорт</label>${tr.length?`<select id="sh_truck"><option value="">—</option>${tr.map(t=>`<option>${esc((t.model||'')+' '+(t.number||''))}</option>`).join('')}</select>`:`<select id="sh_truck">${TRUCKS.map(t=>`<option>${esc(t)}</option>`).join('')}</select>`}</div>
    <div class="hint" style="margin-bottom:12px;line-height:1.5">Лист создаётся со статусом <b>«Сборка»</b>. Когда будет готов — нажмёте «Отправить в путь», и доставщик увидит его на телефоне.</div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="createShipment()">Создать (Сборка)</button></div>`);}
function createShipment(){const ids=[...oSel].filter(id=>canShipOrder(DB.orders.find(o=>o.id===id)));const sid=uid('sh');const cour=$('#sh_courier')?$('#sh_courier').value:'';
  if(!ids.length){toast('Нет заказов для отгрузки (возможно, все уже отгружены)');return;}
  if(!cour){toast('Выберите доставщика');return;}
  DB.shipments.push({id:sid,number:nextShipNo(),date:$('#sh_date').value,transport:$('#sh_truck')?$('#sh_truck').value:'',courier:cour,status:'created',orders:ids,createdAt:nowTashkent()});
  ids.forEach(i=>{const o=DB.orders.find(x=>x.id===i);o.shipmentId=sid;o.status='shipped';o.deliveryDate=$('#sh_date').value;o.courier=cour;});
  oSel=new Set();logAct('Заявки','Отгрузка создана (сборка): '+ids.length+' заявок','OTG');saveDB();if(sbCfg())scheduleCloudPush();closeModal();ordGo('shipments');toast('Лист отгрузки создан (Сборка)');}
function openAddToShipment(){if(!oSel.size){toast('Выберите заявки');return;}
  const open=DB.shipments.filter(s=>s.status!=='done');
  if(!open.length){toast('Нет активных отгрузок');return;}
  openModal(`<h2>Добавить к отгрузке</h2><div class="hint" style="margin-bottom:12px">Заявок: ${oSel.size}</div>
    ${open.map(s=>`<div class="card" style="margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
      <div><b>${s.number}</b> · ${esc(s.transport)}<div class="hint">${dmonth(s.date)} · ${s.orders.length} заявок · ${SHIP_ST[s.status][0]}</div></div>
      <button class="btn primary" style="width:auto" onclick="addToShipment('${s.id}')">Добавить</button></div>`).join('')}

function addToShipment(sid){const s=shipment(sid);[...oSel].forEach(i=>{if(!s.orders.includes(i))s.orders.push(i);const o=DB.orders.find(x=>x.id===i);o.shipmentId=sid;o.status='shipped';o.deliveryDate=s.date;});oSel=new Set();saveDB();closeModal();ordGo('shipments');toast('Добавлено к '+s.number);}

function orderRestoreStock(o){ // вернуть зарезервированный товар на ОСНОВНОЙ склад при отмене неотгруженного заказа
  if(!o||o._stockRestored||o.status==='shipped'||o.status==='delivered')return false;
  (o.items||[]).forEach(i=>{const p=prod(i.p);if(p){p.stock=(p.stock||0)+i.q;p.stockBy=p.stockBy||{};p.stockBy.w_main=(p.stockBy.w_main||0)+i.q;}});
  o._stockRestored=true;return true;}
function orderReserveAgain(o){ // если отменённый заказ снова делают активным — снова списать
  if(!o||!o._stockRestored)return;
  (o.items||[]).forEach(i=>{const p=prod(i.p);if(p){p.stock=Math.max(0,(p.stock||0)-i.q);p.stockBy=p.stockBy||{};p.stockBy.w_main=Math.max(0,(p.stockBy.w_main||0)-i.q);}});
  o._stockRestored=false;}
function nextOrderNo(){let max=100000;(DB.orders||[]).forEach(o=>{const x=String(o.number||'');if(x.indexOf('HB-')===0){const n=parseInt(x.slice(3),10);if(!isNaN(n)&&n>max)max=n;}});return 'HB-'+(max+1);}
function nextShipNo(){let max=1000;(DB.shipments||[]).forEach(s=>{const x=String(s.number||'');if(x.indexOf('OTG-')===0){const n=parseInt(x.slice(4),10);if(!isNaN(n)&&n>max)max=n;}});return 'OTG-'+(max+1);}
function shipStats(sh){const os=sh.orders.map(id=>DB.orders.find(o=>o.id===id)).filter(Boolean);
  return {os,sum:os.reduce((a,o)=>a+o.total,0),del:os.filter(o=>o.status==='delivered').length,
    can:os.filter(o=>o.status==='canceled').length,pend:os.filter(o=>o.status==='shipped').length};}

        <b style="font-size:12px;white-space:nowrap">${pct}% · ✅ ${st.del} · ❌ ${st.can} · ⏳ ${st.pend}</b></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn primary" style="flex:1" onclick="openShipment('${sh.id}')">Открыть</button>
        ${sh.status==='created'?`<button class="btn gold" onclick="shipStatus('${sh.id}','transit')">🚚 Отправить в путь</button>`:''}
        ${sh.status==='transit'?`<button class="btn danger" onclick="shipStatus('${sh.id}','returned')">↩️ Вернулся</button>`:''}
        ${sh.status==='returned'?`<button class="btn gold" style="flex:1" onclick="shipReturn('${sh.id}')">📋 Обработать возврат</button>`:''}
        ${sh.status==='returned'&&st.pend===0?`<button class="btn ghost" onclick="shipStatus('${sh.id}','done')">Завершить</button>`:''}
      </div>
    </div>`}).join(''):'<div class="card"><div class="empty">Листов отгрузки нет. Создайте на вкладке «Текущие заказы»: отметьте заявки галочками → «Создать отгрузку».</div></div>'}
  </div>`;
}
function openShipment(sid){const sh=shipment(sid);if(!sh)return;const st=shipStats(sh);

  const agg={};st.os.forEach(o=>o.items.forEach(i=>{agg[i.p]=agg[i.p]||{q:0,sum:0};agg[i.p].q+=i.q;agg[i.p].sum+=i.q*i.price;}));

/* Получить остатки: недоставленные заявки листа отменяются, товар → склад возврата, лист завершается */
function getRemainders(sid){
  const sh=shipment(sid);if(!sh)return;const st=shipStats(sh);
  const pend=st.os.filter(o=>o.status==='shipped');
  if(!pend.length){toast('Все заявки уже закрыты');return;}
  openModal(`<h2>Получить остатки · ${sh.number}</h2>
    <div class="hint" style="margin-bottom:12px;line-height:1.6">Недоставленные заявки (${pend.length}) будут отменены, а их товар вернётся на <b>склад возврата</b>. Лист отгрузки закроется.</div>
    <div style="max-height:34vh;overflow-y:auto;margin-bottom:12px">
      ${pend.map(o=>{const c=cli(o.client);return `<div class="legrow" style="padding:8px 0;border-bottom:1px solid var(--line)"><span class="nm"><b>${o.number}</b> ${esc(c?.name||'')}</span><b>${money(o.total)}</b></div>`}).join('')}
    </div>
    <div class="field"><label>Причина для остатка</label><select id="gr_r">${(DB.refusals||[]).map(r=>`<option value="${esc(r.name)}">${esc(r.name)}</option>`).join('')||'<option value="Не доставлено">Не доставлено</option>'}</select></div>
    <div class="modal-actions"><button class="btn ghost" onclick="openShipment('${sid}')">Назад</button><button class="btn primary" onclick="confirmRemainders('${sid}')">Получить остатки и закрыть</button></div>`);
}
function confirmRemainders(sid){
  const sh=shipment(sid);if(!sh)return;const st=shipStats(sh);
  const reason=$('#gr_r')?$('#gr_r').value:'Не доставлено';
  askCode(()=>{
    let n=0;
    st.os.filter(o=>o.status==='shipped').forEach(o=>{
      o.status='canceled';o.refusal=reason;o.canceledAt=nowTashkent();
      o.items.forEach(i=>{const p=prod(i.p);if(p){p.stockBy=p.stockBy||{};p.stockBy.w_ret=(p.stockBy.w_ret||0)+i.q;}});  // на склад возврата
      n++;
    });
    sh.status='done';
    logAct('Заявки','Получены остатки '+sh.number+': '+n+' заявок → склад возврата',reason);
    saveDB();if(sbCfg())scheduleCloudPush();closeModal();ordShipments();
    toast('✅ Остатки получены: '+n+' заявок отменено, товар на складе возврата');
  });
}

/* ===== ОБРАБОТКА ВОЗВРАТА — 3 листа: Клиенты · Товары · Деньги ===== */
let SHR={sid:null,tab:'clients',alloc:{}};
function shipReturn(sid){SHR={sid,tab:'clients',alloc:{}};renderShipReturn();}
function shrGo(tab){SHR.tab=tab;renderShipReturn();}
function shipReturnGoods(sh){
  // что возвращается в машину: товар отменённых/нетронутых заказов + позиции возвратов
  const goods={};  // pid -> {q, src:'undelivered'|'return', overdue}
  shipStats(sh).os.forEach(o=>{
    if(o.status==='canceled'||o.status==='shipped'){ // не доставлен — товар вернулся целым
      o.items.forEach(i=>{const k=i.p+'|main';goods[k]=goods[k]||{p:i.p,q:0,overdue:false};goods[k].q+=i.q;});
    }
  });
  // возвраты, привязанные к заказам этого листа (просрочка → склад возврата)
  const oids=new Set(sh.orders);
  (DB.returns||[]).filter(r=>oids.has(r.order)||sh.orders.some(id=>DB.orders.find(o=>o.id===id&&o.client===r.client))).forEach(r=>{
    const over=/просроч|брак/i.test(r.reason||'');
    (r.items||[]).forEach(i=>{const k=i.p+'|'+(over?'ret':'main');goods[k]=goods[k]||{p:i.p,q:0,overdue:over};goods[k].q+=i.q;});
  });
  return goods;
}

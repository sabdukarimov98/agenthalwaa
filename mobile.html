<style>
:root{--bg:#F4F5F7;--ink:#1C2536;--muted:#8A94A6;--line:#EAEDF2;--card:#FFFFFF;--navy:#1E2A44;--navy2:#28365A;--accent:#3B6FE0;--accent2:#5B8DEF;--gold:#C9A227;--green:#1E9E6A;--red:#E2574C;--blue:#3B6FE0;--amber:#E0922F}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-size:14.5px;padding-bottom:84px}
.top{position:sticky;top:0;z-index:20;background:var(--bg);color:var(--ink);padding:16px 18px 10px;display:flex;align-items:center;justify-content:space-between}
.top b{font-size:21px;letter-spacing:-.3px;font-weight:800}
.top .tools{display:flex;align-items:center;gap:14px}
.top .ic{width:24px;height:24px;stroke:var(--ink);fill:none;stroke-width:1.9}
.ava{width:42px;height:42px;border-radius:50%;background:var(--navy) center/cover;display:grid;place-items:center;font-weight:800;color:#fff;font-size:15px}
.wrap{padding:4px 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(28,37,54,.04)}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:12px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
.kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.kpi .v{font-size:22px;font-weight:800;margin-top:4px;color:var(--navy);letter-spacing:-.5px}
.kpi .v small{font-size:12px;color:var(--muted);font-weight:600}
.hint{font-size:12px;color:var(--muted)}
.pill{display:inline-block;padding:4px 10px;border-radius:8px;font-size:11.5px;font-weight:700}
.pill.green{background:#E4F5EC;color:#1E9E6A}.pill.red{background:#FCE9E7;color:#E2574C}
.pill.gold{background:#F6EFD8;color:#8a6d0f}.pill.blue{background:#E8F0FE;color:#3B6FE0}
.pill.gray{background:#EEF1F5;color:#6B7689}.pill.amber{background:#FBF0DF;color:#E0922F}
.btn{display:block;width:100%;border:none;border-radius:14px;padding:14px;font-size:14.5px;font-weight:700;cursor:pointer;text-align:center;transition:transform .08s}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--navy);color:#fff}
.btn.gold{background:var(--accent);color:#fff}
.btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--navy)}
.btn.danger{background:#fff;border:1.5px solid #F2C9C5;color:var(--red)}
.btn.sm{width:auto;display:inline-block;padding:9px 14px;font-size:13px;border-radius:11px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:13px;font-size:15px;background:#fff;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:25;padding:6px 0 calc(6px + env(safe-area-inset-bottom));box-shadow:0 -2px 16px rgba(28,37,54,.06)}
.nav button{flex:1;border:none;background:none;padding:8px 2px;font-size:11px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:4px;font-weight:600}
.nav button.on{color:var(--navy);font-weight:700}
.nav button.on .navic{background:#EEF1F8}
.navic{width:46px;height:30px;border-radius:14px;display:grid;place-items:center;transition:background .15s}
.nav svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.chiprow{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:11px}
.chip{flex:0 0 auto;padding:11px 20px;border-radius:999px;border:1.5px solid var(--line);background:#fff;font-size:14px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.search{display:flex;gap:8px;margin-bottom:14px}
.search input{flex:1;padding:14px 16px;border:1.5px solid var(--line);border-radius:14px;font-size:15px;background:#fff}
.modal-bg{position:fixed;inset:0;background:rgba(20,28,44,.45);z-index:40;display:none;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:var(--bg);width:100%;max-height:92vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom))}
.modal h2{font-size:18px;margin-bottom:14px;color:var(--navy);font-weight:800}
.toast{position:fixed;left:14px;right:14px;bottom:90px;background:var(--navy);color:#fff;padding:13px 16px;border-radius:13px;z-index:60;font-size:13.5px;display:none}
.prodimg{width:54px;height:54px;border-radius:12px;background:#EEF1F5 center/cover;flex:0 0 auto}
.qty{width:74px;padding:10px;border:1.5px solid var(--line);border-radius:11px;text-align:center;font-weight:800;font-size:15px}
.fab{position:fixed;right:16px;bottom:96px;z-index:26;background:var(--accent);color:#fff;border:none;border-radius:999px;padding:16px 22px;font-weight:700;font-size:15px;box-shadow:0 8px 24px rgba(59,111,224,.4)}
.timer{font-variant-numeric:tabular-nums;font-weight:800;color:var(--navy);font-size:17px}
.seg{display:flex;background:#EAEDF2;border-radius:13px;padding:4px;margin-bottom:12px}
.seg button{flex:1;border:none;background:none;padding:10px;border-radius:10px;font-weight:700;font-size:13px;color:var(--muted)}
.seg button.on{background:#fff;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:280px;margin:20px auto}
.pinpad button{aspect-ratio:1;border-radius:50%;border:none;background:#fff;font-size:24px;font-weight:600;color:var(--navy);transition:transform .08s;box-shadow:0 1px 3px rgba(28,37,54,.06)}
.pinpad button:active{transform:scale(.92);background:#EEF1F8}
.pindots{display:flex;gap:16px;justify-content:center;margin:20px 0}
.pindots i{width:14px;height:14px;border-radius:50%;background:#D5DBE5;display:block;transition:background .15s}
.pindots i.f{background:var(--navy)}
.center{min-height:90vh;display:flex;flex-direction:column;justify-content:center;padding:24px}
.bar{height:9px;background:#E4E8EF;border-radius:99px;overflow:hidden;flex:1}
.bar i{display:block;height:100%;border-radius:99px;background:var(--accent)}
#map,#pickmap{height:48vh;border-radius:16px;border:1px solid var(--line)}
#pickmap{height:38vh}
.empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:13.5px}
.logo{width:72px;height:72px;border-radius:20px;background:var(--navy);color:#fff;display:grid;place-items:center;font-size:34px;font-weight:800;font-family:Georgia,serif;margin:0 auto 16px}
.locbtn{position:absolute;right:12px;bottom:12px;z-index:5;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:9px 13px;font-weight:700;font-size:13px;color:var(--navy);box-shadow:0 3px 10px rgba(0,0,0,.12)}
.tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:14px}
.tile{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 10px;display:flex;flex-direction:column;align-items:center;gap:9px;cursor:pointer}
.tile svg{width:28px;height:28px;stroke:var(--navy);fill:none;stroke-width:1.7}
.tile span{font-size:12.5px;font-weight:600;color:var(--ink);text-align:center;line-height:1.25}
.summary{background:var(--navy);color:#fff;border-radius:18px;padding:18px;margin-bottom:14px}
.summary h4{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between}
.summary .sr{display:flex;align-items:center;justify-content:space-between;padding:9px 0;font-size:14px;color:#B8C2D6}
.summary .sr b{color:#fff;font-size:15px}
.summary .sbar{flex:1;height:7px;background:rgba(255,255,255,.12);border-radius:99px;margin:0 12px;overflow:hidden}
.summary .sbar i{display:block;height:100%;background:var(--accent2);border-radius:99px}
.rcard{background:#fff;border:1px solid var(--line);border-radius:16px;margin-bottom:12px;overflow:hidden}
.rcard .rtop{padding:15px 16px 13px}
.rcard .rname{font-size:16px;font-weight:700;color:var(--navy)}
.rcard .raddr{font-size:13px;color:var(--muted);margin-top:2px}
.rcard .ract{display:flex;border-top:1px solid var(--line)}
.rcard .ract button{flex:1;border:none;background:none;padding:13px;font-weight:700;font-size:14px;color:var(--navy);display:flex;align-items:center;justify-content:center;gap:7px}
.rcard .ract button:first-child{border-right:1px solid var(--line)}
.rcard .ract svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.9}
.ccard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:11px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.ccard .cph{width:54px;height:54px;border-radius:13px;background:#EEF1F5 center/cover;flex:0 0 auto;display:grid;place-items:center}
.ccard .cph svg{width:26px;height:26px;stroke:#B6C0D0;fill:none;stroke-width:1.6}
.dock{position:fixed;left:50%;transform:translateX(-50%);bottom:92px;z-index:24;display:flex;gap:10px}
.dock button{background:var(--navy);color:#fff;border:none;border-radius:999px;padding:15px 26px;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 22px rgba(28,37,54,.28)}
.dock button svg{width:19px;height:19px;fill:none;stroke:#fff;stroke-width:1.9}

function geoStart(){
  if(!navigator.geolocation){GEO_DENIED=false;return;}  // –љ–µ—В API –≥–µ–Њ–ї–Њ–Ї–∞—Ж–Є–Є вАФ —А–∞–±–Њ—В–∞–µ–Љ –±–µ–Ј –љ–µ—С
  try{TRACK=JSON.parse(localStorage.getItem('halwaa_track_'+today())||'[]');}catch(e){TRACK=[];}
  // –њ—А–Њ–≤–µ—А—П–µ–Љ —Б—В–∞—В—Г—Б —А–∞–Ј—А–µ—И–µ–љ–Є—П –Ј–∞—А–∞–љ–µ–µ (–≥–і–µ –њ–Њ–і–і–µ—А–ґ–Є–≤–∞–µ—В—Б—П)
  if(navigator.permissions&&navigator.permissions.query){
    navigator.permissions.query({name:'geolocation'}).then(st=>{
      if(st.state==='denied'&&!GEO_BYPASS){GEO_DENIED=true;if(me())render();}
      st.onchange=()=>{if(st.state==='granted'){GEO_DENIED=false;geoStart();if(me())render();}
        else if(st.state==='denied'&&!GEO_BYPASS){GEO_DENIED=true;if(me())render();}};
    }).catch(()=>{});
  }
  const rec=p=>{GEO=[p.coords.latitude,p.coords.longitude];if(GEO_DENIED){GEO_DENIED=false;if(me())render();}
    const last=TRACK[TRACK.length-1];const t=new Date().toISOString();
    if(!last||distKm([last.lat,last.lng],GEO)>0.04||(Date.parse(t)-Date.parse(last.t))>180000){
      TRACK.push({lat:GEO[0],lng:GEO[1],t,spd:p.coords.speed||0,acc:p.coords.accuracy||0});
      if(TRACK.length>400)TRACK=TRACK.slice(-400);
      try{localStorage.setItem('halwaa_track_'+today(),JSON.stringify(TRACK));}catch(e){}
    }};
  const err=e=>{if(e&&e.code===1&&!GEO_BYPASS){GEO_DENIED=true;if(me())render();}};
  navigator.geolocation.getCurrentPosition(rec,err,{enableHighAccuracy:true,timeout:15000,maximumAge:0});
  try{if(GEO_WATCH)navigator.geolocation.clearWatch(GEO_WATCH);
    GEO_WATCH=navigator.geolocation.watchPosition(rec,err,{enableHighAccuracy:true,timeout:20000,maximumAge:10000});}catch(e){}
  if(!window._trkIv)window._trkIv=setInterval(()=>{if(me()&&TRACK.length)sendTrack();},300000);
}

function distKm(a,b){if(!a||!b)return null;const R=6371,dl=(b[0]-a[0])*Math.PI/180,dg=(b[1]-a[1])*Math.PI/180;
  const x=Math.sin(dl/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dg/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}

async function initPush(){

    if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
    let sub=await SW_REG.pushManager.getSubscription();
    if(!sub){sub=await SW_REG.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:b64ToUint8(VAPID_PUBLIC)});}
    await savePushSub(sub);

      p=>{GEO=[p.coords.latitude,p.coords.longitude];LOC_OK=true;GEO_DENIED=false;geoStart();render();},

/* ---------- –Ф–Ю–°–Ґ–Р–Т–Ъ–Р: –Ф–Њ—Б—В–∞–≤–ї–µ–љ–Њ —Б –Ј–∞—З—С—В–Њ–Љ –≤–Њ–Ј–≤—А–∞—В–∞/–і–µ–њ–Њ–Ј–Є—В–∞ ---------- */
function deliverFor(oid){

function payUrl(kind,amount,ref){const ig=DATA.integrationsPublic||DATA.integrations||{};
  if(kind==='payme'){const m=(ig.payme&&ig.payme.merchant||'').trim();if(!m)return null;
    return 'https://checkout.paycom.uz/'+btoa('m='+m+';ac.order_id='+ref+';a='+Math.round(amount*100));}
  if(kind==='click'){const c=ig.click||{};if(!(c.merchant||'').trim()||!(c.service||'').trim())return null;
    return 'https://my.click.uz/services/pay?service_id='+encodeURIComponent(c.service)+'&merchant_id='+encodeURIComponent(c.merchant)+'&amount='+amount+'&transaction_param='+encodeURIComponent(ref);}
  return null;}
function dvPayBtns(oid){const o=(DATA.orders||[]).find(x=>x.id===oid);if(!o)return;

function dvCalc(oid){const o=(DATA.orders||[]).find(x=>x.id===oid);if(!o)return;

  const covered=cash+dep+ret;

}

  // –і–Њ–ї–≥>0, –і–µ–њ–Њ–Ј–Є—В<0. –Т–Њ–Ј–≤—А–∞—В –Є –і–µ–љ—М–≥–Є —Г–Љ–µ–љ—М—И–∞—О—В –і–Њ–ї–≥, –љ–Њ–≤—Л–є –Ј–∞–Ї–∞–Ј —Г–≤–µ–ї–Є—З–Є–≤–∞–µ—В.

function initPickMap(){
  const key=(DATA.integrationsPublic&&DATA.integrationsPublic.yandex&&DATA.integrationsPublic.yandex.apikey)||'';
  const run=()=>ymaps.ready(()=>{
    const el=document.getElementById('pickmap');if(!el)return;
    if(NCPICK){try{NCPICK.destroy();}catch(e){}}
    const c=NCGEO||GEO||[41.311,69.279];
    NCPICK=new ymaps.Map('pickmap',{center:c,zoom:NCGEO?17:13,controls:['zoomControl']});
    let mk=null;
    const setPt=(coords)=>{NCGEO=coords;
      if($('#nc_coords'))$('#nc_coords').textContent='рЯУН '+coords[0].toFixed(5)+', '+coords[1].toFixed(5);
      if(mk)mk.geometry.setCoordinates(coords);
      else{mk=new ymaps.Placemark(coords,{},{preset:'islands#redDotIcon',draggable:true});
        mk.events.add('dragend',()=>{NCGEO=mk.geometry.getCoordinates();ncDraft();
          if($('#nc_coords'))$('#nc_coords').textContent='рЯУН '+NCGEO[0].toFixed(5)+', '+NCGEO[1].toFixed(5);});
        NCPICK.geoObjects.add(mk);}ncDraft();};
    if(NCGEO)setPt(NCGEO);
    NCPICK.events.add('click',e=>setPt(e.get('coords')));
    NCPICK._setPt=setPt;
  });
  if(window.ymaps&&window.ymaps.Map)run();
  else if(!window._ymload){window._ymload=1;const sc=document.createElement('script');
    sc.src='https://api-maps.yandex.ru/2.1/?lang=ru_RU'+(key?'&apikey='+encodeURIComponent(key):'');
    sc.onload=run;document.head.appendChild(sc);}

}

function openCart(){
  const items=Object.entries(CART).map(([pid,q])=>({p:pid,q,price:prod(pid)?.price||0}));
  if(!items.length){toast(T('cart')+' 0');return;}
  const total=items.reduce((s,i)=>s+i.q*i.price,0);
  const cons=RULES().consignment||{};
  const canCons=(cons.enabled!==false)||excl('consignment');
  const cls=myClients();
  openM(`<h2>${T('doOrder')}</h2>
    <div class="field"><label>${T('client')} *</label><select id="oc">${cls.map(c=>`<option value="${c.id}" ${ORDCLI===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>

    <div class="field"><label>${T('payment')}</label><select id="om" onchange="document.getElementById('consrow').style.display=this.value==='consign'?'block':'none'">
      <option value="cash">${T('cash')}</option><option value="terminal">${T('terminal')}</option><option value="transfer">${T('transfer')}</option>

function sendOrder(total){
  const cid=$('#oc').value;if(!cid){toast(T('client')+' *');return;}
  const m=$('#om').value;const cons=RULES().consignment||{};
  let consignTerm=null,note='';
  if(m==='consign'){
    consignTerm=Math.floor(+($('#ocd')?.value)||0);
    const maxD=cons.maxDays||10;
    if(consignTerm<1||((consignTerm>maxD)&&!excl('consignment'))){toast(T('consignDays')+' вЙ§ '+maxD);return;}
    if(cons.requireComment){note=($('#occ')?.value||'').trim();if(!note){toast(T('consignComment'));return;}}
  }
  const items=Object.entries(CART).map(([pid,q])=>({p:pid,q,price:prod(pid)?.price||0}));
  const p={id:uid('o'),number:'MB-'+Date.now().toString().slice(-6),client:cid,agent:me().id,
    terr:cli(cid)?.terr||'',route:cli(cid)?.route||'',date:today(),createdAt:now(),status:'new',
    method:m==='consign'?'debt':m,payType:m==='consign'?'consignment':'onsite',consignTerm,consignNote:note,
    items,total,paid:0,deliveryMethod:'delivery',source:'mobile'};
  txSend('order',p);
  if(VISIT&&VISIT.client===cid)VISIT.actions.push('order');
  CART={};ORDCLI=null;closeM();go('dash');
}

function retFor(cid){
  const ords=[...(DATA.orders||[]).filter(o=>o.client===cid&&o.agent===me().id),...myOrders().map(t=>t.payload).filter(o=>o.client===cid)]
    .sort((a,b)=>String(b.date).localeCompare(String(a.date))).slice(0,20);

      return `<option value="${o.id}|${o.date}" ${old?'disabled':''}>${o.number||o.id} ¬Ј ${o.date}${old?' ¬Ј >'+maxD+' –і–љ':''}</option>`}).join(''):`<option value="">${T('pickOrder')} вАФ</option>`}</select></div>`:''}

    <button class="btn primary" style="margin-top:10px" onclick="sendReturn('${cid}',${byOrder})">${T('send')}</button>`);
}
function sendReturn(cid,byOrder){
  const items=[...document.querySelectorAll('[data-rp]')].map(e=>({p:e.dataset.rp,q:Math.floor(+e.value||0)})).filter(i=>i.q>0);
  if(!items.length){toast('0');return;}
  let orderId='',orderDate='';
  if(byOrder){const ro=$('#ro');if(!ro||!ro.value){toast(T('pickOrder'));return;}[orderId,orderDate]=ro.value.split('|');}
  const amount=items.reduce((s,i)=>s+i.q*(prod(i.p)?.price||0),0);
  const p={id:uid('r'),client:cid,agent:me().id,date:today(),at:now(),type:$('#rt').value,items,amount,orderId,orderDate,source:'mobile'};
  txSend('return',p);
  if(VISIT&&VISIT.client===cid)VISIT.actions.push('return');
  closeM();
}

  const days=['–°–µ–≥–Њ–і–љ—П','–Ч–∞–≤—В—А–∞','–Я–Њ—Б–ї–µ–Ј–∞–≤—В—А–∞'];

    <div style="font-size:40px;font-weight:800;margin:6px 0">${Math.round(cur.temperature_2m)}¬∞</div>

let CALC={s:'0'};

    ${['C','вМЂ','%','√Ј','7','8','9','√Ч','4','5','6','вИТ','1','2','3','+','0','.','='].map(k=>{
      const wide=k==='0'?'grid-column:span 2':'';
      const op=['√Ј','√Ч','вИТ','+','='].includes(k);const fn=['C','вМЂ','%'].includes(k);
      return `<button onclick="calcKey('${k}')" style="${wide};padding:20px 0;border:none;border-radius:14px;font-size:22px;font-weight:700;background:${op?'var(--accent)':fn?'#E4E8EF':'#fff'};color:${op?'#fff':'var(--navy)'};border:1px solid var(--line)">${k}</button>`;
    }).join('')}
  </div>`;
}
function calcKey(k){
  let s=CALC.s;
  const norm=x=>x.replace(/√Ч/g,'*').replace(/√Ј/g,'/').replace(/вИТ/g,'-');
  if(k==='C')s='0';
  else if(k==='вМЂ')s=s.length>1?s.slice(0,-1):'0';
  else if(k==='='){try{let r=Function('return '+norm(s))();r=Math.round(r*1e6)/1e6;s=String(r);}catch(e){s='–Ю—И–Є–±–Ї–∞';}}
  else if(k==='%'){try{s=String(Function('return '+norm(s))()/100);}catch(e){}}
  else if(['√Ј','√Ч','вИТ','+'].includes(k)){if(/[+\-√Ч√Ј]$/.test(s))s=s.slice(0,-1)+k;else s+=k;}
  else{if(s==='0'&&k!=='.')s=k;else if(s==='–Ю—И–Є–±–Ї–∞')s=k;else s+=k;}
  CALC.s=s;toolCalc();

/* –њ–Њ—Б—В—А–Њ–Є—В—М –Љ–∞—А—И—А—Г—В –њ–Њ —В–Њ—З–Ї–∞–Љ –і–љ—П (—З–µ—А–µ–Ј –≥–µ–Њ–њ–Њ–Ј–Є—Ж–Є—О вЖТ –≤—Б–µ —В–Њ—З–Ї–Є –њ–Њ –±–ї–Є–Ј–Њ—Б—В–Є) */
function buildRoute(){
  const cls=mapClients().filter(c=>!visitedToday(c.id));  // –µ—Й—С –љ–µ –њ–Њ—Б–µ—Й—С–љ–љ—Л–µ
  if(!cls.length){toast('–Э–µ—В —В–Њ—З–µ–Ї –і–ї—П –Љ–∞—А—И—А—Г—В–∞');return;}
  loadYmaps(()=>{
    if(!MMAP)return;
    if(MROUTE){try{MMAP.geoObjects.remove(MROUTE);}catch(e){}MROUTE=null;}
    // —Б–Њ—А—В–Є—А—Г–µ–Љ –њ–Њ –±–ї–Є–Ј–Њ—Б—В–Є –Њ—В —В–µ–Ї—Г—Й–µ–є –њ–Њ–Ј–Є—Ж–Є–Є (–ґ–∞–і–љ—Л–є –±–ї–Є–ґ–∞–є—И–Є–є —Б–Њ—Б–µ–і)
    const start=GEO||[cls[0].lat,cls[0].lng];
    const pts=cls.map(c=>[c.lat,c.lng]);const ordered=[];const used=new Set();let cur=start;
    while(ordered.length<pts.length){let bi=-1,bd=1e9;
      pts.forEach((p,i)=>{if(used.has(i))return;const d=distKm(cur,p)||1e9;if(d<bd){bd=d;bi=i;}});
      if(bi<0)break;used.add(bi);ordered.push(pts[bi]);cur=pts[bi];}
    const way=[start,...ordered];
    MROUTE=new ymaps.multiRouter.MultiRoute({referencePoints:way,params:{routingMode:'auto'}},
      {boundsAutoApply:true,routeActiveStrokeColor:'C9A227',routeActiveStrokeWidth:5});
    MMAP.geoObjects.add(MROUTE);
    toast('–Ь–∞—А—И—А—Г—В –њ–Њ—Б—В—А–Њ–µ–љ: '+ordered.length+' —В–Њ—З–µ–Ї');
  });
}

  const pool=tipPool().filter(t=>!tipShown(t[0]));
  if(!pool.length)return;
  const t=pool[0];tipMark(t[0]);notify(t[1],t[2]);
}
function startTips(){
  if(_tipTimer)return;
  // –њ–µ—А–≤—Л–є —Б–Њ–≤–µ—В —З–µ—А–µ–Ј 30 —Б–µ–Ї –њ–Њ—Б–ї–µ –≤—Е–Њ–і–∞, –і–∞–ї–µ–µ –Ї–∞–ґ–і—Л–µ 20 –Љ–Є–љ—Г—В (15-20 –Ј–∞ –і–µ–љ—М)
  setTimeout(tipTick,30000);
  _tipTimer=setInterval(tipTick,20*60000);
}

async function checkMyAccount(){
  if(!me())return;
  if(ST.cur==='demo')return;   // –і–µ–Љ–Њ-–∞–Ї–Ї–∞—Г–љ—В –≤—Б–µ–≥–і–∞ –∞–Ї—В–Є–≤–µ–љ
  try{
    const r=await fetch(SB_URL+'/rest/v1/crm_kv?select=value&key=eq.employees',{headers:H()});
    if(!r.ok)return;const rows=await r.json();const emps=(rows[0]&&rows[0].value)||[];
    const e=emps.find(x=>x.id===ST.cur);
    if(!e||e.active===false){          // –Љ–µ–љ—П —Г–і–∞–ї–Є–ї–Є –Є–ї–Є –Њ—В–Ї–ї—О—З–Є–ї–Є
      const nm=me().name;
      ST.accounts=ST.accounts.filter(a=>a.id!==ST.cur);
      ST.cur=ST.accounts[0]?.id||null;ST.pinOk=ST.cur?ST.pinOk:false;VISIT=null;save();closeM();
      toast('–Р–Ї–Ї–∞—Г–љ—В ¬Ђ'+nm+'¬ї –Њ—В–Ї–ї—О—З—С–љ –∞–і–Љ–Є–љ–Є—Б—В—А–∞—В–Њ—А–Њ–Љ');render();
    }else{ // –Њ–±–љ–Њ–≤–Є–Љ –њ–∞—А–Њ–ї—М/–і–Њ—Б—В—Г–њ—Л –љ–∞ —Б–ї—Г—З–∞–є —Б–Љ–µ–љ—Л
      const a=me();if(a){a.password=e.password;a.active=e.active;a.caps=e.caps||{};a.terr=e.terr||'';
        a.restrictCats=e.restrictCats||[];a.restrictTerrs=e.restrictTerrs||[];a.restrictRoutes=e.restrictRoutes||[];
        a.restrictProducts=e.restrictProducts||[];a.restrictTypes=e.restrictTypes||[];save();}
    }
  }catch(e){}
}

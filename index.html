<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#143D2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>HALWAA · Мобильный</title>
<style>
:root{--green:#0F3326;--green2:#1C4A38;--gold:#C9A227;--gold2:#E3C766;--cream:#F8F5EC;--ink:#23201A;--muted:#938C7A;--line:#EAE3D0;--red:#B23A33;--blue:#2F6690;--amber:#C97B1E;--card:#FFFDF8}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--cream);color:var(--ink);font-size:14.5px;padding-bottom:80px;
  background-image:radial-gradient(circle at 12% -5%,rgba(201,162,39,.07),transparent 45%),radial-gradient(circle at 90% 0%,rgba(15,51,38,.06),transparent 40%)}
.top{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,#0F3326,#1C4A38);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 18px rgba(15,51,38,.18)}
.top b{font-size:16px;letter-spacing:.5px;font-weight:800}
.ava{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold2)) center/cover;display:grid;place-items:center;font-weight:800;color:var(--green);box-shadow:0 2px 8px rgba(201,162,39,.4)}
.wrap{padding:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px;margin-bottom:12px;box-shadow:0 2px 10px rgba(40,30,10,.04)}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:12px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;position:relative;overflow:hidden;box-shadow:0 2px 10px rgba(40,30,10,.04)}
.kpi::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(var(--gold),var(--gold2))}
.kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.kpi .v{font-size:22px;font-weight:800;margin-top:4px;color:var(--green);letter-spacing:-.5px}
.kpi .v small{font-size:12px;color:var(--muted);font-weight:600}
.hint{font-size:12px;color:var(--muted)}
.pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:700}
.pill.green{background:#E7F0E9;color:#1F4D3A}.pill.red{background:#F8E8E6;color:#B23A33}
.pill.gold{background:#F6EFD8;color:#8a6d0f}.pill.blue{background:#E3EDF5;color:#2F6690}
.pill.gray{background:#EFECE2;color:#6c6757}.pill.amber{background:#F9EEDC;color:#C97B1E}
.btn{display:block;width:100%;border:none;border-radius:14px;padding:14px;font-size:14.5px;font-weight:700;cursor:pointer;text-align:center;transition:transform .08s}
.btn:active{transform:scale(.98)}
.btn.primary{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;box-shadow:0 4px 14px rgba(15,51,38,.22)}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#3a2e08;box-shadow:0 4px 14px rgba(201,162,39,.3)}
.btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--green)}
.btn.danger{background:#fff;border:1.5px solid #ECC8C4;color:var(--red)}
.btn.sm{width:auto;display:inline-block;padding:9px 14px;font-size:13px;border-radius:11px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:13px;font-size:15px;background:#fff;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold)}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,253,248,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;z-index:25;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 20px rgba(40,30,10,.06)}
.nav button{flex:1;border:none;background:none;padding:10px 2px 9px;font-size:10.5px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:4px;font-weight:700}
.nav button.on{color:var(--green)}
.nav button.on svg{stroke:var(--gold)}
.nav svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.chiprow{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:11px}
.chip{flex:0 0 auto;padding:9px 14px;border-radius:999px;border:1.5px solid var(--line);background:#fff;font-size:13px;font-weight:700;color:var(--ink)}
.chip.on{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;border-color:var(--green)}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.search{display:flex;gap:8px;margin-bottom:12px}
.search input{flex:1;padding:12px;border:1.5px solid var(--line);border-radius:12px;font-size:15px}
.modal-bg{position:fixed;inset:0;background:rgba(20,30,20,.5);z-index:40;display:none;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:var(--cream);width:100%;max-height:92vh;overflow-y:auto;border-radius:18px 18px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom))}
.modal h2{font-size:17px;margin-bottom:12px;color:var(--green)}
.toast{position:fixed;left:14px;right:14px;bottom:84px;background:#243524;color:#fff;padding:13px 16px;border-radius:12px;z-index:60;font-size:13.5px;display:none}
.prodimg{width:52px;height:52px;border-radius:10px;background:#F0EBDD center/cover;flex:0 0 auto}
.qty{width:74px;padding:10px;border:1.5px solid var(--line);border-radius:10px;text-align:center;font-weight:800;font-size:15px}
.fab{position:fixed;right:16px;bottom:90px;z-index:26;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#3a2e08;border:none;border-radius:999px;padding:16px 20px;font-weight:800;font-size:14px;box-shadow:0 8px 24px rgba(201,162,39,.45)}
.timer{font-variant-numeric:tabular-nums;font-weight:800;color:var(--green);font-size:17px}
.seg{display:flex;background:#EFEADC;border-radius:13px;padding:4px;margin-bottom:12px}
.seg button{flex:1;border:none;background:none;padding:10px;border-radius:10px;font-weight:700;font-size:13px;color:var(--muted)}
.seg button.on{background:#fff;color:var(--green);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;max-width:270px;margin:18px auto}
.pinpad button{aspect-ratio:1;border-radius:50%;border:1.5px solid var(--line);background:#fff;font-size:22px;font-weight:700;transition:transform .08s}
.pinpad button:active{transform:scale(.92);background:var(--cream)}
.pindots{display:flex;gap:14px;justify-content:center;margin:18px 0}
.pindots i{width:14px;height:14px;border-radius:50%;border:2px solid var(--green);display:block}
.pindots i.f{background:var(--green)}
.center{min-height:90vh;display:flex;flex-direction:column;justify-content:center;padding:24px}
.logo{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--green),var(--green2));color:var(--gold);display:grid;place-items:center;font-size:34px;font-weight:800;font-family:Georgia,serif;margin:0 auto 16px;box-shadow:0 8px 26px rgba(15,51,38,.28)}
.bar{height:9px;background:#EFEADC;border-radius:99px;overflow:hidden;flex:1}
.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold2))}
#map,#pickmap{height:48vh;border-radius:16px;border:1px solid var(--line)}
#pickmap{height:38vh}
.empty{text-align:center;color:var(--muted);padding:28px 10px;font-size:13.5px}
.locbtn{position:absolute;right:12px;bottom:12px;z-index:5;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:9px 13px;font-weight:700;font-size:13px;color:var(--green);box-shadow:0 3px 10px rgba(0,0,0,.12)}
</style>
</head>
<body>
<div id="app"></div>
<div class="modal-bg" id="mbg" onclick="if(event.target===this)closeM()"><div class="modal" id="mbody"></div></div>
<div class="toast" id="toast"></div>
<script>
/* ===================== НАСТРОЙКА ОБЛАКА =====================
   Вставь сюда URL и anon key проекта Supabase (Settings → API),
   те же, что в админке (Настройки → Интеграции → Облако): */
const SB_URL = "https://wgkilpzxhmwqsnfytwya.supabase.co";
const SB_KEY = "sb_publishable_mz8zS9e_UMQHNDhc2ktz8g_Fcjkq7EM";
/* ============================================================ */

const $=s=>document.querySelector(s);
const uid=p=>(p||'x')+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function toast(m){const t=$('#toast');t.textContent=m;t.style.display='block';clearTimeout(t._h);t._h=setTimeout(()=>t.style.display='none',2600);}
const tz=()=>new Date(Date.now()+(5*60+new Date().getTimezoneOffset())*60000);
const today=()=>tz().toISOString().slice(0,10);
const now=()=>{const d=tz();return d.toISOString().slice(0,16);};
const addDays=(s,n)=>{const d=new Date(s+'T12:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
const money=n=>new Intl.NumberFormat('ru-RU').format(Math.round(n||0))+' сум';
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ---------- i18n ---------- */
const I18N={
 ru:{dash:'Дашборд',routes:'Маршруты',clients:'Клиенты',catalog:'Каталог',more:'Ещё',login:'Вход',loginB:'Войти',loginH:'Логин и пароль выдаёт администратор',
  visitsToday:'Визиты сегодня',plan:'План визитов',orders:'Заказов сегодня',sum:'Сумма заказов',akb:'АКБ (актив. клиенты)',yest:'Факт вчера (доставлено)',
  search:'Поиск…',visited:'посещён',notVisited:'не посещён',dist:'км',startVisit:'Начать визит',endVisit:'Завершить визит',photo:'Фотоотчёт',
  order:'Заказ',ret:'Возврат',refuse:'Отказ',comment:'Комментарий',cart:'Корзина',doOrder:'Оформить заказ',client:'Клиент',payment:'Оплата',
  cash:'Наличные',terminal:'Терминал',transfer:'Безналичный',consign:'Консигнация',consignDays:'Дней консигнации',consignComment:'Комментарий (обязателен)',
  total:'Итого',send:'Отправить',history:'История',kpi:'KPI и бонусы',ships:'Отгрузки',profile:'Профиль',lang:'Язык',pin:'PIN-код',
  setPin:'Установить PIN',changePin:'Изменить PIN',logout:'Выйти из аккаунта',addAcc:'Добавить аккаунт',accounts:'Аккаунты',
  retType:'Тип возврата',shelf:'С полки',exch:'Обмен',expired:'Просрочка',byOrder:'По заказу',pickOrder:'Выберите заказ',
  reason:'Причина',sendOk:'Отправлено',offline:'Нет связи — сохранено, отправится позже',pend:'Ожидают отправки',
  noData:'Нет данных. Попросите администратора нажать «Выгрузить в облако».',map:'Карта',route:'Маршрут',all:'Все',
  enterPin:'Введите PIN',newPin:'Придумайте PIN (4 цифры)',repPin:'Повторите PIN',wrongPin:'Неверный PIN',wrongLogin:'Неверный логин или пароль',
  status:'Статус',del:'Доставлено',canc:'Отказ',pending:'В пути',myOrders:'Мои заказы',today2:'Сегодня',sync:'Обновить данные',pinProtect:'Защитить PIN-кодом?',pinProtectH:'Можно установить PIN для входа или пропустить — тогда вход без пароля.',skip:'Пропустить',moreAcc:'точнее',saved:'Черновик сохранён',expense:'Мои расходы',expCat:'Категория расхода',sum:'Сумма'},
 uz:{dash:'Boshqaruv',routes:'Marshrutlar',clients:'Mijozlar',catalog:'Katalog',more:'Yana',login:'Kirish',loginB:'Kirish',loginH:'Login va parolni administrator beradi',
  visitsToday:'Bugungi tashriflar',plan:'Tashrif rejasi',orders:'Bugungi buyurtmalar',sum:'Buyurtmalar summasi',akb:'AKB (faol mijozlar)',yest:'Kechagi fakt (yetkazildi)',
  search:'Qidirish…',visited:'tashrif qilindi',notVisited:'tashrif yo‘q',dist:'km',startVisit:'Tashrifni boshlash',endVisit:'Tashrifni yakunlash',photo:'Fotohisobot',
  order:'Buyurtma',ret:'Qaytarish',refuse:'Rad etish',comment:'Izoh',cart:'Savat',doOrder:'Buyurtma berish',client:'Mijoz',payment:'To‘lov',
  cash:'Naqd',terminal:'Terminal',transfer:'O‘tkazma',consign:'Konsignatsiya',consignDays:'Konsignatsiya kunlari',consignComment:'Izoh (majburiy)',
  total:'Jami',send:'Yuborish',history:'Tarix',kpi:'KPI va bonuslar',ships:'Yuk jo‘natmalar',profile:'Profil',lang:'Til',pin:'PIN-kod',
  setPin:'PIN o‘rnatish',changePin:'PIN o‘zgartirish',logout:'Akkauntdan chiqish',addAcc:'Akkaunt qo‘shish',accounts:'Akkauntlar',
  retType:'Qaytarish turi',shelf:'Peshtaxtadan',exch:'Almashtirish',expired:'Muddati o‘tgan',byOrder:'Buyurtma bo‘yicha',pickOrder:'Buyurtmani tanlang',
  reason:'Sabab',sendOk:'Yuborildi',offline:'Aloqa yo‘q — saqlandi, keyin yuboriladi',pend:'Yuborish kutilmoqda',
  noData:'Ma’lumot yo‘q. Administrator «Bulutga yuklash» tugmasini bossin.',map:'Xarita',route:'Marshrut',all:'Hammasi',
  enterPin:'PIN kiriting',newPin:'PIN o‘ylab toping (4 raqam)',repPin:'PINni takrorlang',wrongPin:'PIN noto‘g‘ri',wrongLogin:'Login yoki parol noto‘g‘ri',
  status:'Holat',del:'Yetkazildi',canc:'Rad',pending:'Yo‘lda',myOrders:'Mening buyurtmalarim',today2:'Bugun',sync:'Yangilash',pinProtect:'PIN-kod bilan himoyalansinmi?',pinProtectH:'Kirish uchun PIN o‘rnatishingiz yoki o‘tkazib yuborishingiz mumkin.',skip:'O‘tkazib yuborish',moreAcc:'aniqroq',saved:'Qoralama saqlandi',expense:'Mening xarajatlarim',expCat:'Xarajat turi',sum:'Summa'}
};
function T(k){return (I18N[ST.lang]||I18N.ru)[k]||k;}

/* ---------- локальное состояние ---------- */
let ST=JSON.parse(localStorage.getItem('halwaa_mob')||'{}');
ST.lang=ST.lang||'ru';ST.accounts=ST.accounts||[];ST.cur=ST.cur||null;ST.outbox=ST.outbox||[];ST.pin=ST.pin||null;
let DATA={};         // справочники из crm_kv
let MYTX=[];         // мои операции из crm_tx
let VIEW='dash', NAVH=[];
let VISIT=null;      // активный визит {client,startAt,photo,actions:[]}
let CART={};         // pid -> qty
let GEO=null;
function save(){localStorage.setItem('halwaa_mob',JSON.stringify(ST));}
function me(){return ST.accounts.find(a=>a.id===ST.cur)||null;}

/* ---------- Supabase REST ---------- */
function sbOk(){return SB_URL.startsWith('https://')&&SB_KEY.length>20;}
function H(){return {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};}
async function kvLoad(){
  const r=await fetch(SB_URL+'/rest/v1/crm_kv?select=key,value',{headers:H()});
  if(!r.ok)throw new Error('kv '+r.status);
  const rows=await r.json();DATA={};rows.forEach(x=>DATA[x.key]=x.value);
  mergeLocalClients();refreshAccounts();
  localStorage.setItem('halwaa_mob_data',JSON.stringify(DATA));
}
/* клиенты, добавленные с этого телефона и ещё не влитые админкой — не должны пропадать */
function mergeLocalClients(){
  DATA.clients=DATA.clients||[];
  [...ST.outbox,...MYTX].filter(t=>t.type==='client').forEach(t=>{
    if(!DATA.clients.some(c=>c.id===t.id||c.id===t.payload.id))DATA.clients.push(t.payload);});
}
/* админка — источник истины: обновляем имя/фото/план/запреты, выкидываем удалённых и неактивных */
function refreshAccounts(){
  const emps=L('employees');if(!emps.length)return;
  let kicked=false;
  ST.accounts=ST.accounts.filter(a=>{
    const e=emps.find(x=>x.id===a.id);
    if(!e||e.active===false){if(a.id===ST.cur)kicked=true;return false;}
    a.name=e.name;a.role=e.role;a.login=e.login;a.photo=e.photo||'';a.terr=e.terr||'';a.plan=e.plan||25;
    a.restrictCats=e.restrictCats||[];a.restrictProducts=e.restrictProducts||[];a.restrictTypes=e.restrictTypes||[];
    a.restrictTerrs=e.restrictTerrs||[];a.restrictRoutes=e.restrictRoutes||[];a.caps=e.caps||{};
    return true;});
  if(kicked){ST.cur=ST.accounts[0]?.id||null;toast('Аккаунт отключён администратором');}
  save();
}
async function txLoadMine(){
  if(!me())return;
  const r=await fetch(SB_URL+'/rest/v1/crm_tx?select=*&employee=eq.'+encodeURIComponent(me().id)+'&order=created_at.desc&limit=500',{headers:H()});
  if(r.ok){const cloud=await r.json();
    // добавляем локальные операции, которых ещё нет в облаке (не теряем)
    const cloudIds=new Set(cloud.map(t=>t.id));
    const localOnly=MYTX.filter(t=>!cloudIds.has(t.id));
    MYTX=[...localOnly,...cloud];
    localStorage.setItem('halwaa_mob_tx',JSON.stringify(MYTX));}
}
async function txSend(type,payload){
  const rec={id:payload.id||uid(type[0]),type,employee:me()?me().id:'',payload,created_at:new Date().toISOString()};
  MYTX.unshift(rec);                                  // сразу видно в счётчиках/истории
  try{localStorage.setItem('halwaa_mob_tx',JSON.stringify(MYTX));}catch(e){}
  try{
    const r=await fetch(SB_URL+'/rest/v1/crm_tx',{method:'POST',headers:{...H(),'Prefer':'resolution=merge-duplicates'},body:JSON.stringify([rec])});
    if(!r.ok)throw 0;
  }catch(e){ // не дошло до облака — в очередь на отправку (из MYTX не убираем, чтобы видеть)
    if(!ST.outbox.some(x=>x.id===rec.id)){ST.outbox.push(rec);save();}
  }
}
async function flushOutbox(){
  if(!ST.outbox.length)return;
  try{
    const r=await fetch(SB_URL+'/rest/v1/crm_tx',{method:'POST',headers:{...H(),'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(ST.outbox)});
    if(r.ok){ST.outbox=[];save();}  // операции уже в MYTX (добавлены при txSend), просто очищаем очередь отправки
  }catch(e){}
}

/* справочники-хелперы */
const L=k=>DATA[k]||[];
const cli=id=>L('clients').find(c=>c.id===id);
const prod=id=>L('products').find(p=>p.id===id);
const cat=id=>L('categories').find(c=>c.id===id);
const route=id=>L('routes').find(r=>r.id===id);
const terr=id=>L('territories').find(t=>t.id===id);
const RULES=()=>DATA.rules||{};
const excl=(rk)=>{const r=RULES()[rk];return r&&Array.isArray(r.exceptions)&&me()&&r.exceptions.includes(me().id);};
const ruleOn=(rk)=>{const r=RULES()[rk];return r?(r.enabled&&!excl(rk)):false;};
const allowedProd=p=>{const m=me();if(!m)return true;
  if((m.restrictCats||[]).includes(p.cat))return false;
  if((m.restrictProducts||[]).includes(p.id))return false;return true;};
const allowedClient=c=>{const m=me();if(!m)return true;
  if((m.restrictTypes||[]).includes(c.type))return false;
  if((m.restrictTerrs||[]).includes(c.terr))return false;
  if((m.restrictRoutes||[]).includes(c.route))return false;return true;};
function myClients(){return L('clients').filter(c=>c.active!==false&&allowedClient(c));}

/* мои визиты/заказы (облако+исходящие) */
function myVisits(d){return [...ST.outbox,...MYTX].filter(t=>t.type==='visit'&&(!d||(t.payload.date===d)));}
function myOrders(d){return [...ST.outbox,...MYTX].filter(t=>t.type==='order'&&(!d||(t.payload.date===d)));}
function visitedToday(cid){return myVisits(today()).some(t=>t.payload.client===cid);}
function visitOf(cid){return myVisits(today()).find(t=>t.payload.client===cid);}

/* ---------- модалки ---------- */
function openM(html){$('#mbody').innerHTML=html;$('#mbg').classList.add('open');
  try{history.pushState({m:1},'');}catch(e){}}
function closeM(){$('#mbg').classList.remove('open');}
// аппаратная кнопка «Назад»: сначала закрыть открытое окно (не теряя черновик), потом вернуться по экранам
window.addEventListener('popstate',()=>{
  if($('#mbg').classList.contains('open')){closeM();return;}
  if(NAVH.length){VIEW=NAVH.pop();render();try{history.pushState({},'');}catch(e){}}
});

/* ---------- геолокация ---------- */
function geoStart(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(p=>{GEO=[p.coords.latitude,p.coords.longitude];},()=>{},{enableHighAccuracy:true});
  const iv=(RULES().location&&RULES().location.intervalMin||3)*60000;
  setInterval(()=>{navigator.geolocation.getCurrentPosition(p=>{GEO=[p.coords.latitude,p.coords.longitude];},()=>{});},iv);
}
function distKm(a,b){if(!a||!b)return null;const R=6371,dl=(b[0]-a[0])*Math.PI/180,dg=(b[1]-a[1])*Math.PI/180;
  const x=Math.sin(dl/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dg/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}

  if(PINBUF.length>=4)return;PINBUF+=d;
  if(PINBUF.length===4){

    return 'https://checkout.paycom.uz/'+btoa('m='+m+';ac.order_id='+ref+';a='+Math.round(amount*100));}

    return 'https://my.click.uz/services/pay?service_id='+encodeURIComponent(c.service)+'&merchant_id='+encodeURIComponent(c.merchant)+'&amount='+amount+'&transaction_param='+encodeURIComponent(ref);}

  box.innerHTML=`<div class="card" style="text-align:center;padding:14px">

function dvCalc(oid){const o=(DATA.orders||[]).find(x=>x.id===oid);if(!o)return;
  const dep=clientDeposit(o.client);
  const ret=+($('#dv_ret')?.value)||0;
  const cash=+($('#dv_cash')?.value)||0;
  // покрытие нового заказа = деньги + депозит + возврат(в зачёт)
  const covered=cash+dep+ret;
  const balance=covered-o.total;   // >0 излишек -> депозит, <0 остаток -> долг
  const res=$('#dv_res'),hint=$('#dv_hint');
  if(res){
    if(balance>0){res.textContent='депозит +'+money(balance);res.style.color='var(--green)';}
    else if(balance<0){res.textContent='долг '+money(-balance);res.style.color='var(--red)';}
    else{res.textContent='0 — закрыто';res.style.color='var(--green)';}
  }
  if(hint)hint.textContent=`Заказ ${money(o.total)} = деньги ${money(cash)}${dep>0?' + депозит '+money(dep):''}${ret>0?' + возврат '+money(ret):''}`;
}
function confirmDeliver(oid){
  const o=(DATA.orders||[]).find(x=>x.id===oid);if(!o)return;const c=cli(o.client);
  const dep=clientDeposit(o.client);
  const ret=+($('#dv_ret')?.value)||0;
  const cash=+($('#dv_cash')?.value)||0;
  const m=$('#dv_m').value;
  let returnTxId='';
  // если был возврат деньгами — оформляем отдельной return-операцией (товар на склад возврата, долг вниз)
  if(ret>0){returnTxId=uid('r');
    txSend('return',{id:returnTxId,client:o.client,agent:me().id,date:today(),at:now(),type:'expired',
      items:[],amount:ret,orderId:'',orderDate:'',viaDelivery:true});}
  const p={id:uid('o'),deliverOf:oid,client:o.client,agent:me().id,date:today(),at:now(),
    orderTotal:o.total,cash,deposit:dep,returnAmt:ret,returnTxId,method:m,items:o.items||[]};
  txSend('deliver',p);
  // локально: заказ доставлен, баланс пересчитан
  // долг>0, депозит<0. Возврат и деньги уменьшают долг, новый заказ увеличивает.
  o.status='delivered';o.deliveredAt=now();
  if(c){c.debt=(c.debt||0)+o.total-ret-cash;}
  if(VISIT&&VISIT.client===o.client)VISIT.actions.push('order');
  closeM();render();toast('Доставлено: '+o.number);
}

  ${clients.length?clients.map(c=>{
    const v=visitedToday(c.id);const d=GEO&&c.lat?distKm(GEO,[c.lat,c.lng]):null;
    return `<div class="card" onclick="clientCard('${c.id}')">

}

function ncPhoto(inp){const f=inp.files&&inp.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{const img=new Image();img.onload=()=>{const max=500;let w=img.width,h=img.height;

    const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);

/* карта для отметки точки */
function initPickMap(){
  const key=(DATA.integrationsPublic&&DATA.integrationsPublic.yandex&&DATA.integrationsPublic.yandex.apikey)||'';
  const run=()=>ymaps.ready(()=>{
    const el=document.getElementById('pickmap');if(!el)return;
    if(NCPICK){try{NCPICK.destroy();}catch(e){}}
    const c=NCGEO||GEO||[41.311,69.279];
    NCPICK=new ymaps.Map('pickmap',{center:c,zoom:NCGEO?17:13,controls:['zoomControl']});
    let mk=null;
    const setPt=(coords)=>{NCGEO=coords;
      if($('#nc_coords'))$('#nc_coords').textContent='📍 '+coords[0].toFixed(5)+', '+coords[1].toFixed(5);
      if(mk)mk.geometry.setCoordinates(coords);
      else{mk=new ymaps.Placemark(coords,{},{preset:'islands#redDotIcon',draggable:true});
        mk.events.add('dragend',()=>{NCGEO=mk.geometry.getCoordinates();ncDraft();
          if($('#nc_coords'))$('#nc_coords').textContent='📍 '+NCGEO[0].toFixed(5)+', '+NCGEO[1].toFixed(5);});
        NCPICK.geoObjects.add(mk);}ncDraft();};
    if(NCGEO)setPt(NCGEO);
    NCPICK.events.add('click',e=>setPt(e.get('coords')));
    NCPICK._setPt=setPt;
  });
  if(window.ymaps&&window.ymaps.Map)run();
  else if(!window._ymload){window._ymload=1;const sc=document.createElement('script');
    sc.src='https://api-maps.yandex.ru/2.1/?lang=ru_RU'+(key?'&apikey='+encodeURIComponent(key):'');
    sc.onload=run;document.head.appendChild(sc);}
  else{const wait=setInterval(()=>{if(window.ymaps&&window.ymaps.Map){clearInterval(wait);run();}},300);}
}
/* кнопка «Точнее» — берём текущую точную геопозицию телефона */
function ncLocate(){
  if(!navigator.geolocation){toast('GPS недоступен');return;}
  toast('🎯 '+T('moreAcc')+'…');
  navigator.geolocation.getCurrentPosition(p=>{
    const c=[p.coords.latitude,p.coords.longitude];GEO=c;
    if(NCPICK&&NCPICK._setPt){NCPICK._setPt(c);NCPICK.setCenter(c,17);}
    else{NCGEO=c;if($('#nc_coords'))$('#nc_coords').textContent='📍 '+c[0].toFixed(5)+', '+c[1].toFixed(5);}
    ncDraft();
  },()=>toast('Не удалось определить геопозицию'),{enableHighAccuracy:true,timeout:10000,maximumAge:0});
}

function sendOrder(total){
  const cid=$('#oc').value;if(!cid){toast(T('client')+' *');return;}
  const m=$('#om').value;const cons=RULES().consignment||{};
  let consignTerm=null,note='';
  if(m==='consign'){

    const maxD=cons.maxDays||10;
    if(consignTerm<1||((consignTerm>maxD)&&!excl('consignment'))){toast(T('consignDays')+' ≤ '+maxD);return;}
    if(cons.requireComment){note=($('#occ')?.value||'').trim();if(!note){toast(T('consignComment'));return;}}
  }
  const items=Object.entries(CART).map(([pid,q])=>({p:pid,q,price:prod(pid)?.price||0}));
  const p={id:uid('o'),number:'MB-'+Date.now().toString().slice(-6),client:cid,agent:me().id,
    terr:cli(cid)?.terr||'',route:cli(cid)?.route||'',date:today(),createdAt:now(),status:'new',
    method:m==='consign'?'debt':m,payType:m==='consign'?'consignment':'onsite',consignTerm,consignNote:note,
    items,total,paid:0,deliveryMethod:'delivery',source:'mobile'};
  txSend('order',p);
  if(VISIT&&VISIT.client===cid)VISIT.actions.push('order');
  CART={};ORDCLI=null;closeM();go('dash');

  const rd=RULES().returnDays||{};const maxD=rd.maxDays||8;
  openM(`<h2>${T('ret')} — ${esc(cli(cid)?.name||'')}</h2>
    <div class="field"><label>${T('retType')}</label><select id="rt"><option value="shelf">${T('shelf')}</option><option value="exchange">${T('exch')}</option><option value="expired">${T('expired')}</option></select></div>
    ${byOrder?`<div class="field"><label>${T('byOrder')} *</label><select id="ro">${ords.length?ords.map(o=>{
      const old=rd.enabled&&!excl('returnDays')&&o.date<addDays(today(),-(maxD-1));
      return `<option value="${o.id}|${o.date}" ${old?'disabled':''}>${o.number||o.id} · ${o.date}${old?' · >'+maxD+' дн':''}</option>`}).join(''):`<option value="">${T('pickOrder')} —</option>`}</select></div>`:''}
    <div id="ritems">${L('products').filter(allowedProd).slice(0,80).map(p=>`<div class="row"><span>${esc(p.name)}<div class="hint">${money(p.cost||p.price)}</div></span>
      <input class="qty" type="number" min="0" placeholder="0" data-rp="${p.id}"></div>`).join('')}</div>
    <button class="btn primary" style="margin-top:10px" onclick="sendReturn('${cid}',${byOrder})">${T('send')}</button>`);
}
function sendReturn(cid,byOrder){
  const items=[...document.querySelectorAll('[data-rp]')].map(e=>({p:e.dataset.rp,q:Math.floor(+e.value||0)})).filter(i=>i.q>0);
  if(!items.length){toast('0');return;}
  let orderId='',orderDate='';
  if(byOrder){const ro=$('#ro');if(!ro||!ro.value){toast(T('pickOrder'));return;}[orderId,orderDate]=ro.value.split('|');}
  const amount=items.reduce((s,i)=>s+i.q*(prod(i.p)?.cost||prod(i.p)?.price||0),0);
  const p={id:uid('r'),client:cid,agent:me().id,date:today(),at:now(),type:$('#rt').value,items,amount,orderId,orderDate,source:'mobile'};
  txSend('return',p);
  if(VISIT&&VISIT.client===cid)VISIT.actions.push('return');
  closeM();
}

/* ---------- ОТГРУЗКИ ---------- */
function vShips(){
  const m=me();
  const sh=(DATA.shipments||[]).filter(s=>!s.courier||s.courier===m.id||m.role==='supervisor'||m.role==='manager'||m.role==='admin'||m.role==='operator');
  const ords=DATA.orders||[];
  const ST2={created:[T('pending'),'blue'],transit:[T('pending'),'amber'],done:['✓','green']};
  $('#page').innerHTML=`<h3 style="margin-bottom:10px">${T('ships')}</h3>
  ${sh.length?sh.slice().reverse().map(s=>{
    const os=(s.orders||[]).map(id=>ords.find(o=>o.id===id)).filter(Boolean);
    const del=os.filter(o=>o.status==='delivered').length,can=os.filter(o=>o.status==='canceled').length;
    const sum=os.reduce((a,o)=>a+o.total,0);const st=ST2[s.status]||['—','gray'];
    return `<div class="card"><div class="row" style="border:none;padding:0 0 8px"><b>${esc(s.number)}</b><span class="pill ${st[1]}">${st[0]}</span></div>
      <div class="hint">${esc(s.date)} · 🚚 ${esc(s.transport||'')} · ${os.length} ${T('order').toLowerCase()} · ${money(sum)}</div>
      <div style="margin-top:7px"><span class="pill green">✅ ${del}</span> <span class="pill red">❌ ${can}</span> <span class="pill gray">⏳ ${os.length-del-can}</span></div>
      <div style="margin-top:8px">${os.map(o=>{const c=(DATA.clients||[]).find(x=>x.id===o.client);
        const op=o.status==='delivered'?'green':o.status==='canceled'?'red':'amber';
        return `<div class="row"><span>${esc(o.number)} ${esc(c?.name||'')}</span><span class="pill ${op}">${o.status==='delivered'?T('del'):o.status==='canceled'?T('canc'):T('pending')}</span></div>`}).join('')}</div>
    </div>`}).join(''):`<div class="empty">${T('noData')}</div>`}`;
}

/* ---------- МОИ ЗАКАЗЫ / ИСТОРИЯ ---------- */

let HQ='',HD='';
function vHistory(){
  let list=[...ST.outbox.map(x=>({...x,pending:true})),...MYTX];
  if(HD)list=list.filter(t=>(t.payload.date||'').startsWith(HD));
  if(HQ){const q=HQ.toLowerCase();list=list.filter(t=>{const c=cli(t.payload.client);return c&&(c.name||'').toLowerCase().includes(q);});}
  const TN={order:T('order'),visit:'Визит',return:T('ret'),client:T('client')};
  $('#page').innerHTML=`<h3 style="margin-bottom:10px">${T('history')}</h3>
  <div class="search"><input type="date" value="${HD}" onchange="HD=this.value;vHistory()" style="flex:0 0 46%">
    <input placeholder="🔍" value="${esc(HQ)}" oninput="HQ=this.value;vHistory()"></div>
  ${list.slice(0,150).map(t=>{const c=cli(t.payload.client);
    return `<div class="card"><div class="row" style="border:none;padding:0">
      <div><b>${TN[t.type]||t.type}</b> · ${esc(c?.name||'')}
        <div class="hint">${esc((t.payload.at||t.payload.createdAt||t.payload.date||'').replace('T',' '))}</div></div>
      <div style="text-align:right">${t.payload.total?'<b>'+money(t.payload.total)+'</b>':t.payload.amount?'<b>'+money(t.payload.amount)+'</b>':''}
        ${t.pending?`<div class="pill amber">${T('pend')}</div>`:''}</div></div></div>`}).join('')||`<div class="empty">—</div>`}`;
}

/* ---------- KPI ---------- */
function vKpi(){
  const m=me();const mon=today().slice(0,7);
  const ords=myOrders().map(t=>t.payload).filter(o=>(o.date||'').startsWith(mon));
  const adminOrds=(DATA.orders||[]).filter(o=>o.agent===m.id&&(o.date||'').startsWith(mon));
  const all=[...ords,...adminOrds.filter(a=>!ords.some(o=>o.id===a.id))];
  const sum=all.reduce((s,o)=>s+o.total,0);
  const vis=[...MYTX,...ST.outbox].filter(t=>t.type==='visit'&&(t.payload.date||'').startsWith(mon)).length;
  const rules=(DATA.kpis||[]).filter(k=>k.active!==false&&(k.applyTo==='all'||k.applyTo===m.role));
  let bonus=0;const lines=rules.map(k=>{let v=0;
    if(k.type==='fixed')v=k.rate;
    else if(k.type==='sum')v=sum*k.rate/100;
    else if(k.type==='visit')v=vis*k.rate;
    else if(k.type==='qty')v=all.reduce((s,o)=>s+(o.items||[]).reduce((a,i)=>a+i.q,0),0)*k.rate;
    else if(k.type==='newClient')v=[...MYTX,...ST.outbox].filter(t=>t.type==='client'&&(t.payload.created||'').startsWith(mon)).length*k.rate;
    bonus+=v;return {n:k.name,v};});
  $('#page').innerHTML=`<h3 style="margin-bottom:10px">${T('kpi')} · ${mon}</h3>
  <div class="kgrid">
    <div class="kpi"><div class="l">${T('sum')}</div><div class="v" style="font-size:16px">${money(sum)}</div></div>
    <div class="kpi"><div class="l">${T('visitsToday').split(' ')[0]}</div><div class="v">${vis}</div></div>
  </div>
  <div class="card">${lines.length?lines.map(l=>`<div class="row"><span>${esc(l.n)}</span><b>${money(l.v)}</b></div>`).join(''):`<div class="empty">${T('noData')}</div>`}
    <div class="row"><b>${T('total')}</b><b style="color:var(--green)">${money(bonus)}</b></div></div>
  <div class="hint">Прогноз по правилам KPI из админ-панели. Точный расчёт делает администратор.</div>`;
}

/* ---------- КАРТА ---------- */
function vMap(){
  $('#page').innerHTML=`<h3 style="margin-bottom:10px">${T('map')}</h3><div id="map"></div>
  <div class="hint" style="margin-top:8px">🟢 ${T('visited')} · ⚪ ${T('notVisited')} · нажмите точку → ${T('route')}</div>`;
  const key=(DATA.integrationsPublic&&DATA.integrationsPublic.yandex&&DATA.integrationsPublic.yandex.apikey)||'';
  if(!window.ymaps&&!window._ymload){window._ymload=1;
    const s=document.createElement('script');s.src='https://api-maps.yandex.ru/2.1/?lang=ru_RU'+(key?'&apikey='+encodeURIComponent(key):'');
    s.onload=()=>ymaps.ready(drawMobMap);document.head.appendChild(s);}
  else if(window.ymaps)ymaps.ready(drawMobMap);
}
let MMAP=null;
function drawMobMap(){
  const el=document.getElementById('map');if(!el)return;
  if(MMAP){try{MMAP.destroy();}catch(e){}}
  MMAP=new ymaps.Map('map',{center:GEO||[41.31,69.25],zoom:12,controls:['zoomControl','geolocationControl']});
  myClients().filter(c=>c.lat).forEach(c=>{
    const v=visitedToday(c.id);
    const pm=new ymaps.Placemark([c.lat,c.lng],{balloonContentHeader:esc(c.name),
      balloonContentBody:`${esc(c.addr||'')}<br><a href="https://yandex.ru/maps/?rtext=~${c.lat}%2C${c.lng}&rtt=auto" target="_blank">🧭 ${T('route')}</a>`,
      hintContent:esc(c.name)},{preset:v?'islands#darkGreenCircleDotIcon':'islands#grayCircleDotIcon'});
    MMAP.geoObjects.add(pm);});
}

/* расходы доставщика: фиксированные категории; «свои» идут в зарплату */
const EXP_CATS=[
  {cat:'Авто',sub:'Топливо',salary:false},
  {cat:'Авто',sub:'Стоянка',salary:false},
  {cat:'Авто',sub:'Мойка / ремонт',salary:false},
  {cat:'Свои расходы',sub:'Личные (в счёт зарплаты)',salary:true}
];
function expenseForm(){
  openM(`<h2>${T('expense')}</h2>
    <div class="field"><label>${T('expCat')}</label><select id="ex_c">${EXP_CATS.map((e,i)=>`<option value="${i}">${e.cat} · ${e.sub}</option>`).join('')}</select></div>
    <div class="field"><label>${T('sum')}</label><input id="ex_a" type="number" placeholder="0"></div>
    <div class="field"><label>${T('comment')}</label><input id="ex_n" placeholder="—"></div>
    <button class="btn primary" onclick="sendExpense()">${T('send')}</button>`);
}
function sendExpense(){
  const i=+$('#ex_c').value;const e=EXP_CATS[i];const a=+$('#ex_a').value||0;
  if(a<=0){toast(T('sum'));return;}
  const p={id:uid('x'),agent:me().id,date:today(),at:now(),cat:e.cat,sub:e.sub,salary:e.salary,amount:a,note:($('#ex_n')?.value||'').trim()};
  txSend('expense',p);
  closeM();
}

/* ---------- синхронизация ---------- */
async function syncAll(loud){
  try{await kvLoad();await txLoadMine();await flushOutbox();if(loud)toast('✓');}catch(e){if(loud)toast('Ошибка сети');}
  closeM();render();
}

/* ---------- старт ---------- */
(function init(){
  try{DATA=JSON.parse(localStorage.getItem('halwaa_mob_data')||'{}');}catch(e){DATA={};}
  try{MYTX=JSON.parse(localStorage.getItem('halwaa_mob_tx')||'[]');}catch(e){MYTX=[];}
  ST.pinOk=false;
  render();
  geoStart();
  if(sbOk()){kvLoad().then(()=>{txLoadMine();flushOutbox();render();}).catch(()=>{});}
  setInterval(()=>{if(me())flushOutbox();},60000);
  // живая связь с админкой: данные и правила обновляются сами
  setInterval(()=>{if(sbOk()&&me()&&!$('#mbg').classList.contains('open')&&!VISIT){
    kvLoad().then(()=>{txLoadMine();render();}).catch(()=>{});}},30000);
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&sbOk()&&me()){
    kvLoad().then(()=>{txLoadMine();flushOutbox();if(!$('#mbg').classList.contains('open')&&!VISIT)render();}).catch(()=>{});}});
})();
</script>

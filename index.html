function visitStatus(v){ // green: действие; orange: посетил без действий; red: отказ; blue: сейчас посещает
  if(v.live)return 'live';
  if(v.result==='refusal'||v.refusal)return 'refusal';
  if(v.result==='order'||v.result==='payment'||v.result==='return')return 'action';
  return 'noaction';
}
const VST={action:{color:'#1F4D3A',preset:'islands#darkGreenCircleDotIcon',label:'сделал действие'},
  noaction:{color:'#C97B1E',preset:'islands#orangeCircleDotIcon',label:'посетил, без действий'},
  refusal:{color:'#B23A33',preset:'islands#redCircleDotIcon',label:'отказ'},
  live:{color:'#2F6690',preset:'islands#blueCircleDotIcon',label:'сейчас посещает'},
  none:{color:'#2b2b2b',preset:'islands#blackCircleDotIcon',label:'не посещено (по маршруту)'}};
function actLabel(v){if(v.result==='order')return 'заказ оформлен';if(v.result==='payment')return 'оплата принята';
  if(v.result==='return')return 'возврат оформлен';if(v.result==='refusal'||v.refusal)return 'отказ'+(v.refusal?': '+esc(v.refusal):'');
  return 'без действий';}
function drawMap(){
  if(!MAP||!window.ymaps)return;MAP.geoObjects.removeAll();mapMarkers={};
  const date=mapFilt.date;
  let agents=DB.employees.filter(e=>e.role!=='admin');
  if(mapFilt.role!=='all')agents=agents.filter(e=>e.role===mapFilt.role);
  if(mapFilt.emp!=='all')agents=agents.filter(e=>e.id===mapFilt.emp);
  const agentIds=new Set(agents.map(a=>a.id));
  // какие клиенты показываем
  let clients=DB.clients.filter(c=>c.lat);
  if(mapFilt.terr!=='all')clients=clients.filter(c=>c.terr===mapFilt.terr);
  if(mapFilt.route!=='all')clients=clients.filter(c=>c.route===mapFilt.route);
  if(mapFilt.emp!=='all')clients=clients.filter(c=>c.agent===mapFilt.emp);
  // визиты за дату
  let vis=DB.visits.filter(v=>v.date===date&&agentIds.has(v.agent)&&cli(v.client));
  if(mapFilt.terr!=='all')vis=vis.filter(v=>cli(v.client).terr===mapFilt.terr);
  if(mapFilt.route!=='all')vis=vis.filter(v=>cli(v.client).route===mapFilt.route);
  const visByClient={};vis.forEach(v=>{visByClient[v.client]=v;});
  // маршрут дня: дни на латинице -> dow; не посещено = клиент маршрута этого дня без визита
  const dow=(new Date(date+'T12:00').getDay()+6)%7+1; // 1=Пн..7=Вс
  const todaysRoutes=new Set(DB.routes.filter(r=>r.dow===dow).map(r=>r.id));
  // в режиме «по маршрутам» показываем точки маршрутов дня + визиты; «по клиентам» — всех клиентов
  let baseClients=clients;
  if(mapFilt.mode==='routes')baseClients=clients.filter(c=>todaysRoutes.has(c.route)||visByClient[c.id]);
  const pts=[];
  baseClients.forEach(c=>{
    const v=visByClient[c.id];
    const st=v?visitStatus(v):'none';
    const cfg=VST[st];
    const timeStr=v&&v.at?(v.at.split('T')[1]||''):'';
    const hint=`${esc(c.name)}${v?` · ${timeStr} · ${actLabel(v)}`:' · не посещено'}`;
    const body=v?`Время: <b>${timeStr}</b><br>Действие: <b>${actLabel(v)}</b><br>Сотрудник: ${esc(emp(v.agent)?.name||'—')}<br>${esc(route(c.route)?.name||'')}${c.debt>0?'<br>Долг: '+money(c.debt):''}`
      :`Не посещено (по маршруту)<br>${esc(route(c.route)?.name||'')} · ${esc(emp(c.agent)?.name||'—')}${c.debt>0?'<br>Долг: '+money(c.debt):''}`;
    const pm=new ymaps.Placemark([c.lat,c.lng],
      {balloonContentHeader:esc(c.name),balloonContentBody:body,hintContent:hint},
      {preset:cfg.preset});
    MAP.geoObjects.add(pm);mapMarkers[c.id]=pm;pts.push([c.lat,c.lng]);
  });
  // линия маршрута по времени для одного сотрудника
  if(mapFilt.emp!=='all'){
    const seq=vis.slice().sort((a,b)=>String(a.at).localeCompare(String(b.at)));
    if(seq.length>1){const line=new ymaps.Polyline(seq.map(v=>[cli(v.client).lat,cli(v.client).lng]),{},{strokeColor:'#C9A227',strokeWidth:3,strokeOpacity:.8});MAP.geoObjects.add(line);}
    // РЕАЛЬНЫЙ GPS-ТРЕК агента за день (где физически был)
    const trk=(DB.tracks&&DB.tracks['trk_'+mapFilt.emp+'_'+date]);
    if(trk&&trk.points&&trk.points.length>1){
      const tline=new ymaps.Polyline(trk.points.map(pt=>[pt.lat,pt.lng]),
        {balloonContent:'GPS-трек: '+trk.count+' точек, '+(trk.firstAt?trk.firstAt.split("T")[1].slice(0,5):'')+'–'+(trk.lastAt?trk.lastAt.split("T")[1].slice(0,5):'')},
        {strokeColor:'#2F6690',strokeWidth:4,strokeOpacity:.55,strokeStyle:'shortdash'});
      MAP.geoObjects.add(tline);
      // старт и финиш
      MAP.geoObjects.add(new ymaps.Placemark(trk.points[0]&&[trk.points[0].lat,trk.points[0].lng],{hintContent:'Старт '+(trk.firstAt?trk.firstAt.split("T")[1].slice(0,5):'')},{preset:'islands#greenDotIcon'}));
      const lp=trk.points[trk.points.length-1];
      MAP.geoObjects.add(new ymaps.Placemark([lp.lat,lp.lng],{hintContent:'Последняя точка '+(trk.lastAt?trk.lastAt.split("T")[1].slice(0,5):'')},{preset:'islands#blueDotIcon'}));
    }
  }
  const tSel=mapFilt.terr!=='all'?terr(mapFilt.terr):null;
  if(tSel&&tSel.center){MAP.setCenter(tSel.center,13);}
  else{try{const b=MAP.geoObjects.getBounds();if(b)MAP.setBounds(b,{checkZoomRange:true,zoomMargin:35});}catch(e){}}
}
function mapFind(){const q=($('#mf_q')?.value||'').trim().toLowerCase();if(!q||!MAP)return;
  const c=DB.clients.find(c=>c.lat&&c.name.toLowerCase().includes(q));

function sbCfg(){const c=(DB.integrations||{}).supabase||{};if(!(c.url&&c.key))return null;
  let u=String(c.url).replace(/\s+/g,'');u=u.replace(/\/rest\/v1\/?$/,'');u=u.replace(/\/+$/,'');
  return {url:u,key:String(c.key).trim()};}
function sbHead(c){return {'apikey':c.key,'Authorization':'Bearer '+c.key,'Content-Type':'application/json'};}
function cloudSt(msg,ok){const e=$('#cloud_st');if(e){e.innerHTML=msg;e.style.color=ok===false?'var(--red)':ok?'var(--green)':'';}}
async function cloudPushCore(){const c=sbCfg();if(!c)throw new Error('нет настроек');
  const KEYS=['profile','employees','clients','suppliers','products','categories','units','clientTypes','territories','routes','refusals','expenseCats','transport','rules','kpis','rolePerms','warehouses','shipments','orders','integrationsPublic','control','violations','notifications'];
  const rows=KEYS.map(k=>({key:k,value:k==='integrationsPublic'?{yandex:DB.integrations.yandex,click:DB.integrations.click,payme:DB.integrations.payme,videos:DB.integrations.videos||[]}:(k==='profile'?{company:DB.profile.company,phone:DB.profile.phone||''}:DB[k]),updated_at:new Date().toISOString()}));
  const r=await fetch(c.url+'/rest/v1/crm_kv',{method:'POST',headers:{...sbHead(c),'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(rows)});
  if(!r.ok)throw new Error('HTTP '+r.status+': '+(await r.text()).slice(0,120));
  window._cloudDirty=false;DB._lastPush=nowTashkent();try{localStorage.setItem(DB_KEY,JSON.stringify(DB));}catch(e){}
  return KEYS.length;}
async function cloudPush(){if(!sbCfg()){toast('Заполните URL и ключ Supabase');return;}
  cloudSt('Выгрузка…');
  try{const n=await cloudPushCore();
    cloudSt('✅ Выгружено ('+n+' разделов). Телефоны видят данные. Автосинхронизация включена — дальше выгружается само.',true);toast('Выгружено в облако');
  }catch(e){cloudSt('Ошибка: '+esc(e.message)+'. Проверь URL/ключ и что выполнен supabase.sql.',false);}}
async function cloudPullCore(){const c=sbCfg();if(!c)throw new Error('нет настроек');
  const r=await fetch(c.url+'/rest/v1/crm_tx?select=*&order=created_at.asc',{headers:sbHead(c)});
  if(!r.ok)throw new Error('HTTP '+r.status);
  const txs=await r.json();let nOrd=0,nVis=0,nRet=0,nCli=0,nDel=0,nExp=0;
  txs.forEach(t=>{const p=t.payload||{};
    if(t.type==='order'&&!DB.orders.some(o=>o.id===t.id)){
      const o={id:t.id,...p};DB.orders.push(o);
      (o.items||[]).forEach(i=>{const pr=prod(i.p);if(pr){pr.stock=Math.max(0,(pr.stock||0)-i.q);pr.stockBy=pr.stockBy||{};pr.stockBy.w_main=Math.max(0,(pr.stockBy.w_main!==undefined?pr.stockBy.w_main:pr.stock+i.q)-i.q);}});
      nOrd++;}
    if(t.type==='visit'&&!DB.visits.some(v=>v.id===t.id)){DB.visits.push({id:t.id,...p});nVis++;}
    if(t.type==='return'&&!DB.returns.some(v=>v.id===t.id)){DB.returns.push({id:t.id,...p});
      (p.items||[]).forEach(i=>{const pr=prod(i.p);if(pr){pr.stockBy=pr.stockBy||{};pr.stockBy.w_ret=(pr.stockBy.w_ret||0)+i.q;}});
      // возврат уменьшает долг клиента / создаёт депозит
      const c=cli(p.client);if(c&&p.amount)c.debt=(c.debt||0)-p.amount;nRet++;}
    if(t.type==='client'&&!DB.clients.some(x=>x.id===t.id)){DB.clients.push({id:t.id,...p});nCli++;}
    // ДОСТАВКА с телефона: закрыть заказ, провести деньги, новый заказ в долг
    if(t.type==='deliver'&&!(DB._delivered||[]).includes(t.id)){
      const src=DB.orders.find(o=>o.id===p.deliverOf);const c=cli(p.client);
      if(src){src.status='delivered';src.deliveredAt=p.at||nowTashkent();
        if(p.returnAmt)src.shelfReturn=(src.shelfReturn||0)+p.returnAmt;}  // возврат с полки → в заказ для отчёта по продажам
      if(p.cash>0)DB.payments.push({id:t.id,client:p.client,order:p.deliverOf,amount:p.cash,method:p.method||'cash',employee:p.agent||'',date:p.at||nowTashkent(),allocations:[{order:p.deliverOf,amount:p.cash}]});
      if(c){c.debt=(c.debt||0)+(p.orderTotal||0)-(p.cash||0);}
      DB._delivered=DB._delivered||[];DB._delivered.push(t.id);
      nDel++;}
    // РАСХОД доставщика
    if(t.type==='expense'&&!(DB.expenses||[]).some(x=>x.id===t.id)){
      DB.expenses=DB.expenses||[];
      let catId='';const exC=(DB.expenseCats||[]).find(c=>c.name===p.cat);
      if(exC)catId=exC.id;else{catId=uid('ec');DB.expenseCats.push({id:catId,name:p.cat});}
      DB.expenses.push({id:t.id,cat:catId,amount:p.amount,note:(p.sub||'')+(p.note?' · '+p.note:''),employee:p.agent||'',transport:'',date:p.at||nowTashkent(),salary:!!p.salary});
      // «свои расходы» → в зарплату сотрудника (как удержание/выплата)
      if(p.salary){const e=emp(p.agent);if(e){e.salaryAdj=(e.salaryAdj||0)+p.amount;}}
      nExp++;}
    // GPS-трек агента за день (обновляется, не плодит дубли)
    if(t.type==='track'){
      DB.tracks=DB.tracks||{};DB.tracks[p.id]={agent:p.agent,date:p.date,points:p.points||[],firstAt:p.firstAt,lastAt:p.lastAt,count:p.count};
    }
    // напоминание агента по точке
    if(t.type==='note'&&!(DB.notes||[]).some(x=>x.id===t.id)){
      DB.notes=DB.notes||[];DB.notes.push({id:t.id,client:p.client,agent:p.agent,date:p.date,at:p.at,text:p.text});
    }
    // супервайзер прочитал уведомления
    if(t.type==='notifread'){
      (DB.notifications||[]).forEach(n=>{if(n.to===p.sup)n.read=true;});
    }
  });
  const total=nOrd+nVis+nRet+nCli+nDel+nExp;
  if(total>0){logAct('Заявки','Облако: загружено с телефонов','заказы '+nOrd+', визиты '+nVis+', возвраты '+nRet+', клиенты '+nCli+', доставки '+nDel+', расходы '+nExp);saveDB();}
  return {nOrd,nVis,nRet,nCli,nDel,nExp,total};}

function setGeo(){
  const q=(GEOQ||'').toLowerCase();
  let terrs=DB.territories;
  if(q)terrs=terrs.filter(t=>t.name.toLowerCase().includes(q)||DB.routes.some(r=>r.terr===t.id&&r.name.toLowerCase().includes(q)));
  $('#content').innerHTML=setBar()+`
  <div class="between" style="margin-bottom:12px"><div><b style="font-size:16px">Территории и маршруты</b>
    <div class="hint">У каждой территории автоматически создаются 7 маршрутов по дням недели. Название можно менять, день — нет.</div></div>
    <button class="btn primary" onclick="editTerritory()">${I.plus} Территория</button></div>
  <div class="tablewrap" style="margin-bottom:12px"><div class="tabletop">
    <div class="filt" style="flex:1"><input placeholder="🔍 Поиск по названию территории или маршрута" value="${esc(GEOQ||'')}" oninput="GEOQ=this.value;setGeo()"></div>
    <span class="hint">${terrs.length} территорий</span></div></div>
  ${terrs.length?terrs.map(t=>{let rs=DB.routes.filter(r=>r.terr===t.id).sort((a,b)=>(a.dow||0)-(b.dow||0));
    if(q&&!t.name.toLowerCase().includes(q))rs=rs.filter(r=>r.name.toLowerCase().includes(q));return `
    <div class="card" style="margin-bottom:12px"><div class="between" style="margin-bottom:10px">
      <b>${esc(t.name)}</b><div><button class="btn ghost" style="padding:5px 10px" onclick="editTerritory('${t.id}')">Изменить</button>
      <button class="btn danger" style="padding:5px 10px;margin-left:6px" onclick="delTerritory('${t.id}')">Удалить</button></div></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">${rs.map(r=>`<div class="chip" style="cursor:default">
        <b>${esc(r.name)}</b>
        <button onclick="editRoute('${r.id}')" title="Изменить / отметить на карте">✎</button></div>`).join('')||'<span class="hint">Маршрутов нет</span>'}</div>
    </div>`}).join(''):'<div class="card"><div class="empty">'+(q?'Ничего не найдено':'Территорий нет. Добавьте первую — маршруты по дням создадутся автоматически.')+'</div></div>'}`;
}
let GEOQ='';
function editTerritory(id){const t=id?terr(id):null;TERRP={id:id||'',center:(t&&t.center)||null};
  openModal(`<h2>${id?'Изменить территорию':'Новая территория'}</h2>
    <div class="field"><label>Название территории / района</label><input id="t_name" value="${esc(t?t.name:'')}"></div>
    <div class="hint" style="margin-bottom:6px">Отметьте примерную область на карте (клик):</div>
    <div id="tmap" class="pickmap"></div>
    <div class="hint" id="tmap_coords">${(t&&t.center)?'Отмечено: '+t.center[0].toFixed(4)+', '+t.center[1].toFixed(4):'Не отмечено'}</div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="saveTerritory()">Сохранить</button></div>
    ${id?`<button class="btn danger" style="width:100%;margin-top:10px" onclick="delTerritory('${id}')">Удалить территорию</button>`:''}`);

function saveTerritory(){const name=$('#t_name').value.trim();if(!name){toast('Введите название');return;}
  if(TERRP.id){const t=terr(TERRP.id);t.name=name;t.center=TERRP.center;}
  else{const tid=uid('t');DB.territories.push({id:tid,name,center:TERRP.center});
    WEEKDAYS.forEach((d,i)=>DB.routes.push({id:uid('rt'),terr:tid,dow:i+1,day:d,name:'Marshrut '+d,center:null}));}
  logAct('Настройки','Территория: сохранена',name);saveDB();closeModal();renderContent();toast('Сохранено');}

function saveWarehouse(id){const name=$('#w_name').value.trim();if(!name){toast('Введите название');return;}
  const nm=name.toLowerCase();if(DB.warehouses.some(w=>w.id!==id&&(w.name||'').toLowerCase()===nm)){toast('Склад с таким названием уже есть');return;}
  if(id){const w=warehouse(id);w.name=name;if($('#w_note'))w.note=$('#w_note').value.trim();}
  else DB.warehouses.push({id:uid('w'),name,note:$('#w_note')?$('#w_note').value.trim():''});
  logAct('Настройки','Склад: '+(id?'переименован':'создан'),name);saveDB();closeModal();renderContent();toast('Склад сохранён');}
function delWarehouse(id){if(['w_main','w_ret','w_def'].includes(id)){toast('Системный склад нельзя удалить');return;}

function ruleSet(path,val){const p=path.split('.');let o=DB.rules;for(let i=0;i<p.length-1;i++)o=o[p[i]];o[p[p.length-1]]=val;saveDB();}
function openRuleExc(key){const ex=DB.rules[key].exceptions||[];const emps=DB.employees.filter(e=>e.role!=='admin');
  openModal(`<h2>Исключения для сотрудников</h2><div class="hint" style="margin-bottom:12px">Отмеченные сотрудники освобождаются от этого правила.</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">${emps.length?emps.map(e=>`<label class="chip" style="cursor:pointer;margin:0"><input type="checkbox" class="re_x" value="${e.id}" ${ex.includes(e.id)?'checked':''}> ${esc(e.name)} <span class="hint">(${ROLEMAP[e.role]})</span></label>`).join(''):'<span class="hint">Сначала добавьте сотрудников в «Участники».</span>'}</div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="saveRuleExc('${key}')">Сохранить</button></div>`);}
function saveRuleExc(key){DB.rules[key].exceptions=[...document.querySelectorAll('.re_x:checked')].map(x=>x.value);saveDB();closeModal();setRules();toast('Исключения сохранены');}

let auditCat='all';

  let list=(DB.audit||[]);

  if(auditCat!=='all')list=list.filter(a=>(a.cat||'Прочее')===auditCat);
  const pd=pageData('audit',list);
  $('#content').innerHTML=setBar()+`
  <div class="tablewrap"><div class="tabletop"><b>Журнал действий</b>
    <div class="filt"><label>Категория</label><select onchange="auditCat=this.value;PG.audit=1;setAudit()">
      <option value="all">Все</option>${cats.map(c=>`<option value="${esc(c)}" ${auditCat===c?'selected':''}>${esc(c)}</option>`).join('')}</select></div>
    <div class="grow"></div><span class="hint">${list.length} записей</span>
    <button class="btn ghost" onclick="exportTable('Журнал',auditRows())">${I.down} Excel</button></div>
    <table><thead><tr><th>Когда</th><th>Категория</th><th>Изменение</th><th>Объект</th></tr></thead>
    <tbody>${pd.slice.length?pd.slice.map(a=>`<tr><td>${fmtDT(a.at)}</td><td><span class="pill gold">${esc(a.cat||'Прочее')}</span></td><td><b>${esc(a.action)}</b></td><td>${esc(String(a.obj||''))}</td></tr>`).join(''):'<tr><td colspan="4"><div class="empty">Журнал пуст</div></td></tr>'}</tbody></table>
  </div>`+pageBar(pd);
}
function auditRows(){const rows=[['Когда','Категория','Изменение','Объект']];
  (DB.audit||[]).filter(a=>auditCat==='all'||(a.cat||'Прочее')===auditCat).forEach(a=>rows.push([fmtDT(a.at),a.cat||'Прочее',a.action,String(a.obj||'')]));return rows;}

/* --- Роли и доступы (наблюдать / изменять по процессам) --- */
function rp(role){DB.rolePerms[role]=DB.rolePerms[role]||{};return DB.rolePerms[role];}
function setRoles(){
  const roles=Object.entries(ROLEMAP).filter(([k])=>k!=='admin');
  const cur=rolePick;
  $('#content').innerHTML=setBar()+`
  <div class="card" style="margin-bottom:12px"><div class="hint">Админ имеет полный доступ. Для остальных ролей отметьте, что можно <b>наблюдать</b> и что можно <b>изменять</b> по каждому процессу.</div></div>
  <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">${roles.map(([k,l])=>`<button class="pill ${cur===k?'green':'gray'}" style="padding:8px 14px" onclick="rolePick='${k}';setRoles()">${l}</button>`).join('')}</div>
  <div class="tablewrap"><div class="tabletop"><b>${ROLEMAP[cur]}</b><div class="grow"></div>
    <button class="btn ghost" onclick="rolesAll('${cur}','v')">Всё наблюдать</button>
    <button class="btn ghost" onclick="rolesAll('${cur}','clear')">Снять всё</button></div>
    <table><thead><tr><th>Процесс</th><th style="text-align:center">Наблюдать</th><th style="text-align:center">Изменять</th></tr></thead>
    <tbody>${[...new Set(PROCESSES.map(p=>p.g))].map(g=>`
      <tr><td colspan="3" style="background:#F4EFE2;font-weight:800;font-size:12.5px;color:var(--green)">${g}</td></tr>
      ${PROCESSES.filter(p=>p.g===g).map(p=>{const pp=rp(cur)[p.k]||{};return `<tr><td style="padding-left:24px">${esc(p.l)}</td>
        <td style="text-align:center"><input type="checkbox" ${pp.v?'checked':''} onchange="roleSet('${cur}','${p.k}','v',this.checked)"></td>
        <td style="text-align:center"><input type="checkbox" ${pp.e?'checked':''} onchange="roleSet('${cur}','${p.k}','e',this.checked)"></td></tr>`}).join('')}`).join('')}</tbody></table></div>`;
}
function roleSet(role,proc,field,val){const o=rp(role);o[proc]=o[proc]||{};o[proc][field]=val;if(field==='e'&&val)o[proc].v=true;saveDB();
  if(field==='e'&&val)setRoles();}
function rolesAll(role,mode){const o=rp(role);PROCESSES.forEach(p=>{o[p.k]=o[p.k]||{};if(mode==='v'){o[p.k].v=true;}else{o[p.k]={v:false,e:false};}});saveDB();setRoles();}

function listEditor(title,key,kind){
  return `<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <h3 style="margin:0;font-size:15px">${title}</h3><button class="btn ghost" style="padding:6px 11px" onclick="addList('${key}','${kind}')">${I.plus}</button></div>

      <button onclick="renameList('${key}','${x.id}')">✎</button>
      <button onclick="delList('${key}','${x.id}')" style="color:var(--red)">×</button></span>`).join('')||'<span class="hint">Пусто — добавьте первый</span>'}</div></div>`;
}
function addList(key,kind){const name=prompt('Название:');if(!name)return;
  const obj={id:uid(key.slice(0,2)),name:name.trim()};if(kind==='cat')obj.color=pick(['#C9A227','#1F4D3A','#2F6690','#C97B1E','#B23A33']);
  DB[key]=DB[key]||[];DB[key].push(obj);saveDB();renderContent();toast('Добавлено');}
function renameList(key,id){const o=DB[key].find(x=>x.id===id);const name=prompt('Название:',o.name);if(!name)return;o.name=name.trim();saveDB();renderContent();}
function delList(key,id){askCode(()=>{DB[key]=DB[key].filter(x=>x.id!==id);saveDB();renderContent();toast('Удалено');});}

function openProfile(focus){const p=DB.profile;
  openModal(`<h2>Профиль фирмы</h2>
    <div class="field"><label>Полное название фирмы</label><input id="f_company" value="${esc(p.company)}"></div>

    <div class="field"><label>Логин для входа</label><input id="f_login" value="${esc(p.login||'halwaauz')}"></div>
    <div class="field"><label>Новый пароль (оставьте пустым, чтобы не менять)</label><input id="f_pass" type="password" placeholder="••••"></div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Отмена</button>
      <button class="btn primary" onclick="saveProfile()">Сохранить</button></div>`);
  if(focus==='pass')setTimeout(()=>$('#f_pass').focus(),50);
}
function saveProfile(){const v=k=>$('#f_'+k).value.trim();
  DB.profile.company=v('company')||DB.profile.company;DB.profile.email=v('email');DB.profile.phone=v('phone');
  if(v('login'))DB.profile.login=v('login');
  if($('#f_pass').value)DB.profile.password=$('#f_pass').value;
  saveDB();closeModal();renderAcct();renderContent();toast('Профиль сохранён');}

/* =====================================================================
   EXCEL
   ===================================================================== */
function exportTable(name,rows){
  try{
    if(window.XLSX){const wb=XLSX.utils.book_new();const ws=XLSX.utils.aoa_to_sheet(rows);
      XLSX.utils.book_append_sheet(wb,ws,name.slice(0,31));
      XLSX.writeFile(wb,`HALWAA_${name}_${today()}.xlsx`);}
    else exportCSV(name,rows);
    toast('Файл выгружен');
  }catch(e){exportCSV(name,rows);}
}
function exportCSV(name,rows){
  const csv='\ufeff'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`HALWAA_${name}_${today()}.csv`;a.click();
}
function exportDash(){
  const ord=ordersInP();const sum=ord.reduce((s,o)=>s+o.total,0);
  const rows=[['HALWAA BARAKA — Сводка дашборда'],['Период',periodLabel()],[],
    ['Показатель','Значение'],
    ['Заявок за период',ord.length],['Сумма заявок',sum],
    ['ОКБ (всего точек)',DB.clients.length],['АКБ (активных)',new Set(ord.map(o=>o.client)).size],
    ['Задолженность',DB.clients.reduce((s,c)=>s+c.debt,0)],[],['По территориям','Сумма']];
  DB.territories.forEach(t=>rows.push([t.name,ord.filter(o=>o.terr===t.id).reduce((s,o)=>s+o.total,0)]));
  rows.push([],['По категориям','Сумма']);
  const byCat={};ord.forEach(o=>o.items.forEach(i=>{const p=prod(i.p);if(p)byCat[p.cat]=(byCat[p.cat]||0)+i.q*i.price;}));
  DB.categories.forEach(c=>rows.push([c.name,byCat[c.id]||0]));
  exportTable('Дашборд',rows);
}
function exportReport(){
  if(!window.XLSX){exportDash();return;}
  const wb=XLSX.utils.book_new();
  const add=(nm,rows)=>XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),nm.slice(0,31));
  add('Заявки',ordersRows());add('Визиты',visitsRows());add('Долги',debtRows());add('Склад',stockRows());add('Участники',peopleRows());
  XLSX.writeFile(wb,`HALWAA_Отчёт_${today()}.xlsx`);toast('Отчёт выгружен');
}

function doLogin(){
  const l=($('#lg_login')?.value||'').trim().toLowerCase();
  const p=($('#lg_pass')?.value||'').trim();
  const realLogin=(DB.profile.login||'halwaauz').trim().toLowerCase();
  const realPass=String(DB.profile.password||'12345678910').trim();
  // основной вход + резервный (на случай если профиль был повреждён)
  const ok=(l===realLogin&&p===realPass)||(l==='halwaauz'&&p==='12345678910');
  if(ok){SESSION=true;render();
    if(sbCfg())setTimeout(()=>{cloudPushCore().catch(()=>{});cloudPullCore().then(x=>{if(x&&x.total>0)renderContent();}).catch(()=>{});},800);
  }else $('#lg_err').textContent='Неверный логин или пароль. Логин: halwaauz, пароль: 12345678910';
}

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HALWAA BARAKA · Админ-панель</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#F4F1E8; --panel:#FFFEFB; --green:#143D2E; --green2:#1F4D3A; --green-100:#E7EFEA;
    --gold:#C9A227; --gold-soft:#E8D8A6; --ink:#262017; --muted:#8A8475; --line:#E9E2D2;
    --red:#B23A33; --red-100:#F6E4E2; --blue:#2F6690; --blue-100:#E3EDF3; --amber:#C97B1E; --amber-100:#F8ECD8;
    --sidebar:#11352A;
    --shadow:0 1px 2px rgba(38,32,23,.04),0 6px 22px rgba(38,32,23,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  .serif{font-family:Georgia,"Times New Roman",serif}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit;font-size:14px}
  a{color:inherit;text-decoration:none}

  /* ===== Layout ===== */
  .app{display:flex;min-height:100vh}
  /* ===== Горизонтальный layout Mirasoft ===== */
  .app-h{min-height:100vh;display:flex;flex-direction:column}
  .topbrand{background:var(--sidebar);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:40}
  .topbrand .brand{display:flex;align-items:center;gap:11px}
  .topbrand .brandmark{width:30px;height:30px;border-radius:8px;background:#fff;display:grid;place-items:center}
  .topbrand .brandmark svg{width:18px;height:18px;stroke:var(--sidebar)}
  .topbrand .brand b{font-size:18px;font-weight:700;letter-spacing:.2px}
  .topbrand .brand-right{display:flex;align-items:center;gap:12px}
  .topbtn{background:rgba(255,255,255,.12);color:#fff;border:none;padding:7px 14px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer}
  .topbtn:hover{background:rgba(255,255,255,.2)}
  .ava-top{width:34px;height:34px;border-radius:50%;background:#fff;color:var(--green);display:grid;place-items:center;font-weight:700;cursor:pointer;border:2px solid var(--green);position:relative}
  .topnav{background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:2px;padding:0 14px;overflow-x:auto;position:sticky;top:56px;z-index:35;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .topnav::-webkit-scrollbar{height:0}
  .topnav button{display:flex;align-items:center;gap:7px;background:none;border:none;padding:15px 14px;font-size:14px;font-weight:600;color:#5A6478;cursor:pointer;white-space:nowrap;border-bottom:2.5px solid transparent;position:relative}
  .topnav button svg:first-child{width:18px;height:18px;stroke:#8A93A6;flex:0 0 auto}
  .topnav button .caret{width:14px;height:14px;stroke:#B4BCC9;opacity:.7}
  .topnav button:hover{color:var(--navy,#1E2A44)}
  .topnav button.active{color:#3B6FE0;border-bottom-color:#3B6FE0}
  .topnav button.active svg:first-child{stroke:#3B6FE0}
  .topnav button.active .caret{stroke:#3B6FE0}
  .main-h{flex:1;min-width:0}
  .main-h .content{padding:24px 26px 60px;max-width:1400px;margin:0 auto}
  @media(max-width:720px){.topbrand{padding:0 14px}.topnav button{padding:13px 10px;font-size:13px}.topnav button .caret{display:none}.main-h .content{padding:16px 14px 60px}}
  .sidebar{width:248px;background:var(--sidebar);color:#cfe0d6;position:fixed;top:0;bottom:0;left:0;
    display:flex;flex-direction:column;padding:18px 14px;overflow-y:auto}
  .logo{display:flex;align-items:center;gap:11px;padding:6px 8px 18px}
  .logo .mark{width:42px;height:42px;border-radius:13px;background:rgba(212,175,55,.14);
    border:1px solid rgba(212,175,55,.35);display:grid;place-items:center;color:var(--gold-soft);font-size:24px}
  .logo b{color:#fff;font-size:16px;letter-spacing:.4px;display:block;line-height:1.1}
  .logo span{font-size:10px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:1.6px}
  .nav{display:flex;flex-direction:column;gap:3px;margin-top:6px}
  .nav button{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;
    color:#bcd0c4;font-size:14px;font-weight:500;text-align:left;width:100%;transition:.12s}
  .nav button:hover{background:rgba(255,255,255,.05);color:#fff}
  .nav button.active{background:var(--gold);color:#241c00;font-weight:600}
  .nav button.active svg{stroke:#241c00}
  .nav svg{width:19px;height:19px;flex:none;stroke:#9fbcab;stroke-width:2;fill:none}
  .nav button:hover svg{stroke:#fff}
  .nav .num{margin-left:auto;font-size:11px;opacity:.5}

  .main{flex:1;margin-left:248px;min-width:0}
  .topbar{position:sticky;top:0;z-index:30;background:rgba(244,241,232,.85);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;gap:16px}
  .topbar h1{font-size:20px;font-weight:600;margin:0;letter-spacing:-.3px;flex:none}
  .topbar .spacer{flex:1}
  .content{padding:24px 26px 60px}

  /* ===== Period ===== */
  .period{position:relative}
  .period .btn-period{display:flex;align-items:center;gap:9px;background:var(--panel);border:1.5px solid var(--line);
    border-radius:11px;padding:9px 13px;font-weight:600;font-size:13.5px;box-shadow:var(--shadow)}
  .period .btn-period svg{width:16px;height:16px;stroke:var(--muted);stroke-width:2;fill:none}
  .pop{position:absolute;top:46px;left:0;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    box-shadow:0 12px 40px rgba(38,32,23,.14);padding:8px;width:230px;z-index:50;display:none}
  .pop.open{display:block}
  .pop button{display:block;width:100%;text-align:left;padding:9px 11px;border-radius:9px;font-size:13.5px}
  .pop button:hover{background:var(--green-100)}
  .pop button.sel{background:var(--green);color:#fff}
  .pop .range{display:flex;gap:6px;padding:8px 6px 4px;border-top:1px solid var(--line);margin-top:6px}
  .pop .range input{flex:1;padding:7px;border:1.5px solid var(--line);border-radius:8px;width:100%}

  /* ===== Account ===== */
  .acct{position:relative}
  .acct .btn-acct{display:flex;align-items:center;gap:10px;background:var(--panel);border:1.5px solid var(--line);
    border-radius:12px;padding:6px 12px 6px 7px;box-shadow:var(--shadow)}
  .acct .ava{width:34px;height:34px;border-radius:9px;background:var(--green);color:var(--gold-soft);
    display:grid;place-items:center;font-weight:700;font-size:15px}
  .acct .who{line-height:1.15;text-align:left}
  .acct .who b{font-size:13.5px;display:block}
  .acct .who span{font-size:11px;color:var(--muted)}
  .acct .pop{right:0;left:auto;width:210px}

  /* ===== Cards / KPI ===== */
  .grid{display:grid;gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 4px;font-size:15px;font-weight:600}
  .card .hint{color:var(--muted);font-size:12px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:15px 17px;box-shadow:var(--shadow)}
  .kpi .label{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
  .kpi .value{font-size:26px;font-weight:700;margin-top:5px;letter-spacing:-.6px}
  .kpi .value small{font-size:13px;font-weight:600;color:var(--muted)}
  .kpi .sub{font-size:12.5px;color:var(--muted);margin-top:3px}
  .kpi.green{background:var(--green);border-color:var(--green);color:#fff}
  .kpi.green .label{color:var(--gold-soft)} .kpi.green .sub{color:#bcd0c4}
  .sectiontitle{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);
    margin:26px 2px 12px}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .pill.gray{background:#EFEBE0;color:#7A7363}.pill.green{background:var(--green-100);color:var(--green)}
  .pill.gold{background:var(--gold-soft);color:#8a6d12}.pill.amber{background:var(--amber-100);color:var(--amber)}
  .pill.blue{background:var(--blue-100);color:var(--blue)}.pill.red{background:var(--red-100);color:var(--red)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:9px 15px;border-radius:11px;font-weight:600;font-size:13.5px}
  .btn.primary{background:var(--green);color:#fff}.btn.primary:hover{background:var(--green2)}
  .btn.gold{background:var(--gold);color:#fff}
  .btn.ghost{background:var(--panel);border:1.5px solid var(--line)}
  .btn.ghost:hover{border-color:var(--green);color:var(--green)}
  .btn.danger{background:var(--red-100);color:var(--red)}
  .btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none}

  /* ===== Tables ===== */
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;
    padding:10px 12px;border-bottom:1px solid var(--line)}
  td{padding:11px 12px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#FBF8F0}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  .tabletop{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tabletop .grow{flex:1}
  .filt{display:flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:0 4px 0 10px}
  .filt label{font-size:11.5px;color:var(--muted);font-weight:600}
  .filt select,.filt input{border:none;padding:9px 8px;background:transparent;outline:none}

  /* ===== Bars / donut ===== */
  .bar{height:9px;border-radius:6px;background:#EFEBE0;overflow:hidden;flex:1}
  .bar i{display:block;height:100%;border-radius:6px}
  .legend{display:flex;flex-direction:column;gap:11px}
  .legrow{display:flex;align-items:center;gap:10px;font-size:13px}
  .legrow .dot{width:11px;height:11px;border-radius:3px;flex:none}
  .legrow .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .legrow b{font-variant-numeric:tabular-nums}
  .progress{display:flex;align-items:center;gap:10px}

  /* ===== Modal ===== */
  .scrim{position:fixed;inset:0;background:rgba(17,30,24,.45);z-index:60;display:none;align-items:center;justify-content:center;padding:24px}
  .scrim.open{display:flex}
  .modal{background:var(--bg);width:100%;max-width:460px;border-radius:20px;padding:22px;max-height:88vh;overflow-y:auto}
  .modal.wide{max-width:700px}
  .modal h2{margin:0 0 16px;font-size:19px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
  .field input,.field select{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;background:#fff;outline:none}
  .field input:focus,.field select:focus{border-color:var(--green)}
  .modal-actions{display:flex;gap:10px;margin-top:8px}
  .modal-actions .btn{flex:1}
  .chip{display:inline-flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:8px 12px;font-size:13px;margin:0 8px 8px 0}
  .chip button{color:var(--muted);font-weight:700}
  .empty{text-align:center;padding:46px;color:var(--muted)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:11px 18px;border-radius:12px;font-size:13.5px;z-index:80;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}

  /* ===== Login ===== */
  .login{min-height:100vh;display:grid;place-items:center;
    background:radial-gradient(120% 80% at 50% 0%,#1F4D3A,#11352A 70%)}
  .loginbox{background:var(--panel);border-radius:22px;padding:34px;width:340px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.3)}
  .loginbox .mark{width:64px;height:64px;border-radius:18px;background:var(--green);color:var(--gold-soft);
    display:grid;place-items:center;font-size:34px;margin:0 auto 14px}
  .loginbox h1{font-size:20px;margin:0 0 2px}
  .loginbox p{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1.6px;margin:0 0 22px}
  .loginbox .err{color:var(--red);font-size:12.5px;height:16px;margin-top:6px}

  /* ===== Стрелки пагинации ===== */
  .pager-arrow{position:fixed;top:50%;transform:translateY(-50%);width:50px;height:50px;border-radius:50%;
    background:var(--green);display:grid;place-items:center;box-shadow:0 8px 24px rgba(20,61,46,.28);z-index:26;cursor:pointer}
  .pager-arrow:hover{background:var(--green2)}
  .pager-arrow svg{width:24px;height:24px;stroke:#fff;stroke-width:2.6;fill:none}
  .pager-arrow.left{left:266px}
  .pager-arrow.right{right:22px}
  .pager-arrow:disabled{background:#E7E1D2;box-shadow:none;cursor:default}
  .pager-arrow:disabled svg{stroke:#BBB29C}
  .pager-info{position:fixed;bottom:20px;left:calc(50% + 124px);transform:translateX(-50%);
    background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:7px 16px;font-size:12.5px;
    font-weight:600;color:var(--muted);box-shadow:var(--shadow);z-index:26}
  .hscroll{overflow-x:auto;width:100%;scroll-behavior:smooth}
  .aifab{position:fixed;right:22px;bottom:22px;z-index:27;background:var(--green);color:#fff;font-weight:800;
    border-radius:999px;padding:13px 18px;box-shadow:0 8px 24px rgba(20,61,46,.3);display:flex;align-items:center;gap:7px;font-size:13.5px}
  .aifab:hover{background:var(--green2)}
  .pgbar{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:10px 14px;margin-top:12px;box-shadow:var(--shadow);flex-wrap:wrap}
  .pgbar select{padding:7px 10px;border:1.5px solid var(--line);border-radius:9px;background:#fff;font-weight:600}
  .pgbtn{padding:8px 14px;border:1.5px solid var(--line);border-radius:10px;background:var(--panel);font-weight:600;font-size:13px}
  .pgbtn:hover:not(:disabled){border-color:var(--green);color:var(--green)}
  .pgbtn:disabled{opacity:.4;cursor:default}
  #map{height:68vh;border-radius:16px;border:1px solid var(--line);box-shadow:var(--shadow);z-index:1}
  .maplegend{display:flex;gap:18px;flex-wrap:wrap;align-items:center;margin-top:12px;font-size:13px;color:var(--muted)}
  .maplegend .lg{display:flex;align-items:center;gap:7px}
  .maplegend .lg i{width:13px;height:13px;border-radius:50%;display:inline-block}
  .pickmap{height:300px;border-radius:12px;border:1px solid var(--line);margin-bottom:6px;overflow:hidden}
</style>
</head>
<body>
<div id="root"></div>
<div class="scrim" id="scrim" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
/* =====================================================================
   HALWAA BARAKA — Админ-панель (десктоп). Прототип v0.2
   Хранилище: localStorage + Supabase.
   ===================================================================== */
const $=s=>document.querySelector(s);
const root=()=>$('#root');

/* ---------- PRNG ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let RND=mulberry32(20202020);
const ri=(a,b)=>Math.floor(RND()*(b-a+1))+a;
const pick=arr=>arr[Math.floor(RND()*arr.length)];

/* ---------- даты ---------- */
function iso(d){return d.toISOString().slice(0,10);}
function today(){return nowTashkent().split('T')[0];}
function addDays(s,n){const d=new Date(s);d.setDate(d.getDate()+n);return iso(d);}
function dmonth(s){return new Date(s).toLocaleDateString('ru-RU',{day:'numeric',month:'short'});}

/* ---------- хранилище ---------- */
const DB_KEY='halwaa_admin_v7';
let DB=null;

function genSeed(){
  return {
    profile:{company:'HALWAA BARAKA MChJ',email:'',phone:'',login:'halwaauz',password:'12345678910'},
    territories:[], routes:[], clientTypes:[], categories:[], products:[],
    employees:[], clients:[], orders:[], payments:[], returns:[], visits:[],
    promos:[], shipments:[], suppliers:[], kpis:[],
    units:[], refusals:[], expenseCats:[], expenses:[], transport:[], rolePerms:{}, rules:defaultRules(),
    integrations:{yandex:{enabled:true,apikey:''},claude:{enabled:false,note:''},payme:{enabled:false,merchant:''},click:{enabled:false,merchant:''},uzum:{enabled:false,merchant:''}},
    warehouses:[{id:'w_main',name:'Основной склад'},{id:'w_ret',name:'Склад возврата'},{id:'w_def',name:'Склад брака'}]
  };
}

function loadDB(){try{const r=localStorage.getItem(DB_KEY);DB=r?JSON.parse(r):genSeed();}catch(e){DB=genSeed();}
  if(!Array.isArray(DB.promos))DB.promos=[];if(!Array.isArray(DB.routes))DB.routes=[];if(!Array.isArray(DB.shipments))DB.shipments=[];
  if(!Array.isArray(DB.suppliers))DB.suppliers=[];if(!Array.isArray(DB.warehouses))DB.warehouses=[{id:'w_main',name:'Основной склад'},{id:'w_ret',name:'Склад возврата'},{id:'w_def',name:'Склад брака'}];
  if(!DB.warehouses.some(w=>w.id==='w_def'))DB.warehouses.push({id:'w_def',name:'Склад брака'});
  if(!Array.isArray(DB.kpis))DB.kpis=seedKpis();
  ['units','refusals','expenseCats','expenses','transport'].forEach(k=>{if(!Array.isArray(DB[k]))DB[k]=[];});
  if(!DB.rolePerms||typeof DB.rolePerms!=='object')DB.rolePerms={};
  if(DB.integrations){DB.integrations.claude=DB.integrations.claude||{enabled:false};DB.integrations.claude.apikey=DB.integrations.claude.apikey||'';
    DB.integrations.click=DB.integrations.click||{enabled:false};DB.integrations.click.service=DB.integrations.click.service||'';}
  if(!DB.profile.login)DB.profile.login='halwaauz';
  if(!DB.integrations)DB.integrations={};
  DB.integrations.supabase=DB.integrations.supabase||{enabled:true,url:'',key:''};
  DB.integrations.supabase.url='https://wgkilpzxhmwqsnfytwya.supabase.co';
  DB.integrations.supabase.key=DB.integrations.supabase.key&&DB.integrations.supabase.key.startsWith('sb_publishable_mz8zS')?DB.integrations.supabase.key:'sb_publishable_mz8zS9e_UMQHNDhc2ktz8g_Fcjkq7EM';
  if(!DB.integrations.yandex)DB.integrations.yandex={enabled:true,apikey:''};
  ['claude','payme','click','uzum'].forEach(k=>{if(!DB.integrations[k])DB.integrations[k]={enabled:false,note:'',merchant:''};});
  if(!DB.rules)DB.rules=defaultRules();
  if(!DB.control)DB.control={
    enabled:true,
    workStart:'10:00',   // должен быть на территории / первый визит
    workEnd:'16:00',     // не уходить раньше (до 16:00)
    lateGraceMin:0,      // допустимое опоздание (0 = даже минута штраф)
    minVisitSec:300,     // минимальная длительность визита (5 мин)
    geofenceM:300,       // визит должен быть в радиусе N метров от точки
    fines:{late:50000,fake:300000,nocomment:30000,early:30000,unfinished:30000,geofence:30000},
    routeDonePct:90      // маршрут считается завершённым при N% визитов
  };
  if(!DB.violations)DB.violations=[];   // зафиксированные нарушения
  if(!DB.notifications)DB.notifications=[]; // уведомления супервайзерам
  ['finishVisit','returnByOrder'].forEach(k=>{if(!DB.rules[k])DB.rules[k]={enabled:true,exceptions:[]};});
  if(!DB.rules.returnDays)DB.rules.returnDays={enabled:true,maxDays:8,exceptions:[]};
  if(!Array.isArray(DB.audit))DB.audit=[];
  if(!Array.isArray(DB.arrivals))DB.arrivals=[];
  const LATD={'Понедельник':'Dushanba','Вторник':'Seshanba','Среда':'Chorshanba','Четверг':'Payshanba','Пятница':'Juma','Суббота':'Shanba','Воскресенье':'Yakshanba'};
  DB.routes.forEach(r=>{if(r.day&&LATD[r.day])r.day=LATD[r.day];
    if(r.day&&(r.name===r.day||/^Маршрут /.test(r.name||'')))r.name='Marshrut '+r.day;});

let PERIOD={preset:'last30',from:null,to:null};
const PRESETS=[['all','Всё время'],['today','Сегодня'],['yesterday','Вчера'],
  ['last7','Последние 7 дней'],['last30','Последние 30 дней'],['last90','Последние 90 дней'],
  ['thisMonth','Текущий месяц'],['lastMonth','Прошлый месяц'],['custom','Произвольный период']];
function periodLabel(){const f=PRESETS.find(p=>p[0]===PERIOD.preset);
  if(PERIOD.preset==='custom'&&PERIOD.from)return dmonth(PERIOD.from)+' — '+dmonth(PERIOD.to);return f?f[1]:'';}
function periodRange(){
  const t=today();const d=new Date();
  switch(PERIOD.preset){
    case 'all':return[null,null];
    case 'today':return[t,t];
    case 'yesterday':{const y=addDays(t,-1);return[y,y];}
    case 'last7':return[addDays(t,-6),t];
    case 'last30':return[addDays(t,-29),t];
    case 'last90':return[addDays(t,-89),t];
    case 'thisMonth':return[iso(new Date(d.getFullYear(),d.getMonth(),1)),t];
    case 'lastMonth':{const f=new Date(d.getFullYear(),d.getMonth()-1,1);const l=new Date(d.getFullYear(),d.getMonth(),0);return[iso(f),iso(l)];}
    case 'custom':return[PERIOD.from,PERIOD.to];
  }return[null,null];
}
const pdate=d=>String(d||'').split('T')[0];
function inP(date){const[f,to]=periodRange();if(!f)return true;return date>=f&&date<=to;}
function daysInPeriod(){const[f,to]=periodRange();if(!f)return 90;return Math.round((new Date(to)-new Date(f))/864e5)+1;}

/* круговая диаграмма (donut) */
function donut(data){
  const total=data.reduce((s,d)=>s+d.value,0)||1;const r=46,C=2*Math.PI*r;let off=0;
  const segs=data.map(d=>{const len=d.value/total*C;const s=`<circle r="${r}" cx="60" cy="60" fill="none" stroke="${d.color}" stroke-width="18" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 60 60)"/>`;off+=len;return s;}).join('');
  return `<svg viewBox="0 0 120 120" width="120" height="120" style="flex:none">${segs}</svg>`;
}

function ordRowsHTML(list){
  if(!list.length)return `<tr><td colspan="12"><div class="empty">Заявок за период нет</div></td></tr>`;
  const gk=o=>oFilt.group==='byClient'?(cli(o.client)?.name||'—'):oFilt.group==='byRoute'?(route(o.route)?.name||'Без маршрута'):null;
  if(oFilt.group!=='flat')list=list.slice().sort((a,b)=>String(gk(a)).localeCompare(String(gk(b))));
  let html='',last=null;
  list.forEach(o=>{
    if(oFilt.group!=='flat'){const k=gk(o);if(k!==last){last=k;html+=`<tr style="background:#F1ECDF"><td colspan="12" style="font-weight:700">${esc(k)}</td></tr>`;}}
    const c=cli(o.client),st=STAT[o.status]||['—','gray'];
    html+=`<tr onclick="openOrderDetail('${o.id}')" style="cursor:pointer">

      <td class="num"><b>${money(o.total)}</b></td><td><span class="pill ${st[1]}">${st[0]}</span></td></tr>`;

function noQty(pid,val){const p=prod(pid);let q=Math.max(0,Math.floor(+val||0));
  if(q>p.stock){toast('Недостаточно на складе (остаток '+p.stock+')');q=p.stock;}
  if(q<=0)delete NEWO.items[pid];else NEWO.items[pid]=q;renderNewOrder2();}
function noItem(pid,d){const cur=NEWO.items[pid]||0,p=prod(pid),next=cur+d;if(next>p.stock){toast('Недостаточно на складе (остаток '+p.stock+')');return;}if(next<=0)delete NEWO.items[pid];else NEWO.items[pid]=next;renderNewOrder2();}
function saveNewOrder(){const entries=Object.entries(NEWO.items);if(!entries.length){toast('Добавьте товары');return;}
  for(const [pid,q] of entries){const p=prod(pid);if(!p){toast('Товар не найден');return;}if(q>p.stock){toast('Недостаточно «'+p.name+'»: остаток '+p.stock);return;}}
  const c=cli(NEWO.client);const items=entries.map(([pid,q])=>({p:pid,q,price:prod(pid).price}));const total=items.reduce((s,i)=>s+i.q*i.price,0);
  const o={id:uid('o'),number:'HB-'+String(100000+DB.orders.length),client:NEWO.client,agent:NEWO.agent||c.agent,terr:c.terr,route:NEWO.route||c.route,
    courier:null,date:todayTashkent(),createdAt:nowTashkent(),deliveryDate:null,deliveredAt:null,status:'new',method:NEWO.method,
    payType:NEWO.payType,consignTerm:NEWO.payType==='consignment'?NEWO.consignTerm:null,deliveryMethod:NEWO.deliveryMethod,currency:NEWO.currency,items,total,paid:0,shipmentId:null};
  DB.orders.push(o);items.forEach(i=>{const p=prod(i.p);p.stock=Math.max(0,(p.stock||0)-i.q);p.stockBy=p.stockBy||{};p.stockBy.w_main=Math.max(0,(p.stockBy.w_main!==undefined?p.stockBy.w_main:(p.stock+i.q))-i.q);});logAct('Заявки','Заказ: создан '+o.number,cli(o.client)?.name||'');saveDB();closeModal();ordSub='current';oSel=new Set();renderContent();toast('Заказ '+o.number+' создан');}

function shipStats(sh){const os=sh.orders.map(id=>DB.orders.find(o=>o.id===id)).filter(Boolean);
  return {os,sum:os.reduce((a,o)=>a+o.total,0),del:os.filter(o=>o.status==='delivered').length,

      <div class="legrow" style="padding:8px 0;border-bottom:1px solid var(--line)">
        <span class="nm"><b>${o.number}</b> ${esc(c?.name||'—')}<div class="hint">${esc(c?.addr||'')} · ${money(o.total)}</div></span>
        <span class="pill ${ost[1]}" style="margin-right:8px">${ost[0]}</span>

    <button class="btn ghost" style="width:100%;margin-top:10px" onclick="closeModal()">Закрыть</button>`);
  $('#modal').classList.add('wide');
}
function shipStatus(sid,st){const sh=shipment(sid);
  if(st==='done'){const x=shipStats(sh);
    if(x.pend>0){toast('Нельзя завершить: '+x.pend+' заявок не закрыты (Доставлено/Отказ)');openShipment(sid);return;}
    sh.status='done';logAct('Заявки','Отгрузка завершена: '+sh.number,'✅'+x.del+' ❌'+x.can);saveDB();ordShipments();toast('Отгрузка завершена');return;}

function deliverDialog(oid,backShip){const o=DB.orders.find(x=>x.id===oid);if(!o)return;const c=cli(o.client);
  openModal(`<h2>Доставлено · ${o.number}</h2>

    <div class="field"><label>Способ оплаты</label><select id="dv_m"><option value="cash">Наличные</option><option value="terminal">Терминал</option><option value="transfer">Безналичный</option></select></div>
    <div class="hint" style="margin-bottom:10px">Если получено меньше суммы — остаток автоматически запишется в долг клиента${o.payType==='consignment'?' (заказ по консигнации — допустимо 0)':''}.</div>

function confirmDeliver(oid,backShip){const o=DB.orders.find(x=>x.id===oid);const c=cli(o.client);
  let amt=Math.max(0,Math.min(+$('#dv_amt').value||0,o.total-(o.paid||0)));const m=$('#dv_m').value;
  o.status='delivered';o.deliveredAt=nowTashkent();
  if(amt>0){o.paid=(o.paid||0)+amt;DB.payments.push({id:uid('pm'),client:o.client,order:o.id,amount:amt,method:m,employee:o.courier||'',date:nowTashkent(),allocations:[{order:o.id,amount:amt}]});}
  const rest=o.total-(o.paid||0);if(rest>0&&c)c.debt=(c.debt||0)+rest;
  logAct('Заявки','Доставлено: '+o.number+' · получено '+money(amt)+(rest>0?' · в долг '+money(rest):''),c?.name||'');
  saveDB();closeModal();if(backShip)openShipment(backShip);else ordDelivery();toast('Доставлено: '+o.number);}

/* Отказ: причина из справочника, товар — на склад возврата */
function refuseDialog(oid,backShip){const o=DB.orders.find(x=>x.id===oid);if(!o)return;const c=cli(o.client);
  openModal(`<h2>Отказ · ${o.number}</h2>

function confirmRefuse(oid,backShip){const o=DB.orders.find(x=>x.id===oid);const c=cli(o.client);
  const reason=$('#rf_r').value;if(!reason){toast('Выберите причину (Настройки → Причины отказа)');return;}
  o.status='canceled';o.refusal=reason;o.refusalNote=$('#rf_c').value.trim();o.canceledAt=nowTashkent();
  o.items.forEach(i=>{const p=prod(i.p);if(p){p.stockBy=p.stockBy||{};p.stockBy.w_ret=(p.stockBy.w_ret||0)+i.q;}});
  logAct('Заявки','Отказ: '+o.number+' · '+reason,c?.name||'');
  saveDB();closeModal();if(backShip)openShipment(backShip);else ordDelivery();toast('Отказ оформлен, товар → склад возврата');}

function cancelCutoff(o){const d=(o.canceledAt||o.date||'').split('T')[0];return d&&d>=addDays(today(),-3);} // 4 дня вкл. день отмены
function ordCanceled(){
  let all=DB.orders.filter(o=>o.status==='canceled'&&cancelCutoff(o)).sort((a,b)=>String(b.canceledAt||b.date).localeCompare(String(a.canceledAt||a.date)));
  if(oFilt.q){const q=oFilt.q.toLowerCase();all=all.filter(o=>(cli(o.client)?.name||'').toLowerCase().includes(q)||o.number.toLowerCase().includes(q));}
  const pd=pageData('canceled',all);
  $('#content').innerHTML=ordSubBar()+`
  <div class="tablewrap">
    <div class="tabletop"><b>Отменённые: ${all.length}</b>
      <span class="hint">· через 4 дня после отмены заявка автоматически уходит в Архив со статусом «Отменён»</span>
      <div class="filt" style="flex:1"><input placeholder="🔍 Клиент / №" value="${esc(oFilt.q)}" oninput="oFilt.q=this.value;PG.canceled=1;ordCanceled()"></div>
      <button class="btn ghost" onclick="exportTable('Отменённые',canceledRows())">${I.down} Excel</button></div>
    <table><thead><tr><th>Отменён</th><th>№</th><th>Клиент</th><th>Причина</th><th class="num">Сумма</th><th style="text-align:right">Действия</th></tr></thead>
    <tbody>${pd.slice.length?pd.slice.map(o=>{const c=cli(o.client);return `<tr>
      <td>${fmtDT(o.canceledAt||o.date)}</td><td><b>${o.number}</b></td><td>${esc(c?.name||'—')}</td>
      <td><span class="pill red">${esc(o.refusal||'отмена')}</span>${o.refusalNote?`<div class="hint">${esc(o.refusalNote)}</div>`:''}</td>
      <td class="num"><b>${money(o.total)}</b></td>
      <td class="num"><button class="btn ghost" style="padding:6px 11px" onclick="dupCanceled('${o.id}')">Дублировать</button>
      <button class="btn primary" style="padding:6px 11px;margin-left:6px" onclick="restoreCanceled('${o.id}')">↩ В новые</button></td></tr>`}).join(''):'<tr><td colspan="6"><div class="empty">Отменённых заявок за последние 4 дня нет</div></td></tr>'}</tbody></table>
  </div>`+pageBar(pd);
}
function canceledRows(){const rows=[['Отменён','№','Клиент','Причина','Комментарий','Сумма']];
  DB.orders.filter(o=>o.status==='canceled'&&cancelCutoff(o)).forEach(o=>rows.push([fmtDT(o.canceledAt||o.date),o.number,cli(o.client)?.name||'',o.refusal||'',o.refusalNote||'',o.total]));return rows;}
function dupCanceled(oid){const src=DB.orders.find(x=>x.id===oid);if(!src)return;
  for(const i of src.items){const p=prod(i.p);if(!p){toast('Товар не найден');return;}if(i.q>p.stock){toast('Недостаточно «'+p.name+'»: остаток '+p.stock);return;}}
  const o={id:uid('o'),number:'HB-'+String(100000+DB.orders.length),client:src.client,agent:src.agent,terr:src.terr,route:src.route,
    courier:null,date:todayTashkent(),createdAt:nowTashkent(),deliveryDate:null,deliveredAt:null,status:'new',method:src.method,
    payType:src.payType,consignTerm:src.consignTerm,deliveryMethod:src.deliveryMethod,currency:src.currency,
    items:src.items.map(i=>({p:i.p,q:i.q,price:prod(i.p).price})),total:0,paid:0,shipmentId:null};
  o.total=o.items.reduce((s,i)=>s+i.q*i.price,0);
  o.items.forEach(i=>{const p=prod(i.p);p.stock=Math.max(0,(p.stock||0)-i.q);p.stockBy=p.stockBy||{};p.stockBy.w_main=Math.max(0,(p.stockBy.w_main!==undefined?p.stockBy.w_main:p.stock+i.q)-i.q);});
  DB.orders.push(o);logAct('Заявки','Заказ: дубль из отменённого '+src.number+' → '+o.number,cli(o.client)?.name||'');
  saveDB();ordSub='current';oSel=new Set();renderContent();toast('Создан '+o.number);}
function restoreCanceled(oid){const o=DB.orders.find(x=>x.id===oid);if(!o)return;
  // товары вернулись на склад возврата при отказе — забираем оттуда обратно в процесс
  o.items.forEach(i=>{const p=prod(i.p);if(p&&p.stockBy)p.stockBy.w_ret=Math.max(0,(p.stockBy.w_ret||0)-i.q);});
  o.status='new';o.shipmentId=null;o.refusal='';o.refusalNote='';o.canceledAt=null;o.deliveryDate=null;
  logAct('Заявки','Заказ: возвращён в новые '+o.number,cli(o.client)?.name||'');
  saveDB();ordSub='current';oSel=new Set();renderContent();toast(o.number+' возвращён в новые');}

  table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}th,td{border:1px solid #bbb;padding:7px 9px;text-align:left}th{background:#f0ece0}.n{text-align:right}
  .tot td{font-weight:bold;background:#faf7ee}.blk{margin-bottom:26px;page-break-after:always}.sign{margin-top:26px;display:flex;justify-content:space-between;font-size:12px;color:#444}
  </style></head><body onload="setTimeout(function(){window.print()},250)">${body}</body></html>`);

function printConsolidated(ids){const os=ids.map(id=>DB.orders.find(o=>o.id===id)).filter(Boolean);if(!os.length){toast('Нет заявок');return;}
  const agg={};os.forEach(o=>o.items.forEach(i=>{agg[i.p]=agg[i.p]||{q:0,sum:0};agg[i.p].q+=i.q;agg[i.p].sum+=i.q*i.price;}));
  const rows=Object.entries(agg).map(([pid,v])=>{const p=prod(pid);return `<tr><td>${esc(p?.name||'—')}</td><td class="n">${v.q} ${p?.unit||''}</td><td class="n">${money(v.sum)}</td></tr>`}).join('');
  const tot=Object.values(agg).reduce((s,v)=>s+v.sum,0);
  printDoc('Сводная накладная',`<h1>${esc(DB.profile.company)}</h1><div class="muted">Сводная накладная на сборку · ${fmtDT(nowTashkent())} · заявок: ${os.length}</div>
    <table><thead><tr><th>Товар</th><th class="n">Количество</th><th class="n">Сумма</th></tr></thead><tbody>${rows}
    <tr class="tot"><td>ИТОГО</td><td class="n"></td><td class="n">${money(tot)}</td></tr></tbody></table>
    <div class="sign"><span>Собрал: ______________</span><span>Принял: ______________</span></div>`);}
function printPerShop(ids){const os=ids.map(id=>DB.orders.find(o=>o.id===id)).filter(Boolean);if(!os.length){toast('Нет заявок');return;}
  const body=os.map(o=>{const c=cli(o.client);const rows=o.items.map(i=>{const p=prod(i.p);return `<tr><td>${esc(p?.name||'—')}</td><td class="n">${i.q} ${p?.unit||''}</td><td class="n">${money(i.price)}</td><td class="n">${money(i.q*i.price)}</td></tr>`}).join('');
    return `<div class="blk"><h1>${esc(DB.profile.company)}</h1><div class="muted">Накладная № ${o.number} · ${fmtDT(o.createdAt)}</div>
    <div style="font-size:13px;margin-bottom:6px"><b>${esc(c?.name||'—')}</b><br>${esc(c?.addr||'')} · ${esc(c?.phone||'')}<br>Оплата: ${METHOD3[o.method]} · ${o.payType==='consignment'?'консигнация':'на месте'}</div>
    <table><thead><tr><th>Товар</th><th class="n">Кол-во</th><th class="n">Цена</th><th class="n">Сумма</th></tr></thead><tbody>${rows}

function saveEmp(){empSync();
  if(!EMPED.name.trim()){toast('Введите имя');return;}
  if(!EMPED.login||!EMPED.login.trim()){toast('Введите логин');return;}
  if(!/^[a-z]{7,}$/.test(EMPED.login.trim())){toast('Логин: минимум 7 строчных латинских букв (например: alisher)');return;}
  if(!EMPED.password||!EMPED.password.trim()){toast('Введите пароль');return;}
  if(!/^\d{10,}$/.test(EMPED.password.trim())){toast('Пароль: минимум 10 цифр (например: 1234567890)');return;}
  if(DB.employees.some(x=>x.id!==EMPED._id&&x.login===EMPED.login.trim())){toast('Такой логин уже занят');return;}
  if(!EMPED.terr){toast('Выберите территорию');return;}
  if((EMPED.role==='agent'||EMPED.role==='courier'||EMPED.role==='expediter')&&!EMPED.sup){toast('Прикрепите супервайзера');return;}
  const id=EMPED._id;const data={name:EMPED.name.trim(),role:EMPED.role,terr:EMPED.terr,sup:EMPED.sup,phone:EMPED.phone,email:EMPED.email,
    login:EMPED.login.trim(),password:EMPED.password.trim(),plan:EMPED.plan||25,active:EMPED.active!==false,perms:EMPED.perms,
    caps:{order:$('#cap_order')?$('#cap_order').checked:true,delivery:$('#cap_delivery')?$('#cap_delivery').checked:false,ret:$('#cap_return')?$('#cap_return').checked:true,expense:$('#cap_expense')?$('#cap_expense').checked:false},
    restrictCats:EMPED.restrictCats,restrictTypes:EMPED.restrictTypes,restrictMethods:EMPED.restrictMethods,
    restrictProducts:EMPED.restrictProducts||[],restrictTerrs:EMPED.restrictTerrs||[],restrictRoutes:EMPED.restrictRoutes||[]};
  // автозапрет маршрутов запрещённых территорий
  const tset=new Set(data.restrictTerrs);
  DB.routes.forEach(r=>{if(tset.has(r.terr)&&!data.restrictRoutes.includes(r.id))data.restrictRoutes.push(r.id);});
  let supId=id;
  if(id)Object.assign(emp(id),data);else{supId=uid('e');DB.employees.push({id:supId,...data});}
  if(EMPED.role==='supervisor'){const subs=new Set(EMPED.subs||[]);
    DB.employees.filter(x=>x.role==='agent'||x.role==='courier'||x.role==='expediter').forEach(x=>{
      if(subs.has(x.id))x.sup=supId;else if(x.sup===supId)x.sup='';});}
  logAct('Участники','Сотрудник: сохранён',EMPED.name);saveDB();closeModal();renderContent();toast('Сотрудник сохранён');}

function clientPhoto(inp){const f=inp.files&&inp.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{const img=new Image();img.onload=()=>{const max=500;let w=img.width,h=img.height;
    if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
    CLPIC=cv.toDataURL('image/jpeg',0.6);const b=$('#c_photo_box');if(b)b.style.backgroundImage="url('"+CLPIC+"')";};img.src=r.result;};
  r.readAsDataURL(f);}
function routeOptions(tid,sel){const rs=DB.routes.filter(r=>r.terr===tid);return '<option value="">—</option>'+rs.map(r=>`<option value="${r.id}" ${sel===r.id?'selected':''}>${esc(r.name)}${r.day?' ('+r.day+')':''}</option>`).join('');}

function openImport(){
  openModal(`<h2>Импорт клиентов из Excel</h2>
    <div class="hint" style="line-height:1.7;margin-bottom:12px">Файл .xlsx или .csv с колонками (первая строка — заголовки):<br>
    <b>name</b> (название) · <b>type</b> (тип клиента) · <b>address</b> (адрес) · <b>lat</b> · <b>lng</b> · phone · owner · contact · landmark · legal<br>
    Территория и маршрут прикрепятся <b>автоматически по координатам</b> — к ближайшей территории (по отметке на карте в Настройках) и её маршруту. Базу точек (гейм-клубы, школы, магазины) можно выгрузить из 2ГИС или Яндекс.Бизнес.</div>
    <label class="btn primary" style="cursor:pointer;display:block;text-align:center">Выбрать файл<input type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="doImport(this)"></label>
    <div id="imp_res" class="hint" style="margin-top:10px"></div>
    <button class="btn ghost" style="width:100%;margin-top:12px" onclick="closeModal()">Закрыть</button>`);
}
function nearestTerr(lat,lng){let best=null,bd=1e9;
  DB.territories.forEach(t=>{if(!t.center)return;const d=(t.center[0]-lat)**2+(t.center[1]-lng)**2;if(d<bd){bd=d;best=t;}});
  return best||DB.territories[0]||null;}
function doImport(input){const file=input.files&&input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{try{
    const wb=XLSX.read(r.result,{type:'binary'});
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
    let added=0,skipped=0;
    rows.forEach(row=>{
      const name=String(row.name||row.Name||row['название']||'').trim();
      const lat=+row.lat||+row.Lat,lng=+row.lng||+row.Lng||+row.lon;
      if(!name||!lat||!lng){skipped++;return;}
      if(DB.clients.some(c=>(c.name||'').toLowerCase()===name.toLowerCase())){skipped++;return;}
      const t=nearestTerr(lat,lng);
      const typeName=String(row.type||row['тип']||'').trim().toLowerCase();
      let ct=DB.clientTypes.find(x=>x.name.toLowerCase()===typeName);
      if(!ct&&typeName){ct={id:uid('ct'),name:String(row.type||row['тип']).trim()};DB.clientTypes.push(ct);}
      const dow=1;const rt=t?DB.routes.find(r=>r.terr===t.id&&r.dow===dow):null;
      DB.clients.push({id:uid('cl'),name,legal:String(row.legal||'').trim()||name,owner:String(row.owner||'').trim()||'—',
        contact:String(row.contact||'').trim()||'—',phone:String(row.phone||'').trim()||'—',addr:String(row.address||row['адрес']||'').trim()||'—',
        landmark:String(row.landmark||'').trim()||'—',terr:t?.id||'',route:rt?.id||'',type:ct?.id||'',discount:0,agent:'',
        debt:0,active:true,created:todayTashkent(),act:0.6,lat,lng});
      added++;});
    logAct('Участники','Импорт клиентов: добавлено '+added+', пропущено '+skipped,file.name);
    saveDB();$('#imp_res').innerHTML='<b style="color:var(--green)">Добавлено: '+added+'</b> · пропущено (без имени/координат или дубликаты): '+skipped;
    renderContent&&setTimeout(()=>{},0);
  }catch(e){$('#imp_res').innerHTML='<b style="color:var(--red)">Ошибка чтения файла</b>';}};
  r.readAsBinaryString(file);}

/* ---- KPI / Зарплата ---- */
const KPI_TYPES={
  fixed:{l:'Фиксированная часть',u:'сум',sc:false},
  bonus:{l:'Доп. бонус (Extra)',u:'сум',sc:false},
  sum:{l:'% от суммы продаж',u:'%',sc:true},
  qty:{l:'За штуку',u:'сум/шт',sc:true},
  kg:{l:'За килограмм',u:'сум/кг',sc:true},
  visit:{l:'За визит',u:'сум/визит',sc:false},
  akb:{l:'За активного клиента (АКБ)',u:'сум/клиент',sc:false},
  newClient:{l:'За добавление клиента (ОКБ)',u:'сум/клиент',sc:true},
  noReturn:{l:'Бонус за безвозвратность',u:'сум',sc:false}
};
function ruleItems(rule,o){const sc=rule.scope||{kind:'all'};
  if(sc.kind==='ctype'){const c=cli(o.client);return (c&&c.type===sc.ref)?o.items:[];}
  if(sc.kind==='category')return o.items.filter(i=>prod(i.p)?.cat===sc.ref);
  if(sc.kind==='product')return o.items.filter(i=>i.p===sc.ref);
  return o.items;}
function computeKpi(a){
  const dord=DB.orders.filter(o=>o.agent===a.id&&o.status==='delivered'&&inP(o.date));
  const vis=DB.visits.filter(v=>v.agent===a.id&&inP(v.date)).length;
  const akb=new Set(DB.orders.filter(o=>o.agent===a.id&&inP(o.date)).map(o=>o.client)).size;
  const rets=DB.returns.filter(r=>r.agent===a.id&&inP(r.date)).length;
  const sales=dord.reduce((s,o)=>s+o.total,0);
  let total=0;const bd=[];
  DB.kpis.filter(k=>k.active&&(k.applyTo==='agent'||k.applyTo===a.id)).forEach(k=>{let amt=0;
    if(k.type==='fixed'||k.type==='bonus')amt=k.rate;
    else if(k.type==='visit')amt=vis*k.rate;
    else if(k.type==='akb')amt=akb*k.rate;
    else if(k.type==='newClient'){let n=DB.clients.filter(c=>c.agent===a.id&&c.created&&inP(c.created)&&(!k.scope||k.scope.kind!=='ctype'||c.type===k.scope.ref)).length;amt=n*k.rate;}
    else if(k.type==='noReturn')amt=rets===0?k.rate:0;
    else dord.forEach(o=>{const its=ruleItems(k,o);
      if(k.type==='sum')amt+=its.reduce((s,i)=>s+i.q*i.price,0)*k.rate/100;
      else if(k.type==='qty')amt+=its.reduce((s,i)=>s+i.q,0)*k.rate;
      else if(k.type==='kg')amt+=its.filter(i=>prod(i.p)?.unit==='кг').reduce((s,i)=>s+i.q,0)*k.rate;});
    total+=amt;bd.push({k,amt});});
  return {total,bd,vis,akb,rets,sales};
}

    <div class="card"><div class="between"><div><b>${esc(k.name)}</b><div style="margin-top:4px"><span class="pill gold">${t.l}</span> <span class="pill ${k.active?'green':'gray'}">${k.active?'вкл':'выкл'}</span></div></div>
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer"><input type="checkbox" ${k.active?'checked':''} onchange="toggleKpi('${k.id}')"></label></div>

      <td class="num">${c.rets?`<span style="color:var(--red)">${c.rets}</span>`:'0'}</td>
      <td class="num"><b style="color:var(--green)">${money(c.total)}</b></td></tr>`).join('')||'<tr><td colspan="7"><div class="empty">Нет торговых</div></td></tr>'}</tbody></table>
  </div>`;
}

  DB.employees.filter(e=>e.role==='agent').forEach(a=>{const c=computeKpi(a);rows.push([a.name,terr(a.terr)?.name||'',c.sales,c.vis,c.akb,c.rets,c.total]);});return rows;}

  KPED=JSON.parse(JSON.stringify(k));KPED._id=id||'';if(!KPED.scope)KPED.scope={kind:'all',ref:''};renderKpiEditor();}
function kpiSync(){const v=k=>$('#k_'+k)?$('#k_'+k).value:undefined;
  if(v('name')!==undefined)KPED.name=v('name');if(v('rate')!==undefined)KPED.rate=+v('rate')||0;

  openModal(`<h2>${KPED._id?'Изменить правило KPI':'Новое правило KPI'}</h2>

/* ---- Касса доставщиков: сколько привёз, расходы, сколько сдать, товар-возврат ---- */
function courierStats(empId){
  const inPer=d=>inP(pdate(d));
  // деньги, принятые этим сотрудником (доставка/оплаты)
  const pays=DB.payments.filter(p=>(p.employee===empId)&&inPer(p.date));
  const cash=pays.reduce((s,p)=>s+p.amount,0);
  // отгружено товаром (заказы, где курьер=этот, статус был отгружен/доставлен) за период
  const myOrders=DB.orders.filter(o=>(o.courier===empId||o.agent===empId)&&inPer(o.date)&&!o._deliverMarker);
  const shipped=myOrders.reduce((s,o)=>s+(o.total||0),0);
  const delivered=myOrders.filter(o=>o.status==='delivered').reduce((s,o)=>s+(o.total||0),0);
  const consign=myOrders.filter(o=>o.payType==='consignment').reduce((s,o)=>s+(o.total||0),0);
  // расходы
  const exps=(DB.expenses||[]).filter(x=>x.employee===empId&&inPer(x.date));
  const autoExp=exps.filter(x=>!x.salary).reduce((s,x)=>s+x.amount,0);
  const ownExp=exps.filter(x=>x.salary).reduce((s,x)=>s+x.amount,0);
  const allExp=autoExp+ownExp;
  // возврат товара (для фирмы — это ТОВАР, не деньги)
  const rets=DB.returns.filter(r=>r.agent===empId&&inPer(r.date));
  const retQty=rets.reduce((s,r)=>s+(r.items||[]).reduce((a,i)=>a+(i.q||0),0),0);
  const retSum=rets.reduce((s,r)=>s+(r.amount||0),0);
  // СКОЛЬКО СДАТЬ = наличные − все расходы
  const toCashbox=cash-allExp;
  return {cash,shipped,delivered,consign,autoExp,ownExp,allExp,retQty,retSum,toCashbox,orders:myOrders.length};
}

let AIH=[];
function aiCtx(){
  const t=today();const t30=addDays(t,-30);
  const debt=DB.clients.reduce((s,c)=>s+(c.debt>0?c.debt:0),0);
  const ordToday=DB.orders.filter(o=>o.date===t);
  const supDebt=DB.suppliers.reduce((s,x)=>s+Math.max(0,x.balance||0),0);
  // топ должников
  const topDebt=DB.clients.filter(c=>c.debt>0).sort((a,b)=>b.debt-a.debt).slice(0,5)
    .map(c=>c.name+' '+Math.round(c.debt)).join('; ')||'нет';
  // непосещённые 14+ дней (есть клиент, но визита давно нет)
  const lastVisit={};DB.visits.forEach(v=>{if(!lastVisit[v.client]||v.date>lastVisit[v.client])lastVisit[v.client]=v.date;});
  const notVisited=DB.clients.filter(c=>c.active!==false&&(!lastVisit[c.id]||lastVisit[c.id]<addDays(t,-14)));
  // клиенты с возвратами за 30 дней
  const retByCli={};DB.returns.filter(r=>r.date>=t30).forEach(r=>{retByCli[r.client]=(retByCli[r.client]||0)+(r.amount||0);});
  const topRet=Object.entries(retByCli).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,v])=>(cli(id)?.name||'?')+' '+Math.round(v)).join('; ')||'нет';
  // лидеры продаж 30 дней
  const salesByCli={};DB.orders.filter(o=>o.date>=t30&&o.status!=='canceled').forEach(o=>{salesByCli[o.client]=(salesByCli[o.client]||0)+o.total;});
  const topSales=Object.entries(salesByCli).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,v])=>(cli(id)?.name||'?')+' '+Math.round(v)).join('; ')||'нет';
  return `Клиентов: ${DB.clients.length} (активных ${DB.clients.filter(c=>c.active!==false).length}). Сотрудников: ${DB.employees.length}. Товаров: ${DB.products.length}. `+
    `Территорий: ${DB.territories.length}, маршрутов: ${DB.routes.length}. Заказов сегодня: ${ordToday.length} на ${Math.round(ordToday.reduce((s,o)=>s+o.total,0))} сум. `+
    `Долг клиентов всего: ${Math.round(debt)} сум. Долг поставщикам: ${Math.round(supDebt)} сум. `+
    `ТОП должников: ${topDebt}. `+
    `Непосещённых клиентов 14+ дней: ${notVisited.length}${notVisited.length?' ('+notVisited.slice(0,8).map(c=>c.name).join(', ')+(notVisited.length>8?'…':'')+')':''}. `+
    `ТОП по возвратам (30дн): ${topRet}. `+
    `ТОП по продажам (30дн): ${topSales}.`;
}

function aiCmdLabel(c){
  const pn=id=>prod(id)?.name||id, en=id=>emp(id)?.name||id, cn=id=>cli(id)?.name||id;
  switch(c.do){

    case 'product_name':return 'переименовать товар → '+c.value;
    case 'product_stock':return 'остаток "'+pn(c.id)+'" → '+c.value;
    case 'emp_active':return (c.value===false||c.value==='false'?'заблокировать':'разблокировать')+' сотрудника "'+en(c.id)+'"';
    case 'emp_plan':return 'план визитов "'+en(c.id)+'" → '+c.value;

      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1500,
        system:aiSystem(),
        messages:AIH.map(m=>({role:m.role,content:m.content}))})});
    const data=await res.json();

    const cmds=[];txt=txt.replace(/\[\[ACTION:(\{[\s\S]*?\})\]\]/g,(m,j)=>{try{cmds.push(JSON.parse(j));}catch(e){}return '';}).trim();

}

/* применение команды AI — с подтверждением кодом */
function aiApply(idx,ci){
  const m=AIH[idx];if(!m||!m.cmds||!m.cmds[ci])return;const cmd=m.cmds[ci];
  askCode(()=>{
    const r=aiExec(cmd);
    cmd._done=r?true:'err';cmd._result=r||'не удалось';
    logAct('Настройки','AI изменил по команде: '+(r||'ошибка'),'');
    saveDB();aiRender();renderContent();toast(r?'Применено':'Не удалось');
  });
}
function aiExec(c){
  try{
    if(c.do==='product_price'){const p=prod(c.id);if(!p)return null;const old=p.price;p.price=+c.value;return 'цена "'+p.name+'": '+money(old)+' → '+money(p.price);}
    if(c.do==='product_name'){const p=prod(c.id);if(!p)return null;const old=p.name;p.name=String(c.value);return 'товар переименован: '+old+' → '+p.name;}
    if(c.do==='product_stock'){const p=prod(c.id);if(!p)return null;p.stock=+c.value;p.stockBy=p.stockBy||{};p.stockBy.w_main=+c.value;return 'остаток "'+p.name+'" = '+c.value;}
    if(c.do==='emp_active'){const e=emp(c.id);if(!e)return null;e.active=c.value!==false&&c.value!=='false';return 'сотрудник "'+e.name+'": '+(e.active?'разблокирован':'заблокирован');}
    if(c.do==='emp_plan'){const e=emp(c.id);if(!e)return null;e.plan=+c.value;return 'план визитов "'+e.name+'" = '+c.value;}
    if(c.do==='client_discount'){const x=cli(c.id);if(!x)return null;x.discount=+c.value;return 'скидка "'+x.name+'" = '+c.value+'%';}
    if(c.do==='client_active'){const x=cli(c.id);if(!x)return null;x.active=c.value!==false&&c.value!=='false';return 'клиент "'+x.name+'": '+(x.active?'активен':'неактивен');}
    if(c.do==='client_cleardebt'){const x=cli(c.id);if(!x)return null;const old=x.debt;x.debt=0;return 'долг "'+x.name+'" списан ('+money(old)+' → 0)';}
    if(c.do==='rule'){if(!DB.rules[c.id])return null;DB.rules[c.id].enabled=c.value!==false&&c.value!=='false';return 'правило "'+c.id+'": '+(DB.rules[c.id].enabled?'вкл':'выкл');}
  }catch(e){return null;}
  return null;
}

function debtorMatch(c){const f=finFilt;

  if(!(f.type==='all'||c.type===f.type))return false;
  if(!(f.agent==='all'||c.agent===f.agent))return false;
  if(f.product!=='all'||f.cat!=='all'){const uo=DB.orders.filter(o=>o.client===c.id&&(o.total-(o.paid||0))>0);
    if(!uo.some(o=>o.items.some(i=>(f.product==='all'||i.p===f.product)&&(f.cat==='all'||prod(i.p)?.cat===f.cat))))return false;}
  return true;}

    <div class="legrow" style="margin-top:12px;font-size:15px"><span class="nm"><b>Распределено</b></span><b id="pw_alloc">${money(allocSum)}</b></div>
    <div class="legrow"><span class="nm">Остаток к распределению</span><b id="pw_left" style="color:${left===0?'var(--green)':'var(--red)'}">${money(left)}</b></div>
    <div class="modal-actions"><button class="btn ghost" onclick="PAYW.step=1;renderPay()">← Назад</button><button class="btn primary" onclick="payNext2()">Далее →</button></div>`);
  $('#modal').classList.add('wide');
}
function payAllocSync(){const amt=+PAYW.amount;let s=0;DB.orders.filter(o=>o.client===PAYW.client).forEach(o=>{const el=$('#al_'+o.id);if(el){PAYW.alloc[o.id]=el.value;s+=(+el.value||0);}});
  if($('#pw_alloc'))$('#pw_alloc').textContent=money(s);if($('#pw_left')){$('#pw_left').textContent=money(amt-s);$('#pw_left').style.color=(amt-s)===0?'var(--green)':'var(--red)';}}
function payAuto(){let amt=+PAYW.amount;PAYW.alloc={};const uo=DB.orders.filter(o=>o.client===PAYW.client&&(o.total-(o.paid||0))>0).sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  uo.forEach(o=>{const rem=o.total-(o.paid||0);if(amt<=0)return;const take=Math.min(rem,amt);PAYW.alloc[o.id]=take;amt-=take;});renderPay();}
function payNext2(){payAllocSync();const amt=+PAYW.amount;const allocSum=Object.values(PAYW.alloc).reduce((s,v)=>s+(+v||0),0);
  const uo=DB.orders.filter(o=>o.client===PAYW.client&&(o.total-(o.paid||0))>0);
  if(uo.length&&allocSum!==amt){toast('Распределите всю сумму по заказам');return;}
  PAYW.step=3;renderPay();}
function payStep3(){const c=cli(PAYW.client);const amt=+PAYW.amount;
  const allocs=Object.entries(PAYW.alloc).map(([oid,a])=>({order:oid,amount:+a})).filter(x=>x.amount>0);
  openModal(`<h2>Оплата · шаг 3 из 3 — просмотр</h2>
    <div class="card"><div class="legend">
      <div class="legrow"><span class="nm">Клиент</span><b>${esc(c.name)}</b></div>
      <div class="legrow"><span class="nm">Принял</span><b>${esc(emp(PAYW.employee)?.name||'—')}</b></div>
      <div class="legrow"><span class="nm">Способ</span><b>${METHODP[PAYW.method]}</b></div>
      <div class="legrow"><span class="nm">Сумма</span><b style="color:var(--green)">${money(amt)}</b></div>
      ${allocs.length?'<div style="border-top:1px solid var(--line);margin:6px 0;padding-top:6px"></div>'+allocs.map(a=>`<div class="legrow"><span class="nm">${ordNum(a.order)}</span><b>${money(a.amount)}</b></div>`).join(''):''}
    </div></div>
    <div class="hint" style="margin-top:8px">После подтверждения долг клиента уменьшится, а сумма попадёт в кассу.</div>
    <div class="modal-actions"><button class="btn ghost" onclick="PAYW.step=2;renderPay()">← Назад</button><button class="btn primary" onclick="payConfirm()">Подтвердить оплату</button></div>`);
}
function payConfirm(){const w=PAYW,c=cli(w.client),amt=+w.amount;
  const allocs=Object.entries(w.alloc).map(([oid,a])=>({order:oid,amount:+a})).filter(x=>x.amount>0);
  allocs.forEach(a=>{const o=DB.orders.find(o=>o.id===a.order);if(o){o.paid=Math.min(o.total,(o.paid||0)+a.amount);}});
  c.debt=Math.max(0,(c.debt||0)-amt);
  DB.payments.push({id:uid('pay'),client:w.client,employee:w.employee||'',method:w.method,amount:amt,date:nowTashkent(),allocations:allocs});
  logAct('Финансы','Оплата: принята '+money(amt),c.name);saveDB();closeModal();PAYW=null;finSub='cashbox';renderContent();toast('Оплата проведена: '+money(amt));}

let stockWH='w_main';
function whQty(p,wh){if(p.stockBy&&p.stockBy[wh]!==undefined)return p.stockBy[wh];return wh==='w_main'?(p.stock||0):0;}
function pageStock(){

  </div>
  <div class="grid" style="grid-template-columns:repeat(3,1fr)">
    <div class="kpi green"><div class="label">Позиций на складе «${esc(w?.name||'')}»</div><div class="value">${inStock.length}</div></div>
    <div class="kpi"><div class="label">Стоимость остатков (${esc(w?.name||'')})</div><div class="value">${short(totalVal)}<small> сум</small></div></div>

  <div class="tablewrap">

    <tbody>${rows.length?rows.map(({p,qty})=>`<tr style="${qty<=0?'opacity:.45':''}"><td><b>${esc(p.name)}</b></td><td><span class="pill gray">${esc(cat(p.cat)?.name||'—')}</span></td>
      <td class="num">${money(p.price)}</td><td>${esc(p.unit)}</td><td class="num"><b>${qty}</b></td><td class="num">${short(qty*p.price)}</td>
      <td class="num"><button class="btn ghost" style="padding:5px 10px" onclick="editProd('${p.id}')">Изм.</button></td></tr>`).join(''):'<tr><td colspan="7"><div class="empty">Товаров нет</div></td></tr>'}</tbody></table>
  </div>`;
}
/* ---- Корректировка склада (код 2020) ---- */
function setWhQty(p,wh,q){p.stockBy=p.stockBy||{};p.stockBy[wh]=Math.max(0,q);if(wh==='w_main')p.stock=Math.max(0,q);}
function openCorrection(){
  if(!DB.products.length){toast('Товаров нет');return;}
  const w=warehouse(stockWH);
  openModal(`<h2>Корректировка — ${esc(w?.name||'')}</h2>
    <div class="hint" style="margin-bottom:10px">Инвентаризация: укажи фактический остаток. Разница спишется/добавится автоматически и попадёт в журнал. Подтверждение кодом.</div>
    <div class="field"><label>Товар</label><select id="cor_prod" onchange="corShow()">${DB.products.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select></div>
    <div class="card" style="padding:10px 14px;margin-bottom:12px;background:#FBF8F0"><div class="between"><span class="hint">Остаток по программе</span><b id="cor_cur">${whQty(DB.products[0],stockWH)}</b></div></div>
    <div class="field"><label>Фактический остаток *</label><input id="cor_fact" type="number" placeholder="напр. 90"></div>
    <div class="field"><label>Комментарий (необязательно)</label><input id="cor_note" placeholder="итоги инвентаризации"></div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Отмена</button><button class="btn danger" onclick="saveCorrection()">Скорректировать</button></div>`);
}
function corShow(){const p=prod($('#cor_prod').value);if($('#cor_cur'))$('#cor_cur').textContent=whQty(p,stockWH);}
function saveCorrection(){const pid=$('#cor_prod').value,fact=$('#cor_fact').value,note=$('#cor_note').value.trim();
  if(fact===''){toast('Введите фактический остаток');return;}
  const p=prod(pid),w=warehouse(stockWH),cur=whQty(p,stockWH),nf=Math.max(0,+fact||0),diff=nf-cur;
  if(diff===0){toast('Остаток совпадает — корректировка не нужна');return;}
  askCode(()=>{setWhQty(p,stockWH,nf);
    logAct('Склад','Корректировка ('+(w?.name||'')+'): '+p.name+' '+cur+' → '+nf+' ('+(diff>0?'+':'')+diff+')',note||'инвентаризация');
    saveDB();renderContent();toast('Скорректировано: '+p.name+' '+cur+' → '+nf);});}

/* ---- Возврат поставщику ---- */
function openSupReturn(){
  if(!DB.products.length){toast('Товаров нет');return;}
  if(!DB.suppliers.length){toast('Сначала добавьте поставщика');return;}
  openModal(`<h2>Возврат поставщику</h2>
    <div class="field"><label>Со склада *</label><select id="sr_wh">${DB.warehouses.map(w=>`<option value="${w.id}" ${w.id===stockWH?'selected':''}>${esc(w.name)}</option>`).join('')}</select></div>
    <div class="field"><label>Товар *</label><select id="sr_prod" onchange="srSupOpts()">${DB.products.map(p=>`<option value="${p.id}">${esc(p.name)} (приход. ${money(p.cost||0)})</option>`).join('')}</select></div>
    <div class="field"><label>Поставщик * <span class="hint">(только от кого был приход этого товара)</span></label><select id="sr_sup"></select></div>
    <div class="field"><label>Количество *</label><input id="sr_qty" type="number" placeholder="0"></div>
    <div class="hint" style="margin-bottom:8px">Сумма считается по приходной цене. Остаток склада уменьшится; долг поставщику уменьшится, а если долга нет — образуется предоплата.</div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="saveSupReturn()">Провести возврат</button></div>`);
  setTimeout(srSupOpts,0);
}
function srSupOpts(){const pid=$('#sr_prod')?$('#sr_prod').value:'';
  const ids=[...new Set((DB.arrivals||[]).filter(a=>a.prod===pid&&a.sup).map(a=>a.sup))];
  const sel=$('#sr_sup');if(!sel)return;
  sel.innerHTML=ids.length?ids.map(id=>{const sp=supplier(id);return sp?`<option value="${sp.id}">${esc(sp.name)}</option>`:''}).join(''):'<option value="">— приходов этого товара не было —</option>';}
function saveSupReturn(){const wh=$('#sr_wh').value,sup=$('#sr_sup').value,pid=$('#sr_prod').value,qty=+$('#sr_qty').value||0;
  if(!qty||qty<=0){toast('Введите количество');return;}
  const p=prod(pid),sx=supplier(sup),w=warehouse(wh);
  if(!sup||!sx){toast('Нет поставщика прихода для этого товара');return;}
  const hadArr=(DB.arrivals||[]).some(a=>a.prod===pid&&a.sup===sup);
  if(!hadArr){toast('От этого поставщика не было прихода товара «'+(p?.name||'')+'» — возврат возможен только поставщику прихода');return;}
  const cur=whQty(p,wh);
  if(qty>cur){toast('На складе «'+(w?.name||'')+'» только '+cur);return;}
  const total=(p.cost||0)*qty;
  askCode(()=>{setWhQty(p,wh,cur-qty);
    sx.balance=(sx.balance||0)-total; // минус = предоплата
    logAct('Склад','Возврат поставщику: '+p.name+' × '+qty+' с «'+(w?.name||'')+'» → '+(sx.name||''),money(total));
    saveDB();closeModal();renderContent();
    toast('Возврат проведён: '+money(total)+(sx.balance<0?' · предоплата '+money(-sx.balance):''));});}

function openArrival(){
  if(!DB.products.length){toast('Сначала добавьте товары');return;}
  openModal(`<h2>Приход товара</h2>
    <div class="field"><label>Склад *</label><select id="ar_wh">${DB.warehouses.map(w=>`<option value="${w.id}">${esc(w.name)}</option>`).join('')}</select></div>
    <div class="field"><label>Поставщик</label><select id="ar_sup"><option value="">—</option>${DB.suppliers.map(sp=>`<option value="${sp.id}">${esc(sp.name)}</option>`).join('')}</select></div>
    <div class="field"><label>Товар *</label><select id="ar_prod">${DB.products.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select></div>
    <div style="display:flex;gap:10px">
      <div class="field" style="flex:1"><label>Количество *</label><input id="ar_qty" type="number" placeholder="0"></div>
      <div class="field" style="flex:1"><label>Приходная цена (за ед.)</label><input id="ar_cost" type="number" placeholder="по карточке"></div>
    </div>
    <div class="hint" style="margin-bottom:8px">Остаток выбранного склада увеличится; если указан поставщик — его баланс (долг) вырастет на сумму прихода.</div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="saveArrival()">Провести приход</button></div>`);
}
function saveArrival(){const wh=$('#ar_wh').value,sup=$('#ar_sup').value,pid=$('#ar_prod').value,qty=+$('#ar_qty').value||0,cost=+$('#ar_cost').value||0;
  if(!qty||qty<=0){toast('Введите количество');return;}
  const p=prod(pid);if(!p){toast('Товар не найден');return;}
  if(wh==='w_main')p.stock=(p.stock||0)+qty;
  p.stockBy=p.stockBy||{};p.stockBy[wh]=(p.stockBy[wh]||0)+qty;
  const unitCost=cost||p.cost||0;const total=unitCost*qty;
  if(sup){const sx=supplier(sup);if(sx)sx.balance=(sx.balance||0)+total;}
  DB.arrivals=DB.arrivals||[];DB.arrivals.push({id:uid('arr'),date:nowTashkent(),wh,sup:sup||'',prod:pid,qty,cost:unitCost});
  logAct('Склад','Приход: '+p.name+' × '+qty+' → '+(warehouse(wh)?.name||wh)+(sup?(' от '+(supplier(sup)?.name||'')):''),money(total));
  saveDB();closeModal();renderContent();toast('Приход проведён: '+p.name+' × '+qty);}
function stockRows(){const w=warehouse(stockWH);const rows=[['Склад','Название','Категория','Цена','Ед','Остаток','Стоимость']];
  DB.products.forEach(p=>{const q=whQty(p,stockWH);rows.push([w?.name||'',p.name,cat(p.cat)?.name||'',p.price,p.unit,q,q*p.price]);});return rows;}
let prodPic=null;
function editProd(id){const p=id?prod(id):{name:'',cat:DB.categories[0]?.id||'',cost:'',price:'',unit:DB.units[0]?.name||'шт',stock:0,supplier:'',packQty:'',photo:null};
  prodPic=p.photo||null;
  const markup=(p.price&&p.cost)?Math.round((p.price-p.cost)/p.cost*100):0;

      <div class="field" style="flex:1"><label>В пачке, штук</label><input id="f_packQty" type="number" value="${p.packQty||''}" placeholder="напр. 24"></div>
    </div>

    </div>

      <div class="between" style="margin-top:6px"><span class="hint">Маржинальность (прибыль от продажной)</span><b id="f_margin" style="color:var(--green)">${margin}%</b></div>
    </div>
    <div class="field"><label>Видео о товаре (до 15 сек) — ссылка YouTube или mp4</label><input id="f_video" value="${esc(p.video||'')}" placeholder="https://youtu.be/… или https://…/video.mp4"></div>
    <div class="hint" style="margin-bottom:8px">Остаток и поставщик задаются при приходе товара на склад (раздел «Склад»).</div>

    ${id?`<button class="btn danger" style="width:100%;margin-top:10px" onclick="delProd('${id}')">Удалить</button>`:''}`);}
function prodPhoto(input){const file=input.files&&input.files[0];if(!file)return;const r=new FileReader();
  r.onload=()=>{const img=new Image();img.onload=()=>{const max=400;let w=img.width,h=img.height;if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
    prodPic=cv.toDataURL('image/jpeg',0.7);const box=$('#f_pic_box');if(box){box.style.backgroundImage="url('"+prodPic+"')";box.textContent='';}};img.src=r.result;};
  r.readAsDataURL(file);}
function prodMargin(){const cost=+$('#f_cost').value||0,price=+$('#f_price').value||0;
  const mk=cost>0?Math.round((price-cost)/cost*100):0;const mg=price>0?Math.round((price-cost)/price*100):0;
  if($('#f_markup'))$('#f_markup').textContent=mk+'%';if($('#f_margin'))$('#f_margin').textContent=mg+'%';}
function saveProd(id){const v=k=>$('#f_'+k)?$('#f_'+k).value.trim():'';
  if(!v('name')){toast('Введите название');return;}
  if(!prodPic){toast('Добавьте фото товара');return;}
  if(!v('cat')){toast('Выберите группу продуктов');return;}
  if(!v('price')){toast('Укажите продажную цену');return;}
  const data={name:v('name'),cat:v('cat'),unit:v('unit')||'шт',packQty:+v('packQty')||0,photo:prodPic,cost:+v('cost')||0,price:+v('price'),video:v('video')};
  if(id)Object.assign(prod(id),data);else DB.products.push({id:uid('p'),...data,stock:0,supplier:''});
  logAct('Склад','Товар: сохранён',data.name);saveDB();closeModal();renderContent();toast('Сохранено');}
function delProd(id){
  const p=prod(id);const hasOrd=DB.orders.some(o=>o.items&&o.items.some(i=>i.p===id));
  const hasStock=(p?.stock||0)>0||Object.values(p?.stockBy||{}).some(q=>q>0);
  if(hasOrd||hasStock){toast('Нельзя удалить: товар '+(hasOrd?'участвует в заказах':'')+(hasOrd&&hasStock?' и ':'')+(hasStock?'имеет остаток на складе':''));return;}
  askCode(()=>{DB.products=DB.products.filter(p=>p.id!==id);logAct('Склад','Товар: удалён',id);saveDB();renderContent();toast('Товар удалён');});}

/* =====================================================================
   7. МАРКЕТИНГ — акции и скидки
   ===================================================================== */
const PROMO_TYPE={qty:'Количество (N+M)',amount:'За сумму заказа',discount:'Скидка'};
const METHOD_LABEL={cash:'Наличные',terminal:'Терминал',debt:'В долг'};
function promoStatus(p){
  const t=today();
  if(!p.active)return['Отключена','gray'];
  if(p.start>t)return['Запланирована','blue'];
  if(p.end<t)return['Завершена','gray'];
  return['Активна','green'];
}
function promoRule(p){
  if(p.type==='qty'){
    const bp=p.buyProduct==='any'?'любой товар':(prod(p.buyProduct)?.name||'—');
    const fp=prod(p.freeProduct)?.name||'—';
    return `Купить ${p.buyQty} (${esc(bp)}) → бонус +${p.freeQty} (${esc(fp)})`;
  }
  if(p.type==='amount'){
    const rew=p.rewardKind==='discount'?`скидка ${p.rewardPct}%`:`+${p.rewardQty} ${esc(prod(p.rewardProduct)?.name||'товар')}`;
    return `При заказе от ${money(p.minAmount)} → ${rew}`;
  }
  if(p.type==='discount'){
    let on='';
    if(p.discTarget==='ctype')on='тип: '+(ctype(p.discRef)?.name||'—');
    if(p.discTarget==='client')on='клиент: '+(cli(p.discRef)?.name||'—');
    if(p.discTarget==='product')on='товар: '+(prod(p.discRef)?.name||'—');
    return `Скидка ${p.discPct}% — ${esc(on)}`;
  }
  return '';
}
function promoScope(p){
  const parts=[];
  parts.push((!p.employees||!p.employees.length)?'все сотрудники':p.employees.length+' сотр.');
  parts.push((!p.ctypes||!p.ctypes.length)?'все типы':p.ctypes.length+' тип(ов)');
  parts.push((!p.methods||!p.methods.length)?'любая оплата':p.methods.map(m=>METHOD_LABEL[m]).join(', '));
  return parts.join(' · ');
}

function promoTypeChange(){

  if(t==='discount'){const tg=$('#f_discTarget').value;fillDiscRef(tg,$('#f_discRef').value);}

function fillDiscRef(target,cur){
  const sel=$('#f_discRef');if(!sel)return;
  let list=[];
  if(target==='ctype')list=DB.clientTypes;
  else if(target==='client')list=DB.clients;
  else if(target==='product')list=DB.products;
  sel.innerHTML=list.map(x=>`<option value="${x.id}" ${x.id===cur?'selected':''}>${esc(x.name)}</option>`).join('');
}
function savePromo(id){
  const v=k=>$('#f_'+k)?.value;
  const name=(v('name')||'').trim();if(!name){toast('Введите название');return;}
  const collect=cls=>[...document.querySelectorAll('.'+cls+':checked')].map(x=>x.value);
  const p={id:id||uid('pr'),name,type:v('type'),active:true,start:v('start'),end:v('end'),
    employees:collect('ck_emp'),ctypes:collect('ck_ct'),methods:collect('ck_m')};
  if(p.type==='qty')Object.assign(p,{buyProduct:v('buyProduct'),buyQty:+v('buyQty')||0,freeProduct:v('freeProduct'),freeQty:+v('freeQty')||0});
  if(p.type==='amount')Object.assign(p,{minAmount:+v('minAmount')||0,rewardKind:v('rewardKind'),rewardPct:+v('rewardPct')||0,rewardProduct:v('rewardProduct'),rewardQty:+v('rewardQty')||0});
  if(p.type==='discount')Object.assign(p,{discTarget:v('discTarget'),discRef:v('discRef'),discPct:+v('discPct')||0});
  if(id){const old=DB.promos.find(x=>x.id===id);p.active=old.active;Object.assign(old,p);}
  else DB.promos.push(p);
  saveDB();closeModal();pageMkt();toast('Акция сохранена');
}

/* ============ КОНТРОЛЬ СОТРУДНИКОВ ============ */
function hm2min(s){const[h,m]=String(s||'0:0').split(':').map(Number);return h*60+(m||0);}
function tmOfISO(iso){const d=new Date(iso);return d.getHours()*60+d.getMinutes();}
/* анализ одного сотрудника за день → массив нарушений */
function detectViolations(empId,date){
  const C=DB.control;if(!C||!C.enabled)return [];
  const e=emp(empId);if(!e)return [];
  const out=[];
  const vis=DB.visits.filter(v=>v.agent===empId&&pdate(v.date)===date).sort((a,b)=>String(a.at).localeCompare(String(b.at)));
  const trk=(DB.tracks&&DB.tracks['trk_'+empId+'_'+date]);
  // план точек на этот день (территория сотрудника)
  const dow=((new Date(date+'T12:00').getDay())+6)%7+1;
  const dayRoutes=new Set(DB.routes.filter(r=>r.dow===dow&&(!e.terr||r.terr===e.terr)).map(r=>r.id));
  const planClients=DB.clients.filter(c=>c.active!==false&&(c.agent===empId||(e.terr&&c.terr===e.terr))&&dayRoutes.has(c.route));
  const mk=(type,label,fine,extra)=>({id:'vio_'+empId+'_'+date+'_'+type+(extra&&extra.client?'_'+extra.client:''),
    agent:empId,date,type,label,fine,sup:e.sup||'',created:date,...(extra||{})});

  // 1) ОПОЗДАНИЕ — первый визит/трек позже начала работы
  const firstAct=vis[0]?tmOfISO(vis[0].at):(trk&&trk.firstAt?tmOfISO(trk.firstAt):null);
  const startLimit=hm2min(C.workStart)+(C.lateGraceMin||0);
  if(firstAct===null){
    out.push(mk('late','Не вышел на территорию (нет визитов и GPS)',C.fines.late));
  }else if(firstAct>startLimit){
    out.push(mk('late','Опоздание: первый визит в '+Math.floor(firstAct/60)+':'+String(firstAct%60).padStart(2,'0')+' (норма '+C.workStart+')',C.fines.late));
  }

  // 2) ФИКТИВНЫЙ визит — короче минимума
  vis.forEach(v=>{if((v.durSec||0)<(C.minVisitSec||300)){
    out.push(mk('fake','Фиктивный визит '+(cli(v.client)?.name||'')+': '+(v.durSec||0)+' сек (норма '+Math.round(C.minVisitSec/60)+' мин)',C.fines.fake,{client:v.client,visit:v.id}));
  }
  // 3) Визит без заказа и без комментария
  if(v.result==='novisit'&&!String(v.comment||'').trim()){
    out.push(mk('nocomment','Нет заказа без причины: '+(cli(v.client)?.name||''),C.fines.nocomment,{client:v.client,visit:v.id}));
  }
  // 6) Геозона — визит далеко от точки
  if(v.distM!=null&&v.distM>(C.geofenceM||300)){
    out.push(mk('geofence','Визит вне точки '+(cli(v.client)?.name||'')+': '+v.distM+' м от адреса',C.fines.geofence,{client:v.client,visit:v.id}));
  }});

  // 4) РАННИЙ уход — последняя активность раньше конца работы (только если вообще работал)
  const lastAct=vis.length?tmOfISO(vis[vis.length-1].endAt||vis[vis.length-1].at):(trk&&trk.lastAt?tmOfISO(trk.lastAt):null);
  if(lastAct!==null&&lastAct<hm2min(C.workEnd)){
    out.push(mk('early','Ранний уход: закончил в '+Math.floor(lastAct/60)+':'+String(lastAct%60).padStart(2,'0')+' (норма до '+C.workEnd+')',C.fines.early));
  }

  // 5) МАРШРУТ не завершён
  if(planClients.length){
    const visited=new Set(vis.map(v=>v.client));
    const donePct=Math.round([...visited].filter(id=>planClients.some(c=>c.id===id)).length/planClients.length*100);
    if(donePct<(C.routeDonePct||90)){
      out.push(mk('unfinished','Маршрут не завершён: '+donePct+'% из '+planClients.length+' точек',C.fines.unfinished));
    }
  }
  return out;
}
/* применить нарушения за период: записать в журнал + уведомить супервайзера */
function runControl(fromDate,toDate){
  if(!DB.control||!DB.control.enabled){toast('Контроль выключен в настройках');return;}
  const agents=DB.employees.filter(e=>e.role==='agent'||(e.caps&&e.caps.order));
  let added=0;
  const dates=dateRange(fromDate,toDate);
  agents.forEach(e=>dates.forEach(d=>{
    detectViolations(e.id,d).forEach(v=>{
      if(!DB.violations.some(x=>x.id===v.id)){
        DB.violations.push(v);added++;
        // уведомление супервайзеру
        const supId=e.sup;
        if(supId)DB.notifications.push({id:'ntf_'+v.id,to:supId,agent:e.id,date:d,
          text:'⚠ '+e.name+': '+v.label+' — штраф '+money(v.fine),fine:v.fine,read:false,created:nowTashkent()});
      }
    });
  }));
  saveDB();renderContent();toast(added?('Найдено нарушений: '+added):'Новых нарушений нет');
}
function dateRange(from,to){const out=[];let d=new Date(from+'T12:00'),end=new Date(to+'T12:00');
  while(d<=end){out.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}return out;}

let ctrlFilt={emp:'all',from:today(),to:today(),type:'all'};
function pageControl(){
  const VT={late:'Опоздание',fake:'Фиктивный визит',nocomment:'Нет заказа без причины',early:'Ранний уход',unfinished:'Маршрут не завершён',geofence:'Вне геозоны'};
  let vis=DB.violations.filter(v=>pdate(v.date)>=ctrlFilt.from&&pdate(v.date)<=ctrlFilt.to);
  if(ctrlFilt.emp!=='all')vis=vis.filter(v=>v.agent===ctrlFilt.emp);
  if(ctrlFilt.type!=='all')vis=vis.filter(v=>v.type===ctrlFilt.type);
  vis.sort((a,b)=>String(b.date).localeCompare(String(a.date)));

function repOrders(){
  let ords=DB.orders.filter(o=>inP(pdate(o.date)));
  if(repFilt.by==='ctype'&&repFilt.value!=='all')ords=ords.filter(o=>cli(o.client)?.type===repFilt.value);
  else if(repFilt.by==='agent'&&repFilt.value!=='all')ords=ords.filter(o=>o.agent===repFilt.value);
  else if(repFilt.by==='sup'&&repFilt.value!=='all'){const ids=new Set(DB.employees.filter(e=>e.sup===repFilt.value).map(e=>e.id));ords=ords.filter(o=>ids.has(o.agent));}
  return ords;
}
function orderSumFiltered(o,which){
  if(repFilt.by==='cat'&&repFilt.value!=='all'){
    return (o.items||[]).filter(i=>prod(i.p)?.cat===repFilt.value).reduce((s,i)=>{
      const p=prod(i.p);if(!p)return s;return s+(which==='cost'?(p.cost||0)*i.q:(i.price||p.price||0)*i.q);},0);
  }
  if(which==='cost')return (o.items||[]).reduce((s,i)=>{const p=prod(i.p);return s+(p?(p.cost||0)*i.q:0);},0);
  return o.total||0;
}
function salesFunnel(){
  const ords=repOrders();
  let gross=0,canceled=0,shelf=0,disc=0;
  ords.forEach(o=>{
    const base=orderSumFiltered(o,'total');
    if(o.status==='canceled'){canceled+=base;return;}
    gross+=base+(o.discount||0);
    disc+=o.discount||0;
    shelf+=o.shelfReturn||o.returnAmt||0;
  });
  if(DB.returns)DB.returns.filter(r=>inP(pdate(r.date))&&r.type==='shelf').forEach(r=>{shelf+=r.amount||0;});
  const net=gross-canceled-shelf-disc;
  return {gross,canceled,shelf,disc,net,count:ords.filter(o=>o.status!=='canceled').length};
}

function agentKpiRows(){
  const agents=DB.employees.filter(e=>e.role==='agent'||e.role==='supervisor'||(e.caps&&e.caps.order));
  return agents.map(e=>{
    const vis=DB.visits.filter(v=>v.agent===e.id&&inP(pdate(v.date)));
    const ords=DB.orders.filter(o=>o.agent===e.id&&inP(pdate(o.date))&&o.status!=='canceled');
    const sum=ords.reduce((s,o)=>s+o.total,0);
    const akb=new Set(ords.map(o=>o.client)).size;
    const plan=DB.clients.filter(c=>c.active!==false&&(c.agent===e.id||(e.terr&&c.terr===e.terr))).length;
    const pct=plan>0?Math.round(vis.length/plan*100):0;
    return {name:e.name,plan,visits:vis.length,pct:Math.min(100,pct),orders:ords.length,sum,akb,avg:ords.length?Math.round(sum/ords.length):0};
  }).sort((a,b)=>b.sum-a.sum);
}
function agentKpiExport(){const rows=[['Сотрудник','Точек(план)','Визитов','Выполнение%','Заказов','Сумма','AKB','Средний чек']];

function topClientRows(){
  const map={};
  DB.orders.filter(o=>inP(pdate(o.date))&&o.status!=='canceled').forEach(o=>{
    if(!map[o.client])map[o.client]={orders:0,sum:0};map[o.client].orders++;map[o.client].sum+=o.total;});
  return Object.entries(map).map(([id,v])=>({name:cli(id)?.name||'?',route:route(cli(id)?.route)?.name||'—',orders:v.orders,sum:v.sum,debt:cli(id)?.debt||0}))

}

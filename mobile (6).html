<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#143D2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>HALWAA · Мобильный</title>
<style>
:root{--bg:#F4F5F7;--ink:#1C2536;--muted:#8A94A6;--line:#EAEDF2;--card:#FFFFFF;--navy:#1E2A44;--navy2:#28365A;--accent:#3B6FE0;--accent2:#5B8DEF;--gold:#C9A227;--green:#1E9E6A;--red:#E2574C;--blue:#3B6FE0;--amber:#E0922F}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-size:14.5px;padding-bottom:84px}
.top{position:sticky;top:0;z-index:20;background:var(--bg);color:var(--ink);padding:16px 18px 10px;display:flex;align-items:center;justify-content:space-between}
.top b{font-size:21px;letter-spacing:-.3px;font-weight:800}
.top .tools{display:flex;align-items:center;gap:14px}
.top .ic{width:24px;height:24px;stroke:var(--ink);fill:none;stroke-width:1.9}
.ava{width:42px;height:42px;border-radius:50%;background:var(--navy) center/cover;display:grid;place-items:center;font-weight:800;color:#fff;font-size:15px}
.wrap{padding:4px 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(28,37,54,.04)}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:12px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
.kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.kpi .v{font-size:22px;font-weight:800;margin-top:4px;color:var(--navy);letter-spacing:-.5px}
.kpi .v small{font-size:12px;color:var(--muted);font-weight:600}
.hint{font-size:12px;color:var(--muted)}
.pill{display:inline-block;padding:4px 10px;border-radius:8px;font-size:11.5px;font-weight:700}
.pill.green{background:#E4F5EC;color:#1E9E6A}.pill.red{background:#FCE9E7;color:#E2574C}
.pill.gold{background:#F6EFD8;color:#8a6d0f}.pill.blue{background:#E8F0FE;color:#3B6FE0}
.pill.gray{background:#EEF1F5;color:#6B7689}.pill.amber{background:#FBF0DF;color:#E0922F}
.btn{display:block;width:100%;border:none;border-radius:14px;padding:14px;font-size:14.5px;font-weight:700;cursor:pointer;text-align:center;transition:transform .08s}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--navy);color:#fff}
.btn.gold{background:var(--accent);color:#fff}
.btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--navy)}
.btn.danger{background:#fff;border:1.5px solid #F2C9C5;color:var(--red)}
.btn.sm{width:auto;display:inline-block;padding:9px 14px;font-size:13px;border-radius:11px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:13px;font-size:15px;background:#fff;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:25;padding:6px 0 calc(6px + env(safe-area-inset-bottom));box-shadow:0 -2px 16px rgba(28,37,54,.06)}
.nav button{flex:1;border:none;background:none;padding:8px 2px;font-size:11px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:4px;font-weight:600}
.nav button.on{color:var(--navy);font-weight:700}
.nav button.on .navic{background:#EEF1F8}
.navic{width:46px;height:30px;border-radius:14px;display:grid;place-items:center;transition:background .15s}
.nav svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.chiprow{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:11px}
.chip{flex:0 0 auto;padding:11px 20px;border-radius:999px;border:1.5px solid var(--line);background:#fff;font-size:14px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.search{display:flex;gap:8px;margin-bottom:14px}
.search input{flex:1;padding:14px 16px;border:1.5px solid var(--line);border-radius:14px;font-size:15px;background:#fff}
.modal-bg{position:fixed;inset:0;background:rgba(20,28,44,.45);z-index:40;display:none;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:var(--bg);width:100%;max-height:92vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom))}
.modal h2{font-size:18px;margin-bottom:14px;color:var(--navy);font-weight:800}
.toast{position:fixed;left:14px;right:14px;bottom:90px;background:var(--navy);color:#fff;padding:13px 16px;border-radius:13px;z-index:60;font-size:13.5px;display:none}
.prodimg{width:54px;height:54px;border-radius:12px;background:#EEF1F5 center/cover;flex:0 0 auto}
.qty{width:74px;padding:10px;border:1.5px solid var(--line);border-radius:11px;text-align:center;font-weight:800;font-size:15px}
.fab{position:fixed;right:16px;bottom:96px;z-index:26;background:var(--accent);color:#fff;border:none;border-radius:999px;padding:16px 22px;font-weight:700;font-size:15px;box-shadow:0 8px 24px rgba(59,111,224,.4)}
.timer{font-variant-numeric:tabular-nums;font-weight:800;color:var(--navy);font-size:17px}
#opFab{position:fixed;right:16px;bottom:96px;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#3B6FE0,#2C5BC8);box-shadow:0 10px 26px rgba(43,91,200,.42);display:flex;align-items:center;justify-content:center;z-index:40;cursor:pointer;text-decoration:none;animation:opIn .35s ease}
#opFab svg{width:27px;height:27px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#opFab::after{content:"";position:absolute;inset:0;border-radius:50%;box-shadow:0 0 0 0 rgba(59,111,224,.5);animation:opRing 2.2s infinite}
@keyframes opRing{0%{box-shadow:0 0 0 0 rgba(59,111,224,.45)}70%{box-shadow:0 0 0 14px rgba(59,111,224,0)}100%{box-shadow:0 0 0 0 rgba(59,111,224,0)}}
@keyframes opIn{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.seg{display:flex;background:#EAEDF2;border-radius:13px;padding:4px;margin-bottom:12px}
.seg button{flex:1;border:none;background:none;padding:10px;border-radius:10px;font-weight:700;font-size:13px;color:var(--muted)}
.seg button.on{background:#fff;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:280px;margin:20px auto}
.pinpad button{aspect-ratio:1;border-radius:50%;border:none;background:#fff;font-size:24px;font-weight:600;color:var(--navy);transition:transform .08s;box-shadow:0 1px 3px rgba(28,37,54,.06)}
.pinpad button:active{transform:scale(.92);background:#EEF1F8}
.pindots{display:flex;gap:16px;justify-content:center;margin:20px 0}
.pindots i{width:14px;height:14px;border-radius:50%;background:#D5DBE5;display:block;transition:background .15s}
.pindots i.f{background:var(--navy)}
.center{min-height:90vh;display:flex;flex-direction:column;justify-content:center;padding:24px}
.bar{height:9px;background:#E4E8EF;border-radius:99px;overflow:hidden;flex:1}
.bar i{display:block;height:100%;border-radius:99px;background:var(--accent)}
#map,#pickmap{height:48vh;border-radius:16px;border:1px solid var(--line)}
#pickmap{height:38vh}
.empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:13.5px}
.logo{width:72px;height:72px;border-radius:20px;background:var(--navy);color:#fff;display:grid;place-items:center;font-size:34px;font-weight:800;font-family:Georgia,serif;margin:0 auto 16px}
.locbtn{position:absolute;right:12px;bottom:12px;z-index:5;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:9px 13px;font-weight:700;font-size:13px;color:var(--navy);box-shadow:0 3px 10px rgba(0,0,0,.12)}
.tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:14px}
.tile{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 10px;display:flex;flex-direction:column;align-items:center;gap:9px;cursor:pointer}
.tile svg{width:28px;height:28px;stroke:var(--navy);fill:none;stroke-width:1.7}
.tile span{font-size:12.5px;font-weight:600;color:var(--ink);text-align:center;line-height:1.25}
.summary{background:var(--navy);color:#fff;border-radius:18px;padding:18px;margin-bottom:14px}
.summary h4{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between}
.summary .sr{display:flex;align-items:center;justify-content:space-between;padding:9px 0;font-size:14px;color:#B8C2D6}
.summary .sr b{color:#fff;font-size:15px}
.summary .sbar{flex:1;height:7px;background:rgba(255,255,255,.12);border-radius:99px;margin:0 12px;overflow:hidden}
.summary .sbar i{display:block;height:100%;background:var(--accent2);border-radius:99px}
.rcard{background:#fff;border:1px solid var(--line);border-radius:16px;margin-bottom:12px;overflow:hidden}
.rcard .rtop{padding:15px 16px 13px}
.rcard .rname{font-size:16px;font-weight:700;color:var(--navy)}
.rcard .raddr{font-size:13px;color:var(--muted);margin-top:2px}
.rcard .ract{display:flex;border-top:1px solid var(--line)}
.rcard .ract button{flex:1;border:none;background:none;padding:13px;font-weight:700;font-size:14px;color:var(--navy);display:flex;align-items:center;justify-content:center;gap:7px}
.rcard .ract button:first-child{border-right:1px solid var(--line)}
.rcard .ract svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.9}
.ccard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:11px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.ccard .cph{width:54px;height:54px;border-radius:13px;background:#EEF1F5 center/cover;flex:0 0 auto;display:grid;place-items:center}
.ccard .cph svg{width:26px;height:26px;stroke:#B6C0D0;fill:none;stroke-width:1.6}
.dock{position:fixed;left:50%;transform:translateX(-50%);bottom:92px;z-index:24;display:flex;gap:10px}
.dock button{background:var(--navy);color:#fff;border:none;border-radius:999px;padding:15px 26px;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 22px rgba(28,37,54,.28)}
.dock button svg{width:19px;height:19px;fill:none;stroke:#fff;stroke-width:1.9}
/* ===== ПОГОДНЫЕ АНИМАЦИИ (10 видов) ===== */
.wx-hero{position:relative;overflow:hidden;border-radius:18px;color:#fff;padding:18px 18px 16px}
.wx-hero .wx-content{position:relative;z-index:3}
.tgspin{width:26px;height:26px;border:3px solid rgba(59,111,224,.25);border-top-color:#3B6FE0;border-radius:50%;animation:tgspin .8s linear infinite}@keyframes tgspin{to{transform:rotate(360deg)}}
.wx-layer{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.wxvid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2}
.fsvid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.wx-sun{position:absolute;top:-26px;right:-26px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,#FFF6D5 0%,#FFE27A 35%,#FFC93C 58%,rgba(255,201,60,0) 73%);box-shadow:0 0 55px 16px rgba(255,210,90,.38);animation:wxspin 40s linear infinite}
@keyframes wxspin{to{transform:rotate(360deg)}}
@keyframes vpulse{0%,100%{opacity:1}50%{opacity:.3}}
.wx-cloud{position:absolute;border-radius:50px;background:rgba(255,255,255,.85);filter:blur(.3px)}
.wx-cloud::before,.wx-cloud::after{content:"";position:absolute;background:inherit;border-radius:50%}
.wx-cloud{width:90px;height:26px}
.wx-cloud::before{width:42px;height:42px;top:-18px;left:14px}
.wx-cloud::after{width:30px;height:30px;top:-12px;right:14px}
.wx-c1{top:14px;left:-100px;opacity:.9;animation:wxdrift 22s linear infinite}
.wx-c2{top:46px;left:-140px;transform:scale(.7);opacity:.7;animation:wxdrift 32s linear infinite;animation-delay:4s}
@keyframes wxdrift{0%{transform:translateX(0)}100%{transform:translateX(340px)}}
@keyframes wxdrift2{0%{transform:translateX(0) scale(.7)}100%{transform:translateX(340px) scale(.7)}}
.wx-drop{position:absolute;top:-12px;width:2px;height:14px;background:linear-gradient(transparent,rgba(190,225,255,.95));border-radius:2px;animation:wxfall 1s linear infinite}
@keyframes wxfall{0%{transform:translateY(-14px);opacity:0}20%{opacity:1}100%{transform:translateY(160px);opacity:.2}}
.wx-flake{position:absolute;top:-10px;color:#fff;font-size:11px;opacity:.9;animation:wxsnow 5s linear infinite}
@keyframes wxsnow{0%{transform:translateY(-10px) translateX(0);opacity:0}15%{opacity:1}100%{transform:translateY(170px) translateX(18px);opacity:.2}}
.wx-bolt{position:absolute;top:10px;right:40px;font-size:30px;animation:wxflash 4s ease-in-out infinite}
@keyframes wxflash{0%,92%,100%{opacity:0}94%,98%{opacity:1}}
.wx-fog{position:absolute;left:-50%;width:200%;height:18px;background:rgba(255,255,255,.35);border-radius:50%;filter:blur(6px);animation:wxfog 14s linear infinite}
@keyframes wxfog{0%{transform:translateX(0)}100%{transform:translateX(60px)}}
.wx-star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;opacity:.8;animation:wxtwinkle 3s ease-in-out infinite}
@keyframes wxtwinkle{0%,100%{opacity:.25}50%{opacity:.9}}
@keyframes pwaUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
/* ===== ПОЛНОЭКРАННАЯ ПОГОДНАЯ АНИМАЦИЯ (15 сек) ===== */
#wxfs{position:fixed;inset:0;z-index:9000;pointer-events:none;overflow:hidden;opacity:0;transition:opacity .8s}
#wxfs.show{opacity:1}
#wxfs .fs-grad{position:absolute;inset:0}
.fs-drop{position:absolute;top:-20px;width:2px;height:22px;background:linear-gradient(transparent,rgba(180,220,255,.9));border-radius:2px;animation:fsfall linear infinite}
@keyframes fsfall{to{transform:translateY(110vh)}}
.fs-flake{position:absolute;top:-20px;color:#fff;animation:fsflake linear infinite}
@keyframes fsflake{to{transform:translateY(110vh) translateX(40px) rotate(360deg)}}
.fs-sun{position:absolute;top:8%;left:50%;transform:translateX(-50%);width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,235,130,.95),rgba(255,200,60,.5) 60%,transparent 72%);animation:fssun 6s ease-in-out infinite}
@keyframes fssun{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.12)}}
.fs-ray{position:absolute;top:8%;left:50%;width:4px;height:240px;background:linear-gradient(rgba(255,220,90,.5),transparent);transform-origin:top center}
.fs-cloud{position:absolute;border-radius:60px;background:rgba(255,255,255,.9);width:140px;height:42px;animation:fsdrift linear infinite}
.fs-cloud::before{content:"";position:absolute;width:64px;height:64px;border-radius:50%;background:inherit;top:-28px;left:22px}
.fs-cloud::after{content:"";position:absolute;width:46px;height:46px;border-radius:50%;background:inherit;top:-18px;right:24px}
@keyframes fsdrift{from{transform:translateX(-200px)}to{transform:translateX(110vw)}}
.fs-bolt{position:absolute;font-size:70px;animation:fsbolt 3s ease-in-out infinite}
@keyframes fsbolt{0%,88%,100%{opacity:0}90%,96%{opacity:1}}
.fs-star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;animation:fstw 2.5s ease-in-out infinite}
@keyframes fstw{0%,100%{opacity:.2}50%{opacity:1}}
/* ===== ПОЛНОЭКРАННАЯ АНИМАЦИЯ ПОГОДЫ (7 сек, 20 явлений) ===== */
#wxfs{position:fixed;inset:0;z-index:99998;overflow:hidden;pointer-events:none;animation:wxfsFade 7s forwards}
@keyframes wxfsFade{0%{opacity:0}6%{opacity:1}88%{opacity:1}100%{opacity:0;visibility:hidden}}
.fs-drop{position:absolute;top:-50px;width:1.4px;height:50px;background:linear-gradient(transparent 0%,rgba(200,226,255,.2) 35%,rgba(214,234,255,.92) 100%);border-radius:2px;filter:blur(.3px);animation:fsfall linear infinite}
@keyframes fsfall{to{transform:translateY(110vh)}}
.fs-flake{position:absolute;top:-30px;color:#fff;text-shadow:0 0 6px rgba(255,255,255,.95),0 0 13px rgba(255,255,255,.6);opacity:.92;filter:blur(.4px);animation:fsflake linear infinite}
@keyframes fsflake{to{transform:translateY(110vh) translateX(40px) rotate(360deg)}}
.fs-leaf{position:absolute;top:-40px;font-size:26px;animation:fsleaf linear infinite}
@keyframes fsleaf{0%{transform:translateY(0) rotate(0)}100%{transform:translateY(110vh) translateX(-60px) rotate(540deg)}}
.fs-sun{position:absolute;top:9%;left:50%;transform:translateX(-50%);width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,#FFF7DC 0%,#FFE27A 28%,#FFC93C 48%,rgba(255,190,60,.3) 66%,transparent 77%);box-shadow:0 0 95px 38px rgba(255,206,86,.42);animation:fsSunPulse 5s ease-in-out infinite}
@keyframes fsSunPulse{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.12)}}
.fs-cloud{position:absolute;border-radius:60px;background:radial-gradient(circle at 50% 72%,#fff 0 55%,rgba(255,255,255,.82) 73%,transparent 86%);width:175px;height:54px;opacity:.92;filter:blur(2.5px) drop-shadow(0 11px 17px rgba(70,90,120,.15));animation:fscloud linear infinite}
.fs-cloud::before{content:"";position:absolute;width:80px;height:80px;background:#fff;border-radius:50%;top:-32px;left:30px;filter:blur(3px)}
.fs-cloud::after{content:"";position:absolute;width:58px;height:58px;background:#fff;border-radius:50%;top:-22px;right:28px;filter:blur(3px)}
@keyframes fscloud{from{transform:translateX(-200px)}to{transform:translateX(110vw)}}
.fs-star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;animation:fstwinkle ease-in-out infinite}
@keyframes fstwinkle{0%,100%{opacity:.2}50%{opacity:1}}
.fs-bolt{position:absolute;font-size:70px;animation:fsbolt 2.5s steps(1) infinite}
.fs-flash{position:absolute;inset:0;background:radial-gradient(circle at 50% 28%,rgba(255,255,255,.92),rgba(255,255,255,0) 62%);opacity:0;animation:fsFlash 4.5s ease-out infinite}
@keyframes fsFlash{0%,8%,100%{opacity:0}3%,5%{opacity:.85}4%{opacity:.18}}
@keyframes fsbolt{0%,90%,100%{opacity:0}92%,96%{opacity:1}}
.fs-santa{position:absolute;top:18%;font-size:54px;white-space:nowrap;animation:fssanta 6s linear forwards}
@keyframes fssanta{from{left:-140px;transform:translateY(0)}50%{transform:translateY(-30px)}to{left:110vw;transform:translateY(0)}}
.fs-bird{position:absolute;font-size:28px;animation:fsbird linear forwards}
@keyframes fsbird{from{left:-60px}to{left:110vw}}
.fs-balloon{position:absolute;bottom:-80px;font-size:44px;animation:fsballoon linear forwards}
@keyframes fsballoon{to{transform:translateY(-120vh) translateX(30px)}}
.fs-petal{position:absolute;top:-30px;font-size:20px;animation:fsleaf linear infinite}
.fs-fog{position:absolute;left:-30%;width:160%;height:80px;background:rgba(230,230,235,.5);border-radius:50%;filter:blur(14px);animation:fsfog ease-in-out infinite alternate}
@keyframes fsfog{from{transform:translateX(-40px)}to{transform:translateX(40px)}}
.fs-rainbow{position:absolute;top:6%;left:50%;transform:translateX(-50%);width:300px;height:150px;border-radius:300px 300px 0 0;border:14px solid;border-color:#e53 #fa3 #fd3 #5c5 #39f #63c transparent;border-bottom:none;opacity:.7;animation:fsfade2 1s}
@keyframes fsfade2{from{opacity:0}to{opacity:.7}}
.fs-moon{position:absolute;top:8%;right:16%;font-size:90px;animation:fsSunPulse 4s ease-in-out infinite}
.fs-meteor{position:absolute;width:3px;height:80px;background:linear-gradient(transparent,#fff);animation:fsmeteor linear infinite}
@keyframes fsmeteor{from{transform:translate(0,0) rotate(45deg);opacity:1}to{transform:translate(-120vw,120vh) rotate(45deg);opacity:0}}
.fs-bigemoji{position:absolute;top:10%;left:50%;transform:translateX(-50%);font-size:90px;animation:fsSunPulse 2.5s ease-in-out infinite}
.fs-hail{position:absolute;top:-20px;width:9px;height:9px;background:#dff;border-radius:50%;animation:fsfall linear infinite}
.fs-wind{position:absolute;font-size:30px;opacity:.6;animation:fsbird linear infinite}
.fs-label{position:absolute;bottom:8%;left:0;right:0;text-align:center;color:#fff;font-size:22px;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.5)}
</style>

/* ---------- Supabase REST ---------- */
function sbOk(){return SB_URL.startsWith('https://')&&SB_KEY.length>20;}
function H(){return {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};}
async function kvLoad(){
  // грузим только данные/справочники; тяжёлые строки чата (cmsg_/chat_msgs_) и
  // push (pushmsg_) исключаем — они грузятся отдельно по мере надобности.
  const r=await fetch(SB_URL+'/rest/v1/crm_kv?select=key,value&key=not.like.cmsg_*&key=not.like.chat_msgs_*&key=not.like.pushmsg_*',{headers:H()});
  if(!r.ok)throw new Error('kv '+r.status);
  const rows=await r.json();DATA={};rows.forEach(x=>DATA[x.key]=x.value);
  mergeLocalClients();refreshAccounts();
  localStorage.setItem('halwaa_mob_data',JSON.stringify(DATA));
}
/* клиенты, добавленные с этого телефона и ещё не влитые админкой — не должны пропадать */
function mergeLocalClients(){
  DATA.clients=DATA.clients||[];
  txAll().filter(t=>t.type==='client').forEach(t=>{
    if(!DATA.clients.some(c=>c.id===t.id||c.id===t.payload.id))DATA.clients.push(t.payload);});
}
/* админка — источник истины: обновляем имя/фото/план/запреты, выкидываем удалённых и неактивных */
function refreshAccounts(){
  const emps=L('employees');if(!emps.length)return;
  let kicked=false,kickName='';
  ST.accounts=ST.accounts.filter(a=>{
    if(a.id==='demo')return true;   // демо-аккаунт не зависит от облака
    const e=emps.find(x=>x.id===a.id);
    if(!e||e.active===false){if(a.id===ST.cur){kicked=true;kickName=a.name;}return false;}
    a.name=e.name;a.role=e.role;a.login=e.login;a.password=e.password;a.photo=e.photo||'';a.terr=e.terr||'';a.plan=e.plan||25;
    a.restrictCats=e.restrictCats||[];a.restrictProducts=e.restrictProducts||[];a.restrictTypes=e.restrictTypes||[];
    a.restrictTerrs=e.restrictTerrs||[];a.restrictRoutes=e.restrictRoutes||[];a.caps=e.caps||{};
    return true;});
  if(kicked){
    ST.cur=ST.accounts[0]?.id||null;ST.pinOk=ST.cur?ST.pinOk:false;save();
    // принудительно выкинуть с рабочих экранов
    VISIT=null;visitSave();closeM();
    setTimeout(()=>{toast('Аккаунт «'+kickName+'» отключён администратором');render();},50);
  } else save();
}
function logoutKicked(){ST.cur=null;ST.pinOk=false;save();render();}
async function txLoadMine(){
  if(!me())return;
  const r=await fetch(SB_URL+'/rest/v1/crm_tx?select=*&employee=eq.'+encodeURIComponent(me().id)+'&order=created_at.desc&limit=500',{headers:H()});
  if(r.ok){const cloud=await r.json();
    const cloudIds=new Set(cloud.map(t=>t.id));
    const localOnly=MYTX.filter(t=>!cloudIds.has(t.id));
    MYTX=[...localOnly,...cloud];
    // убираем операции по заказам, удалённым в админке (синхронизация удаления)
    const del=new Set(DATA._deleted||[]);
    if(del.size)MYTX=MYTX.filter(t=>!(t.type==='order'&&del.has(t.id)));
    localStorage.setItem('halwaa_mob_tx',JSON.stringify(MYTX));}
}
function pingApply(){try{fetch(SB_URL+'/functions/v1/crm-apply',{method:'POST',headers:H(),body:'{}'}).catch(()=>{});}catch(e){}}
async function txSend(type,payload){
  const rec={id:payload.id||uid(type[0]),type,employee:me()?me().id:'',payload,created_at:new Date().toISOString()};
  MYTX.unshift(rec);                                  // сразу видно в счётчиках/истории
  try{localStorage.setItem('halwaa_mob_tx',JSON.stringify(MYTX));}catch(e){}
  try{
    const r=await fetch(SB_URL+'/rest/v1/crm_tx?on_conflict=id',{method:'POST',headers:{...H(),'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify([rec])});
    if(!r.ok)throw 0;
    pingApply();  // мгновенно применить на сервере (работает даже если админка закрыта)
  }catch(e){ // не дошло до облака — в очередь на отправку (из MYTX не убираем, чтобы видеть)
    if(!ST.outbox.some(x=>x.id===rec.id)){ST.outbox.push(rec);save();}
  }
}
async function flushOutbox(){
  if(!ST.outbox.length)return;
  try{
    const r=await fetch(SB_URL+'/rest/v1/crm_tx?on_conflict=id',{method:'POST',headers:{...H(),'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(ST.outbox)});
    if(r.ok){ST.outbox=[];save();pingApply();}  // операции уже в MYTX; чистим очередь и применяем на сервере
  }catch(e){}
}
/* ===== ПОЛНАЯ СИНХРОНИЗАЦИЯ офлайн-заказов с проверкой остатков ===== */
async function fullSync(){
  if(!ST.outbox.length){toast('Всё уже отправлено ✅');render();return;}
  toast('Проверяю остатки…');
  try{await kvLoad();}catch(e){toast('Нет связи с сервером');return;}
  const stock={};L('products').forEach(p=>stock[p.id]=(p.stock||0));
  const shorts=[];
  ST.outbox.filter(r=>r.type==='order').forEach(rec=>{
    (rec.payload.items||[]).forEach(it=>{
      const avail=stock[it.p]!==undefined?stock[it.p]:0;
      if(it.q>avail){const pr=prod(it.p);shorts.push({rid:rec.id,pid:it.p,name:pr?pr.name:('товар '+it.p),need:it.q,avail:Math.max(0,avail)});}
      stock[it.p]=Math.max(0,avail-it.q);   // последовательное резервирование между офлайн-заказами
    });
  });
  if(shorts.length){
    window._SHORTS=shorts;

let TRACK=[];
let GEO_DENIED=false,GEO_WATCH=null,GEO_BYPASS=false,GPS_HIDE=false;
function geoStart(){
  if(!navigator.geolocation){GEO_DENIED=false;return;}  // нет API геолокации — работаем без неё
  try{TRACK=JSON.parse(localStorage.getItem('halwaa_track_'+today())||'[]');}catch(e){TRACK=[];}
  // проверяем статус разрешения заранее (где поддерживается)
  if(navigator.permissions&&navigator.permissions.query){
    navigator.permissions.query({name:'geolocation'}).then(st=>{
      if(st.state==='denied'&&!GEO_BYPASS){GEO_DENIED=true;if(me())render();}
      st.onchange=()=>{if(st.state==='granted'){GEO_DENIED=false;geoStart();if(me())render();}
        else if(st.state==='denied'&&!GEO_BYPASS){GEO_DENIED=true;if(me())render();}};
    }).catch(()=>{});
  }
  const rec=p=>{GEO=[p.coords.latitude,p.coords.longitude];try{localStorage.setItem('halwaa_lastgeo',JSON.stringify(GEO));}catch(e){}if(GEO_DENIED){GEO_DENIED=false;if(me())render();}
    const last=TRACK[TRACK.length-1];const t=new Date().toISOString();
    if(!last||distKm([last.lat,last.lng],GEO)>0.04||(Date.parse(t)-Date.parse(last.t))>180000){
      TRACK.push({lat:GEO[0],lng:GEO[1],t,spd:p.coords.speed||0,acc:p.coords.accuracy||0});
      if(TRACK.length>400)TRACK=TRACK.slice(-400);
      try{localStorage.setItem('halwaa_track_'+today(),JSON.stringify(TRACK));}catch(e){}
    }};
  const err=e=>{if(e&&e.code===1&&!GEO_BYPASS){GEO_DENIED=true;if(me())render();}};
  navigator.geolocation.getCurrentPosition(rec,err,{enableHighAccuracy:true,timeout:15000,maximumAge:0});
  try{if(GEO_WATCH)navigator.geolocation.clearWatch(GEO_WATCH);
    GEO_WATCH=navigator.geolocation.watchPosition(rec,err,{enableHighAccuracy:true,timeout:20000,maximumAge:10000});}catch(e){}
  if(!window._trkIv)window._trkIv=setInterval(()=>{if(me()&&TRACK.length)sendTrack();},300000);
}

function showPushFullscreen(msg){
  // вибрация + длинный звук-сигнал (~3.5 сек, мелодия)
  if(navigator.vibrate)navigator.vibrate([500,250,500,250,500,250,500]);
  try{if(window.AudioContext||window.webkitAudioContext){const c=new(window.AudioContext||window.webkitAudioContext)();
    const notes=[[880,0],[1100,.45],[880,.9],[1100,1.35],[660,1.8],[880,2.25],[1100,2.7],[880,3.15]];
    notes.forEach(([f,t0])=>{const o=c.createOscillator(),g=c.createGain();o.frequency.value=f;
      g.gain.setValueAtTime(.0001,c.currentTime+t0);g.gain.exponentialRampToValueAtTime(.35,c.currentTime+t0+.03);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+t0+.4);
      o.connect(g);g.connect(c.destination);o.start(c.currentTime+t0);o.stop(c.currentTime+t0+.42);});
  }}catch(e){}
  const old=document.getElementById('push_overlay');if(old)old.remove();
  const ov=document.createElement('div');ov.id='push_overlay';

  document.body.appendChild(ov);

}

function distKm(a,b){if(!a||!b)return null;const R=6371,dl=(b[0]-a[0])*Math.PI/180,dg=(b[1]-a[1])*Math.PI/180;
  const x=Math.sin(dl/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dg/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}

const VAPID_PUBLIC="BDk7OsRQnYiFKWRzlALa6NQ_-iDwYE8F50Hzcq6s2unelAvVWRTS7e1jkaBvbLueC0Gn8aLaZm7MljaXQOtDqV8";

function b64ToUint8(b){const pad='='.repeat((4-b.length%4)%4);const s=(b+pad).replace(/-/g,'+').replace(/_/g,'/');const r=atob(s);return Uint8Array.from([...r].map(c=>c.charCodeAt(0)));}
async function initPush(){
  if(!('serviceWorker'in navigator)||!('PushManager'in window))return;
  try{
    SW_REG=await navigator.serviceWorker.register('/sw.js');
    if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
    let sub=await SW_REG.pushManager.getSubscription();
    if(!sub){sub=await SW_REG.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:b64ToUint8(VAPID_PUBLIC)});}

async function checkConn(){

async function doLogin(){
  const l=$('#lg_l').value.trim().toLowerCase(),p=$('#lg_p').value.trim();
  if(!l||!p){toast('Введите логин и пароль');return;}
  // РЕЗЕРВНЫЙ демо-вход (всегда работает, чтобы проверить приложение)
  if(l==='demo'&&p==='demo'){
    const demo={id:'demo',name:'Демо агент',role:'agent',login:'demo',password:'demo',terr:'',caps:{order:true,ret:true,delivery:true},
      restrictCats:[],restrictProducts:[],restrictTypes:[],restrictTerrs:[],restrictRoutes:[],plan:25};
    if(!ST.accounts.some(a=>a.id==='demo'))ST.accounts.push(demo);
    ST.cur='demo';save();try{await kvLoad();}catch(e){}try{await txLoadMine();}catch(e){}
    toast('Демо-режим');VIEW='dash';render();return;
  }
  let emps=null,online=false;
  try{await kvLoad();emps=L('employees');online=true;}
  catch(e){
    // нет связи — пробуем локальный кэш (вход в офлайне)
    try{const cached=JSON.parse(localStorage.getItem('halwaa_mob_data')||'{}');emps=cached.employees||[];}catch(_){emps=[];}
  }
  if(!emps||!emps.length){
    if(online)toast('❌ В облаке нет сотрудников. В админке откройте Настройки → Интеграции → «Выгрузить в облако».');
    else toast('❌ Нет связи и нет сохранённых данных. Подключите интернет.');
    return;
  }
  const byLogin=emps.find(e=>String(e.login||'').trim().toLowerCase()===l);
  if(!byLogin){toast('❌ Логин «'+l+'» не найден. Нажмите «Проверить связь» — покажу все логины.');return;}
  if(byLogin.active===false){toast('❌ Аккаунт отключён администратором.');return;}
  if(String(byLogin.password||'').trim()!==p){toast('❌ Неверный пароль для «'+l+'».');return;}
  const emp=byLogin;
  if(!ST.accounts.some(a=>a.id===emp.id))ST.accounts.push({id:emp.id,name:emp.name,role:emp.role,login:emp.login,password:emp.password,photo:emp.photo||'',
    restrictCats:emp.restrictCats||[],restrictProducts:emp.restrictProducts||[],restrictTypes:emp.restrictTypes||[],
    restrictTerrs:emp.restrictTerrs||[],restrictRoutes:emp.restrictRoutes||[],terr:emp.terr||'',plan:emp.plan||25,caps:emp.caps||{}});
  else Object.assign(ST.accounts.find(a=>a.id===emp.id),{name:emp.name,role:emp.role,password:emp.password,terr:emp.terr||'',caps:emp.caps||{}});
  ST.cur=emp.id;save();
  try{await txLoadMine();}catch(e){}
  sendPresence();
  if(ST.pin){VIEW='dash';render();}
  else if(ST.pinAsked){VIEW='dash';render();}
  else pinOffer();
}

      <button onclick="pinKey('0','${mode}')" style="width:78px;height:78px;border:none;background:none;font-size:30px;font-weight:400;color:var(--navy);border-radius:50%">0</button>
      <button onclick="pinKey('⌫','${mode}')" style="width:78px;height:78px;border:none;background:none;border-radius:50%;display:grid;place-items:center"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#1C2536" stroke-width="1.6"><path d="M21 5H8l-5 7 5 7h13a2 2 0 002-2V7a2 2 0 00-2-2z"/><path d="M14 9l-4 6M10 9l4 6"/></svg></button>

      ${mode==='enter'?`<span style="color:#A8B0BD">Забыли пин-код? </span><b style="color:var(--navy)" onclick="pinForgot()">Войдите заново</b>`
        :`<b style="color:var(--navy)" onclick="pinBack('${mode}')">${mode==='set'?'Пропустить':'← Назад'}</b>`}
    </div>
  </div>`;
}
function pinBack(mode){PINBUF='';if(mode==='set'){ST.pinAsked=true;save();VIEW='dash';render();}else{pinScreen('set');}}
function pinKey(d,mode){
  if(d==='⌫'){PINBUF=PINBUF.slice(0,-1);pinScreen(mode);return;}
  if(PINBUF.length>=4)return;PINBUF+=d;
  if(PINBUF.length===4){
    if(mode==='set'){PINTMP=PINBUF;PINBUF='';pinScreen('rep');return;}
    if(mode==='rep'){if(PINBUF===PINTMP){ST.pin=PINBUF;ST.pinOk=true;ST.pinAsked=true;PINBUF='';save();VIEW='dash';render();}else{toast(T('wrongPin'));PINBUF='';pinScreen('set');}return;}
    if(mode==='enter'){if(PINBUF===ST.pin){ST.pinOk=true;PINBUF='';render();}else{toast(T('wrongPin'));PINBUF='';pinScreen('enter');}return;}
  }
  pinScreen(mode);
}

function planToday(){
  const m=me();if(!m)return 0;
  const dow=(new Date(today()+'T12:00').getDay()+6)%7+1; // 1=Пн..7=Вс
  const todayRoutes=new Set(L('routes').filter(r=>r.dow===dow&&(!m.terr||r.terr===m.terr)&&!((m.restrictRoutes||[]).includes(r.id))).map(r=>r.id));
  // клиенты этого сотрудника на сегодняшних маршрутах
  return myClients().filter(c=>todayRoutes.has(c.route)).length;
}

function greetSub(){
  const c=(DATA&&DATA.control)||{};
  let ws=parseInt(((c.workStart||'09:00')+'').split(':')[0]);let we=parseInt(((c.workEnd||'18:00')+'').split(':')[0]);
  if(isNaN(ws))ws=9; if(isNaN(we))we=18; if(we<=ws)we=ws+1;
  const now=tz();const h=now.getHours();
  const span=Math.max(1,we-ws);
  let slot=h<ws?0:(h>=we?span-1:h-ws); if(slot<0)slot=0;
  const day=parseInt((today()||'').replace(/-/g,''))||0;
  const rk=roleKey(me()&&me().role);const L=ST.lang||'ru';
  const arr=(TIPS[rk]&&(TIPS[rk][L]||TIPS[rk].ru))||[];
  if(!arr.length)return '';
  return arr[(day*span+slot)%arr.length];
}

let VTIMER=null;

/* активный визит переживает закрытие приложения (хранится в localStorage, таймер считается от startTs) */
function visitSave(){try{if(VISIT)localStorage.setItem('halwaa_mob_visit',JSON.stringify(VISIT));else localStorage.removeItem('halwaa_mob_visit');}catch(e){}}
function visitRestore(){try{const r=localStorage.getItem('halwaa_mob_visit');if(!r)return;const v=JSON.parse(r);
  if(v&&v.startTs&&(!v.agent||(me()&&v.agent===me().id))){VISIT=v;clearInterval(VTIMER);VTIMER=setInterval(tickVisit,1000);}

function startVisit(cid){
  if(VISIT&&VISIT.client!==cid){toast('Сначала завершите текущий визит');return;}
  VISIT={client:cid,agent:me()&&me().id,startTs:Date.now(),startAt:now(),photo:null,shelfPhotos:[],shelfMeta:[],actions:[],geo:GEO};
  clearInterval(VTIMER);VTIMER=setInterval(tickVisit,1000);visitSave();

}
function visitPhoto(inp){const f=inp.files&&inp.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{const img=new Image();img.onload=()=>{const max=500;let w=img.width,h=img.height;
    if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
    VISIT.photo=cv.toDataURL('image/jpeg',0.6);visitSave();render();toast('📷 OK');};img.src=r.result;};
  r.readAsDataURL(f);}
function endVisit(){

function finishVisitTx(comment){
  if(!VISIT.actions.length&&!comment){toast('Укажите причину, почему нет заказа');return;}
  const result=VISIT.actions.includes('refusal')?'refusal':VISIT.actions.includes('order')?'order':VISIT.actions.includes('return')?'return':'novisit';
  const c=cli(VISIT.client);

  // расстояние от места визита до координат точки (геозона — контроль фиктива)
  let distM=null;if(c&&c.lat&&VISIT.geo){distM=Math.round((distKm(VISIT.geo,[c.lat,c.lng])||0)*1000);}
  const p={id:uid('v'),client:VISIT.client,agent:me().id,date:today(),at:VISIT.startAt,endAt:now(),
    durSec:dur,result,comment:comment||'',refusal:VISIT.refusal||'',photo:VISIT.photo||'',shelfPhotos:VISIT.shelfPhotos||[],shelfMeta:VISIT.shelfMeta||[],
    geo:VISIT.geo||GEO,distM};

/* ---------- ДОСТАВКА: Доставлено с зачётом возврата/депозита ---------- */
function deliverFor(oid){
  const o=(DATA.orders||[]).find(x=>x.id===oid);if(!o)return;const c=cli(o.client);
  const dep=clientDeposit(o.client);            // уже имеющийся депозит магазина
  PROOF={oid:oid,client:o.client,photos:((o.consignPhotos||[]).map(x=>({data:(x&&x.data)||x,at:(x&&x.at)||''}))),_pending:null};
  openM(`<h2>📦 ${T('del')} · ${esc(o.number)}</h2>
    <div class="card" style="padding:12px"><div class="row" style="border:none;padding:0"><span>${T('total')} заказа</span><b>${money(o.total)}</b></div>
    ${dep>0?`<div class="row" style="border:none;padding:6px 0 0"><span class="pill green">Депозит магазина</span><b style="color:var(--green)">−${money(dep)}</b></div>`:''}</div>
    <div class="field"><label>Возврат при доставке (просрочка/с полки) — сумма</label>
      <input id="dv_ret" type="number" placeholder="0" oninput="dvCalc('${oid}')"></div>
    <div class="field"><label>Получено деньгами от магазина</label>

    <div class="field"><label>Способ оплаты</label><select id="dv_m" onchange="dvPayBtns('${oid}')"><option value="cash">${T('cash')}</option><option value="terminal">${T('terminal')}</option><option value="transfer">${T('transfer')}</option><option value="click">Click (QR)</option><option value="payme">Payme (QR)</option></select></div>
    <div id="dv_qr"></div>
    <div class="card" style="padding:12px;background:#F4F8F4"><div class="row" style="border:none;padding:0"><b>Итог по магазину</b><b id="dv_res" style="color:var(--green)">—</b></div>
      <div class="hint" id="dv_hint" style="margin-top:4px"></div></div>
    <div class="field" style="margin-top:6px"><label>📄 Фотонакладная с подписью клиента — обязательно при консигнации (остаётся долг)</label>
      <div id="dv_proof" style="margin-bottom:8px"></div>
      <button type="button" class="btn ghost" id="dv_proofbtn" onclick="openProofCam()">📷 Снять фото (только камера, до 3)</button>
      <div class="hint" style="margin-top:6px">На фото автоматически ставится дата и время. Без фото консигнацию завершить нельзя.</div></div>
    <button class="btn primary" style="margin-top:12px" onclick="confirmDeliver('${oid}')">${T('del')}</button>`);
  setTimeout(()=>{dvCalc(oid);renderProof();},0);

function payUrl(kind,amount,ref){const ig=DATA.integrationsPublic||DATA.integrations||{};
  if(kind==='payme'){const m=(ig.payme&&ig.payme.merchant||'').trim();if(!m)return null;
    return 'https://checkout.paycom.uz/'+btoa('m='+m+';ac.order_id='+ref+';a='+Math.round(amount*100));}
  if(kind==='click'){const c=ig.click||{};if(!(c.merchant||'').trim()||!(c.service||'').trim())return null;
    return 'https://my.click.uz/services/pay?service_id='+encodeURIComponent(c.service)+'&merchant_id='+encodeURIComponent(c.merchant)+'&amount='+amount+'&transaction_param='+encodeURIComponent(ref);}
  return null;}
function dvPayBtns(oid){const o=(DATA.orders||[]).find(x=>x.id===oid);if(!o)return;
  const m=$('#dv_m').value;const box=$('#dv_qr');if(!box)return;
  if(m!=='click'&&m!=='payme'){box.innerHTML='';return;}
  const amt=+($('#dv_cash')?.value)||o.total;
  const url=payUrl(m,amt,'HB-'+oid);
  if(!url){box.innerHTML=`<div class="hint" style="color:var(--red);margin-bottom:10px">Реквизиты ${m==='click'?'Click':'Payme'} не заполнены администратором (Настройки → Интеграции).</div>`;return;}
  const qr='https://api.qrserver.com/v1/create-qr-code/?size=220x220&data='+encodeURIComponent(url);
  box.innerHTML=`<div class="card" style="text-align:center;padding:14px">
    <b style="font-size:13px">Покажите QR магазину для оплаты ${m==='click'?'Click':'Payme'}</b>
    <img src="${qr}" style="width:200px;height:200px;margin:10px auto;display:block;border-radius:12px;background:#fff">
    <div class="hint">${money(amt)} · после оплаты нажмите «Доставлено»</div></div>`;}
function dvCalc(oid){const o=(DATA.orders||[]).find(x=>x.id===oid);if(!o)return;
  const dep=clientDeposit(o.client);
  const ret=+($('#dv_ret')?.value)||0;
  const cash=+($('#dv_cash')?.value)||0;
  // покрытие нового заказа = деньги + депозит + возврат(в зачёт)
  const covered=cash+dep+ret;
  const balance=covered-o.total;   // >0 излишек -> депозит, <0 остаток -> долг
  const res=$('#dv_res'),hint=$('#dv_hint');
  if(res){
    if(balance>0){res.textContent='депозит +'+money(balance);res.style.color='var(--green)';}
    else if(balance<0){res.textContent='долг '+money(-balance);res.style.color='var(--red)';}
    else{res.textContent='0 — закрыто';res.style.color='var(--green)';}
  }
  if(hint)hint.textContent=`Заказ ${money(o.total)} = деньги ${money(cash)}${dep>0?' + депозит '+money(dep):''}${ret>0?' + возврат '+money(ret):''}`;
}
function confirmDeliver(oid){
  const o=(DATA.orders||[]).find(x=>x.id===oid);if(!o)return;const c=cli(o.client);
  const dep=clientDeposit(o.client);
  const ret=+($('#dv_ret')?.value)||0;
  const cash=+($('#dv_cash')?.value)||0;
  const m=$('#dv_m').value;
  // консигнация = остаётся долг (total - возврат - деньги > 0) → обязательно фото накладной
  const willDebt=(o.total-ret-cash)>0;
  if(willDebt&&(!PROOF.photos||PROOF.photos.length<1)){toast('📄 Консигнация: снимите фото накладной');return;}
  let returnTxId='';
  // если был возврат деньгами — оформляем отдельной return-операцией (товар на склад возврата, долг вниз)
  if(ret>0){returnTxId=uid('r');
    txSend('return',{id:returnTxId,client:o.client,agent:me().id,date:today(),at:now(),type:'expired',
      items:[],amount:ret,orderId:'',orderDate:'',viaDelivery:true});}
  const p={id:uid('o'),deliverOf:oid,client:o.client,agent:me().id,date:today(),at:now(),
    orderTotal:o.total,cash,deposit:dep,returnAmt:ret,returnTxId,method:m,items:o.items||[],
    consignPhotos:willDebt?PROOF.photos.slice():[]};
  txSend('deliver',p);
  // локально: заказ доставлен, баланс пересчитан
  // долг>0, депозит<0. Возврат и деньги уменьшают долг, новый заказ увеличивает.
  o.status='delivered';o.deliveredAt=now();
  if(willDebt){o.consignPhotos=PROOF.photos.slice();o.consignAt=now();o.consignPaid=false;}
  if(c){c.debt=(c.debt||0)+o.total-ret-cash;}
  if(VISIT&&VISIT.client===o.client){VISIT.actions.push('order');visitSave();}
  PROOF={oid:null,client:null,photos:[],_pending:null};
  closeM();render();toast('Доставлено: '+o.number);
}

/* ===== ФОТОНАКЛАДНАЯ КОНСИГНАЦИИ: камера-онли · штамп даты-времени · до 3 фото ===== */
let PROOF={oid:null,client:null,photos:[],_pending:null};   // photos: [{data,at}]
let _camStream=null;
function stampNow(){const d=tz();const p=n=>String(n).padStart(2,'0');
  return p(d.getDate())+'.'+p(d.getMonth()+1)+'.'+d.getFullYear()+' '+p(d.getHours())+':'+p(d.getMinutes());}
function stopCamStream(){if(_camStream){_camStream.getTracks().forEach(t=>t.stop());_camStream=null;}}
function closeProofCam(){stopCamStream();const ov=document.getElementById('camov');if(ov)ov.remove();}
async function openProofCam(){
  if(PROOF.photos.length>=3){toast('Максимум 3 фото');return;}
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){toast('Камера недоступна на этом устройстве');return;}
  let ov=document.getElementById('camov');
  if(!ov){ov=document.createElement('div');ov.id='camov';document.body.appendChild(ov);}
  ov.style.cssText='position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column';
  ov.innerHTML=`<video id="camvid" autoplay muted playsinline style="flex:1;width:100%;object-fit:cover;background:#000"></video>
    <div style="position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;align-items:center">
      <button onclick="closeProofCam()" style="background:rgba(0,0,0,.55);border:none;color:#fff;font-size:20px;width:44px;height:44px;border-radius:50%">✕</button>
      <span style="background:rgba(0,0,0,.55);color:#fff;padding:6px 12px;border-radius:999px;font-size:13px">Накладная · ${PROOF.photos.length+1}/3</span></div>
    <div style="position:absolute;bottom:34px;left:0;right:0;display:flex;justify-content:center">
      <button onclick="snapProof()" style="width:74px;height:74px;border-radius:50%;background:#fff;border:5px solid rgba(255,255,255,.45);cursor:pointer"></button></div>`;
  try{_camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});}
  catch(e){toast('Нет доступа к камере');closeProofCam();return;}
  const v=document.getElementById('camvid');if(v)v.srcObject=_camStream;
}
function snapProof(){
  const v=document.getElementById('camvid');if(!v||!v.videoWidth){toast('Камера ещё не готова');return;}
  const max=1100;let w=v.videoWidth,h=v.videoHeight;
  if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}
  const cv=document.createElement('canvas');cv.width=w;cv.height=h;const ctx=cv.getContext('2d');
  ctx.drawImage(v,0,0,w,h);
  const txt=stampNow();const fs=Math.max(14,Math.round(w*0.034));ctx.font='bold '+fs+'px Arial';
  const tw=ctx.measureText(txt).width;const pad=Math.round(fs*0.45);
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(w-tw-pad*2-8,h-fs-pad*2-8,tw+pad*2,fs+pad*2);
  ctx.fillStyle='#fff';ctx.textBaseline='top';ctx.fillText(txt,w-tw-pad-8,h-fs-pad-8);
  const data=cv.toDataURL('image/jpeg',0.7);
  PROOF._pending={data,at:now()};stopCamStream();
  const ov=document.getElementById('camov');if(!ov)return;
  ov.innerHTML=`<img src="${data}" style="flex:1;width:100%;object-fit:contain;background:#000">
    <div style="position:absolute;top:14px;left:0;right:0;text-align:center;color:#fff;font-size:13px;opacity:.85">Фото подходит?</div>
    <div style="position:absolute;bottom:34px;left:0;right:0;display:flex;justify-content:center;gap:46px">
      <button onclick="openProofCam()" style="width:64px;height:64px;border-radius:50%;background:#fff;border:none;font-size:26px" title="переснять">↻</button>
      <button onclick="acceptProof()" style="width:64px;height:64px;border-radius:50%;background:#1F8A4C;border:none;color:#fff;font-size:30px" title="принять">✓</button></div>`;
}
function acceptProof(){if(PROOF._pending){PROOF.photos.push(PROOF._pending);PROOF._pending=null;}closeProofCam();renderProof();toast('📄 Фото добавлено');}
function delProof(i){PROOF.photos.splice(i,1);renderProof();}
function renderProof(){const box=document.getElementById('dv_proof');if(!box)return;

/* фото консигнации по клиенту (для должников/возврата остатков) */

/* ---------- МАРШРУТЫ ---------- */
let RFILT={days:null,q:'',mode:'all'};
function vRoutes(){
  const m=me();
  const myRoutes=L('routes').filter(r=>(!m.terr||r.terr===m.terr)&&!((m.restrictRoutes||[]).includes(r.id)));
  // по умолчанию — маршрут сегодняшнего дня
  if(!RFILT.days){const dow=(new Date(today()+'T12:00').getDay()+6)%7+1;
    const todayR=myRoutes.filter(r=>r.dow===dow).map(r=>r.id);
    RFILT.days=todayR.length?todayR:myRoutes.map(r=>r.id);}
  let clients=RFILT.allPoints?myClients().slice():myClients().filter(c=>RFILT.days.includes(c.route));
  if(RFILT.q){const q=RFILT.q.toLowerCase();clients=clients.filter(c=>(c.name||'').toLowerCase().includes(q)||(c.addr||'').toLowerCase().includes(q));}
  if(RFILT.mode==='order')clients=clients.filter(c=>!visitedToday(c.id));
  if(RFILT.mode==='ret')clients=clients.filter(c=>c.debt<0||visitedToday(c.id));
  if(GEO)clients.sort((a,b)=>(distKm(GEO,[a.lat,a.lng])||99)-(distKm(GEO,[b.lat,b.lng])||99));
  const baseList=RFILT.allPoints?myClients():myClients().filter(c=>RFILT.days.includes(c.route));
  const done=baseList.filter(c=>visitedToday(c.id)).length;
  const total=baseList.length;
  $('#page').innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin:2px 0 12px">
    <div style="font-size:19px;font-weight:800">Маршрут <span style="color:var(--muted)">(${done}/${total})</span></div>
    <span class="pill gray">${today().split('-').reverse().slice(0,2).join('.')}</span></div>
  <div class="search"><input placeholder="Поиск" value="${esc(RFILT.q)}" oninput="RFILT.q=this.value;vRoutes()"></div>
  <div class="chiprow">
    <button class="chip ${RFILT.mode==='all'?'on':''}" onclick="RFILT.mode='all';vRoutes()">Все</button>
    <button class="chip ${RFILT.mode==='order'?'on':''}" onclick="RFILT.mode='order';vRoutes()">🛒 Заказ</button>
    <button class="chip ${RFILT.mode==='ret'?'on':''}" onclick="RFILT.mode='ret';vRoutes()">⇄ Возврат</button>
  </div>
  <div class="chiprow"><button class="chip ${RFILT.allPoints?'on':''}" style="padding:8px 14px;font-size:13px" onclick="RFILT.allPoints=true;vRoutes()">Все</button>${myRoutes.map(r=>`<button class="chip ${!RFILT.allPoints&&RFILT.days.includes(r.id)?'on':''}" style="padding:8px 14px;font-size:13px" onclick="toggleDay('${r.id}')">${esc(r.name)}</button>`).join('')}</div>
  ${clients.length?clients.map(c=>{
    const v=visitedToday(c.id);const d=GEO&&c.lat?distKm(GEO,[c.lat,c.lng]):null;
    return `<div class="rcard">

function initPickMap(){
  const key=(DATA.integrationsPublic&&DATA.integrationsPublic.yandex&&DATA.integrationsPublic.yandex.apikey)||'';
  const run=()=>ymaps.ready(()=>{
    const el=document.getElementById('pickmap');if(!el)return;
    if(NCPICK){try{NCPICK.destroy();}catch(e){}}
    const c=NCGEO||GEO||[41.311,69.279];
    NCPICK=new ymaps.Map('pickmap',{center:c,zoom:NCGEO?17:13,controls:['zoomControl']});
    let mk=null;
    const setPt=(coords)=>{NCGEO=coords;
      if($('#nc_coords'))$('#nc_coords').textContent='📍 '+coords[0].toFixed(5)+', '+coords[1].toFixed(5);
      if(mk)mk.geometry.setCoordinates(coords);
      else{mk=new ymaps.Placemark(coords,{},{preset:'islands#redDotIcon',draggable:true});
        mk.events.add('dragend',()=>{NCGEO=mk.geometry.getCoordinates();ncDraft();
          if($('#nc_coords'))$('#nc_coords').textContent='📍 '+NCGEO[0].toFixed(5)+', '+NCGEO[1].toFixed(5);});
        NCPICK.geoObjects.add(mk);}ncDraft();};
    if(NCGEO)setPt(NCGEO);
    NCPICK.events.add('click',e=>setPt(e.get('coords')));
    NCPICK._setPt=setPt;
  });
  if(window.ymaps&&window.ymaps.Map)run();
  else if(!window._ymload){window._ymload=1;const sc=document.createElement('script');
    sc.src='https://api-maps.yandex.ru/2.1/?lang=ru_RU'+(key?'&apikey='+encodeURIComponent(key):'');
    sc.onload=run;document.head.appendChild(sc);}
  else{const wait=setInterval(()=>{if(window.ymaps&&window.ymaps.Map){clearInterval(wait);run();}},300);}
}

/* ===== ПОГОДА (Open-Meteo, Ташкент) ===== */
let WX=null;
/* Полноэкранная анимация погоды (7 сек) — 20 явлений, выбирается по реальной погоде или случайно */
function wxFullscreen(force){
  if(!wxAnimOn())return;  // анимация может быть выключена в настройках
  if(!force&&localStorage.getItem('wx_fs_shown')===today())return;  // 1 раз в день
  localStorage.setItem('wx_fs_shown',today());
  const code=WX&&WX.current?WX.current.weather_code:0;
  const h=new Date().getHours();const night=h<6||h>=20;
  const month=new Date().getMonth();const winter=month===11||month<2;
  // выбор сцены: по погоде, ночи, сезону
  let scene;
  if(code>=95)scene='storm';
  else if(code>=71&&code<=77)scene=winter?'santa':'snow';
  else if((code>=61&&code<=65)||(code>=80&&code<=82))scene='rain';
  else if(code>=51&&code<=55)scene='drizzle';
  else if(code===45||code===48)scene='fog';
  else if(code===3)scene='overcast';
  else if(code===2)scene='clouds';
  else if(code===1)scene=night?'night':'sunny';
  else scene=night?'night':'sunny';
  wxPlayScene(scene);
}
function rnd(a,b){return a+Math.random()*(b-a);}
function wxPlayScene(scene){
  const old=document.getElementById('wxfs');if(old)old.remove();
  const ov=document.createElement('div');ov.id='wxfs';
  let bg='linear-gradient(135deg,#2E9BD6,#62C3F0)',inner='',label='';
  const drops=(n,cls,dur)=>Array.from({length:n},()=>`<div class="${cls}" style="left:${rnd(0,100)}%;animation-duration:${rnd(dur[0],dur[1]).toFixed(2)}s;animation-delay:${rnd(0,2).toFixed(2)}s"></div>`).join('');
  const flakes=(n,glyph)=>Array.from({length:n},()=>`<div class="fs-flake" style="left:${rnd(0,100)}%;font-size:${rnd(12,26).toFixed(0)}px;animation-duration:${rnd(4,8).toFixed(2)}s;animation-delay:${rnd(0,3).toFixed(2)}s">${glyph}</div>`).join('');
  const stars=n=>Array.from({length:n},()=>`<div class="fs-star" style="left:${rnd(0,100)}%;top:${rnd(0,70)}%;animation-duration:${rnd(1.5,3.5).toFixed(2)}s"></div>`).join('');
  const clouds=n=>Array.from({length:n},(_, i)=>`<div class="fs-cloud" style="top:${rnd(8,60)}%;animation-duration:${rnd(14,26).toFixed(2)}s;animation-delay:${(i*1.5).toFixed(1)}s;transform:scale(${rnd(.6,1.2).toFixed(2)})"></div>`).join('');
  switch(scene){
    case 'sunny':bg='linear-gradient(135deg,#2E9BD6,#7FD0F0)';inner=`<div class="fs-sun"></div>${clouds(3)}`;label='☀️ Солнечно';break;

/* Погодный фон: возвращает {grad, layers, emoji, label} по коду WMO + времени суток */
function wxScene(code){
  const h=new Date().getHours();const night=h<6||h>=20;
  const drops=n=>Array.from({length:n},()=>`<div class="wx-drop" style="left:${Math.random()*100}%;animation-delay:${(Math.random()*1).toFixed(2)}s;animation-duration:${(0.6+Math.random()*0.6).toFixed(2)}s"></div>`).join('');
  const flakes=n=>Array.from({length:n},()=>`<div class="wx-flake" style="left:${Math.random()*100}%;animation-delay:${(Math.random()*5).toFixed(2)}s;font-size:${(9+Math.random()*6).toFixed(0)}px">❄</div>`).join('');
  const stars=n=>Array.from({length:n},()=>`<div class="wx-star" style="left:${Math.random()*100}%;top:${(Math.random()*60)}%;animation-delay:${(Math.random()*3).toFixed(2)}s"></div>`).join('');
  const clouds=`<div class="wx-cloud wx-c1"></div><div class="wx-cloud wx-c2"></div>`;
  const sun=`<div class="wx-sun"></div>`;
  const fog=`<div class="wx-fog" style="top:30%"></div><div class="wx-fog" style="top:55%;animation-delay:5s"></div>`;
  // 10 сцен
  if(code===0) return night?{grad:'linear-gradient(135deg,#1b2a4a,#33406b)',layers:stars(20),emoji:'🌙',label:'Ясная ночь'}
                             :{grad:'linear-gradient(135deg,#2E9BD6,#62C3F0)',layers:sun,emoji:'☀️',label:'Солнечно'};
  if(code===1) return {grad:'linear-gradient(135deg,#3BA0D0,#7FC9E8)',layers:sun+clouds,emoji:'🌤',label:'В основном ясно'};
  if(code===2) return {grad:'linear-gradient(135deg,#6E8BA8,#9FB6CC)',layers:clouds+sun,emoji:'⛅',label:'Переменная облачность'};
  if(code===3) return {grad:'linear-gradient(135deg,#7A8699,#A6B0BE)',layers:clouds,emoji:'☁️',label:'Пасмурно'};
  if(code===45||code===48) return {grad:'linear-gradient(135deg,#8A93A0,#B4BAC2)',layers:fog+clouds,emoji:'🌫',label:'Туман'};
  if(code>=51&&code<=55) return {grad:'linear-gradient(135deg,#5B7387,#85A0B3)',layers:clouds+drops(14),emoji:'🌦',label:'Морось'};
  if((code>=61&&code<=65)||(code>=80&&code<=82)) return {grad:'linear-gradient(135deg,#3F5161,#647889)',layers:clouds+drops(40),emoji:'🌧',label:'Дождь'};
  if(code>=71&&code<=77) return {grad:'linear-gradient(135deg,#7E8CA3,#AEB9CC)',layers:clouds+flakes(30),emoji:'🌨',label:'Снег'};
  if(code>=95) return {grad:'linear-gradient(135deg,#2C3340,#4A5564)',layers:clouds+drops(36)+'<div class="wx-bolt">⚡</div>',emoji:'⛈',label:'Гроза'};
  return {grad:'linear-gradient(135deg,#1F4D3A,#2E6B50)',layers:'',emoji:'🌡',label:''};
}
/* ===== Полноэкранная анимация погоды на 15 сек ===== */
function wxSceneKey(code){
  const h=new Date().getHours();const night=h<6||h>=20;
  if(code>=95)return 'storm';
  if(code>=71&&code<=77)return 'snow';
  if((code>=61&&code<=65)||(code>=80&&code<=82))return 'rain';
  if(code>=51&&code<=55)return 'drizzle';
  if(code===45||code===48)return 'fog';
  if(code===3)return 'overcast';
  if(code===2)return 'clouds';
  if(code===1)return night?'night':'sunny';
  return night?'night':'sunny';
}

  }else if(code===0||code===1){ // ясно
    if(night){grad='linear-gradient(#0f1b3a,#243156)';for(let i=0;i<60;i++)parts+=`<div class="fs-star" style="left:${rnd(0,100)}%;top:${rnd(0,70)}%;animation-delay:${rnd(0,2.5).toFixed(1)}s"></div>`;}
    else{grad='linear-gradient(#3ea8e0,#8fd0f0)';parts=`<div class="fs-sun"></div>`;for(let i=0;i<10;i++)parts+=`<div class="fs-ray" style="transform:translateX(-50%) rotate(${i*36}deg)"></div>`;}
  }else if(code===45||code===48){ // туман
    grad='linear-gradient(#9aa3ad,#c3c9d0)';for(let i=0;i<5;i++)parts+=`<div class="fs-cloud" style="top:${15+i*16}%;animation-duration:${rnd(14,26).toFixed(0)}s;opacity:.6"></div>`;
  }else{ // облачно (2,3 и прочее) — плывущие облака
    grad='linear-gradient(#7c8ba0,#aab6c6)';for(let i=0;i<6;i++)parts+=`<div class="fs-cloud" style="top:${8+i*14}%;animation-duration:${rnd(16,30).toFixed(0)}s;animation-delay:${rnd(0,8).toFixed(0)}s"></div>`;

  document.body.appendChild(ov);
  requestAnimationFrame(()=>ov.classList.add('show'));
  if(wxSoundOn())wxPlaySound(code);
  setTimeout(()=>{ov.classList.remove('show');setTimeout(()=>{if(ov)ov.remove();wxStopSound();},900);},15000);
}
let _wxAudio=null,_wxNodes=[];
function wxPlaySound(code){
  try{
    _wxAudio=_wxAudio||new (window.AudioContext||window.webkitAudioContext)();const ctx=_wxAudio;
    if((code>=51&&code<=82)||code>=95){ // шум дождя (отфильтрованный шум)
      const buf=ctx.createBuffer(1,ctx.sampleRate*2,ctx.sampleRate);const data=buf.getChannelData(0);
      for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*0.3;
      const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;
      const flt=ctx.createBiquadFilter();flt.type='bandpass';flt.frequency.value=1200;flt.Q.value=0.6;
      const g=ctx.createGain();g.gain.value=0.12;
      src.connect(flt);flt.connect(g);g.connect(ctx.destination);src.start();_wxNodes=[src,g];
    }else if(code===0||code===1){ // лёгкая «солнечная» нота
      const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=528;g.gain.value=0.04;
      o.connect(g);g.connect(ctx.destination);o.start();_wxNodes=[o,g];
    }else{ // ветер для облаков/снега
      const buf=ctx.createBuffer(1,ctx.sampleRate*2,ctx.sampleRate);const data=buf.getChannelData(0);
      for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*0.2;
      const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;
      const flt=ctx.createBiquadFilter();flt.type='lowpass';flt.frequency.value=400;
      const g=ctx.createGain();g.gain.value=0.08;
      src.connect(flt);flt.connect(g);g.connect(ctx.destination);src.start();_wxNodes=[src,g];
    }
  }catch(e){}
}
function wxStopSound(){try{_wxNodes.forEach(n=>{if(n.stop)n.stop();if(n.disconnect)n.disconnect();});_wxNodes=[];}catch(e){}}

function pedAutoStart(){
  if(PED_ON)return;

  // iOS требует разрешение по жесту — открытие шагомера это и есть жест
  if(typeof DeviceMotionEvent.requestPermission==='function'){
    DeviceMotionEvent.requestPermission().then(p=>{if(p==='granted'){PED_ON=true;window.addEventListener('devicemotion',pedStep);}else{const el=$('#ped_status');if(el)el.textContent='Разрешите доступ к движению в настройках браузера';}}).catch(()=>{});
  }else{PED_ON=true;window.addEventListener('devicemotion',pedStep);}
}
let _pedLast=0,_pedPeak=false,_pedAvg=10,_pedBuf=[];
function pedStep(e){
  const a=e.accelerationIncludingGravity||e.acceleration;if(!a)return;
  const mag=Math.sqrt((a.x||0)**2+(a.y||0)**2+(a.z||0)**2);
  _pedBuf.push(mag);if(_pedBuf.length>15)_pedBuf.shift();
  _pedAvg=_pedBuf.reduce((s,v)=>s+v,0)/_pedBuf.length;
  const now=Date.now();
  const thr=_pedAvg+1.8;
  if(mag>thr&&!_pedPeak&&now-_pedLast>250){
    _pedPeak=true;_pedLast=now;PED.steps=(PED.steps||0)+1;pedSave();
    pedRefresh();
  }
  if(mag<_pedAvg+0.8)_pedPeak=false;
}

function _mAt(m){if(m&&m._k){const p=String(m._k).split('_');if(p[2])return p[2];}return (m&&m.at)||'';}
function msgsMerge(list,incoming){ // слить по _k ИЛИ id (защита от дублей optimistic-сообщений)
  list=list||[];const byK={},byId={};
  list.forEach((m,i)=>{if(m._k)byK[m._k]=i;if(m.id)byId[m.id]=i;});
  incoming.forEach(n=>{
    let i=(n._k&&byK[n._k]!==undefined)?byK[n._k]:((n.id&&byId[n.id]!==undefined)?byId[n.id]:undefined);
    if(i!==undefined)list[i]=n;else list.push(n);
  });
  list.sort((a,b)=>{const d=String(_mAt(a)).localeCompare(String(_mAt(b)));return d!==0?d:String(a.id||'').localeCompare(String(b.id||''));});

async function msgAppend(gid,msg){ // ВСТАВКА одной строки; при неудаче — в очередь
  const k=_cmsgKey(gid);msg._k=k;
  const val={...msg};delete val._k;delete val._pending;
  let ok=false;
  try{const r=await fetch(SB_URL+'/rest/v1/crm_kv?on_conflict=key',{method:'POST',headers:{...H(),'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify([{key:k,value:val,updated_at:new Date().toISOString()}])});ok=r.ok;}catch(e){ok=false;}

    if(CURGRP&&CURGRP.id===gid)chatGrpRender(true);
    toast('⏳ Нет связи — отправится автоматически');}
  return msg;
}
async function msgPatch(msg){ // правка/удаление; офлайн — правим очередь или ставим патч в очередь
  if(!msg||!msg._k)return;
  const val={...msg};delete val._k;delete val._pending;
  const qa=CHAT_OUTBOX.find(x=>x.t==='a'&&x.k===msg._k);
  if(qa){qa.val=val;chatOutboxSave();return;} // сообщение ещё не ушло — правим прямо в очереди
  let ok=false;
  try{const r=await fetch(SB_URL+'/rest/v1/crm_kv?key=eq.'+encodeURIComponent(msg._k),{method:'PATCH',headers:{...H(),'Prefer':'return=minimal'},body:JSON.stringify({value:val,updated_at:new Date().toISOString()})});ok=r.ok;}catch(e){ok=false;}
  if(!ok){const qp=CHAT_OUTBOX.find(x=>x.t==='p'&&x.k===msg._k);
    if(qp)qp.val=val;else CHAT_OUTBOX.push({t:'p',k:msg._k,val});
    chatOutboxSave();}
}
let _obFlushing=false;
async function flushChatOutbox(){

    while(CHAT_OUTBOX.length){
      const it=CHAT_OUTBOX[0];let ok=false;

        if(it.t==='a'){const r=await fetch(SB_URL+'/rest/v1/crm_kv?on_conflict=key',{method:'POST',headers:{...H(),'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify([{key:it.k,value:it.val,updated_at:new Date().toISOString()}])});ok=r.ok;}
        else{const r=await fetch(SB_URL+'/rest/v1/crm_kv?key=eq.'+encodeURIComponent(it.k),{method:'PATCH',headers:{...H(),'Prefer':'return=minimal'},body:JSON.stringify({value:it.val,updated_at:new Date().toISOString()})});ok=r.ok;}
      }catch(e){ok=false;}
      if(!ok)break; // связи нет — попробуем позже, порядок сохраняем
      CHAT_OUTBOX.shift();chatOutboxSave();
      const mm=(CMSGS||[]).find(m=>m._k===it.k);

}

    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
      ${CHAT_THEMES.map(t=>`<div onclick="localStorage.setItem('chat_theme','${t.id}');closeM();chatGrpRender()" style="cursor:pointer;border-radius:12px;overflow:hidden;border:2px solid ${chatTheme().id===t.id?'var(--green)':'transparent'}">
        <div style="height:64px;background:${t.bg}"></div>
        <div style="padding:7px;text-align:center;font-size:13px;font-weight:600">${t.name}${chatTheme().id===t.id?' ✓':''}</div></div>`).join('')}

}
function chatGrpRender(keep){
  const g=CURGRP;if(!g)return;
  let msgs=(CMSGS||[]).filter(m=>!m.deleted);
  if(_chatSearch){const q=_chatSearch.toLowerCase();msgs=msgs.filter(m=>(m.text||'').toLowerCase().includes(q));}
  if(_chatDate)msgs=msgs.filter(m=>(m.at||'').slice(0,10)===_chatDate);
  const pinned=(CMSGS||[]).find(m=>m.id===g.pinned&&!m.deleted);
  const myId=me().id,isAdmin=me().role==='admin';
  $('#page').innerHTML=`<div style="position:fixed;inset:0;z-index:30;background:#fff;display:flex;flex-direction:column;padding:calc(6px + env(safe-area-inset-top)) 12px 0;box-sizing:border-box">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex:0 0 auto">

      <input id="chat_d" type="date" value="${_chatDate}" onchange="_chatDate=this.value;chatGrpRender()" style="padding:9px;border:1.5px solid var(--line);border-radius:10px">
    </div>
    ${pinned?`<div class="card" style="padding:8px 12px;margin-bottom:8px;background:#FFF8E5;border:1px solid #F0D88A;display:flex;align-items:center;gap:8px"><span>📌</span><div style="flex:1;font-size:13px">${esc((pinned.text||'фото').slice(0,80))}</div>${grpCanManage(g)?`<button onclick="grpUnpin()" style="background:none;border:none;color:#B5841A;cursor:pointer">✕</button>`:''}</div>`:''}

        return `<div style="display:flex;justify-content:${mine?'flex-end':'flex-start'};margin-bottom:8px">
        <div onclick="msgMenu(event,'${m.id}')" style="max-width:80%;background:${mine?'#D9FDD3':'#fff'};color:#1C2536;border-radius:${mine?'16px 16px 5px 16px':'16px 16px 16px 5px'};padding:8px 11px 7px;box-shadow:0 1px 1.5px rgba(0,0,0,.14);position:relative;cursor:pointer">

          ${m.photo?`<img src="${m.photo}" style="max-width:100%;border-radius:10px;margin-bottom:${(m.text||m.geo)?'6px':'0'}">`:(m._media==='photo'?`<div style="font-size:13px;color:#8a8f98;margin-bottom:4px">📷 Фото — загрузится при связи</div>`:'')}
          ${m.geo?`<div onclick="event.stopPropagation();openGeoMap(${m.geo[0]},${m.geo[1]})" style="cursor:pointer;border-radius:10px;overflow:hidden;margin-bottom:${m.text?'6px':'0'};border:1px solid rgba(0,0,0,.10);max-width:240px"><img src="https://static-maps.yandex.ru/1.x/?ll=${m.geo[1]},${m.geo[0]}&z=16&size=240,120&l=map&pt=${m.geo[1]},${m.geo[0]},pm2rdm" style="width:100%;display:block" onerror="this.style.display='none'"><div style="display:flex;align-items:center;gap:6px;padding:8px 10px;background:#EEF6F0;font-size:12.5px;font-weight:700;color:#1F6B45">📍 Открыть в Яндекс.Картах ›</div></div>`:''}
          ${m.text?`<div style="font-size:14px;line-height:1.4;white-space:pre-wrap">${esc(m.text)}${m.edited?' <span style="font-size:10px;opacity:.5">(изм.)</span>':''}</div>`:''}
          <div style="font-size:10px;opacity:.6;text-align:right;margin-top:3px">${msgTick(m,mine)}</div>
        </div></div>`}).join(''):'<div class="hint" style="text-align:center;padding:40px">'+(_chatSearch||_chatDate?'Ничего не найдено':'Сообщений нет. Напишите первым 👋')+'</div>'}
    </div>
    ${_replyTo?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;background:#EAF3EE;border-left:3px solid var(--navy);border-radius:8px;padding:7px 10px"><div style="flex:1;font-size:12.5px;overflow:hidden"><b style="color:var(--navy)">↩️ ${esc(_replyTo.name||'')}</b><br><span style="color:#555">${esc((_replyTo.text||'').slice(0,60))}</span></div><button onclick="msgReplyCancel()" style="background:none;border:none;font-size:18px;color:#C0392B">✕</button></div>`:''}
    ${_chatPhoto?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;background:#EAF3EE;border-radius:10px;padding:8px"><img src="${_chatPhoto}" style="width:42px;height:42px;border-radius:8px;object-fit:cover"><span class="hint" style="flex:1">📷 Фото</span><button onclick="_chatPhoto=null;chatGrpRender()" style="background:none;border:none;font-size:18px;color:#C0392B">✕</button></div>`:''}
    ${_chatGeo?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;background:#EAF3EE;border-radius:10px;padding:8px"><img src="https://static-maps.yandex.ru/1.x/?ll=${_chatGeo[1]},${_chatGeo[0]}&z=15&size=80,54&l=map&pt=${_chatGeo[1]},${_chatGeo[0]},pm2rdm" style="width:54px;height:40px;border-radius:7px;object-fit:cover" onerror="this.style.display='none'"><span class="hint" style="flex:1">📍 Геопозиция прикреплена</span><button onclick="_chatGeo=null;chatGrpRender()" style="background:none;border:none;font-size:18px;color:#C0392B">✕</button></div>`:''}
    <div id="emoji_bar" style="display:none;flex-direction:column;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:8px;margin-bottom:8px;height:236px;box-sizing:border-box">
      <div style="display:flex;gap:6px;margin-bottom:8px;flex:0 0 auto">
        <button id="ptab_emoji" onclick="chatPickTab('emoji')" style="flex:1;padding:7px;border:1.5px solid var(--line);border-radius:9px;background:var(--navy);color:#fff;font-weight:700;font-size:13px;cursor:pointer">😊 Эмодзи</button>
        <button id="ptab_stick" onclick="chatPickTab('stick')" style="flex:1;padding:7px;border:1.5px solid var(--line);border-radius:9px;background:#fff;color:var(--navy);font-weight:700;font-size:13px;cursor:pointer">🎉 Стикеры</button>
        <button id="ptab_gif" onclick="chatPickTab('gif')" style="flex:1;padding:7px;border:1.5px solid var(--line);border-radius:9px;background:#fff;color:var(--navy);font-weight:700;font-size:13px;cursor:pointer">🎞 GIF</button>
      </div>
      <div id="picker_body" style="flex:1 1 auto;overflow-y:auto"></div>
    </div>
    <div style="display:flex;gap:6px;align-items:center;flex:0 0 auto;padding:8px 0 calc(10px + env(safe-area-inset-bottom))">
      <button onclick="chatToggleEmoji()" style="width:44px;height:44px;min-width:44px;border-radius:50%;border:1.5px solid var(--line);background:#fff;font-size:19px;cursor:pointer">😊</button>
      <button onclick="chatAttachMenu(event)" style="width:44px;height:44px;min-width:44px;border-radius:50%;border:1.5px solid var(--line);background:#fff;font-size:19px;cursor:pointer">📎</button>
      <input type="file" id="chat_photo_inp" accept="image/*" style="display:none" onchange="chatPickPhoto(this)">
      <input id="chat_input" placeholder="Сообщение…" style="flex:1;min-width:0;padding:12px 14px;border:1.5px solid var(--line);border-radius:22px;font-size:15px" onkeydown="if(event.key==='Enter')chatSend()">
      <button id="voice_btn" onclick="chatVoiceToggle()" style="width:44px;height:44px;min-width:44px;border-radius:50%;border:1.5px solid var(--navy);background:#fff;font-size:19px;cursor:pointer" title="Голосовое">🎤</button>
      <button onclick="chatSend()" style="width:48px;height:48px;min-width:48px;border-radius:50%;border:none;background:#3B6FE0;color:#fff;font-size:21px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(59,111,224,.5);cursor:pointer">➤</button>
    </div></div>`;
  const box=$('#chat_box');if(box)box.scrollTop=box.scrollHeight;
}
function chatToggleSearch(){const b=$('#chat_search_bar');if(b)b.style.display=b.style.display==='none'?'flex':'none';if(b&&b.style.display==='none'){_chatSearch='';_chatDate='';chatGrpRender();}}
function chatTime(iso){try{const d=new Date(iso);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}catch(e){return '';}}
function chatPickPhoto(inp){const f=inp.files&&inp.files[0];if(!f)return;toast('Обработка…');const r=new FileReader();
  r.onload=()=>{const img=new Image();img.onload=()=>{const max=900;let w=img.width,h=img.height;
    if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
    _chatPhoto=cv.toDataURL('image/jpeg',0.55);chatGrpRender();toast('✓ Фото готово');};img.src=r.result;};
  r.readAsDataURL(f);}
function openGeoMap(lat,lng){var u='https://yandex.ru/maps/?pt='+lng+','+lat+'&z=16&l=map';try{var w=window.open(u,'_blank');if(!w)location.href=u;}catch(e){location.href=u;}}
function chatAttachGeo(){
  openM(`<h2>📍 Отправить геопозицию</h2>
    <button class="btn primary" style="margin-bottom:10px" onclick="chatGeoCurrent()">📍 Моя геопозиция (GPS)</button>
    <button class="btn ghost" onclick="chatGeoPick()">🗺 Указать на карте вручную</button>
    <button class="btn ghost" style="margin-top:10px" onclick="closeM()">${T('btnCancel')}</button>`);
}
function chatGeoCurrent(){
  const set=(la,lo)=>{_chatGeo=[la,lo];closeM();chatGrpRender();toast('📍 Геопозиция прикреплена');};
  if(GEO){set(GEO[0],GEO[1]);return;}
  if(navigator.geolocation){toast('Определяем…');navigator.geolocation.getCurrentPosition(p=>set(p.coords.latitude,p.coords.longitude),()=>toast('Не удалось получить GPS'),{enableHighAccuracy:true,timeout:10000,maximumAge:0});}
  else toast('Геолокация недоступна');
}
let _chatPickGeo=null,_chatMap=null;
function chatGeoPick(){
  _chatPickGeo=_chatGeo?_chatGeo.slice():(GEO?GEO.slice():null);
  openM(`<h2>🗺 Укажите точку на карте</h2>
    <div class="search"><input id="cg_q" placeholder="Поиск адреса…" onkeydown="if(event.key==='Enter')chatGeoSearch()"></div>
    <div id="cgmap" style="height:54vh;border-radius:14px;overflow:hidden;background:#EEF1F5"></div>
    <div class="hint" id="cg_co" style="text-align:center;margin:8px 0">${_chatPickGeo?'📍 '+_chatPickGeo[0].toFixed(5)+', '+_chatPickGeo[1].toFixed(5):'Нажмите на карту, чтобы поставить точку'}</div>
    <div style="display:flex;gap:8px">
      <button class="btn ghost" style="flex:1" onclick="chatGeoCurrentOnMap()">🎯 Моё место</button>
      <button class="btn primary" style="flex:2" onclick="chatGeoConfirm()">Прикрепить точку</button></div>`);
  setTimeout(chatGeoMapInit,80);
}
function chatGeoMapInit(){
  const key=(DATA.integrationsPublic&&DATA.integrationsPublic.yandex&&DATA.integrationsPublic.yandex.apikey)||'';
  const run=()=>ymaps.ready(()=>{
    const el=document.getElementById('cgmap');if(!el)return;
    if(_chatMap){try{_chatMap.destroy();}catch(e){}}
    const c=_chatPickGeo||GEO||[41.311,69.279];
    _chatMap=new ymaps.Map('cgmap',{center:c,zoom:_chatPickGeo?17:13,controls:['zoomControl','geolocationControl']});
    let mk=null;
    const setPt=(coords)=>{_chatPickGeo=coords;
      const co=document.getElementById('cg_co');if(co)co.textContent='📍 '+coords[0].toFixed(5)+', '+coords[1].toFixed(5);
      if(mk)mk.geometry.setCoordinates(coords);
      else{mk=new ymaps.Placemark(coords,{},{preset:'islands#redDotIcon',draggable:true});
        mk.events.add('dragend',()=>setPt(mk.geometry.getCoordinates()));
        _chatMap.geoObjects.add(mk);}};
    if(_chatPickGeo)setPt(_chatPickGeo);
    _chatMap.events.add('click',e=>setPt(e.get('coords')));
    _chatMap._setPt=setPt;
  });
  if(window.ymaps&&window.ymaps.Map)run();
  else if(!window._ymload){window._ymload=1;const sc=document.createElement('script');
    sc.src='https://api-maps.yandex.ru/2.1/?lang=ru_RU'+(key?'&apikey='+encodeURIComponent(key):'');
    sc.onload=run;document.head.appendChild(sc);}
  else{const wait=setInterval(()=>{if(window.ymaps&&window.ymaps.Map){clearInterval(wait);run();}},300);}
}
function chatGeoSearch(){const q=($('#cg_q')?.value||'').trim();if(!q||!window.ymaps)return;
  ymaps.geocode(q,{results:1}).then(res=>{const obj=res.geoObjects.get(0);if(!obj){toast('Не найдено');return;}
    const c=obj.geometry.getCoordinates();if(_chatMap&&_chatMap._setPt){_chatMap._setPt(c);_chatMap.setCenter(c,17);}});}
function chatGeoCurrentOnMap(){if(!navigator.geolocation){toast('GPS недоступен');return;}toast('🎯 Определяем…');
  navigator.geolocation.getCurrentPosition(p=>{const c=[p.coords.latitude,p.coords.longitude];if(_chatMap&&_chatMap._setPt){_chatMap._setPt(c);_chatMap.setCenter(c,17);}},()=>toast('Не удалось'),{enableHighAccuracy:true,timeout:10000,maximumAge:0});}
function chatGeoConfirm(){if(!_chatPickGeo){toast('Поставьте точку на карте');return;}
  _chatGeo=_chatPickGeo.slice();closeM();chatGrpRender();toast('📍 Точка прикреплена');}
async function chatSend(){
  const inp=$('#chat_input');const text=inp?inp.value.trim():'';
  if(!text&&!_chatPhoto&&!_chatGeo)return;
  const msg={id:'m'+Date.now()+Math.floor(Math.random()*999),from:me().id,name:me().name,text,photo:_chatPhoto||null,geo:_chatGeo||null,reply:_replyTo||null,at:new Date().toISOString()};
  _chatPhoto=null;_chatGeo=null;_replyTo=null;if(inp)inp.value='';
  CMSGS=CMSGS||[];CMSGS.push(msg);chatGrpRender(true);   // мгновенно локально
  await msgAppend(CURGRP.id,msg);                         // вставка отдельной строки
}
async function grpPin(mid){if(!grpCanPin()){toast('Закреплять может админ или супервайзер');return;}GROUPS=await grpLoad();const g=GROUPS.find(x=>x.id===CURGRP.id);g.pinned=mid;CURGRP=g;await grpSave(GROUPS);chatGrpRender();toast('📌 Закреплено');}
async function grpUnpin(){GROUPS=await grpLoad();const g=GROUPS.find(x=>x.id===CURGRP.id);g.pinned=null;CURGRP=g;await grpSave(GROUPS);chatGrpRender();}
async function grpDelMsg(mid){
  const m=(CMSGS||[]).find(x=>x.id===mid);
  if(!m)return;
  if(m.from!==me().id&&me().role!=='admin'){toast('Можно удалять только свои сообщения');return;}
  m.deleted=true;chatGrpRender();await msgPatch(m);toast('Сообщение удалено');}
let _pickTab='emoji',_gifQ='';
const EMOJISET='😀 😁 😂 🤣 😊 😇 🙂 🙃 😉 😍 🥰 😘 😗 😚 😋 😛 😜 🤪 😝 🤗 🤭 🤔 😐 😶 😏 😒 🙄 😌 😔 😪 🤤 😴 😷 🤒 🤕 🤢 🥵 🥶 😵 🤯 🤠 🥳 😎 🤓 🧐 😕 🙁 😮 😲 🥺 😨 😰 😥 😢 😭 😱 😖 😞 😩 😫 😤 😡 😠 🤬 😈 💀 💩 🤡 👍 👎 👌 ✌️ 🤞 🤟 🤘 👏 🙌 🙏 💪 🫶 👋 🤙 ☝️ ✋ 🖐️ 🖖 👐 🔥 ❤️ 🧡 💛 💚 💙 💜 🖤 🤍 💯 ✅ ❌ ⚡ ⭐ 🌟 ✨ 🎉 🎊 🎁 🎈 ☕ 🍵 🍪 🍩 🍰 🎂 🍫 🍬 🍭 🍦 🍎 🍌 🥤 📦 🚚 🚗 💰 💵 💳 📈 📉 📊 📍 📌 ⏰ ⌛ 📅 ✏️ 📞 📱 💬 ✔️ ☀️ 🌤 🌧 ⛈ ❄️ ⛄ 🌈 🌙';
const STICKERSET='🎉 🔥 👍 ❤️ 😂 🥳 💪 🏆 ✅ 🚀 🌟 🍪 👏 🙏 💯 😎 🤝 💰 📦 🚚 ☕ 🎁 😍 🤣 🥰 😴 🤔 👌 ⚡ 🌈';
function chatToggleEmoji(){const b=$('#emoji_bar');if(!b)return;const show=b.style.display==='none';b.style.display=show?'flex':'none';if(show)chatPickTab(_pickTab||'emoji');}
function chatPickTab(tab){_pickTab=tab;
  const setb=(id,on)=>{const el=$('#'+id);if(el){el.style.background=on?'var(--navy)':'#fff';el.style.color=on?'#fff':'var(--navy)';}};
  setb('ptab_emoji',tab==='emoji');setb('ptab_stick',tab==='stick');setb('ptab_gif',tab==='gif');
  const body=$('#picker_body');if(!body)return;
  if(tab==='emoji'){body.innerHTML='<div style="display:flex;flex-wrap:wrap;gap:2px">'+EMOJISET.split(' ').map(e=>`<span onclick="chatInsertEmoji('${e}')" style="font-size:26px;cursor:pointer;padding:3px;line-height:1">${e}</span>`).join('')+'</div>';}
  else if(tab==='stick'){body.innerHTML='<div style="display:flex;flex-wrap:wrap;gap:6px">'+STICKERSET.split(' ').map(e=>`<span onclick="chatSendSticker('${e}')" style="font-size:46px;cursor:pointer;padding:4px;line-height:1">${e}</span>`).join('')+'</div>';}
  else {body.innerHTML=`<div style="display:flex;gap:6px;margin-bottom:8px"><input id="gif_q" value="${esc(_gifQ)}" placeholder="Поиск GIF…" onkeydown="if(event.key==='Enter')chatGifSearch()" style="flex:1;padding:8px;border:1.5px solid var(--line);border-radius:8px"><button onclick="chatGifSearch()" style="background:var(--navy);color:#fff;border:none;border-radius:8px;padding:0 12px;cursor:pointer">🔍</button></div><div id="gif_grid" style="display:grid;grid-template-columns:1fr 1fr;gap:6px"><div class="hint" style="grid-column:1/3;text-align:center">Загрузка…</div></div>`;chatGifLoad(_gifQ);}
}
function chatGifSearch(){const q=$('#gif_q');_gifQ=q?q.value.trim():'';chatGifLoad(_gifQ);}
async function chatGifLoad(q){const grid=$('#gif_grid');if(!grid)return;grid.innerHTML='<div class="hint" style="grid-column:1/3;text-align:center">Загрузка…</div>';
  const key=(DATA.integrationsPublic&&DATA.integrationsPublic.giphy)||'WENHXnadU7mlytVLb2BO2c3FDKWt9yJ3';
